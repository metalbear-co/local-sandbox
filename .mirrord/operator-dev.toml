operator = false
skip_sip = ["operator-service"]

# The sip_utils feature unpacks pre-built SIP utility binaries from a tar.gz
# embedded in the mirrord CLI at compile time. Locally-built CLI binaries often
# have a corrupt or missing archive, which causes a "failed to iterate over
# archive" SIP error on macOS. Disabling it falls back to normal SIP patching.
[experimental]
sip_utils = false

[target]
path = "deployment/mirrord-operator"
namespace = "mirrord"

[agent]
log_level = "mirrord=debug"
image = "test"
image_pull_policy = "Never"
namespace = "mirrord"
clean_iptables_on_start = true

[feature.network]
incoming = "steal"

[feature.fs]
mode = "read"
read_only = ["/var.+", "/mirrord.+"]

[feature.env.override]
RUST_LOG = "operator_service=info,mirrord=info,operator_kafka_splitting=debug,operator_pod_mutator=debug,operator_queue_splitting=debug"
