operator:
  image: mirrord-operator
  sqsSplitting: true
  kafkaSplitting: true
  mysqlBranching: true
  pgBranching: true
  mongodbBranching: true
  awsRoleArn: arn:aws:iam::000000000000:role/dummy
  metrics: true 
  jsonLog: true
  logLevel: "debug"
  # Increased resource limits for multi-cluster operations
  limits:
    memory: 512Mi
    cpu: 500m
license:
  pemRef: "mirrord-operator-license-pem"
createNamespace: false
image:
  pullPolicy: Never