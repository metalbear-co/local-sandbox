operator:
  image: mirrord-operator
  sqsSplitting: true
  kafkaSplitting: true
  mysqlBranching: true
  pgBranching: true
  mongodbBranching: true
  awsRoleArn: arn:aws:iam::000000000000:role/dummy
  metrics: true 
  jsonLog: true
  logLevel: "debug"
  # Increased resource limits for multi-cluster operations
  limits:
    memory: 512Mi
    cpu: 500m
  # AWS credentials for LocalStack (SQS splitting tests)
  extraEnv:
    AWS_ENDPOINT_URL: "http://localstack.localstack.svc.cluster.local:4566"
    AWS_ACCESS_KEY_ID: "test"
    AWS_SECRET_ACCESS_KEY: "test"
    AWS_REGION: "us-east-1"
license:
  pemRef: "mirrord-operator-license-pem"
createNamespace: false
image:
  pullPolicy: Never