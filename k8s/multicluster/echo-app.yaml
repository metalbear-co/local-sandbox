apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo-app
  namespace: test-multicluster
  labels:
    app: echo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: echo-app
  template:
    metadata:
      labels:
        app: echo-app
    spec:
      containers:
      - name: echo
        image: echo-app:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
        env:
        - name: CLUSTER_ID
          value: "UNKNOWN"
        - name: PORT
          value: "8080"
---
apiVersion: v1
kind: Service
metadata:
  name: echo-app
  namespace: test-multicluster
spec:
  selector:
    app: echo-app
  ports:
  - port: 8080
    targetPort: 8080
