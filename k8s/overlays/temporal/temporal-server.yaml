apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal-postgres
  namespace: temporal
  labels:
    app: temporal-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temporal-postgres
  template:
    metadata:
      labels:
        app: temporal-postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        env:
        - name: POSTGRES_USER
          value: temporal
        - name: POSTGRES_PASSWORD
          value: temporal
        ports:
        - containerPort: 5432
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - temporal
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: temporal-postgres
  namespace: temporal
spec:
  selector:
    app: temporal-postgres
  ports:
  - port: 5432
    targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal
  namespace: temporal
  labels:
    app: temporal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temporal
  template:
    metadata:
      labels:
        app: temporal
    spec:
      initContainers:
      - name: wait-for-postgres
        image: busybox:latest
        command:
        - sh
        - -c
        - |
          until nc -z temporal-postgres.temporal.svc.cluster.local 5432 2>/dev/null; do
            sleep 2
          done
      containers:
      - name: temporal
        image: temporalio/auto-setup:1.24.2
        env:
        - name: DB
          value: postgres12
        - name: DB_PORT
          value: "5432"
        - name: POSTGRES_USER
          value: temporal
        - name: POSTGRES_PWD
          value: temporal
        - name: POSTGRES_SEEDS
          value: temporal-postgres
        ports:
        - containerPort: 7233
          name: frontend
        readinessProbe:
          tcpSocket:
            port: 7233
          initialDelaySeconds: 45
          periodSeconds: 5
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: temporal-frontend
  namespace: temporal
spec:
  selector:
    app: temporal
  ports:
  - port: 7233
    targetPort: 7233
    name: frontend
