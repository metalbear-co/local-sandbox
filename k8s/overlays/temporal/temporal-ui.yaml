apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal-ui
  namespace: temporal
  labels:
    app: temporal-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temporal-ui
  template:
    metadata:
      labels:
        app: temporal-ui
    spec:
      # K8s injects TEMPORAL_UI_PORT=tcp://... for the temporal-ui Service, but the
      # UI image expects TEMPORAL_UI_PORT to be an integer.
      enableServiceLinks: false
      initContainers:
      - name: wait-for-temporal
        image: busybox:latest
        command:
        - sh
        - -c
        - |
          until nc -z temporal-frontend.temporal.svc.cluster.local 7233 2>/dev/null; do
            sleep 2
          done
      containers:
      - name: ui
        image: temporalio/ui:2.22.2
        env:
        - name: TEMPORAL_ADDRESS
          value: temporal-frontend.temporal.svc.cluster.local:7233
        - name: TEMPORAL_UI_PORT
          value: "8080"
        - name: TEMPORAL_CORS_ORIGINS
          value: http://localhost:8080
        - name: TEMPORAL_UI_DEFAULT_NAMESPACE
          value: temporal
        ports:
        - containerPort: 8080
          name: http
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: temporal-ui
  namespace: temporal
spec:
  selector:
    app: temporal-ui
  ports:
  - port: 8080
    targetPort: 8080
    name: http
