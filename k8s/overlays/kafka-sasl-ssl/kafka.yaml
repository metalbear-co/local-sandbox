apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-cluster
  namespace: test-mirrord
  labels:
    app: kafka-cluster
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-cluster
  template:
    metadata:
      labels:
        app: kafka-cluster
    spec:
      initContainers:
        - name: setup
          image: eclipse-temurin:21-jdk
          command:
            - /bin/bash
            - -c
            - |
              set -e
              SECRETS=/etc/kafka/secrets
              PASSWORD=changeit
              FQDN=kafka-cluster.test-mirrord.svc.cluster.local

              # Generate CA
              keytool -genkeypair -alias ca \
                -keyalg RSA -keysize 2048 -validity 365 \
                -dname "CN=Test CA" \
                -keystore "$SECRETS/ca.jks" \
                -storepass "$PASSWORD" -keypass "$PASSWORD" \
                -ext bc=ca:true
              keytool -exportcert -alias ca \
                -keystore "$SECRETS/ca.jks" -storepass "$PASSWORD" \
                -rfc -file "$SECRETS/ca.crt"

              # Generate broker keystore
              keytool -genkeypair -alias broker \
                -keyalg RSA -keysize 2048 -validity 365 \
                -dname "CN=$FQDN" \
                -keystore "$SECRETS/broker.keystore.jks" \
                -storepass "$PASSWORD" -keypass "$PASSWORD" \
                -ext "SAN=DNS:$FQDN,DNS:localhost"

              # Sign broker cert with CA
              keytool -certreq -alias broker \
                -keystore "$SECRETS/broker.keystore.jks" -storepass "$PASSWORD" \
                -file "$SECRETS/broker.csr"
              keytool -gencert -alias ca \
                -keystore "$SECRETS/ca.jks" -storepass "$PASSWORD" \
                -infile "$SECRETS/broker.csr" \
                -outfile "$SECRETS/broker.signed.crt" \
                -ext "SAN=DNS:$FQDN,DNS:localhost" -rfc
              keytool -importcert -alias ca \
                -keystore "$SECRETS/broker.keystore.jks" -storepass "$PASSWORD" \
                -noprompt -file "$SECRETS/ca.crt"
              keytool -importcert -alias broker \
                -keystore "$SECRETS/broker.keystore.jks" -storepass "$PASSWORD" \
                -noprompt -file "$SECRETS/broker.signed.crt"

              # Create truststore
              keytool -importcert -alias ca \
                -keystore "$SECRETS/broker.truststore.jks" -storepass "$PASSWORD" \
                -noprompt -file "$SECRETS/ca.crt"

              # Credential files (the Docker image reads passwords from these)
              echo -n "$PASSWORD" > "$SECRETS/keystore_creds"
              echo -n "$PASSWORD" > "$SECRETS/key_creds"
              echo -n "$PASSWORD" > "$SECRETS/truststore_creds"

              # JAAS config
              cat > "$SECRETS/jaas.conf" << 'JAAS'
              KafkaServer {
                org.apache.kafka.common.security.plain.PlainLoginModule required
                username="admin"
                password="admin-secret"
                user_admin="admin-secret"
                user_testuser="testpassword";
              };
              JAAS

              echo "Setup complete"
              ls -la "$SECRETS"
          volumeMounts:
            - name: secrets
              mountPath: /etc/kafka/secrets
      containers:
        - name: kafka
          image: apache/kafka:4.1.0
          ports:
            - containerPort: 9092
              name: kafka-plain
            - containerPort: 9093
              name: controller
            - containerPort: 9094
              name: kafka-sasl
            - containerPort: 9095
              name: kafka-sasl-ssl
          env:
            - name: KAFKA_NODE_ID
              value: "1"
            - name: KAFKA_PROCESS_ROLES
              value: "broker,controller"
            - name: KAFKA_LISTENERS
              value: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,SASL_PLAINTEXT://0.0.0.0:9094,SASL_SSL://0.0.0.0:9095"
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://kafka-cluster.test-mirrord.svc.cluster.local:9092,SASL_PLAINTEXT://kafka-cluster.test-mirrord.svc.cluster.local:9094,SASL_SSL://kafka-cluster.test-mirrord.svc.cluster.local:9095"
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: "CONTROLLER"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,SASL_PLAINTEXT:SASL_PLAINTEXT,SASL_SSL:SASL_SSL"
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: "1@localhost:9093"
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
            - name: KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS
              value: "0"
            - name: KAFKA_NUM_PARTITIONS
              value: "3"
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "true"
            - name: KAFKA_DELETE_TOPIC_ENABLE
              value: "true"
            # SASL - JAAS file via KAFKA_OPTS
            - name: KAFKA_SASL_ENABLED_MECHANISMS
              value: "PLAIN"
            - name: KAFKA_OPTS
              value: "-Djava.security.auth.login.config=/etc/kafka/secrets/jaas.conf"
            # SSL - Docker image expects FILENAME + CREDENTIALS pointing to /etc/kafka/secrets/
            - name: KAFKA_SSL_KEYSTORE_FILENAME
              value: "broker.keystore.jks"
            - name: KAFKA_SSL_KEYSTORE_CREDENTIALS
              value: "keystore_creds"
            - name: KAFKA_SSL_KEY_CREDENTIALS
              value: "key_creds"
            - name: KAFKA_SSL_TRUSTSTORE_FILENAME
              value: "broker.truststore.jks"
            - name: KAFKA_SSL_TRUSTSTORE_CREDENTIALS
              value: "truststore_creds"
            - name: KAFKA_SSL_CLIENT_AUTH
              value: "none"
          volumeMounts:
            - name: secrets
              mountPath: /etc/kafka/secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          readinessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 15
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: secrets
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-cluster
  namespace: test-mirrord
spec:
  selector:
    app: kafka-cluster
  ports:
    - name: kafka-plain
      port: 9092
      targetPort: 9092
    - name: controller
      port: 9093
      targetPort: 9093
    - name: kafka-sasl
      port: 9094
      targetPort: 9094
    - name: kafka-sasl-ssl
      port: 9095
      targetPort: 9095
  type: ClusterIP
