apiVersion: apps/v1
kind: Deployment
metadata:
  name: bullmq-consumer
  namespace: test-mirrord
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bullmq-consumer
  template:
    metadata:
      labels:
        app: bullmq-consumer
    spec:
      initContainers:
      - name: wait-for-redis
        image: busybox:latest
        command:
        - sh
        - -c
        - |
          echo "Waiting for Redis to be ready..."
          until nc -z redis-main.redis-test.svc.cluster.local 6379 2>/dev/null; do
            echo "Redis not ready yet, retrying in 2s..."
            sleep 2
          done
          echo "Redis is ready!"
      containers:
      - name: consumer
        image: bullmq-consumer:local
        imagePullPolicy: Never
        env:
        - name: BULLMQ_QUEUE
          value: "orders"
        - name: REDIS_URL
          value: "redis://redis-main.redis-test.svc.cluster.local:6379"
        - name: BULLMQ_PREFIX
          value: "bull"
