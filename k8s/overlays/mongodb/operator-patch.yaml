apiVersion: apps/v1
kind: Deployment
metadata:
  name: mirrord-operator
  namespace: mirrord
spec:
  template:
    spec:
      containers:
        - name: operator
          env:
            - name: RUST_LOG
              value: "info,operator_mongodb_branching=debug"
            - name: OPERATOR_MONGODB_BRANCHING
              value: "true"
