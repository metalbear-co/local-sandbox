# Test scenario: Database branching with GCP Cloud SQL using IAM authentication
# This pod holds the connection URL - mirrord reads it from here.
# The pod itself doesn't connect to Cloud SQL.
apiVersion: v1
kind: Namespace
metadata:
  name: test-mirrord
---
apiVersion: v1
kind: Pod
metadata:
  name: pg-cloudsql-target
  namespace: test-mirrord
  labels:
    app: pg-cloudsql-target
spec:
  containers:
    - name: echo
      image: ealen/echo-server:latest
      env:
        # DATABASE_URL format: postgres://user:placeholder@host:port/database
        # The password is a placeholder - IAM auth generates the real token
        - name: DATABASE_URL
          value: "postgres://${CLOUDSQL_USER}:placeholder@${CLOUDSQL_HOST}:${CLOUDSQL_PORT}/${CLOUDSQL_DATABASE}?sslmode=require"
        # GCP credentials for the init container
        - name: GOOGLE_CLOUD_PROJECT
          value: "${GCP_PROJECT}"
        # Note: GOOGLE_APPLICATION_CREDENTIALS is typically a file path
        # In GKE with Workload Identity, credentials are automatic
      ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: pg-cloudsql-service
  namespace: test-mirrord
spec:
  selector:
    app: pg-cloudsql-target
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP

