spec:
  template:
    spec:
      containers:
      - name: mirrord-operator
        env:
        - name: GOOGLE_CLOUD_PROJECT
          value: "${GCP_PROJECT}"
        # GCP credentials JSON for inline auth
        - name: GCP_CREDENTIALS_JSON
          valueFrom:
            secretKeyRef:
              name: gcp-credentials-json
              key: credentials.json


