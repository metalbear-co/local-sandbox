# ServiceAccount with limited permissions for testing GCP Cloud SQL branching
# This helps verify that mirrord works with minimal RBAC permissions
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pg-cloudsql-sa
  namespace: test-mirrord
---
# Minimal role for the target pod (not for mirrord operator)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pg-cloudsql-role
  namespace: test-mirrord
rules:
  # Read pods (needed for mirrord target discovery)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  # Read services (needed for service discovery)
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list"]
  # Read deployments (needed for target resolution)
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
  # Read ConfigMaps (if app uses them)
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]
  # Note: NO access to secrets - mirrord operator handles that via volume mounting
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pg-cloudsql-sa-binding
  namespace: test-mirrord
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: pg-cloudsql-role
subjects:
  - kind: ServiceAccount
    name: pg-cloudsql-sa
    namespace: test-mirrord
