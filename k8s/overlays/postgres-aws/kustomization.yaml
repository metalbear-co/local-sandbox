apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# NOTE: This file is processed by envsubst in the deploy task.
# The following environment variables must be set in .env:
#   - RDS_HOST: AWS RDS endpoint (e.g., mydb.xxxxx.us-east-1.rds.amazonaws.com)
#   - RDS_PORT: RDS port (default: 5432)
#   - RDS_DATABASE: Database name
#   - RDS_USER: IAM database user (must be granted rds_iam role)
#   - AWS_REGION: AWS region (e.g., us-east-1)
#
# For IAM auth, the password in DATABASE_URL is ignored - the init container
# generates a temporary token using AWS credentials.
#
# The operator-patch.yaml is applied separately via kubectl patch command.

namespace: test-mirrord

resources:
  - app.yaml

