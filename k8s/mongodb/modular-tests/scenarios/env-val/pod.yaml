apiVersion: v1
kind: Pod
metadata:
  name: mongo-server-env-val
  namespace: test-mirrord
  labels:
    app: mongodb-app
    scenario: env-val
spec:
  containers:
  - name: app
    image: mongo:7.0
    command: ["sleep", "infinity"]
    env:
    - name: DATABASE_URL
      value: "mongodb://admin:password@mongodb-test.test-mirrord.svc.cluster.local:27017/source_db?authSource=admin"
    ports:
    - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: mongo-server-env-val
  namespace: test-mirrord
spec:
  selector:
    app: mongodb-app
    scenario: env-val
  ports:
  - port: 8080
    targetPort: 8080
