# PostgreSQL + App for EKS Multi-Cluster Testing (Database Branching)
# Deploy to remote clusters (not the primary/management cluster)
apiVersion: v1
kind: Namespace
metadata:
  name: test-multicluster
---
# PostgreSQL Database
apiVersion: v1
kind: Pod
metadata:
  name: postgres-db
  namespace: test-multicluster
  labels:
    app: postgres-db
spec:
  containers:
  - name: postgres
    image: postgres:17
    env:
    - name: POSTGRES_PASSWORD
      value: postgres
    - name: POSTGRES_USER
      value: postgres
    - name: POSTGRES_DB
      value: source_db
    ports:
    - containerPort: 5432
    readinessProbe:
      exec:
        command:
        - pg_isready
        - -U
        - postgres
      initialDelaySeconds: 5
      periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-db
  namespace: test-multicluster
spec:
  selector:
    app: postgres-db
  ports:
  - port: 5432
    targetPort: 5432
---
# Postgres App (connects to the database)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-app
  namespace: test-multicluster
  labels:
    app: postgres-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-app
  template:
    metadata:
      labels:
        app: postgres-app
    spec:
      containers:
      - name: app
        image: vladrbg/mc-postgres-app:latest
        env:
        - name: DATABASE_URL
          value: "postgresql://postgres:postgres@postgres-db:5432/source_db"
---
# Secret for mirrord pg branching
apiVersion: v1
kind: Secret
metadata:
  name: pg-connection-secret
  namespace: test-multicluster
type: Opaque
stringData:
  url: postgresql://postgres:postgres@postgres-db:5432/source_db
