# Loki Helm Values
# Chart: grafana/loki
# Docs: https://grafana.com/docs/loki/latest/
#
# Simple, efficient log storage for local development

deploymentMode: SingleBinary

loki:
  auth_enabled: false
  
  commonConfig:
    replication_factor: 1
    path_prefix: /var/loki
    ring:
      kvstore:
        store: inmemory
  
  # Disable memberlist (not needed for single replica)
  memberlist:
    join_members: []
  
  storage:
    type: filesystem
  
  schemaConfig:
    configs:
      - from: "2026-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  
  limits_config:
    ingestion_rate_mb: 10
    ingestion_burst_size_mb: 20
    max_streams_per_user: 10000
    max_entries_limit_per_query: 5000

singleBinary:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1
      memory: 1Gi
  persistence:
    enabled: false
  extraVolumes:
    - name: data
      emptyDir: {}
  extraVolumeMounts:
    - name: data
      mountPath: /var/loki

# Disable everything else
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0
gateway:
  enabled: false
test:
  enabled: false
lokiCanary:
  enabled: false
monitoring:
  selfMonitoring:
    enabled: false
  lokiCanary:
    enabled: false
chunksCache:
  enabled: false
resultsCache:
  enabled: false
