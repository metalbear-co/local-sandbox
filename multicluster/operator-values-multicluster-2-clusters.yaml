# Operator values for PRIMARY cluster - 2 CLUSTERS (primary + 1 remote)
#
# Cluster discovery: Secret-based
# Clusters are discovered from Secrets with label mirrord.metalbear.co/remote-cluster=true
#
operator:
  image: mirrord-operator
  sqsSplitting: true
  kafkaSplitting: true
  mysqlBranching: true
  pgBranching: true
  awsRoleArn: arn:aws:iam::000000000000:role/dummy
  metrics: true 
  jsonLog: true
  logLevel: "debug,operator_envoy=debug,operator_controller=debug"
  multiCluster:
    enabled: true
    primaryCluster: "primary"
    defaultCluster: "primary"  # Default cluster for stateful ops
    primaryIsManagementOnly: false  # Primary only runs Envoy
    remoteSessionTimeoutSecs: 300
    tokenRefreshIntervalSecs: 2700  # 45 minutes
    sessionTtlSecs: 60
    # Cluster credentials are created separately via task multicluster:secrets:create
    # Not in values.yaml because tokens are generated dynamically
license:
  pemRef: "mirrord-operator-license-pem"
createNamespace: false
image:
  pullPolicy: Never
