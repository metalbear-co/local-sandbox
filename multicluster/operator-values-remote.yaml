# Operator values for REMOTE clusters (remote-1, remote-2)
#
# Remote clusters run standard operators - NOT multi-cluster enabled.
# Only the PRIMARY cluster has multiCluster.enabled: true
#
operator:
  image: mirrord-operator
  sqsSplitting: true
  kafkaSplitting: true
  mysqlBranching: true
  pgBranching: true
  mongodbBranching: true
  previewEnv: true
  preview:
    image_pull_policy: "IfNotPresent"
  awsRoleArn: arn:aws:iam::000000000000:role/dummy
  metrics: true
  jsonLog: true
  logLevel: "warn,operator=debug,mirrord=debug"
  # Note: hostNetwork is patched via kubectl after helm install (not in chart)
  # AWS credentials for LocalStack - use NodePort URL (set via --set in task)
  extraEnv:
    AWS_ACCESS_KEY_ID: "test"
    AWS_SECRET_ACCESS_KEY: "test"
    AWS_REGION: "us-east-1"
  # Mark as a remote cluster member — creates ClusterRole + bindings
  multiClusterMember: true
  # multiCluster is NOT enabled on remote clusters - they're just regular operators
agent:
  image: mirrord-agent:custom
license:
  pemRef: "mirrord-operator-license-pem"
createNamespace: false
image:
  pullPolicy: Never
