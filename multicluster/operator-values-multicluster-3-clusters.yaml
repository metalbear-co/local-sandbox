# Operator values for PRIMARY cluster - 3 CLUSTERS (primary + 2 remotes)
#
# Cluster discovery: Secret-based
# Clusters are discovered from Secrets with label mirrord.metalbear.co/remote-cluster=true
#
operator:
  image: mirrord-operator
  sqsSplitting: true
  kafkaSplitting: true
  mysqlBranching: true
  pgBranching: true
  awsRoleArn: arn:aws:iam::000000000000:role/dummy
  metrics: true 
  jsonLog: true
  logLevel: "debug"
  # Enable hostNetwork for local/CI multi-cluster testing (allows pod to reach Docker network IPs)
  hostNetwork: true
  # AWS credentials for LocalStack (SQS splitting tests)
  # Note: AWS_ENDPOINT_URL is set via --set in the task (NodePort URL)
  extraEnv:
    AWS_ACCESS_KEY_ID: "test"
    AWS_SECRET_ACCESS_KEY: "test"
    AWS_REGION: "us-east-1"
  multiCluster:
    enabled: true
    clusterName: "primary"
    defaultCluster: "remote-1"  # Default cluster for stateful ops
    primaryIsManagementOnly: true  # Primary only runs Envoy
    remoteSessionTimeoutSecs: 300
    tokenRefreshIntervalSecs: 2700  # 45 minutes
    sessionTtlSecs: 60
    # Cluster credentials are created separately via task multicluster:secrets:create
    # Not in values.yaml because tokens are generated dynamically
license:
  pemRef: "mirrord-operator-license-pem"
createNamespace: false
image:
  pullPolicy: Never
