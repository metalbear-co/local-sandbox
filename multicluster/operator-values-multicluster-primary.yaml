# Operator values for PRIMARY cluster in multi-cluster setup
# 
# Usage:
#   NUM_CLUSTERS=2  -> 2 clusters (primary + 1 remote)
#   NUM_CLUSTERS=3  -> 3 clusters (primary + 2 remotes)
#
#   PRIMARY_MANAGEMENT_ONLY=false (default) -> primary has workloads, default_cluster=primary
#   PRIMARY_MANAGEMENT_ONLY=true            -> primary is Envoy-only, default_cluster=remote-1
#
operator:
  image: mirrord-operator
  sqsSplitting: true
  kafkaSplitting: true
  mysqlBranching: true
  pgBranching: true
  awsRoleArn: arn:aws:iam::000000000000:role/dummy
  metrics: true 
  jsonLog: true
  logLevel: "debug"
  # Multi-cluster configuration
  multiCluster:
    enabled: true
    remoteSessionTimeoutSecs: 60
  # Extra env vars for multi-cluster
  # Note: MIRRORD_MULTI_CLUSTER_CONTEXTS is set dynamically by the install task based on NUM_CLUSTERS
  extraEnv:
    MIRRORD_MULTI_CLUSTER_ENABLED: "true"
    MIRRORD_IS_PRIMARY_CLUSTER: "true"       # Only "true" on primary, "false" on remotes
    MIRRORD_PRIMARY_CLUSTER: "primary"       # Name of primary cluster
    MIRRORD_DEFAULT_CLUSTER: "primary"       # Where stateful ops go (file, env, outgoing)
    # MIRRORD_MULTI_CLUSTER_CONTEXTS is set dynamically based on NUM_CLUSTERS
license:
  pemRef: "mirrord-operator-license-pem"
createNamespace: false
image:
  pullPolicy: Never
