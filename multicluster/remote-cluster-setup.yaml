# Remote Cluster Setup for Multi-Cluster Mode
#
# Apply this to REMOTE clusters to allow the PRIMARY cluster to access them.
#
# Usage:
#   kubectl apply -f remote-cluster-setup.yaml -n mirrord
#
# After applying, get the credentials for the primary cluster:
#   kubectl create token mirrord-operator-envoy -n mirrord
#   kubectl config view --minify -o jsonpath='{.clusters[0].cluster.server}'
#   kubectl config view --minify --raw -o jsonpath='{.clusters[0].cluster.certificate-authority-data}'

---
# ServiceAccount used by the PRIMARY operator to access this cluster
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mirrord-operator-envoy
  namespace: mirrord
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mirrord-operator-envoy
rules:
  # Session CRD management
  - apiGroups: ["mirrord.metalbear.co"]
    resources: ["mirrordclustersessions"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["mirrord.metalbear.co"]
    resources: ["mirrordclustersessions/status"]
    verbs: ["get", "update", "patch"]
  # Token refresh
  - apiGroups: [""]
    resources: ["serviceaccounts/token"]
    verbs: ["create"]
  # Read pods for session targeting
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  # Read deployments/statefulsets for targeting
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "replicasets", "daemonsets"]
    verbs: ["get", "list", "watch"]
  # Operator API resources for multi-cluster agent communication
  - apiGroups: ["operator.metalbear.co"]
    resources: ["targets", "copytargets", "targets/port-locks"]
    verbs: ["get", "list", "proxy"]
  - apiGroups: ["operator.metalbear.co"]
    resources: ["copytargets"]
    verbs: ["create"]
  # MirrordOperator CRD for health checks
  - apiGroups: ["operator.metalbear.co"]
    resources: ["mirrordoperators"]
    verbs: ["get"]
  # Queue registry sync from primary cluster
  - apiGroups: ["queues.mirrord.metalbear.co"]
    resources: ["mirrordworkloadqueueregistries"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Database branching CRDs
  - apiGroups: ["dbs.mirrord.metalbear.co"]
    resources:
      ["pgbranchdatabases", "mysqlbranchdatabases", "mongodbbranchdatabases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mirrord-operator-envoy
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mirrord-operator-envoy
subjects:
  - kind: ServiceAccount
    name: mirrord-operator-envoy
    namespace: mirrord
