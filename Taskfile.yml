  test:multicluster:clean:
    desc: "Full multicluster setup from scratch - build, create clusters, deploy apps"
    cmds:
      - task: multicluster:teardown:all
      - echo "Building operator image..."
      - task: build:operator:multicluster
      # - echo "Building echo-app..."
      # - task: multicluster:echo-app:build
      - echo "Creating minikube profiles..."
      - task: multicluster:clusters:create
      - echo "Waiting for clusters to be ready..."
      - |
        # Wait for both clusters with retries
        for cluster in mirrord-primary mirrord-remote-1; do
          echo "Waiting for $cluster..."
          for i in $(seq 1 30); do
            minikube update-context -p $cluster &>/dev/null || true
            if kubectl --context $cluster cluster-info &>/dev/null; then
              echo "$cluster is ready!"
              break
            fi
            echo "  Attempt $i: $cluster not ready yet, waiting..."
            sleep 2
          done
        done
      - task: multicluster:test:verify:clusters
      - echo "Loading images to minikube clusters..."
      - task: multicluster:operator:load:images
      - task: multicluster:echo-app:load:all
      - echo "Installing operators..."
      - task: multicluster:operator:install:all
      - echo "Waiting for operators..."
      - sleep 10
      - task: multicluster:test:verify:operator
      - sleep 10
      - echo "Deploying echo apps..."
      - task: multicluster:test:deploy:echo-apps
      - echo "Waiting for apps to be ready..."
      - "kubectl --context mirrord-primary wait --for=condition=available deploy/echo-app -n test-multicluster --timeout=120s"
      - "kubectl --context mirrord-remote-1 wait --for=condition=available deploy/echo-app -n test-multicluster --timeout=120s"
      - echo ""
      - echo "============================================"
      - echo "  SETUP COMPLETE - Ready for testing!"
      - echo "============================================"
      - echo ""
      - echo "Terminal 1 - Generate traffic:"
      - echo "  task multicluster:test:generate:traffic"
      - echo ""
      - echo "Terminal 2 - Steal from all clusters:"
      - echo "  task multicluster:test:steal:multi-cluster"
      - echo ""

  build:operator:multicluster:
    desc: Build operator image for multicluster testing (no auto-load)
    cmds:
      - |
        cd {{.OPERATOR_DIR}}/.. && {{.CONTAINER_RUNTIME}} build \
          -f operator/public/operator/Dockerfile \
          -t {{.OPERATOR_IMAGE}} \
          --build-arg OPERATOR_LICENSE_ISSUER_PUBLIC_KEY="$(cat {{.SCRIPTS_DIR}}/license-issuer.pem)" \
          operator

