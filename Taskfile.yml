version: "3"

shell:
  - bash
  - -c

dotenv: [".env"]

includes:
  sqs:
    taskfile: ./tasks/Taskfile.sqs.yml
    dir: ./tasks
  mysql:
    taskfile: ./tasks/Taskfile.mysql.yml
    dir: ./tasks
  kafka:
    taskfile: ./tasks/Taskfile.kafka.yml
    dir: ./tasks
  postgres:
    taskfile: ./tasks/Taskfile.postgres.yml
    dir: ./tasks
  mssql:
    taskfile: ./tasks/Taskfile.mssql.yml
    dir: ./tasks
  mongodb:
    taskfile: ./tasks/Taskfile.mongodb.yml
    dir: ./tasks
  redis:
    taskfile: ./tasks/Taskfile.redis.yml
    dir: ./tasks
  multicluster:
    taskfile: ./tasks/Taskfile.multicluster.yml
    dir: ./tasks
  rmq:
    taskfile: ./tasks/Taskfile.rmq.yml
    dir: ./tasks
  pubsub:
    taskfile: ./tasks/Taskfile.pubsub.yml
    dir: ./tasks
  eks:
    taskfile: ./tasks/Taskfile.eks.yml
    dir: ./tasks

vars:
  ROOT_DIR:
    sh: pwd
  OPERATOR_DIR: '{{.OPERATOR_DIR | default (print .ROOT_DIR "/../operator")}}'
  CHARTS_DIR: '{{.CHARTS_DIR | default (print .ROOT_DIR "/../operator/public/charts/mirrord-operator")}}'
  SCRIPTS_DIR: '{{.SCRIPTS_DIR | default (print .ROOT_DIR "/scripts")}}'
  MIRRORD_DIR: '{{.MIRRORD_DIR | default (print .ROOT_DIR "/../mirrord")}}'
  OPERATOR_IMAGE: '{{.OPERATOR_IMAGE | default "mirrord-operator:custom"}}'
  CHART_VERSION:
    sh: grep "appVersion:" "$(pwd)/../operator/public/charts/mirrord-operator/Chart.yaml" | awk '{print $2}' | tr -d '"'
  NAMESPACE: '{{.NAMESPACE | default "test-mirrord"}}'
  CLUSTER_NAME: '{{.CLUSTER_NAME | default "bearkube"}}'
  CONTAINER_RUNTIME: '{{.CONTAINER_RUNTIME | default "docker"}}'

tasks:
  license:generate:
    desc: Generate new operator license
    dir: "{{.SCRIPTS_DIR}}"
    cmds:
      - ./generate-license.sh
      - echo "License generated at {{.SCRIPTS_DIR}}/company-license.pem"

  license:create:secret:
    desc: Create license secret in cluster
    vars:
      LICENSE_FILE: "{{.SCRIPTS_DIR}}/company-license.pem"
    preconditions:
      - sh: test -f {{.LICENSE_FILE}}
        msg: "License file not found. Run 'task license:generate' first"
    cmds:
      - kubectl create secret generic mirrord-operator-license-pem --from-file=license.pem={{.LICENSE_FILE}} -n mirrord --dry-run=client -o yaml | kubectl apply -f -

  build:operator:
    desc: Build operator image
    cmds:
      - cd {{.OPERATOR_DIR}}/.. && {{.CONTAINER_RUNTIME}} build --provenance=false -f operator/public/operator/Dockerfile -t {{.OPERATOR_IMAGE}}  --build-arg OPERATOR_LICENSE_ISSUER_PUBLIC_KEY="$(cat {{.SCRIPTS_DIR}}/license-issuer.pem)" operator
      - task: operator:image:load

  build:operator:nocache:
    desc: Build operator without any cache (clears sccache + Docker layers)
    cmds:
      - echo "Clearing sccache and target cache mounts..."
      - docker builder prune --filter type=exec.cachemount --force || true
      - cd {{.OPERATOR_DIR}}/.. && {{.CONTAINER_RUNTIME}} build --provenance=false --no-cache -f operator/public/operator/Dockerfile -t {{.OPERATOR_IMAGE}} --build-arg OPERATOR_LICENSE_ISSUER_PUBLIC_KEY="$(cat {{.SCRIPTS_DIR}}/license-issuer.pem)" operator
      - task: operator:image:load

  build:operator:gcs:
    desc: Build operator with GCS sccache
    vars:
      GCS_CREDENTIALS_FILE: '{{.GCS_CREDENTIALS_FILE | default ""}}'
      GCS_BUCKET: '{{.GCS_BUCKET | default ""}}'
      GCS_PATH_PREFIX: '{{.GCS_PATH_PREFIX | default "operator-local/"}}'
    preconditions:
      - sh: test -n "{{.GCS_CREDENTIALS_FILE}}"
        msg: "GCS_CREDENTIALS_FILE required"
      - sh: test -f "{{.GCS_CREDENTIALS_FILE}}"
        msg: "GCS credentials file not found"
      - sh: test -n "{{.GCS_BUCKET}}"
        msg: "GCS_BUCKET required"
    cmds:
      - |
        cd {{.OPERATOR_DIR}}/.. && docker build --provenance=false -f operator/public/operator/Dockerfile -t {{.OPERATOR_IMAGE}} \
          --secret id=gcp_credentials,src={{.GCS_CREDENTIALS_FILE}} \
          --build-arg OPERATOR_LICENSE_ISSUER_PUBLIC_KEY="$(cat {{.SCRIPTS_DIR}}/license-issuer.pem)" \
          --build-arg GCS_BUCKET={{.GCS_BUCKET}} \
          --build-arg GCS_RW_MODE=READ_WRITE \
          --build-arg GCS_PATH_PREFIX={{.GCS_PATH_PREFIX}} \
          operator
      - task: operator:image:load

  build:operator:gcs:custom:issuer:
    desc: Build operator with GCS sccache and custom license issuer
    vars:
      GCS_CREDENTIALS_FILE: '{{.GCS_CREDENTIALS_FILE | default ""}}'
      GCS_BUCKET: '{{.GCS_BUCKET | default ""}}'
      GCS_PATH_PREFIX: '{{.GCS_PATH_PREFIX | default "operator-local-custom-issuer/"}}'
      CUSTOM_ISSUER_FILE: '{{.CUSTOM_ISSUER_FILE | default (printf "%s/tests/e2e_operator_license_issuer.pem" .OPERATOR_DIR)}}'
    preconditions:
      - sh: test -n "{{.GCS_CREDENTIALS_FILE}}"
        msg: "GCS_CREDENTIALS_FILE required"
      - sh: test -f "{{.GCS_CREDENTIALS_FILE}}"
        msg: "GCS credentials file not found"
      - sh: test -n "{{.GCS_BUCKET}}"
        msg: "GCS_BUCKET required"
      - sh: test -f "{{.CUSTOM_ISSUER_FILE}}"
        msg: "Custom issuer file not found"
    cmds:
      - |
        cd {{.OPERATOR_DIR}}/.. && docker build --provenance=false -f operator/public/operator/Dockerfile -t {{.OPERATOR_IMAGE}} \
          --secret id=gcp_credentials,src={{.GCS_CREDENTIALS_FILE}} \
          --build-arg OPERATOR_LICENSE_ISSUER_PUBLIC_KEY="$(cat {{.CUSTOM_ISSUER_FILE}})" \
          --build-arg GCS_BUCKET={{.GCS_BUCKET}} \
          --build-arg GCS_RW_MODE=READ_WRITE \
          --build-arg GCS_PATH_PREFIX={{.GCS_PATH_PREFIX}} \
          operator
      - task: operator:image:load

  build:mirrord:agent:
    desc: Build mirrord agent image and load into minikube
    vars:
      AGENT_IMAGE: '{{.AGENT_IMAGE | default "test"}}'
    cmds:
      - cd {{.MIRRORD_DIR}} && {{.CONTAINER_RUNTIME}} build -f mirrord/agent/Dockerfile -t {{.AGENT_IMAGE}} .
      - task: mirrord:agent:image:load
        vars: { AGENT_IMAGE: "{{.AGENT_IMAGE}}" }

  build:mirrord:agent:gcs:
    desc: Build mirrord agent with GCS sccache
    vars:
      GCS_CREDENTIALS_FILE: '{{.GCS_CREDENTIALS_FILE | default ""}}'
      GCS_BUCKET: '{{.GCS_BUCKET | default ""}}'
      MIRRORD_AGENT_GCS_PREFIX: '{{.MIRRORD_AGENT_GCS_PREFIX | default "mirrord-agent-local/"}}'
      AGENT_IMAGE: '{{.AGENT_IMAGE | default "mirrord-agent:local"}}'
    preconditions:
      - sh: test -n "{{.GCS_CREDENTIALS_FILE}}"
        msg: "GCS_CREDENTIALS_FILE required"
      - sh: test -f "{{.GCS_CREDENTIALS_FILE}}"
        msg: "GCS credentials file not found"
      - sh: test -n "{{.GCS_BUCKET}}"
        msg: "GCS_BUCKET required"
    cmds:
      - |
        cd {{.MIRRORD_DIR}} && docker build -f mirrord/agent/Dockerfile -t {{.AGENT_IMAGE}} \
          --secret id=gcp_credentials,src={{.GCS_CREDENTIALS_FILE}} \
          --build-arg GCS_BUCKET={{.GCS_BUCKET}} \
          --build-arg GCS_RW_MODE=READ_WRITE \
          --build-arg GCS_PATH_PREFIX={{.MIRRORD_AGENT_GCS_PREFIX}} \
          .
      - task: mirrord:agent:image:load
        vars: { AGENT_IMAGE: "{{.AGENT_IMAGE}}" }

  build:app:sqs:
    desc: Build SQS consumer app
    dir: "{{.ROOT_DIR}}/apps/sqs-consumer"
    cmds:
      - "{{.CONTAINER_RUNTIME}} build -t sqs-consumer:local ."
      - minikube -p {{.CLUSTER_NAME}} image load sqs-consumer:local

  build:app:kafka:
    desc: Build Kafka consumer app
    dir: "{{.ROOT_DIR}}/apps/kafka-consumer"
    cmds:
      - "{{.CONTAINER_RUNTIME}} build -t kafka-consumer:local ."
      - minikube -p {{.CLUSTER_NAME}} image load kafka-consumer:local

  build:app:mysql:
    desc: Build MySQL app
    dir: "{{.ROOT_DIR}}/apps/mysql-app"
    cmds:
      - "{{.CONTAINER_RUNTIME}} build -t mysql-app:local ."
      - minikube -p {{.CLUSTER_NAME}} image load mysql-app:local

  build:app:postgres:
    desc: Build PostgreSQL app
    dir: "{{.ROOT_DIR}}/apps/postgres-app"
    cmds:
      - "{{.CONTAINER_RUNTIME}} build -t postgres-app:local ."
      - minikube -p {{.CLUSTER_NAME}} image load postgres-app:local

  build:app:mongodb:
    desc: Build MongoDB app
    dir: "{{.ROOT_DIR}}/apps/mongodb-app"
    cmds:
      - "{{.CONTAINER_RUNTIME}} build -t mongodb-app:local ."
      - minikube -p {{.CLUSTER_NAME}} image load mongodb-app:local

  build:apps:
    desc: Build all consumer apps
    cmds:
      - task: build:app:sqs
      - task: build:app:kafka
      - task: build:app:mysql
      - task: build:app:postgres
      - task: build:app:mongodb

  build:
    desc: Build all images
    cmds:
      - task: build:operator
      - task: build:apps

  cluster:create:
    desc: Create fresh minikube cluster with infrastructure
    cmds:
      - minikube -p {{.CLUSTER_NAME}} start --driver={{.CONTAINER_RUNTIME}}
      - minikube -p {{.CLUSTER_NAME}} addons enable metrics-server
      - kubectl config use-context {{.CLUSTER_NAME}}
      - task: infra:all

  cluster:delete:
    desc: Delete minikube cluster
    cmds:
      - minikube -p {{.CLUSTER_NAME}} delete

  infra:argo:rollouts:
    desc: Install Argo Rollouts
    cmds:
      - kubectl create namespace argo-rollouts --dry-run=client -o yaml | kubectl apply -f -
      - kubectl apply -n argo-rollouts -f https://github.com/argoproj/argo-rollouts/releases/latest/download/install.yaml
      - kubectl wait --for=condition=available deployment/argo-rollouts -n argo-rollouts --timeout=300s

  infra:argocd:
    desc: Install ArgoCD
    cmds:
      - kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -
      - kubectl apply -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
      - kubectl wait --for=condition=available deployment/argocd-server -n argocd --timeout=300s

  infra:loki:
    desc: Install Loki stack (Loki + Promtail) for log aggregation
    cmds:
      - helm repo add grafana https://grafana.github.io/helm-charts || true
      - helm repo update grafana
      - kubectl create namespace loki --dry-run=client -o yaml | kubectl apply -f -
      - |
        helm upgrade --install loki grafana/loki-stack \
          --namespace loki \
          --set loki.persistence.enabled=false \
          --set promtail.enabled=true \
          --set grafana.enabled=true \
          --set grafana.adminPassword=admin \
          --wait --timeout=300s
      - |
        echo ""
        echo "=== Loki Stack Installed ==="
        echo "To access Grafana, run: task postgres:debug:grafana"
        echo "Login: admin / admin"
        echo "Query logs: {namespace=\"test-mirrord\", container=\"pg-branch-init\"}"
        echo ""

  infra:loki:uninstall:
    desc: Uninstall Loki stack
    cmds:
      - helm uninstall loki -n loki || true
      - kubectl delete namespace loki --ignore-not-found=true

  infra:tempo:
    desc: Install Tempo
    cmds:
      - helm repo add grafana https://grafana.github.io/helm-charts || true
      - helm repo update grafana
      - kubectl create namespace loki --dry-run=client -o yaml | kubectl apply -f -
      - |
        helm upgrade --install tempo grafana/tempo -f k8s/tempo/tempo-values.yaml \
          --namespace loki \
          --wait --timeout=300s
      - |
        echo ""
        echo "=== Tempo Installed ==="
        echo ""

  infra:tempo:uninstall:
    desc: Uninstall Tempo
    cmds:
      - helm uninstall tempo -n loki || true
      - kubectl delete namespace tempo --ignore-not-found=true

  infra:all:
    desc: Install all infrastructure
    cmds:
      - task: infra:argo:rollouts
      - task: infra:loki
      - task: infra:tempo

  infra:status:
    desc: Check infrastructure status
    cmds:
      - echo "=== Infrastructure Status ==="
      - |
        echo -n "Argo Rollouts: "
        kubectl get deployment argo-rollouts -n argo-rollouts >/dev/null 2>&1 && echo "Installed" || echo "Not installed"
      - |
        echo -n "ArgoCD: "
        kubectl get deployment argocd-server -n argocd >/dev/null 2>&1 && echo "Installed" || echo "Not installed"
      - |
        echo -n "Loki: "
        kubectl get deployment loki -n loki >/dev/null 2>&1 && echo "Installed" || echo "Not installed"
      - |
        echo -n "Tempo: "
        kubectl get deployment tempo -n tempo >/dev/null 2>&1 && echo "Installed" || echo "Not installed"
      - |
        echo -n "Grafana: "
        kubectl get deployment loki-grafana -n loki >/dev/null 2>&1 && echo "Installed" || echo "Not installed"
      - |
        echo -n "LocalStack: "
        kubectl get deployment localstack -n localstack >/dev/null 2>&1 && echo "Running" || echo "Not running"
      - |
        echo -n "Operator: "
        kubectl get deployment mirrord-operator -n mirrord >/dev/null 2>&1 && echo "Running" || echo "Not running"

  logs:grafana:
    desc: Open Grafana UI for log viewing (port-forward)
    cmds:
      - echo "Opening Grafana at http://localhost:3456"
      - echo "Login -> admin / admin"
      - echo "Go to Explore -> Select Loki -> Query -> {namespace=\"test-mirrord\"}"
      - echo ""
      - kubectl port-forward -n loki svc/loki-grafana 3456:80

  logs:query:
    desc: Query logs from Loki using logcli
    vars:
      QUERY: '{{.QUERY | default "{namespace=\"test-mirrord\"}"}}'
      SINCE: '{{.SINCE | default "1h"}}'
    cmds:
      - |
        echo "Querying logs: {{.QUERY}}"
        kubectl run logcli --rm -i --restart=Never \
          --image=grafana/logcli:latest \
          --env="LOKI_ADDR=http://loki.loki.svc.cluster.local:3100" \
          -- query '{{.QUERY}}' --since={{.SINCE}} --limit=500 2>/dev/null || \
        echo "Tip: Use 'task logs:grafana' for a better UI experience"

  logs:branch-pods:
    desc: Query logs from all branch database pods
    vars:
      SINCE: '{{.SINCE | default "30m"}}'
    cmds:
      - |
        echo "=== Branch Pod Logs (last {{.SINCE}}) ==="
        echo "Starting Grafana port-forward in background..."
        kubectl port-forward -n loki svc/loki-grafana 3456:80 &
        PF_PID=$!
        sleep 2
        echo ""
        echo "Open http://localhost:3456 (login -> admin/admin)"
        echo "Query in Grafana -> {namespace=\"test-mirrord\", pod=~\"mirrord-.*branch.*\"}"
        echo "Or for init containers -> {namespace=\"test-mirrord\", container=\"pg-branch-init\"}"
        echo ""
        echo "Press Ctrl+C to stop port-forward"
        wait $PF_PID

  operator:install:
    desc: Install operator with custom image
    deps: [infra:all, build:operator]
    cmds:
      - helm upgrade --install mirrord-operator {{.CHARTS_DIR}} --namespace mirrord --create-namespace -f {{.ROOT_DIR}}/operator-values.yaml
      - task: license:create:secret
      # Force pod restart to pick up the new image
      - kubectl delete pods -n mirrord -l app=mirrord-operator --force --grace-period=0 2>/dev/null || true
      - task: _wait:operator

  operator:install:nocache:
    desc: Install operator with clean build
    deps: [infra:all, build:operator:nocache]
    cmds:
      - helm upgrade --install mirrord-operator {{.CHARTS_DIR}} --namespace mirrord --create-namespace -f {{.ROOT_DIR}}/operator-values.yaml
      - task: license:create:secret
      # Force pod restart to pick up the new image
      - kubectl delete pods -n mirrord -l app=mirrord-operator --force --grace-period=0 2>/dev/null || true
      - task: _wait:operator

  operator:install:nobuild:
    desc: Install operator without building
    deps: [infra:all]
    cmds:
      - task: operator:image:load
      - helm upgrade --install mirrord-operator {{.CHARTS_DIR}} --namespace mirrord --create-namespace -f {{.ROOT_DIR}}/operator-values.yaml
      - task: license:create:secret
      # Force pod restart to pick up the new image
      - kubectl delete pods -n mirrord -l app=mirrord-operator --force --grace-period=0 2>/dev/null || true
      - task: _wait:operator

  operator:install:new:license:
    desc: Generate new license and install operator
    cmds:
      - task: license:generate
      - task: operator:install

  operator:uninstall:
    desc: Uninstall operator
    cmds:
      - helm uninstall mirrord-operator -n mirrord || true
      - kubectl delete namespace mirrord --ignore-not-found=true

  operator:update:
    desc: Rebuild and upgrade operator
    cmds:
      - task: build:operator
      - helm template mirrord-operator {{.CHARTS_DIR}} -f {{.ROOT_DIR}}/operator-values.yaml -s templates/crd.yaml | kubectl apply --server-side --force-conflicts -f -
      - helm upgrade --install mirrord-operator {{.CHARTS_DIR}} --namespace mirrord -f {{.ROOT_DIR}}/operator-values.yaml
      - kubectl delete pods -n mirrord -l app=mirrord-operator --force --grace-period=0 2>/dev/null || true
      - task: _wait:operator

  operator:use:
    desc: Pull a released operator image by version and deploy it
    vars:
      VERSION: '{{.VERSION | default ""}}'
    preconditions:
      - sh: test -n "{{.VERSION}}"
        msg: "VERSION is required. Usage: task operator:use VERSION=3.152.0"
    cmds:
      - "{{.CONTAINER_RUNTIME}} pull ghcr.io/metalbear-co/operator:{{.VERSION}}"
      - "{{.CONTAINER_RUNTIME}} tag ghcr.io/metalbear-co/operator:{{.VERSION}} mirrord-operator:{{.CHART_VERSION}}"
      - minikube -p {{.CLUSTER_NAME}} ssh "{{.CONTAINER_RUNTIME}} rmi mirrord-operator:{{.CHART_VERSION}} --force" || true
      - minikube -p {{.CLUSTER_NAME}} image load mirrord-operator:{{.CHART_VERSION}}
      - helm upgrade --install mirrord-operator {{.CHARTS_DIR}} --namespace mirrord -f {{.ROOT_DIR}}/operator-values.yaml
      - kubectl delete pods -n mirrord -l app=mirrord-operator --force --grace-period=0 2>/dev/null || true
      - task: _wait:operator

  operator:image:load:
    desc: Tag and load operator image into minikube
    cmds:
      - "{{.CONTAINER_RUNTIME}} tag {{.OPERATOR_IMAGE}} mirrord-operator:{{.CHART_VERSION}}"
      - minikube -p {{.CLUSTER_NAME}} ssh "{{.CONTAINER_RUNTIME}} rmi mirrord-operator:{{.CHART_VERSION}} --force" || true
      - minikube -p {{.CLUSTER_NAME}} image load mirrord-operator:{{.CHART_VERSION}}

  mirrord:agent:image:load:
    desc: Load mirrord agent image into minikube
    vars:
      AGENT_IMAGE: '{{.AGENT_IMAGE | default "mirrord-agent:local"}}'
    cmds:
      - minikube -p {{.CLUSTER_NAME}} ssh "docker rmi {{.AGENT_IMAGE}} --force" || true
      - minikube -p {{.CLUSTER_NAME}} image load {{.AGENT_IMAGE}}

  helm:update:
    desc: Update helm chart only
    cmds:
      - helm upgrade --install mirrord-operator {{.CHARTS_DIR}} --namespace mirrord -f {{.ROOT_DIR}}/operator-values.yaml
      # Force pod restart to pick up any changes
      - kubectl delete pods -n mirrord -l app=mirrord-operator --force --grace-period=0 2>/dev/null || true
      - task: _wait:operator

  preview:deploy:echo-app:
    desc: Build and deploy echo-app to bearkube for preview testing
    cmds:
      - cd {{.ROOT_DIR}}/apps/echo-app && {{.CONTAINER_RUNTIME}} build -t echo-app:latest .
      - minikube -p {{.CLUSTER_NAME}} ssh "{{.CONTAINER_RUNTIME}} rmi echo-app:latest --force" || true
      - minikube -p {{.CLUSTER_NAME}} image load echo-app:latest
      - kubectl create namespace {{.NAMESPACE}} --dry-run=client -o yaml | kubectl apply -f -
      - |
        kubectl apply -n {{.NAMESPACE}} -f - <<'EOF'
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: echo-app
          labels:
            app: echo-app
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: echo-app
          template:
            metadata:
              labels:
                app: echo-app
            spec:
              containers:
              - name: echo
                image: echo-app:latest
                imagePullPolicy: Never
                ports:
                - containerPort: 8080
                env:
                - name: CLUSTER_ID
                  value: "bearkube"
                - name: PORT
                  value: "8080"
        ---
        apiVersion: v1
        kind: Service
        metadata:
          name: echo-app
        spec:
          selector:
            app: echo-app
          ports:
          - port: 8080
            targetPort: 8080
        EOF
      - kubectl wait --for=condition=available deploy/echo-app -n {{.NAMESPACE}} --timeout=120s

  preview:start:
    desc: Start a preview environment on bearkube (single-cluster)
    vars:
      PREVIEW_KEY: '{{.PREVIEW_KEY | default "test-preview"}}'
      PREVIEW_IMAGE: '{{.PREVIEW_IMAGE | default "echo-app:latest"}}'
      PREVIEW_TIMEOUT: '{{.PREVIEW_TIMEOUT | default "300"}}'
    cmds:
      - |
        {{.MIRRORD_BIN}} preview start \
          -f {{.ROOT_DIR}}/apps/echo-app/mirrord-preview-single.json \
          -i "{{.PREVIEW_IMAGE}}" \
          -k "{{.PREVIEW_KEY}}" \
          --timeout {{.PREVIEW_TIMEOUT}}

  preview:status:
    desc: Show preview session status on bearkube
    cmds:
      - kubectl get previewsessions -n {{.NAMESPACE}} 2>/dev/null || echo "No preview sessions"
      - kubectl get pods -n {{.NAMESPACE}} -l operator.metalbear.co/managed-by=preview 2>/dev/null || echo "No preview pods"

  preview:stop:
    desc: Stop a preview environment on bearkube
    vars:
      PREVIEW_KEY: '{{.PREVIEW_KEY | default "test-preview"}}'
    cmds:
      - "{{.MIRRORD_BIN}} preview stop -k \"{{.PREVIEW_KEY}}\" || true"

  preview:test:traffic:
    desc: Send traffic with preview header to echo-app on bearkube
    vars:
      PREVIEW_KEY: '{{.PREVIEW_KEY | default "test-preview"}}'
    cmds:
      - |
        echo "Sending traffic WITH preview header (X-Preview: {{.PREVIEW_KEY}})"
        echo "Press Ctrl+C to stop"
        echo ""
        i=1
        while true; do
          echo -n "Request $i: "
          kubectl exec -n {{.NAMESPACE}} deploy/echo-app -- \
            wget -q -O- --header="X-Preview: {{.PREVIEW_KEY}}" \
            http://echo-app:8080/echo?from=preview 2>/dev/null | head -1 || echo "failed"
          i=$((i + 1))
          sleep 2
        done

  preview:clean:
    desc: Remove echo-app deployment and service from bearkube
    cmds:
      - kubectl delete deploy/echo-app svc/echo-app -n {{.NAMESPACE}} --ignore-not-found=true

  preview:test:traffic:no-header:
    desc: Send traffic without preview header (should go to original pod)
    cmds:
      - |
        echo "Sending traffic WITHOUT preview header"
        echo "Press Ctrl+C to stop"
        echo ""
        i=1
        while true; do
          echo -n "Request $i: "
          kubectl exec -n {{.NAMESPACE}} deploy/echo-app -- \
            wget -q -O- http://echo-app:8080/echo?from=normal 2>/dev/null | head -1 || echo "failed"
