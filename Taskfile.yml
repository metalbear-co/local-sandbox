version: "3"

dotenv: [".env"]

includes:
  sqs:
    taskfile: ./tasks/Taskfile.sqs.yml
    dir: ./tasks
  mysql:
    taskfile: ./tasks/Taskfile.mysql.yml
    dir: ./tasks
  kafka:
    taskfile: ./tasks/Taskfile.kafka.yml
    dir: ./tasks
  postgres:
    taskfile: ./tasks/Taskfile.postgres.yml
    dir: ./tasks
  redis:
    taskfile: ./tasks/Taskfile.redis.yml
    dir: ./tasks

vars:
  ROOT_DIR:
    sh: pwd
  OPERATOR_DIR: '{{.OPERATOR_DIR | default (print .ROOT_DIR "/../operator")}}'
  CHARTS_DIR: '{{.CHARTS_DIR | default (print .ROOT_DIR "/../charts/mirrord-operator")}}'
  SCRIPTS_DIR: '{{.SCRIPTS_DIR | default (print .ROOT_DIR "/scripts")}}'
  MIRRORD_DIR: '{{.MIRRORD_DIR | default (print .ROOT_DIR "/../mirrord")}}'
  OPERATOR_IMAGE: '{{.OPERATOR_IMAGE | default "mirrord-operator:custom"}}'
  CHART_VERSION:
    sh: grep "appVersion:" {{.CHARTS_DIR}}/Chart.yaml | awk '{print $2}' | tr -d '"'
  NAMESPACE: '{{.NAMESPACE | default "test-mirrord"}}'
  CLUSTER_NAME: '{{.CLUSTER_NAME | default "bearkube"}}'
  CONTAINER_RUNTIME: '{{.CONTAINER_RUNTIME | default "docker"}}'

tasks:
  license:generate:
    desc: Generate new operator license
    dir: "{{.SCRIPTS_DIR}}"
    cmds:
      - ./generate-license.sh
      - echo "License generated at {{.SCRIPTS_DIR}}/company-license.pem"

  license:create:secret:
    desc: Create license secret in cluster
    vars:
      LICENSE_FILE: "{{.LICENSE_FILE | default .SCRIPTS_DIR}}/company-license.pem"
    preconditions:
      - sh: test -f {{.LICENSE_FILE}}
        msg: "License file not found. Run 'task license:generate' first"
    cmds:
      - kubectl create secret generic mirrord-operator-license-pem --from-file=license.pem={{.LICENSE_FILE}} -n mirrord --dry-run=client -o yaml | kubectl apply -f -

  build:operator:
    desc: Build operator image
    cmds:
      - cd {{.OPERATOR_DIR}}/.. && {{.CONTAINER_RUNTIME}} build --progress=plain -f operator/Dockerfile -t {{.OPERATOR_IMAGE}} --build-arg OPERATOR_LICENSE_ISSUER_PUBLIC_KEY="$(cat {{.SCRIPTS_DIR}}/license-issuer.pem)" operator
      - task: operator:image:load

  build:operator:nocache:
    desc: Build operator without any cache (clears sccache + Docker layers)
    cmds:
      - echo "Clearing sccache and target cache mounts..."
      - docker builder prune --filter type=exec.cachemount --force || true
      - cd {{.OPERATOR_DIR}}/.. && {{.CONTAINER_RUNTIME}} build --no-cache --progress=plain -f operator/Dockerfile -t {{.OPERATOR_IMAGE}} --build-arg OPERATOR_LICENSE_ISSUER_PUBLIC_KEY="$(cat {{.SCRIPTS_DIR}}/license-issuer.pem)" operator
      - task: operator:image:load

  build:operator:gcs:
    desc: Build operator with GCS sccache
    vars:
      GCS_CREDENTIALS_FILE: '{{.GCS_CREDENTIALS_FILE | default ""}}'
      GCS_BUCKET: '{{.GCS_BUCKET | default ""}}'
      GCS_PATH_PREFIX: '{{.GCS_PATH_PREFIX | default "operator-local/"}}'
    preconditions:
      - sh: test -n "{{.GCS_CREDENTIALS_FILE}}"
        msg: "GCS_CREDENTIALS_FILE required"
      - sh: test -f "{{.GCS_CREDENTIALS_FILE}}"
        msg: "GCS credentials file not found"
      - sh: test -n "{{.GCS_BUCKET}}"
        msg: "GCS_BUCKET required"
    cmds:
      - |
        cd {{.OPERATOR_DIR}}/.. && docker build -f operator/Dockerfile -t {{.OPERATOR_IMAGE}} \
          --secret id=gcp_credentials,src={{.GCS_CREDENTIALS_FILE}} \
          --build-arg OPERATOR_LICENSE_ISSUER_PUBLIC_KEY="$(cat {{.SCRIPTS_DIR}}/license-issuer.pem)" \
          --build-arg GCS_BUCKET={{.GCS_BUCKET}} \
          --build-arg GCS_RW_MODE=READ_WRITE \
          --build-arg GCS_PATH_PREFIX={{.GCS_PATH_PREFIX}} \
          operator
      - task: operator:image:load

  build:operator:gcs:custom:issuer:
    desc: Build operator with GCS sccache and custom license issuer
    vars:
      GCS_CREDENTIALS_FILE: '{{.GCS_CREDENTIALS_FILE | default ""}}'
      GCS_BUCKET: '{{.GCS_BUCKET | default ""}}'
      GCS_PATH_PREFIX: '{{.GCS_PATH_PREFIX | default "operator-local-custom-issuer/"}}'
      CUSTOM_ISSUER_FILE: '{{.CUSTOM_ISSUER_FILE | default (printf "%s/tests/e2e_operator_license_issuer.pem" .OPERATOR_DIR)}}'
    preconditions:
      - sh: test -n "{{.GCS_CREDENTIALS_FILE}}"
        msg: "GCS_CREDENTIALS_FILE required"
      - sh: test -f "{{.GCS_CREDENTIALS_FILE}}"
        msg: "GCS credentials file not found"
      - sh: test -n "{{.GCS_BUCKET}}"
        msg: "GCS_BUCKET required"
      - sh: test -f "{{.CUSTOM_ISSUER_FILE}}"
        msg: "Custom issuer file not found"
    cmds:
      - |
        cd {{.OPERATOR_DIR}}/.. && docker build -f operator/Dockerfile -t {{.OPERATOR_IMAGE}} \
          --secret id=gcp_credentials,src={{.GCS_CREDENTIALS_FILE}} \
          --build-arg OPERATOR_LICENSE_ISSUER_PUBLIC_KEY="$(cat {{.CUSTOM_ISSUER_FILE}})" \
          --build-arg GCS_BUCKET={{.GCS_BUCKET}} \
          --build-arg GCS_RW_MODE=READ_WRITE \
          --build-arg GCS_PATH_PREFIX={{.GCS_PATH_PREFIX}} \
          operator
      - task: operator:image:load

  build:mirrord:agent:gcs:
    desc: Build mirrord agent with GCS sccache
    vars:
      GCS_CREDENTIALS_FILE: '{{.GCS_CREDENTIALS_FILE | default ""}}'
      GCS_BUCKET: '{{.GCS_BUCKET | default ""}}'
      MIRRORD_AGENT_GCS_PREFIX: '{{.MIRRORD_AGENT_GCS_PREFIX | default "mirrord-agent-local/"}}'
      AGENT_IMAGE: '{{.AGENT_IMAGE | default "mirrord-agent:local"}}'
    preconditions:
      - sh: test -n "{{.GCS_CREDENTIALS_FILE}}"
        msg: "GCS_CREDENTIALS_FILE required"
      - sh: test -f "{{.GCS_CREDENTIALS_FILE}}"
        msg: "GCS credentials file not found"
      - sh: test -n "{{.GCS_BUCKET}}"
        msg: "GCS_BUCKET required"
    cmds:
      - |
        cd {{.MIRRORD_DIR}} && docker build -f mirrord/agent/Dockerfile -t {{.AGENT_IMAGE}} \
          --secret id=gcp_credentials,src={{.GCS_CREDENTIALS_FILE}} \
          --build-arg GCS_BUCKET={{.GCS_BUCKET}} \
          --build-arg GCS_RW_MODE=READ_WRITE \
          --build-arg GCS_PATH_PREFIX={{.MIRRORD_AGENT_GCS_PREFIX}} \
          .
      - task: mirrord:agent:image:load
        vars: {AGENT_IMAGE: '{{.AGENT_IMAGE}}'}

  build:app:sqs:
    desc: Build SQS consumer app
    dir: "{{.ROOT_DIR}}/apps/sqs-consumer"
    cmds:
      - '{{.CONTAINER_RUNTIME}} build -t sqs-consumer:local .'
      - minikube -p {{.CLUSTER_NAME}} image load sqs-consumer:local

  build:app:kafka:
    desc: Build Kafka consumer app
    dir: "{{.ROOT_DIR}}/apps/kafka-consumer"
    cmds:
      - '{{.CONTAINER_RUNTIME}} build -t kafka-consumer:local .'
      - minikube -p {{.CLUSTER_NAME}} image load kafka-consumer:local

  build:app:mysql:
    desc: Build MySQL app
    dir: "{{.ROOT_DIR}}/apps/mysql-app"
    cmds:
      - '{{.CONTAINER_RUNTIME}} build -t mysql-app:local .'
      - minikube -p {{.CLUSTER_NAME}} image load mysql-app:local

  build:app:postgres:
    desc: Build PostgreSQL app
    dir: "{{.ROOT_DIR}}/apps/postgres-app"
    cmds:
      - '{{.CONTAINER_RUNTIME}} build -t postgres-app:local .'
      - minikube -p {{.CLUSTER_NAME}} image load postgres-app:local

  build:apps:
    desc: Build all consumer apps
    cmds:
      - task: build:app:sqs
      - task: build:app:kafka
      - task: build:app:mysql
      - task: build:app:postgres

  build:
    desc: Build all images
    cmds:
      - task: build:operator
      - task: build:apps

  cluster:create:
    desc: Create fresh minikube cluster with infrastructure
    cmds:
      - minikube -p {{.CLUSTER_NAME}} start --driver={{.CONTAINER_RUNTIME}}
      - minikube -p {{.CLUSTER_NAME}} addons enable metrics-server
      - kubectl config use-context {{.CLUSTER_NAME}}
      - task: infra:all

  cluster:delete:
    desc: Delete minikube cluster
    cmds:
      - minikube -p {{.CLUSTER_NAME}} delete

  infra:argo:rollouts:
    desc: Install Argo Rollouts
    cmds:
      - kubectl create namespace argo-rollouts --dry-run=client -o yaml | kubectl apply -f -
      - kubectl apply -n argo-rollouts -f https://github.com/argoproj/argo-rollouts/releases/latest/download/install.yaml
      - kubectl wait --for=condition=available deployment/argo-rollouts -n argo-rollouts --timeout=300s

  infra:argocd:
    desc: Install ArgoCD
    cmds:
      - kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -
      - kubectl apply -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
      - kubectl wait --for=condition=available deployment/argocd-server -n argocd --timeout=300s

  infra:all:
    desc: Install all infrastructure
    cmds:
      - task: infra:argo:rollouts

  infra:status:
    desc: Check infrastructure status
    cmds:
      - echo "=== Infrastructure Status ==="
      - |
        echo -n "Argo Rollouts: "
        kubectl get deployment argo-rollouts -n argo-rollouts >/dev/null 2>&1 && echo "Installed" || echo "Not installed"
      - |
        echo -n "ArgoCD: "
        kubectl get deployment argocd-server -n argocd >/dev/null 2>&1 && echo "Installed" || echo "Not installed"
      - |
        echo -n "LocalStack: "
        kubectl get deployment localstack -n localstack >/dev/null 2>&1 && echo "Running" || echo "Not running"
      - |
        echo -n "Operator: "
        kubectl get deployment mirrord-operator -n mirrord >/dev/null 2>&1 && echo "Running" || echo "Not running"

  operator:install:
    desc: Install operator with custom image
    deps: [infra:all, build:operator]
    cmds:
      - helm upgrade --install mirrord-operator {{.CHARTS_DIR}} --namespace mirrord --create-namespace -f {{.ROOT_DIR}}/operator-values.yaml
      - task: license:create:secret
      - task: _wait:operator

  operator:install:nocache:
    desc: Install operator with clean build
    deps: [infra:all, build:operator:nocache]
    cmds:
      - helm upgrade --install mirrord-operator {{.CHARTS_DIR}} --namespace mirrord --create-namespace -f {{.ROOT_DIR}}/operator-values.yaml
      - task: license:create:secret
      - task: _wait:operator

  operator:install:nobuild:
    desc: Install operator without building
    deps: [infra:all]
    cmds:
      - task: operator:image:load
      - helm upgrade --install mirrord-operator {{.CHARTS_DIR}} --namespace mirrord --create-namespace -f {{.ROOT_DIR}}/operator-values.yaml
      - task: license:create:secret
      - task: _wait:operator

  operator:install:new:license:
    desc: Generate new license and install operator
    cmds:
      - task: license:generate
      - task: operator:install

  operator:uninstall:
    desc: Uninstall operator
    cmds:
      - helm uninstall mirrord-operator -n mirrord || true
      - kubectl delete namespace mirrord --ignore-not-found=true

  operator:update:
    desc: Rebuild and upgrade operator
    cmds:
      - task: build:operator
      - helm upgrade --install mirrord-operator {{.CHARTS_DIR}} --namespace mirrord -f {{.ROOT_DIR}}/operator-values.yaml
      - kubectl delete pods -n mirrord -l app=mirrord-operator --force --grace-period=0 2>/dev/null || true
      - task: _wait:operator

  operator:image:load:
    desc: Tag and load operator image into minikube
    cmds:
      - '{{.CONTAINER_RUNTIME}} tag {{.OPERATOR_IMAGE}} mirrord-operator:{{.CHART_VERSION}}'
      - minikube -p {{.CLUSTER_NAME}} ssh "{{.CONTAINER_RUNTIME}} rmi mirrord-operator:{{.CHART_VERSION}} --force" || true
      - minikube -p {{.CLUSTER_NAME}} image load mirrord-operator:{{.CHART_VERSION}}

  mirrord:agent:image:load:
    desc: Load mirrord agent image into minikube
    vars:
      AGENT_IMAGE: '{{.AGENT_IMAGE | default "mirrord-agent:local"}}'
    cmds:
      - minikube -p {{.CLUSTER_NAME}} ssh "docker rmi {{.AGENT_IMAGE}} --force" || true
      - minikube -p {{.CLUSTER_NAME}} image load {{.AGENT_IMAGE}}

  helm:update:
    desc: Update helm chart only
    cmds:
      - helm upgrade --install mirrord-operator {{.CHARTS_DIR}} --namespace mirrord -f {{.ROOT_DIR}}/operator-values.yaml
      - task: _wait:operator

  test:mysql:
    desc: "Run MySQL test"
    deps: [build:app:mysql, operator:install]
    cmds:
      - task: mysql:test

  test:mysql:quick:
    desc: "Quick MySQL test - verify only"
    cmds:
      - task: mysql:verify

  test:mysql:clean:
    desc: "Clean cluster and run MySQL test"
    cmds:
      - task: cluster:delete
      - task: cluster:create
      - task: operator:install
      - task: mysql:test

  test:mysql:clean:nobuild:
    desc: "Clean cluster and run MySQL test (skip operator build)"
    cmds:
      - task: cluster:delete
      - task: cluster:create
      - task: build:app:mysql
      - task: license:create:secret
      - task: operator:install:nobuild
      - task: mysql:test

  test:mariadb:
    desc: "Run MariaDB test"
    deps: [build:app:mysql, operator:install]
    cmds:
      - task: mysql:test:mariadb

  test:mariadb:clean:
    desc: "Clean cluster and run MariaDB test"
    cmds:
      - task: cluster:delete
      - task: cluster:create
      - task: build:app:mysql
      - task: operator:install
      - task: mysql:test:mariadb

  test:mariadb:clean:nobuild:
    desc: "Clean cluster and run MariaDB test (skip operator build)"
    cmds:
      - task: cluster:delete
      - task: cluster:create
      - task: build:app:mysql
      - task: license:create:secret
      - task: operator:install:nobuild
      - task: mysql:test:mariadb

  test:postgres:
    desc: "Run PostgreSQL test"
    deps: [build:app:postgres, operator:install]
    cmds:
      - task: postgres:test

  test:postgres:quick:
    desc: "Quick PostgreSQL test - verify only"
    cmds:
      - task: postgres:verify

  test:postgres:clean:
    desc: "Clean cluster and run PostgreSQL test"
    cmds:
      - task: cluster:delete
      - task: cluster:create
      - task: build:app:postgres
      - task: operator:install
      - task: postgres:test

  test:postgres:clean:nobuild:
    desc: "Clean cluster and run PostgreSQL test (skip operator build)"
    cmds:
      - task: cluster:delete
      - task: cluster:create
      - task: build:app:postgres
      - task: license:create:secret
      - task: operator:install:nobuild
      - task: postgres:test

  test:postgres:ssl:setup:
    desc: Generate SSL certificates for PostgreSQL SSL tests
    cmds:
      - chmod +x {{.ROOT_DIR}}/k8s/postgres/ssl-tests/generate-ssl-certs.sh
      - cd {{.ROOT_DIR}}/k8s/postgres/ssl-tests && ./generate-ssl-certs.sh
      - kubectl create namespace {{.NAMESPACE}} --dry-run=client -o yaml | kubectl apply -f -
      - kubectl create secret generic postgres-ssl-certs -n {{.NAMESPACE}} --from-file=server.crt={{.ROOT_DIR}}/k8s/postgres/ssl-tests/certs/server.crt --from-file=server.key={{.ROOT_DIR}}/k8s/postgres/ssl-tests/certs/server.key --dry-run=client -o yaml | kubectl apply -f -

  test:postgres:ssl:deploy:
    desc: Deploy PostgreSQL with SSL
    deps: [test:postgres:ssl:setup]
    cmds:
      - kubectl apply -f {{.ROOT_DIR}}/k8s/postgres/ssl-tests/postgres-ssl-test.yaml
      - kubectl wait --for=condition=ready pod/postgres-ssl-test -n {{.NAMESPACE}} --timeout=120s
      - kubectl wait --for=condition=ready pod/pg-ssl-server-env-val -n {{.NAMESPACE}} --timeout=60s

  test:postgres:ssl:verify:
    desc: Verify PostgreSQL SSL
    cmds:
      - echo "=== SSL Status ==="
      - kubectl exec -n {{.NAMESPACE}} postgres-ssl-test -- psql -U postgres -d source_db -c "SHOW ssl;"
      - echo ""
      - echo "=== SSL Connection Test ==="
      - kubectl exec -n {{.NAMESPACE}} postgres-ssl-test -- psql "postgresql://postgres:postgres@localhost:5432/source_db?sslmode=require" -c "SELECT 'SSL works!' as result;"

  test:postgres:ssl:clean:
    desc: "Clean cluster and run PostgreSQL SSL test"
    cmds:
      - task: cluster:delete
      - task: cluster:create
      - task: build:app:postgres
      - task: operator:install
      - task: test:postgres:ssl:deploy
      - task: test:postgres:ssl:verify

  test:sqs:
    desc: "Run SQS LocalStack test"
    deps: [build:app:sqs, operator:install]
    cmds:
      - task: sqs:test

  test:sqs:clean:
    desc: "Clean cluster and run SQS test"
    cmds:
      - task: cluster:delete
      - task: cluster:create
      - task: test:sqs

  test:sqs:clean:nobuild:
    desc: "Clean cluster and run SQS test (skip operator build)"
    cmds:
      - task: cluster:delete
      - task: cluster:create
      - task: build:app:sqs
      - task: license:create:secret
      - task: operator:install:nobuild
      - task: sqs:test

  test:sqs:aws:
    desc: "Run AWS SQS test"
    deps: [build:app:sqs, operator:install]
    cmds:
      - task: sqs:deploy:aws

  test:sqs:aws:clean:
    desc: "Clean cluster and run AWS SQS test"
    cmds:
      - task: cluster:delete
      - task: cluster:create
      - task: build:app:sqs
      - task: license:create:secret
      - task: operator:install
      - task: sqs:deploy:aws

  test:kafka:
    desc: "Run Kafka test"
    deps: [build:app:kafka, operator:install]
    cmds:
      - task: kafka:test

  test:kafka:clean:
    desc: "Clean cluster and run Kafka test"
    cmds:
      - task: cluster:delete
      - task: cluster:create
      - task: test:kafka

  test:kafka:clean:nobuild:
    desc: "Clean cluster and run Kafka test (skip operator build)"
    cmds:
      - task: cluster:delete
      - task: cluster:create
      - task: build:app:kafka
      - task: license:create:secret
      - task: operator:install:nobuild
      - task: kafka:test

  test:redis:
    desc: "Run Redis test"
    cmds:
      - task: redis:test

  test:redis:clean:
    desc: "Clean cluster and run Redis test"
    cmds:
      - task: cluster:delete
      - task: cluster:create
      - task: operator:install
      - task: redis:test

  test:all:clean:
    desc: Run all tests with fresh cluster
    cmds:
      - task: test:sqs:clean
      - task: test:kafka:clean:nobuild
      - task: test:mysql:clean:nobuild
      - task: test:mariadb:clean:nobuild
      - task: test:postgres:clean:nobuild

  test:all:clean:nobuild:
    desc: Run all tests (skip operator build)
    cmds:
      - task: test:sqs:clean:nobuild
      - task: test:kafka:clean:nobuild
      - task: test:mysql:clean:nobuild
      - task: test:mariadb:clean:nobuild
      - task: test:postgres:clean:nobuild

  test:default:clean:
    desc: Delete cluster and run fresh
    cmds:
      - task: cluster:delete
      - task: cluster:create
      - task: operator:install

  test:default:clean:nocache:
    desc: Delete cluster and run fresh without cache
    cmds:
      - task: cluster:delete
      - task: cluster:create
      - task: operator:install:nocache

  test:copy:target:setup:
    desc: Setup environment for copy-target testing
    deps: [build:app:sqs, operator:install]
    cmds:
      - kubectl apply -k {{.ROOT_DIR}}/k8s/overlays/sqs-localstack
      - kubectl wait --for=condition=ready pod -l app=sqs-consumer -n {{.NAMESPACE}} --timeout=120s
      - kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=localstack -n localstack --timeout=120s

  test:copy:target:run:
    desc: Create a copy-target pod
    cmds:
      - |
        echo "Starting mirrord with copy_target..."
        {{.MIRRORD_BIN | default "mirrord"}} exec -f {{.ROOT_DIR}}/k8s/sqs-localstack/copy-target-config.json -- sleep 10

  test:copy:target:run:long:
    desc: Create a long-running copy-target pod (10 minutes)
    cmds:
      - |
        {{.MIRRORD_BIN | default "mirrord"}} exec -f {{.ROOT_DIR}}/k8s/sqs-localstack/copy-target-config.json -- sleep 600

  test:tls:certs:
    desc: Test TLS certificate configuration
    cmds:
      - '{{.SCRIPTS_DIR}}/test-tls-certificates.sh'

  test:tls:quick:
    desc: Quick TLS test
    cmds:
      - '{{.SCRIPTS_DIR}}/quick-tls-test.sh'

  clean:namespaces:
    desc: Delete all test namespaces
    cmds:
      - kubectl delete namespace {{.NAMESPACE}} --ignore-not-found=true
      - kubectl delete namespace localstack --ignore-not-found=true
      - task: operator:uninstall

  logs:operator:
    desc: Show operator logs
    cmds:
      - kubectl logs -n mirrord deployment/mirrord-operator --tail=100 -f

  dev:
    desc: Quick dev cycle - rebuild and test
    cmds:
      - task: build
      - task: clean:namespaces
      - task: test:sqs

  redis:local:start:
    desc: "Start local Redis"
    vars:
      REDIS_PORT: '{{.REDIS_PORT | default "6379"}}'
    cmds:
      - redis-server --port {{.REDIS_PORT}} --daemonize yes

  redis:local:stop:
    desc: "Stop local Redis"
    vars:
      REDIS_PORT: '{{.REDIS_PORT | default "6379"}}'
    cmds:
      - redis-cli -p {{.REDIS_PORT}} SHUTDOWN 2>/dev/null || true

  redis:local:cli:
    desc: "Open redis-cli to local Redis"
    vars:
      REDIS_PORT: '{{.REDIS_PORT | default "6379"}}'
    interactive: true
    cmds:
      - redis-cli -p {{.REDIS_PORT}}

  redis:local:test:
    desc: "Test local Redis connection"
    vars:
      REDIS_PORT: '{{.REDIS_PORT | default "6379"}}'
    cmds:
      - |
        redis-cli -p {{.REDIS_PORT}} PING
        redis-cli -p {{.REDIS_PORT}} SET test-key "hello"
        redis-cli -p {{.REDIS_PORT}} GET test-key
        redis-cli -p {{.REDIS_PORT}} DEL test-key

  redis:cluster:deploy:
    desc: "Deploy Redis to cluster"
    vars:
      PLAYGROUND_DIR: '{{.PLAYGROUND_DIR | default (print .ROOT_DIR "/../playground")}}'
    cmds:
      - kubectl apply -k {{.PLAYGROUND_DIR}}/base/redis
      - kubectl wait --for=condition=available deployment/redis-main --timeout=120s

  redis:cluster:delete:
    desc: "Delete Redis from cluster"
    vars:
      PLAYGROUND_DIR: '{{.PLAYGROUND_DIR | default (print .ROOT_DIR "/../playground")}}'
    cmds:
      - kubectl delete -k {{.PLAYGROUND_DIR}}/base/redis --ignore-not-found=true

  playground:deploy:
    desc: "Deploy playground essentials"
    vars:
      PLAYGROUND_DIR: '{{.PLAYGROUND_DIR | default (print .ROOT_DIR "/../playground")}}'
    cmds:
      - kubectl apply -k {{.PLAYGROUND_DIR}}/base/redis
      - kubectl apply -k {{.PLAYGROUND_DIR}}/base/kafka
      - kubectl apply -k {{.PLAYGROUND_DIR}}/base/ip-info || true
      - kubectl apply -k {{.PLAYGROUND_DIR}}/base/ip-info-grpc || true
      - kubectl apply -k {{.PLAYGROUND_DIR}}/base/ip-visit-counter
      - kubectl wait --for=condition=available deployment/redis-main --timeout=120s
      - kubectl wait --for=condition=available deployment/ip-visit-counter --timeout=120s || true

  playground:delete:
    desc: "Delete playground deployments"
    vars:
      PLAYGROUND_DIR: '{{.PLAYGROUND_DIR | default (print .ROOT_DIR "/../playground")}}'
    cmds:
      - kubectl delete -k {{.PLAYGROUND_DIR}}/base/ip-visit-counter --ignore-not-found=true
      - kubectl delete -k {{.PLAYGROUND_DIR}}/base/ip-info-grpc --ignore-not-found=true
      - kubectl delete -k {{.PLAYGROUND_DIR}}/base/ip-info --ignore-not-found=true
      - kubectl delete -k {{.PLAYGROUND_DIR}}/base/kafka --ignore-not-found=true
      - kubectl delete -k {{.PLAYGROUND_DIR}}/base/redis --ignore-not-found=true

  _wait:operator:
    internal: true
    cmds:
      - kubectl wait --for=condition=ready pod -l app=mirrord-operator -n mirrord --timeout=300s
