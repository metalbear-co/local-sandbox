version: '3'

vars:
  ROOT_DIR:
    sh: cd .. && pwd
  NAMESPACE: '{{.NAMESPACE | default "test-mirrord"}}'
  MIRRORD_BIN: '{{.MIRRORD_BIN | default "mirrord"}}'

tasks:
  deploy:
    desc: "Deploy SQS LocalStack test environment"
    cmds:
      - kubectl apply -k {{.ROOT_DIR}}/k8s/overlays/sqs-localstack
      - task: _wait:localstack
      - task: _wait:consumer

  deploy:legacy:
    desc: "Deploy SQS env with the old MirrordWorkloadQueueRegistry only (no MirrordSplitConfig). Use this under a released operator that lacks the new CRD."
    cmds:
      - kubectl apply -k {{.ROOT_DIR}}/k8s/overlays/sqs-localstack-legacy
      - task: _wait:localstack
      - task: _wait:consumer

  deploy:aws:
    desc: "Deploy SQS AWS test environment"
    preconditions:
      - sh: test -n "${QUEUE_NAME}"
        msg: "QUEUE_NAME not set in .env"
      - sh: test -n "${AWS_REGION}"
        msg: "AWS_REGION not set in .env"
    cmds:
      - kubectl create namespace {{.NAMESPACE}} --dry-run=client -o yaml | kubectl apply -f -
      - kubectl kustomize {{.ROOT_DIR}}/k8s/overlays/sqs-aws | envsubst | kubectl apply -f -
      - task: _patch:operator:aws
      - task: _wait:consumer

  test:
    desc: "Full SQS LocalStack test (deploy + send message)"
    cmds:
      - task: deploy
      - task: send
      - echo "Check logs with 'task sqs:logs'"

  test:quick:
    desc: "Quick test - send message only (no deploy)"
    cmds:
      - task: send
      - echo "Check logs with 'task sqs:logs'"

  run:local:
    desc: "Run SQS consumer locally with mirrord (LocalStack)"
    dir: '{{.ROOT_DIR}}/apps/sqs-consumer'
    vars:
      MIRRORD_CONFIG: '{{.MIRRORD_CONFIG | default (print .ROOT_DIR "/k8s/overlays/sqs-localstack/mirrord.json")}}'
    cmds:
      - go build -o /tmp/sqs-consumer main.go
      - '{{.MIRRORD_BIN}} exec -f {{.MIRRORD_CONFIG}} -- /tmp/sqs-consumer'

  split:session:
    desc: "Start a local mirrord SQS-splitting session in the foreground (Ctrl-C to stop). Output streams to this console. Pinned to eu-north-1 so it matches the source queue, the consumer deployment env, and the operator (operator-values.yaml AWS_REGION) - the operator creates the split queue in its own region, so everything must agree. Set MIRRORD_BIN to override the CLI."
    dir: '{{.ROOT_DIR}}'
    vars:
      MIRRORD_CONFIG: '{{.MIRRORD_CONFIG | default (print .ROOT_DIR "/k8s/overlays/sqs-localstack/mirrord.json")}}'
      REGION: '{{.REGION | default "eu-north-1"}}'
    cmds:
      - (cd apps/sqs-consumer && go build -o /tmp/sqs-consumer main.go)
      - kubectl exec -n localstack deploy/localstack -- awslocal sqs create-queue --queue-name TestQueue --region {{.REGION}} >/dev/null 2>&1 || true
      - |
        BIN="${MIRRORD_BIN:-{{.ROOT_DIR}}/../mirrord/target/aarch64-apple-darwin/debug/mirrord}"
        AWS_ACCESS_KEY_ID=test AWS_SECRET_ACCESS_KEY=test AWS_REGION={{.REGION}} \
          QUEUE_NAME=test-queue MIRRORD_CHECK_VERSION=false \
          "$BIN" exec -f {{.MIRRORD_CONFIG}} -- /tmp/sqs-consumer

  split:send:
    desc: "Send messages to the SQS source queue and print results to the console. FILTERED=N go to your local session (tenant Avi.Test); UNFILTERED=N stay in the cluster (tenant Basic)."
    vars:
      FILTERED: '{{.FILTERED | default "1"}}'
      UNFILTERED: '{{.UNFILTERED | default "0"}}'
      REGION: '{{.REGION | default "eu-north-1"}}'
      QUEUE_URL: '{{.QUEUE_URL | default "http://localhost:4566/000000000000/TestQueue"}}'
    cmds:
      - |
        for i in $(seq 1 {{.FILTERED}}); do
          kubectl exec -n localstack deploy/localstack -- \
            awslocal sqs send-message --region {{.REGION}} --queue-url {{.QUEUE_URL}} \
              --message-body "filtered-$i" \
              --message-attributes '{"tenant":{"DataType":"String","StringValue":"Avi.Test"}}' >/dev/null
          echo "sent filtered-$i  (tenant=Avi.Test -> local session)"
        done
        for i in $(seq 1 {{.UNFILTERED}}); do
          kubectl exec -n localstack deploy/localstack -- \
            awslocal sqs send-message --region {{.REGION}} --queue-url {{.QUEUE_URL}} \
              --message-body "unfiltered-$i" \
              --message-attributes '{"tenant":{"DataType":"String","StringValue":"Basic"}}' >/dev/null
          echo "sent unfiltered-$i  (tenant=Basic -> stays in cluster)"
        done

  split:reset:
    desc: "Full reset of SQS splitting state: kill the local consumer, delete every split-session CRD, delete all mirrord split queues, and restart the operator so no stale in-memory split keeps routing your messages to a dead queue."
    vars:
      REGION: '{{.REGION | default "eu-north-1"}}'
    cmds:
      - echo "killing any local consumer processes"
      - pkill -f /tmp/sqs-consumer 2>/dev/null || true
      - echo "deleting split-session CRDs (both legacy and unified)"
      - kubectl delete mirrordclustersplitsession --all -A --wait=false 2>/dev/null || true
      - kubectl delete mirrordsqssession --all -A --wait=false 2>/dev/null || true
      - kubectl delete mirrordclustersession --all -n mirrord --wait=false 2>/dev/null || true
      # A split session carries the `mirrord-queue-splitting` finalizer, so the
      # delete above only marks it for deletion - the operator is supposed to
      # remove the finalizer after it cleans up the split, but an orphaned
      # session (consumer gone, operator restarted) never gets reconciled and
      # stays stuck in Terminating forever. Since this is a full reset that
      # also wipes the queues and restarts the operator, that cleanup is moot,
      # so we strip the finalizer to let the stuck sessions actually go away.
      - echo "clearing finalizers on any stuck split-session CRDs"
      - |
        for name in $(kubectl get mirrordclustersplitsession -o jsonpath='{.items[*].metadata.name}' 2>/dev/null); do
          echo "  clearing finalizers on $name"
          kubectl patch mirrordclustersplitsession "$name" --type=merge -p '{"metadata":{"finalizers":[]}}' 2>/dev/null || true
        done
      - echo "deleting all mirrord split queues in {{.REGION}}"
      - |
        for q in $(kubectl exec -n localstack deploy/localstack -- \
            awslocal sqs list-queues --region {{.REGION}} --query 'QueueUrls[]' --output text 2>/dev/null \
            | tr '\t' '\n' | grep mirrord); do
          echo "  deleting $(basename "$q")"
          kubectl exec -n localstack deploy/localstack -- \
            awslocal sqs delete-queue --queue-url "$q" --region {{.REGION}} 2>/dev/null || true
        done
      - echo "restarting operator to clear in-memory split state"
      - kubectl rollout restart deployment/mirrord-operator -n mirrord
      - kubectl rollout status deployment/mirrord-operator -n mirrord --timeout=120s
      - echo "reset complete - start a fresh session with 'task sqs:split:session'"

  split:multi-registry:
    desc: "Backwards-compat test for two MirrordWorkloadQueueRegistry objects on the same workload, each declaring a different queue. The old operator merged them; the unified resolver must too. Splits BOTH test-queue (registry 1) and orders-queue (registry 2) in one session and checks the MirrordClusterSplitSession resolves both. PASS = both queue ids present; FAIL = the second registry was dropped or the session errored."
    dir: '{{.ROOT_DIR}}'
    vars:
      MIRRORD_CONFIG: '{{.MIRRORD_CONFIG | default (print .ROOT_DIR "/k8s/overlays/sqs-localstack/mirrord-multi-registry.json")}}'
      REGION: '{{.REGION | default "eu-north-1"}}'
      CLUSTER_NAME: '{{.CLUSTER_NAME | default "bearkube"}}'
      CONTAINER_RUNTIME: '{{.CONTAINER_RUNTIME | default "docker"}}'
    cmds:
      # Rebuild and load the consumer image so the in-cluster pods run the
      # multi-queue app too (it reads QUEUE_NAME and ORDERS_QUEUE_NAME). The
      # local session rebuilds its own binary below via `go build`.
      - "{{.CONTAINER_RUNTIME}} build -t sqs-consumer:local {{.ROOT_DIR}}/apps/sqs-consumer"
      - minikube -p {{.CLUSTER_NAME}} image load sqs-consumer:local
      - kubectl apply -k {{.ROOT_DIR}}/k8s/overlays/sqs-localstack-legacy
      - kubectl apply -f {{.ROOT_DIR}}/k8s/sqs/queue-registry-second.yaml
      # A real MirrordSplitConfig always wins over legacy registries, so any
      # leftover from a prior `sqs:deploy` would hide the legacy path we want to
      # test. Kustomize `$patch: delete` in the legacy overlay does not remove an
      # already-created object, so delete it explicitly here.
      - kubectl delete mirrordsplitconfig --all -n {{.NAMESPACE}} --ignore-not-found=true
      # registry 2's orders-queue reads its name from ORDERS_QUEUE_NAME, a
      # different env var than test-queue's QUEUE_NAME, so the operator patches
      # two distinct vars instead of clashing on one. Inject it at runtime and
      # create the matching LocalStack queue.
      - kubectl set env deployment/sqs-consumer -n {{.NAMESPACE}} ORDERS_QUEUE_NAME=OrdersQueue
      - kubectl exec -n localstack deploy/localstack -- awslocal sqs create-queue --queue-name TestQueue --region {{.REGION}} >/dev/null 2>&1 || true
      - kubectl exec -n localstack deploy/localstack -- awslocal sqs create-queue --queue-name OrdersQueue --region {{.REGION}} >/dev/null 2>&1 || true
      # Start clean so the only split session we inspect is the one we create.
      - kubectl delete mirrordclustersplitsession --all -n {{.NAMESPACE}} --ignore-not-found=true --wait=false
      - task: _wait:localstack
      - task: _wait:consumer
      - echo "two registries now target Deployment/sqs-consumer:"
      - kubectl get mirrordworkloadqueueregistry -n {{.NAMESPACE}} -o custom-columns='NAME:.metadata.name,CONSUMER:.spec.consumer.name,QUEUES:.spec.queues'
      - (cd apps/sqs-consumer && go build -o /tmp/sqs-consumer main.go)
      - |
        BIN="${MIRRORD_BIN:-{{.ROOT_DIR}}/../mirrord/target/aarch64-apple-darwin/debug/mirrord}"
        LOG=$(mktemp)
        echo "starting split session in the background (log: $LOG)"
        AWS_ACCESS_KEY_ID=test AWS_SECRET_ACCESS_KEY=test AWS_REGION={{.REGION}} \
          QUEUE_NAME=test-queue MIRRORD_CHECK_VERSION=false \
          "$BIN" exec -f {{.MIRRORD_CONFIG}} -- /tmp/sqs-consumer > "$LOG" 2>&1 &
        MIRRORD_PID=$!

        RESOLVED=""
        for i in $(seq 1 30); do
          if ! kill -0 "$MIRRORD_PID" 2>/dev/null; then
            break
          fi
          RESOLVED=$(kubectl get mirrordclustersplitsession -n {{.NAMESPACE}} \
            -o jsonpath='{range .items[*]}{.status.ready.tmpResources[*].queueId}{"\n"}{end}' 2>/dev/null \
            | tr ' ' '\n' | grep -v '^$' | sort -u | tr '\n' ' ')
          if [ -n "$RESOLVED" ]; then
            break
          fi
          sleep 2
        done

        kill "$MIRRORD_PID" 2>/dev/null || true
        wait "$MIRRORD_PID" 2>/dev/null || true

        echo "-----------------------------------------------------------------"
        echo "session log (tail):"
        tail -n 15 "$LOG" || true
        echo "-----------------------------------------------------------------"
        echo "resolved queue ids in MirrordClusterSplitSession: [$RESOLVED]"
        if echo "$RESOLVED" | grep -q 'test-queue' && echo "$RESOLVED" | grep -q 'orders-queue'; then
          echo "PASS: both registries merged - test-queue (registry 1) and orders-queue (registry 2) resolved"
        else
          echo "FAIL: the two registries did not merge - expected both 'test-queue' and 'orders-queue'"
          echo "      (the unified resolver likely rejected or dropped the second registry)"
          exit 1
        fi

  split:multi-registry:send:
    desc: "Send messages to BOTH source queues (TestQueue + OrdersQueue) for the multi-registry test. FILTERED=N per queue match the filter (tenant=Avi.Test) and go to your local session; UNFILTERED=N per queue do not match (tenant=Basic) and stay in the cluster. Defaults: FILTERED=2 UNFILTERED=1."
    vars:
      FILTERED: '{{.FILTERED | default "2"}}'
      UNFILTERED: '{{.UNFILTERED | default "1"}}'
      REGION: '{{.REGION | default "eu-north-1"}}'
    cmds:
      - |
        Q=http://localhost:4566/000000000000
        send() {
          # $1 queue url, $2 body, $3 tenant
          kubectl exec -n localstack deploy/localstack -- awslocal sqs send-message \
            --region {{.REGION}} --queue-url "$1" --message-body "$2" \
            --message-attributes "{\"tenant\":{\"DataType\":\"String\",\"StringValue\":\"$3\"}}" >/dev/null
          echo "  sent $2 (tenant=$3) -> $(basename "$1")"
        }
        for NAME in TestQueue OrdersQueue; do
          echo "queue $NAME:"
          for i in $(seq 1 {{.FILTERED}}); do
            send "$Q/$NAME" "${NAME}-local-$i" "Avi.Test"
          done
          for i in $(seq 1 {{.UNFILTERED}}); do
            send "$Q/$NAME" "${NAME}-remote-$i" "Basic"
          done
        done
        echo ""
        echo "filtered (tenant=Avi.Test) -> local session consumer"
        echo "unfiltered (tenant=Basic)  -> in-cluster pods (kubectl logs -n {{.NAMESPACE}} -l app=sqs-consumer -c consumer)"

  split:multi-registry:clean:
    desc: "Remove the second registry and extra env/queue added by sqs:split:multi-registry."
    cmds:
      - kubectl delete -f {{.ROOT_DIR}}/k8s/sqs/queue-registry-second.yaml --ignore-not-found=true
      - kubectl set env deployment/sqs-consumer -n {{.NAMESPACE}} ORDERS_QUEUE_NAME- 2>/dev/null || true

  run:local:aws:
    desc: "Run SQS consumer locally with mirrord (AWS)"
    dir: '{{.ROOT_DIR}}/apps/sqs-consumer'
    vars:
      MIRRORD_CONFIG: '{{.MIRRORD_CONFIG | default (print .ROOT_DIR "/k8s/overlays/sqs-aws/mirrord.json")}}'
    cmds:
      - echo "Building SQS consumer..."
      - go build -o /tmp/sqs-consumer main.go
      - echo "Starting mirrord with AWS SQS config..."
      - echo "Messages matching filter will be received here."
      - '{{.MIRRORD_BIN}} exec -f {{.MIRRORD_CONFIG}} -- /tmp/sqs-consumer'

  send:
    desc: "Send test message to LocalStack SQS"
    vars:
      TENANT: '{{.TENANT | default "Avi.Test"}}'
      MESSAGE: '{{.MESSAGE | default "Test message"}}'
      QUEUE_URL: '{{.QUEUE_URL | default "http://localhost:4566/000000000000/TestQueue"}}'
      REGION: '{{.REGION | default "eu-north-1"}}'
    cmds:
      - |
        POD=$(kubectl get pod -n localstack -l app.kubernetes.io/name=localstack -o jsonpath='{.items[0].metadata.name}')
        kubectl exec -n localstack $POD -- awslocal sqs send-message \
          --queue-url {{.QUEUE_URL}} \
          --region {{.REGION}} \
          --message-body '{{.MESSAGE}}' \
          --message-attributes 'tenant={StringValue={{.TENANT}},DataType=String}'

  send:aws:
    desc: "Send test message to AWS SQS WITH 'test' attribute (goes to LOCAL app)"
    vars:
      MESSAGE: '{{.MESSAGE | default "Test message for LOCAL app"}}'
      TEST_VALUE: '{{.TEST_VALUE | default "mirrord"}}'
    cmds:
      - |
        echo "Sending message with 'test={{.TEST_VALUE}}' attribute..."
        aws sqs send-message \
          --queue-url https://sqs.${AWS_REGION}.amazonaws.com/${AWS_ACCOUNT_ID}/${QUEUE_NAME} \
          --region ${AWS_REGION} \
          --message-body '{{.MESSAGE}}' \
          --message-attributes 'test={StringValue={{.TEST_VALUE}},DataType=String}' \
          --output json
        echo "Message sent! Check local terminal running 'task sqs:run:local:aws'"

  send:aws:nomatch:
    desc: "Send test message to AWS SQS WITHOUT 'test' attribute (goes to CLUSTER)"
    vars:
      MESSAGE: '{{.MESSAGE | default "Test message for CLUSTER consumer"}}'
    cmds:
      - |
        echo "Sending message WITHOUT 'test' attribute..."
        aws sqs send-message \
          --queue-url https://sqs.${AWS_REGION}.amazonaws.com/${AWS_ACCOUNT_ID}/${QUEUE_NAME} \
          --region ${AWS_REGION} \
          --message-body '{{.MESSAGE}}' \
          --output json
        echo "Message sent! Check cluster logs with 'task sqs:logs'"

  send:aws:both:
    desc: "Send two messages - one for LOCAL, one for CLUSTER"
    cmds:
      - task: send:aws
        vars: {MESSAGE: "Message 1 - for LOCAL app (has test attribute)"}
      - echo ""
      - task: send:aws:nomatch
        vars: {MESSAGE: "Message 2 - for CLUSTER (no test attribute)"}

  logs:
    desc: "Show SQS consumer logs"
    cmds:
      - kubectl logs -n {{.NAMESPACE}} -l app=sqs-consumer --tail=100 -f

  logs:localstack:
    desc: "Show LocalStack logs"
    cmds:
      - kubectl logs -n localstack -l app.kubernetes.io/name=localstack --tail=100 -f

  shell:
    desc: "Shell into SQS consumer pod"
    cmds:
      - |
        POD=$(kubectl get pod -n {{.NAMESPACE}} -l app=sqs-consumer -o jsonpath='{.items[0].metadata.name}')
        kubectl exec -it -n {{.NAMESPACE}} $POD -- sh

  shell:localstack:
    desc: "Shell into LocalStack pod"
    cmds:
      - |
        POD=$(kubectl get pod -n localstack -l app.kubernetes.io/name=localstack -o jsonpath='{.items[0].metadata.name}')
        kubectl exec -it -n localstack $POD -- bash

  status:
    desc: "Show SQS test environment status"
    cmds:
      - echo "=== SQS Consumer ==="
      - kubectl get pods -n {{.NAMESPACE}} -l app=sqs-consumer 2>/dev/null || echo "Not deployed"
      - echo ""
      - echo "=== LocalStack ==="
      - kubectl get pods -n localstack -l app.kubernetes.io/name=localstack 2>/dev/null || echo "Not deployed"
      - echo ""
      - echo "=== Queue Registry ==="
      - kubectl get mirrordworkloadqueueregistries -n {{.NAMESPACE}} 2>/dev/null || echo "No registry"

  status:aws:
    desc: "Show AWS SQS test status"
    cmds:
      - echo "=== Pods in {{.NAMESPACE}} ==="
      - kubectl get pods -n {{.NAMESPACE}}
      - echo ""
      - echo "=== Operator pods ==="
      - kubectl get pods -n mirrord
      - echo ""
      - echo "=== Queue Registry ==="
      - kubectl get mirrordworkloadqueueregistries -n {{.NAMESPACE}} -o yaml 2>/dev/null || echo "No registry"
      - echo ""
      - echo "=== AWS SQS Queue ==="
      - aws sqs get-queue-attributes --queue-url https://sqs.${AWS_REGION}.amazonaws.com/${AWS_ACCOUNT_ID}/${QUEUE_NAME} --region ${AWS_REGION} --attribute-names ApproximateNumberOfMessages ApproximateNumberOfMessagesNotVisible 2>/dev/null || echo "Could not fetch"

  registry:
    desc: "Show queue registry details"
    cmds:
      - kubectl get mirrordworkloadqueueregistries -n {{.NAMESPACE}} -o yaml

  describe:
    desc: "Describe SQS consumer pod"
    cmds:
      - kubectl describe pod -n {{.NAMESPACE}} -l app=sqs-consumer

  clean:
    desc: "Clean SQS LocalStack test resources"
    cmds:
      - kubectl delete -k {{.ROOT_DIR}}/k8s/overlays/sqs-localstack --ignore-not-found=true
      - kubectl delete namespace localstack --ignore-not-found=true

  clean:aws:
    desc: "Clean SQS AWS test resources"
    cmds:
      - kubectl delete -k {{.ROOT_DIR}}/k8s/overlays/sqs-aws --ignore-not-found=true

  _wait:localstack:
    internal: true
    cmds:
      - echo "Waiting for LocalStack..."
      - kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=localstack -n localstack --timeout=120s

  _wait:consumer:
    internal: true
    cmds:
      - echo "Waiting for SQS consumer..."
      - kubectl wait --for=condition=ready pod -l app=sqs-consumer -n {{.NAMESPACE}} --timeout=120s

  _patch:operator:aws:
    internal: true
    cmds:
      - |
        envsubst < {{.ROOT_DIR}}/k8s/overlays/sqs-aws/operator-patch.yaml | \
          kubectl patch deployment mirrord-operator -n mirrord --patch-file /dev/stdin --type=strategic || true
      - kubectl rollout status deployment/mirrord-operator -n mirrord --timeout=120s || true

  # =============================================================================
  # SQS Split Testing Tasks (for investigating stale filter issues)
  # =============================================================================

  test:split:
    desc: "Test SQS splitting - start local consumer, send filtered messages"
    vars:
      MIRRORD_CONFIG: '{{.MIRRORD_CONFIG | default (print .ROOT_DIR "/k8s/overlays/sqs-localstack/mirrord.json")}}'
    cmds:
      - echo "=== SQS Split Test (bearkube) ==="
      - echo ""
      - echo "This starts a local consumer with SQS filter and tests message routing"
      - echo ""
      - |
        # Build the consumer
        cd {{.ROOT_DIR}}/apps/sqs-consumer
        go build -o /tmp/sqs-consumer main.go 2>/dev/null || echo "Build may have failed"
        
        export AWS_ACCESS_KEY_ID=test
        export AWS_SECRET_ACCESS_KEY=test
        export AWS_REGION=eu-north-1
        export QUEUE_NAME=test-queue
        
        echo "Running local SQS consumer with mirrord..."
        {{.MIRRORD_BIN}} exec -f {{.MIRRORD_CONFIG}} -- /tmp/sqs-consumer

  test:split:send:
    desc: "Send filtered and unfiltered messages: task sqs:test:split:send FILTERED=5 UNFILTERED=2"
    vars:
      FILTERED: '{{.FILTERED | default "3"}}'
      UNFILTERED: '{{.UNFILTERED | default "2"}}'
      QUEUE_URL: 'http://localhost:4566/000000000000/test-queue'
    cmds:
      - |
        echo "=== Sending messages for SQS Split Test ==="
        echo "Sending {{.FILTERED}} filtered (tenant=Avi.Test) + {{.UNFILTERED}} unfiltered (tenant=Basic) messages..."
        echo ""
        
        # Send filtered messages (tenant=Avi.* - will be split to local app)
        for i in $(seq 1 {{.FILTERED}}); do
          kubectl exec -n localstack deploy/localstack -- \
            awslocal sqs send-message \
              --queue-url {{.QUEUE_URL}} \
              --message-body "{\"order\": \"ORD-F$i\", \"amount\": \"$((RANDOM % 1000)).99\", \"type\": \"premium\"}" \
              --message-attributes '{"tenant":{"DataType":"String","StringValue":"Avi.Test"}}' \
              2>/dev/null | jq -r '"FILTERED: " + .MessageId' || echo "FILTERED: failed"
        done
        
        # Send unfiltered messages (tenant=Basic - stays in original queue)
        for i in $(seq 1 {{.UNFILTERED}}); do
          kubectl exec -n localstack deploy/localstack -- \
            awslocal sqs send-message \
              --queue-url {{.QUEUE_URL}} \
              --message-body "{\"order\": \"ORD-U$i\", \"amount\": \"$((RANDOM % 100)).99\", \"type\": \"basic\"}" \
              --message-attributes '{"tenant":{"DataType":"String","StringValue":"Basic"}}' \
              2>/dev/null | jq -r '"UNFILTERED: " + .MessageId' || echo "UNFILTERED: failed"
        done
        
        echo ""
        echo "Done! Sent {{.FILTERED}} filtered + {{.UNFILTERED}} unfiltered = $(({{.FILTERED}} + {{.UNFILTERED}})) total"

  test:split:status:
    desc: "Show SQS session and queue status"
    cmds:
      - echo "=== MirrordClusterSession ==="
      - kubectl get mirrordclustersession -n mirrord 2>/dev/null || echo "(none)"
      - echo ""
      - echo "=== MirrordSqsSession ==="
      - kubectl get mirrordsqssession -n mirrord 2>/dev/null || echo "(none)"
      - echo ""
      - echo "=== Queue Status ==="
      - |
        echo "Main queue (test-queue):"
        kubectl exec -n localstack deploy/localstack -- \
          awslocal sqs get-queue-attributes \
            --queue-url http://localhost:4566/000000000000/test-queue \
            --attribute-names ApproximateNumberOfMessages \
            --output json 2>/dev/null | jq -r '.Attributes.ApproximateNumberOfMessages + " messages"' || echo "  (error)"
      - |
        echo ""
        echo "Temp queues (mirrord-*):"
        kubectl exec -n localstack deploy/localstack -- \
          awslocal sqs list-queues --output json 2>&1 | jq -r '.QueueUrls[]' | grep mirrord | while read queue; do
            count=$(kubectl exec -n localstack deploy/localstack -- \
              awslocal sqs get-queue-attributes --queue-url "$queue" \
                --attribute-names ApproximateNumberOfMessages --output json 2>/dev/null | jq -r '.Attributes.ApproximateNumberOfMessages')
            echo "  $(basename $queue): $count messages"
          done || echo "  (none)"

  test:split:cleanup:
    desc: "Clean up all SQS sessions and temp queues"
    cmds:
      - echo "=== Cleaning up sessions ==="
      - kubectl delete mirrordclustersession --all -n mirrord 2>/dev/null || echo "(none to delete)"
      - echo ""
      - echo "=== Purging main queue ==="
      - kubectl exec -n localstack deploy/localstack -- awslocal sqs purge-queue --queue-url http://localhost:4566/000000000000/test-queue 2>/dev/null || echo "(already empty)"
      - echo ""
      - echo "=== Deleting temp queues ==="
      - |
        kubectl exec -n localstack deploy/localstack -- \
          awslocal sqs list-queues --output json 2>&1 | jq -r '.QueueUrls[]' | grep mirrord | while read queue; do
            echo "Deleting: $(basename $queue)"
            kubectl exec -n localstack deploy/localstack -- awslocal sqs delete-queue --queue-url "$queue" 2>/dev/null || true
          done || echo "(none)"
      - echo ""
      - echo "Cleanup complete!"

  test:reconnect:
    desc: "Test fast disconnect/reconnect SQS behavior (runs full test script)"
    cmds:
      - |
        echo "=== SQS Fast Reconnect Test ==="
        echo ""
        echo "This test verifies what happens when:"
        echo "1. Session 1 starts with SQS filter"
        echo "2. Session 1 disconnects"
        echo "3. Session 2 immediately starts with same filter"
        echo "4. Messages are sent - which session receives them?"
        echo ""
        
        # Clean up first
        kubectl delete mirrordclustersession --all -n mirrord 2>/dev/null || true
        kubectl exec -n localstack deploy/localstack -- awslocal sqs purge-queue --queue-url http://localhost:4566/000000000000/test-queue 2>/dev/null || true
        
        # Build consumer
        cd {{.ROOT_DIR}}/apps/sqs-consumer
        go build -o /tmp/sqs-consumer main.go
        
        export AWS_ACCESS_KEY_ID=test
        export AWS_SECRET_ACCESS_KEY=test
        export AWS_REGION=eu-north-1
        export QUEUE_NAME=test-queue
        
        MIRRORD_CONFIG="{{.ROOT_DIR}}/k8s/overlays/sqs-localstack/mirrord.json"
        SESSION1_LOG="/tmp/sqs-session1.log"
        SESSION2_LOG="/tmp/sqs-session2.log"
        
        echo "=== Step 1: Start Session 1 ==="
        {{.MIRRORD_BIN}} exec -f $MIRRORD_CONFIG -- /tmp/sqs-consumer > $SESSION1_LOG 2>&1 &
        SESSION1_PID=$!
        echo "Session 1 PID: $SESSION1_PID"
        sleep 10
        
        if ! kill -0 $SESSION1_PID 2>/dev/null; then
          echo "ERROR: Session 1 died"
          cat $SESSION1_LOG
          exit 1
        fi
        
        echo "=== Step 2: Send message to Session 1 ==="
        kubectl exec -n localstack deploy/localstack -- \
          awslocal sqs send-message \
            --queue-url http://localhost:4566/000000000000/test-queue \
            --message-body '{"msg": "session1-test"}' \
            --message-attributes '{"tenant":{"DataType":"String","StringValue":"Avi.Test"}}' 2>/dev/null | jq -r '.MessageId'
        sleep 3
        echo "Session 1 log tail:"
        tail -5 $SESSION1_LOG
        
        echo ""
        echo "=== Step 3: Kill Session 1 ==="
        kill $SESSION1_PID 2>/dev/null || true
        wait $SESSION1_PID 2>/dev/null || true
        echo "Session 1 terminated"
        
        echo ""
        echo "=== Step 4: Immediately start Session 2 ==="
        {{.MIRRORD_BIN}} exec -f $MIRRORD_CONFIG -- /tmp/sqs-consumer > $SESSION2_LOG 2>&1 &
        SESSION2_PID=$!
        echo "Session 2 PID: $SESSION2_PID"
        sleep 10
        
        if ! kill -0 $SESSION2_PID 2>/dev/null; then
          echo "ERROR: Session 2 died"
          cat $SESSION2_LOG
          exit 1
        fi
        
        echo ""
        echo "=== Step 5: Send 3 messages ==="
        for i in 1 2 3; do
          kubectl exec -n localstack deploy/localstack -- \
            awslocal sqs send-message \
              --queue-url http://localhost:4566/000000000000/test-queue \
              --message-body "{\"msg\": \"after-reconnect-$i\"}" \
              --message-attributes '{"tenant":{"DataType":"String","StringValue":"Avi.Test"}}' 2>/dev/null | jq -r "\"Message $i: \" + .MessageId"
          sleep 1
        done
        
        echo "Waiting 10s for processing..."
        sleep 10
        
        echo ""
        echo "=== Results ==="
        echo ""
        echo "--- Session 1 Log ---"
        cat $SESSION1_LOG
        echo ""
        echo "--- Session 2 Log ---"
        cat $SESSION2_LOG
        echo ""
        
        SESSION1_COUNT=$(grep -c "\[MSG #" $SESSION1_LOG 2>/dev/null || echo "0")
        SESSION2_COUNT=$(grep -c "\[MSG #" $SESSION2_LOG 2>/dev/null || echo "0")
        
        echo "=== Summary ==="
        echo "Session 1 received: $SESSION1_COUNT messages (expected: 1)"
        echo "Session 2 received: $SESSION2_COUNT messages (expected: 3)"
        echo ""
        
        if [ "$SESSION2_COUNT" -lt 3 ]; then
          echo "WARNING: Session 2 missed messages! This indicates stale filter issue."
        else
          echo "SUCCESS: Session 2 received all messages."
        fi
        
        echo ""
        echo "=== Stale Sessions ==="
        kubectl get mirrordclustersession -n mirrord 2>/dev/null || echo "(none)"
        
        kill $SESSION2_PID 2>/dev/null || true
        echo ""
        echo "Test complete!"

  test:live-upgrade:
    desc: "Test a live session surviving an operator change. MODE=both|upgrade|restart OLD_VERSION=3.165.0 RESTORE_TAG=latest"
    vars:
      MODE: '{{.MODE | default "both"}}'
      OLD_VERSION: '{{.OLD_VERSION | default ""}}'
      RESTORE_TAG: '{{.RESTORE_TAG | default "latest"}}'
    cmds:
      - |
        MODE="{{.MODE}}" \
        OLD_VERSION="{{.OLD_VERSION}}" \
        RESTORE_TAG="{{.RESTORE_TAG}}" \
        MIRRORD_BIN="${MIRRORD_BIN:-{{.MIRRORD_BIN}}}" \
        RELEASE_LICENSE_KEY="${RELEASE_LICENSE_KEY:-}" \
        bash {{.ROOT_DIR}}/scripts/test-live-operator-upgrade.sh

  queue:list:
    desc: "List all SQS queues in LocalStack"
    cmds:
      - echo "=== All SQS Queues ==="
      - kubectl exec -n localstack deploy/localstack -- awslocal sqs list-queues --output json 2>&1 | jq -r '.QueueUrls[]' || echo "(none)"

  queue:purge:
    desc: "Purge the main test-queue"
    cmds:
      - kubectl exec -n localstack deploy/localstack -- awslocal sqs purge-queue --queue-url http://localhost:4566/000000000000/test-queue
      - echo "Queue purged"

  queue:receive:
    desc: "Receive and show messages from test-queue (for debugging)"
    vars:
      MAX_MESSAGES: '{{.MAX_MESSAGES | default "10"}}'
    cmds:
      - |
        echo "=== Receiving up to {{.MAX_MESSAGES}} messages ==="
        kubectl exec -n localstack deploy/localstack -- \
          awslocal sqs receive-message \
            --queue-url http://localhost:4566/000000000000/test-queue \
            --max-number-of-messages {{.MAX_MESSAGES}} \
            --message-attribute-names All \
            --output json 2>&1 | jq '.'
