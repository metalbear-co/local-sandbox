version: "3"

vars:
  ROOT_DIR:
    sh: cd .. && pwd
  NAMESPACE: '{{.NAMESPACE | default "test-mirrord"}}'
  MIRRORD_BIN: '{{.MIRRORD_BIN | default "mirrord"}}'
  CLUSTER_NAME: '{{.CLUSTER_NAME | default "bearkube"}}'
  CONTAINER_RUNTIME: '{{.CONTAINER_RUNTIME | default "docker"}}'

tasks:
  deploy:
    desc: "Deploy Kafka test environment (builds and loads the consumer image first)"
    cmds:
      - task: e2e:strimzi
      - task: _build:app
      - kubectl apply -k {{.ROOT_DIR}}/k8s/overlays/kafka
      - kubectl apply -f {{.ROOT_DIR}}/k8s/kafka/kafka-client-config.yaml
      - task: _wait:kafka
      - task: _wait:consumer

  e2e:strimzi:
    desc: "Install Strimzi + the `my-cluster` Kafka the operator e2e tests expect"
    cmds:
      # The operator/tests kafka suite reads a Strimzi `Kafka/my-cluster` in the
      # `kafka` namespace. This task installs everything from scratch and handles
      # leftover state from previous installs (stale CRDs, PVCs with mismatched
      # cluster IDs, etc.) so it can be re-run on a long-lived local cluster.
      - kubectl create namespace kafka --dry-run=client -o yaml | kubectl apply -f -
      - |
        if ! kubectl get deployment strimzi-cluster-operator -n kafka >/dev/null 2>&1; then
          kubectl apply --server-side -f "https://strimzi.io/install/latest?namespace=kafka" -n kafka
        fi
      - kubectl wait --for=condition=Available deployment/strimzi-cluster-operator -n kafka --timeout=180s
      - |
        if kubectl get kafka my-cluster -n kafka >/dev/null 2>&1; then
          STATUS=$(kubectl get kafka my-cluster -n kafka -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' 2>/dev/null)
          if [ "$STATUS" = "True" ]; then
            echo "kafka/my-cluster already Ready, skipping."
            exit 0
          fi
          echo "kafka/my-cluster exists but not Ready, recreating with clean PVCs..."
          kubectl delete kafka my-cluster -n kafka --wait=true --timeout=60s 2>/dev/null || true
          kubectl delete pod -l strimzi.io/cluster=my-cluster -n kafka --force --grace-period=0 2>/dev/null || true
          kubectl delete pvc -l strimzi.io/cluster=my-cluster -n kafka --wait=false 2>/dev/null || true
          for pvc in $(kubectl get pvc -n kafka -l strimzi.io/cluster=my-cluster -o name 2>/dev/null); do
            kubectl patch "$pvc" -n kafka --type=merge -p '{"metadata":{"finalizers":null}}' 2>/dev/null || true
          done
        fi
      - kubectl apply -f "https://strimzi.io/examples/latest/kafka/kafka-single-node.yaml" -n kafka
      - kubectl wait --for=condition=Ready kafka/my-cluster --timeout=360s -n kafka
      - echo "Strimzi and kafka/my-cluster are ready."

  _build:app:
    internal: true
    desc: "Build and load the kafka-consumer:local image into the cluster"
    dir: "{{.ROOT_DIR}}/apps/kafka-consumer"
    cmds:
      - "{{.CONTAINER_RUNTIME}} build -t kafka-consumer:local ."
      - minikube -p {{.CLUSTER_NAME}} image load kafka-consumer:local

  test:
    desc: "Full Kafka test (deploy + send message)"
    cmds:
      - task: deploy
      - task: send
      - echo "Check logs with 'task kafka:logs'"

  test:quick:
    desc: "Quick test - send message only (no deploy)"
    cmds:
      - task: send
      - echo "Check logs with 'task kafka:logs'"

  run:local:
    desc: "Run Kafka consumer locally with mirrord"
    dir: "{{.ROOT_DIR}}/apps/kafka-consumer"
    vars:
      MIRRORD_CONFIG: '{{.MIRRORD_CONFIG | default (print .ROOT_DIR "/k8s/overlays/kafka/mirrord.json")}}'
    cmds:
      - go build -o /tmp/kafka-consumer main.go
      - "{{.MIRRORD_BIN}} exec -f {{.MIRRORD_CONFIG}} -- /tmp/kafka-consumer"

  run:local:dev:
    desc: "Run the Kafka consumer with the branch debug-built mirrord CLI (use for recovery/upgrade tests - the released CLI on PATH may not reconnect after an operator restart)"
    dir: "{{.ROOT_DIR}}/apps/kafka-consumer"
    vars:
      MIRRORD_DIR: '{{.MIRRORD_DIR | default (print .ROOT_DIR "/../mirrord")}}'
      # The debug build lives under a host-triple subdir (e.g.
      # aarch64-apple-darwin on Apple silicon), so resolve it instead of
      # hardcoding one machine's path.
      HOST_TRIPLE:
        sh: rustc -vV | awk '/^host:/ {print $2}'
      MIRRORD_DEV_BIN: '{{.MIRRORD_DEV_BIN | default (print .MIRRORD_DIR "/target/" .HOST_TRIPLE "/debug/mirrord")}}'
      MIRRORD_CONFIG: '{{.MIRRORD_CONFIG | default (print .ROOT_DIR "/k8s/overlays/kafka/mirrord.json")}}'
    preconditions:
      - sh: test -x "{{.MIRRORD_DEV_BIN}}"
        msg: "Branch mirrord build not found at {{.MIRRORD_DEV_BIN}}. Build it first: cd {{.MIRRORD_DIR}} && cargo build -p mirrord"
    cmds:
      - go build -o /tmp/kafka-consumer main.go
      - echo "Using mirrord CLI {{.MIRRORD_DEV_BIN}}"
      - '"{{.MIRRORD_DEV_BIN}}" exec -f {{.MIRRORD_CONFIG}} -- /tmp/kafka-consumer'

  send:
    desc: "Send test message to Kafka (MESSAGE='hello' TOPIC='test-topic' USER_ID='123')"
    vars:
      MESSAGE: '{{.MESSAGE | default "Test message"}}'
      TOPIC: '{{.TOPIC | default "test-topic"}}'
      USER_ID: '{{.USER_ID | default ""}}'
    cmds:
      - |
        POD=$(kubectl get pod -n {{.NAMESPACE}} -l app=kafka-cluster -o jsonpath='{.items[0].metadata.name}')
        if [ -n "{{.USER_ID}}" ]; then
          echo "Sending message with header user_id={{.USER_ID}} to topic {{.TOPIC}}..."
          printf 'user_id:{{.USER_ID}}|{{.MESSAGE}}' | kubectl exec -i -n {{.NAMESPACE}} "$POD" -- /opt/kafka/bin/kafka-console-producer.sh --bootstrap-server localhost:9092 --topic {{.TOPIC}} --property 'parse.headers=true' --property 'headers.delimiter=|'
          echo "Message sent with header user_id={{.USER_ID}}"
        else
          echo "Sending message without headers to topic {{.TOPIC}}..."
          printf '{{.MESSAGE}}' | kubectl exec -i -n {{.NAMESPACE}} "$POD" -- /opt/kafka/bin/kafka-console-producer.sh --bootstrap-server localhost:9092 --topic {{.TOPIC}}
          echo "Message sent"
        fi

  send:bulk:
    desc: "Send COUNT messages fast through a single producer (TOPIC, COUNT, USER_ID, MESSAGE)"
    vars:
      TOPIC: '{{.TOPIC | default "test-topic"}}'
      COUNT: '{{.COUNT | default "50"}}'
      MESSAGE: '{{.MESSAGE | default "bulk"}}'
      USER_ID: '{{.USER_ID | default "test-user"}}'
    cmds:
      - |
        POD=$(kubectl get pod -n {{.NAMESPACE}} -l app=kafka-cluster -o jsonpath='{.items[0].metadata.name}')
        # One producer process handles every line, so the slow JVM startup is paid
        # once instead of once per message.
        if [ -n "{{.USER_ID}}" ]; then
          echo "Sending {{.COUNT}} messages to {{.TOPIC}} with header user_id={{.USER_ID}}..."
          for i in $(seq 1 {{.COUNT}}); do printf 'user_id:{{.USER_ID}}|{{.MESSAGE}}-%s\n' "$i"; done \
            | kubectl exec -i -n {{.NAMESPACE}} "$POD" -- /opt/kafka/bin/kafka-console-producer.sh \
              --bootstrap-server localhost:9092 --topic {{.TOPIC}} \
              --property 'parse.headers=true' --property 'headers.delimiter=|'
        else
          echo "Sending {{.COUNT}} messages to {{.TOPIC}} without headers..."
          for i in $(seq 1 {{.COUNT}}); do printf '{{.MESSAGE}}-%s\n' "$i"; done \
            | kubectl exec -i -n {{.NAMESPACE}} "$POD" -- /opt/kafka/bin/kafka-console-producer.sh \
              --bootstrap-server localhost:9092 --topic {{.TOPIC}}
        fi
        echo "Done sending {{.COUNT}} messages."

  split:send:
    desc: "Send FILTERED + UNFILTERED messages for split testing (FILTERED=3 UNFILTERED=2 TOPIC=test-topic USER_ID=test-user)"
    vars:
      TOPIC: '{{.TOPIC | default "test-topic"}}'
      FILTERED: '{{.FILTERED | default "3"}}'
      UNFILTERED: '{{.UNFILTERED | default "2"}}'
      USER_ID: '{{.USER_ID | default "test-user"}}'
      MESSAGE: '{{.MESSAGE | default "msg"}}'
    cmds:
      - |
        POD=$(kubectl get pod -n {{.NAMESPACE}} -l app=kafka-cluster -o jsonpath='{.items[0].metadata.name}')
        # The split filter matches the header user_id={{.USER_ID}}. Messages
        # carrying that header are routed to the local mirrord session; messages
        # without it fall through to the deployed workload. We send them in two
        # separate producer runs because the headered batch needs parse.headers
        # while the plain batch must not, otherwise the producer rejects lines
        # that have no header delimiter.
        if [ "{{.FILTERED}}" -gt 0 ]; then
          echo "Sending {{.FILTERED}} FILTERED messages (user_id={{.USER_ID}}) to {{.TOPIC}}..."
          for i in $(seq 1 {{.FILTERED}}); do printf 'user_id:{{.USER_ID}}|{{.MESSAGE}}-filtered-%s\n' "$i"; done \
            | kubectl exec -i -n {{.NAMESPACE}} "$POD" -- /opt/kafka/bin/kafka-console-producer.sh \
              --bootstrap-server localhost:9092 --topic {{.TOPIC}} \
              --property 'parse.headers=true' --property 'headers.delimiter=|'
        fi
        if [ "{{.UNFILTERED}}" -gt 0 ]; then
          echo "Sending {{.UNFILTERED}} UNFILTERED messages (no header) to {{.TOPIC}}..."
          for i in $(seq 1 {{.UNFILTERED}}); do printf '{{.MESSAGE}}-unfiltered-%s\n' "$i"; done \
            | kubectl exec -i -n {{.NAMESPACE}} "$POD" -- /opt/kafka/bin/kafka-console-producer.sh \
              --bootstrap-server localhost:9092 --topic {{.TOPIC}}
        fi
        echo "Done: {{.FILTERED}} filtered + {{.UNFILTERED}} unfiltered."

  consume:
    desc: "Consume messages from Kafka topic (TOPIC='test-topic')"
    vars:
      TOPIC: '{{.TOPIC | default "test-topic"}}'
    cmds:
      - |
        POD=$(kubectl get pod -n {{.NAMESPACE}} -l app=kafka-cluster -o jsonpath='{.items[0].metadata.name}')
        kubectl exec -n {{.NAMESPACE}} "$POD" -- /opt/kafka/bin/kafka-console-consumer.sh --bootstrap-server localhost:9092 --topic {{.TOPIC}} --from-beginning

  logs:
    desc: "Show Kafka consumer logs"
    cmds:
      - kubectl logs -n {{.NAMESPACE}} -l app=kafka-consumer --tail=100 -f

  logs:kafka:
    desc: "Show Kafka server logs"
    cmds:
      - kubectl logs -n {{.NAMESPACE}} -l app=kafka-cluster --tail=100 -f

  shell:
    desc: "Shell into Kafka consumer pod"
    cmds:
      - |
        POD=$(kubectl get pod -n {{.NAMESPACE}} -l app=kafka-consumer -o jsonpath='{.items[0].metadata.name}')
        kubectl exec -it -n {{.NAMESPACE}} "$POD" -- sh

  shell:kafka:
    desc: "Shell into Kafka cluster pod"
    cmds:
      - |
        POD=$(kubectl get pod -n {{.NAMESPACE}} -l app=kafka-cluster -o jsonpath='{.items[0].metadata.name}')
        kubectl exec -it -n {{.NAMESPACE}} "$POD" -- bash

  status:
    desc: "Show Kafka test environment status"
    cmds:
      - echo "=== Kafka Cluster ==="
      - kubectl get pods -n {{.NAMESPACE}} -l app=kafka-cluster 2>/dev/null || echo "Not deployed"
      - echo ""
      - echo "=== Kafka Consumer ==="
      - kubectl get pods -n {{.NAMESPACE}} -l app=kafka-consumer 2>/dev/null || echo "Not deployed"
      - echo ""
      - echo "=== Topics ==="
      - task: topics:list

  topics:list:
    desc: "List Kafka topics"
    cmds:
      - |
        POD=$(kubectl get pod -n {{.NAMESPACE}} -l app=kafka-cluster -o jsonpath='{.items[0].metadata.name}')
        kubectl exec -n {{.NAMESPACE}} "$POD" -- /opt/kafka/bin/kafka-topics.sh --list --bootstrap-server localhost:9092

  topics:create:
    desc: "Create Kafka topic (TOPIC='my-topic' PARTITIONS='3')"
    vars:
      TOPIC: '{{.TOPIC | default "test-topic"}}'
      PARTITIONS: '{{.PARTITIONS | default "3"}}'
      REPLICATION: '{{.REPLICATION | default "1"}}'
    cmds:
      - |
        POD=$(kubectl get pod -n {{.NAMESPACE}} -l app=kafka-cluster -o jsonpath='{.items[0].metadata.name}')
        kubectl exec -n {{.NAMESPACE}} "$POD" -- /opt/kafka/bin/kafka-topics.sh --create --bootstrap-server localhost:9092 --topic {{.TOPIC}} --partitions {{.PARTITIONS}} --replication-factor {{.REPLICATION}}

  describe:
    desc: "Describe Kafka consumer pod"
    cmds:
      - kubectl describe pod -n {{.NAMESPACE}} -l app=kafka-consumer

  describe:kafka:
    desc: "Describe Kafka cluster pod"
    cmds:
      - kubectl describe pod -n {{.NAMESPACE}} -l app=kafka-cluster

  short-hostname:deploy:
    desc: "Deploy Kafka with short advertised hostname (reproduces prospect DNS issue)"
    cmds:
      - kubectl apply -k {{.ROOT_DIR}}/k8s/overlays/kafka-short-hostname
      - kubectl apply -f {{.ROOT_DIR}}/k8s/overlays/kafka-short-hostname/kafka-client-config.yaml
      - task: _wait:kafka:short-hostname
      - task: _wait:consumer

  short-hostname:test:
    desc: "Full short-hostname Kafka test (deploy + trigger split to see resolution failure)"
    cmds:
      - task: short-hostname:deploy
      - task: short-hostname:send
      - echo ""
      - echo "Now trigger a split session to reproduce the Host resolution failure:"
      - echo "  task kafka:short-hostname:split"
      - echo ""
      - echo "Or check operator logs for the error:"
      - echo "  kubectl logs -n mirrord -l app=mirrord-operator --tail=50"

  short-hostname:send:
    desc: "Send test message to cp-kafka broker"
    vars:
      MESSAGE: '{{.MESSAGE | default "Test message short-hostname"}}'
      TOPIC: '{{.TOPIC | default "test-topic"}}'
      USER_ID: '{{.USER_ID | default ""}}'
    cmds:
      - |
        POD=$(kubectl get pod -n {{.NAMESPACE}} -l app=cp-kafka -o jsonpath='{.items[0].metadata.name}')
        if [ -n "{{.USER_ID}}" ]; then
          echo "Sending message with header user_id={{.USER_ID}} to topic {{.TOPIC}}..."
          printf 'user_id:{{.USER_ID}}|{{.MESSAGE}}' | kubectl exec -i -n {{.NAMESPACE}} "$POD" -- /opt/kafka/bin/kafka-console-producer.sh --bootstrap-server localhost:9092 --topic {{.TOPIC}} --property 'parse.headers=true' --property 'headers.delimiter=|'
          echo "Message sent with header user_id={{.USER_ID}}"
        else
          echo "Sending message without headers to topic {{.TOPIC}}..."
          printf '{{.MESSAGE}}' | kubectl exec -i -n {{.NAMESPACE}} "$POD" -- /opt/kafka/bin/kafka-console-producer.sh --bootstrap-server localhost:9092 --topic {{.TOPIC}}
          echo "Message sent"
        fi

  short-hostname:split:
    desc: "Run mirrord with split_queues against the short-hostname Kafka setup"
    dir: "{{.ROOT_DIR}}/apps/kafka-consumer"
    vars:
      MIRRORD_CONFIG: '{{.MIRRORD_CONFIG | default (print .ROOT_DIR "/k8s/overlays/kafka-short-hostname/mirrord.json")}}'
    cmds:
      - go build -o /tmp/kafka-consumer main.go
      - "{{.MIRRORD_BIN}} exec -f {{.MIRRORD_CONFIG}} -- /tmp/kafka-consumer"

  short-hostname:logs:
    desc: "Show operator logs (look for Host resolution failure)"
    cmds:
      - echo "=== Operator logs (last 80 lines) ==="
      - kubectl logs -n mirrord -l app=mirrord-operator --tail=80
      - echo ""
      - echo "=== Consumer logs ==="
      - kubectl logs -n {{.NAMESPACE}} -l app=kafka-consumer --tail=30

  short-hostname:status:
    desc: "Show short-hostname Kafka test environment status"
    cmds:
      - echo "=== cp-kafka Broker ==="
      - kubectl get pods -n {{.NAMESPACE}} -l app=cp-kafka 2>/dev/null || echo "Not deployed"
      - echo ""
      - echo "=== Kafka Consumer ==="
      - kubectl get pods -n {{.NAMESPACE}} -l app=kafka-consumer 2>/dev/null || echo "Not deployed"
      - echo ""
      - echo "=== MirrordKafkaClientConfig ==="
      - kubectl get mirrordkafkaclientconfigs -n mirrord 2>/dev/null || echo "No configs"
      - echo ""
      - echo "=== MirrordKafkaTopicsConsumer ==="
      - kubectl get mirrordkafkatopicsconsumers -n {{.NAMESPACE}} 2>/dev/null || echo "No consumers"
      - echo ""
      - echo "=== Broker advertised.listeners (should be short hostname) ==="
      - |
        POD=$(kubectl get pod -n {{.NAMESPACE}} -l app=cp-kafka -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
        if [ -n "$POD" ]; then
          kubectl exec -n {{.NAMESPACE}} "$POD" -- env | grep -i KAFKA_ADVERTISED || echo "  (not found)"
        else
          echo "  Broker not running"
        fi

  short-hostname:clean:
    desc: "Clean short-hostname Kafka test resources"
    cmds:
      - kubectl delete -k {{.ROOT_DIR}}/k8s/overlays/kafka-short-hostname --ignore-not-found=true
      - kubectl delete -f {{.ROOT_DIR}}/k8s/overlays/kafka-short-hostname/kafka-client-config.yaml --ignore-not-found=true

  repro:dns-crash:
    desc: "Reproduce libuv EAI_* assertion crash (Node.js + mirrord remote DNS on macOS)"
    vars:
      MIRRORD_CONFIG: '{{.MIRRORD_CONFIG | default (print .ROOT_DIR "/apps/node-dns-repro/mirrord.json")}}'
    cmds:
      - echo "Reproducing libuv EAI_* assertion crash..."
      - echo "This runs a Node.js script under mirrord with remote DNS resolution."
      - echo "On macOS, a DNS lookup failure should trigger the assertion."
      - echo ""
      - "{{.MIRRORD_BIN}} exec -f {{.MIRRORD_CONFIG}} -- node {{.ROOT_DIR}}/apps/node-dns-repro/repro.js"

  repro:multi-conn:
    desc: "Reproduce Kafka multi-connection issue (Node.js producers+consumers through mirrord outgoing proxy)"
    dir: "{{.ROOT_DIR}}/apps/node-kafka-repro"
    vars:
      MIRRORD_CONFIG: '{{.MIRRORD_CONFIG | default (print .ROOT_DIR "/apps/node-kafka-repro/mirrord.json")}}'
      NUM_PRODUCERS: '{{.NUM_PRODUCERS | default "4"}}'
      NUM_CONSUMERS: '{{.NUM_CONSUMERS | default "3"}}'
    cmds:
      - echo "Reproducing Kafka multi-connection issue..."
      - echo "Starting {{.NUM_PRODUCERS}} producers + {{.NUM_CONSUMERS}} consumers through mirrord outgoing proxy."
      - echo ""
      - "NUM_PRODUCERS={{.NUM_PRODUCERS}} NUM_CONSUMERS={{.NUM_CONSUMERS}} {{.MIRRORD_BIN}} exec -f {{.MIRRORD_CONFIG}} -- node repro.js"

  repro:multi-conn:direct:
    desc: "Run the same Kafka multi-connection test WITHOUT mirrord (baseline comparison)"
    dir: "{{.ROOT_DIR}}/apps/node-kafka-repro"
    vars:
      NUM_PRODUCERS: '{{.NUM_PRODUCERS | default "4"}}'
      NUM_CONSUMERS: '{{.NUM_CONSUMERS | default "3"}}'
    cmds:
      - echo "Running baseline (no mirrord) -- use kubectl port-forward first:"
      - echo "  kubectl port-forward -n test-mirrord svc/kafka-cluster 9092:9092"
      - echo ""
      - "KAFKA_BOOTSTRAP_SERVERS=localhost:9092 NUM_PRODUCERS={{.NUM_PRODUCERS}} NUM_CONSUMERS={{.NUM_CONSUMERS}} node repro.js"

  repro:sasl:deploy:
    desc: "Deploy Kafka with SASL_PLAINTEXT (PLAIN mechanism)"
    cmds:
      - kubectl apply -k {{.ROOT_DIR}}/k8s/overlays/kafka-sasl
      - kubectl apply -f {{.ROOT_DIR}}/k8s/kafka/kafka-client-config.yaml
      - task: _wait:kafka
      - task: _wait:consumer
      - 'echo "SASL Kafka ready. SASL port is 9094, PLAIN mechanism, user: testuser."'

  repro:sasl:
    desc: "Reproduce Kafka SASL multi-connection issue through mirrord outgoing proxy"
    dir: "{{.ROOT_DIR}}/apps/node-kafka-repro"
    vars:
      MIRRORD_CONFIG: '{{.MIRRORD_CONFIG | default (print .ROOT_DIR "/apps/node-kafka-repro/mirrord-sasl.json")}}'
      NUM_PRODUCERS: '{{.NUM_PRODUCERS | default "4"}}'
      NUM_CONSUMERS: '{{.NUM_CONSUMERS | default "3"}}'
    cmds:
      - echo "Reproducing Kafka SASL multi-connection issue..."
      - echo "Connecting to SASL_PLAINTEXT port 9094 with SCRAM-SHA-512"
      - echo ""
      - "NUM_PRODUCERS={{.NUM_PRODUCERS}} NUM_CONSUMERS={{.NUM_CONSUMERS}} {{.MIRRORD_BIN}} exec -f {{.MIRRORD_CONFIG}} -- node repro.js"

  repro:sasl:direct:
    desc: "Run SASL test WITHOUT mirrord (baseline - needs port-forward to 9094)"
    dir: "{{.ROOT_DIR}}/apps/node-kafka-repro"
    vars:
      NUM_PRODUCERS: '{{.NUM_PRODUCERS | default "4"}}'
      NUM_CONSUMERS: '{{.NUM_CONSUMERS | default "3"}}'
    cmds:
      - echo "Running SASL baseline (no mirrord) -- use kubectl port-forward first:"
      - echo "  kubectl port-forward -n test-mirrord svc/kafka-cluster 9094:9094"
      - echo ""
      - |
        KAFKA_BOOTSTRAP_SERVERS=localhost:9094 \
        KAFKA_SASL_USERNAME=testuser \
        KAFKA_SASL_PASSWORD=testpassword \
        KAFKA_SASL_MECHANISM=plain \
        NUM_PRODUCERS={{.NUM_PRODUCERS}} \
        NUM_CONSUMERS={{.NUM_CONSUMERS}} \
        node repro.js

  repro:sasl-ssl:deploy:
    desc: "Deploy Kafka with SASL_SSL listener"
    cmds:
      - kubectl apply -k {{.ROOT_DIR}}/k8s/overlays/kafka-sasl-ssl
      - kubectl apply -f {{.ROOT_DIR}}/k8s/kafka/kafka-client-config.yaml
      - task: _wait:kafka
      - task: _wait:consumer
      - echo "SASL_SSL Kafka ready on port 9095."

  repro:sasl-ssl:
    desc: "Reproduce Kafka SASL_SSL multi-connection issue through mirrord outgoing proxy"
    dir: "{{.ROOT_DIR}}/apps/node-kafka-repro"
    vars:
      MIRRORD_CONFIG: '{{.MIRRORD_CONFIG | default (print .ROOT_DIR "/apps/node-kafka-repro/mirrord-sasl-ssl.json")}}'
      NUM_PRODUCERS: '{{.NUM_PRODUCERS | default "4"}}'
      NUM_CONSUMERS: '{{.NUM_CONSUMERS | default "3"}}'
    cmds:
      - echo "Reproducing Kafka SASL_SSL multi-connection issue..."
      - echo "Connecting to SASL_SSL port 9095 with TLS + SASL PLAIN"
      - echo ""
      - "NUM_PRODUCERS={{.NUM_PRODUCERS}} NUM_CONSUMERS={{.NUM_CONSUMERS}} {{.MIRRORD_BIN}} exec -f {{.MIRRORD_CONFIG}} -- node repro.js"

  repro:sasl-ssl:direct:
    desc: "Run SASL_SSL test WITHOUT mirrord (baseline - needs port-forward to 9095)"
    dir: "{{.ROOT_DIR}}/apps/node-kafka-repro"
    vars:
      NUM_PRODUCERS: '{{.NUM_PRODUCERS | default "4"}}'
      NUM_CONSUMERS: '{{.NUM_CONSUMERS | default "3"}}'
    cmds:
      - echo "Running SASL_SSL baseline (no mirrord) -- use kubectl port-forward first:"
      - echo "  kubectl port-forward -n test-mirrord svc/kafka-cluster 9095:9095"
      - echo ""
      - |
        KAFKA_BOOTSTRAP_SERVERS=localhost:9095 \
        KAFKA_SASL_USERNAME=testuser \
        KAFKA_SASL_PASSWORD=testpassword \
        KAFKA_SASL_MECHANISM=plain \
        KAFKA_SSL=true \
        NUM_PRODUCERS={{.NUM_PRODUCERS}} \
        NUM_CONSUMERS={{.NUM_CONSUMERS}} \
        node repro.js

  statefulset:deploy:
    desc: "Deploy Kafka with StatefulSet consumer (RollingUpdate strategy)"
    cmds:
      - kubectl apply -k {{.ROOT_DIR}}/k8s/overlays/kafka-statefulset
      - kubectl apply -f {{.ROOT_DIR}}/k8s/kafka/kafka-client-config.yaml
      - task: _wait:kafka
      - task: _wait:consumer:statefulset
      - echo "Kafka StatefulSet consumer deployed (RollingUpdate strategy, 1 replica)."

  statefulset:deploy:ondelete:
    desc: "Deploy Kafka with StatefulSet consumer (OnDelete strategy -- reproduces customer issue)"
    cmds:
      - kubectl apply -k {{.ROOT_DIR}}/k8s/overlays/kafka-statefulset-ondelete
      - kubectl apply -f {{.ROOT_DIR}}/k8s/kafka/kafka-client-config.yaml
      - task: _wait:kafka
      - task: _wait:consumer:statefulset
      - echo "Kafka StatefulSet consumer deployed (OnDelete strategy, 1 replica)."

  statefulset:deploy:2:
    desc: "Deploy Kafka with StatefulSet consumer (RollingUpdate, 2 replicas)"
    cmds:
      - kubectl apply -k {{.ROOT_DIR}}/k8s/overlays/kafka-statefulset
      - kubectl scale statefulset kafka-consumer -n {{.NAMESPACE}} --replicas=2
      - kubectl apply -f {{.ROOT_DIR}}/k8s/kafka/kafka-client-config.yaml
      - task: _wait:kafka
      - task: _wait:consumer:statefulset
      - echo "Kafka StatefulSet consumer deployed (RollingUpdate strategy, 2 replicas)."

  statefulset:split:
    desc: "Run mirrord Kafka split against StatefulSet consumer"
    dir: "{{.ROOT_DIR}}/apps/kafka-consumer"
    vars:
      MIRRORD_CONFIG: '{{.MIRRORD_CONFIG | default (print .ROOT_DIR "/k8s/overlays/kafka-statefulset/mirrord.json")}}'
    cmds:
      - go build -o /tmp/kafka-consumer main.go
      - "{{.MIRRORD_BIN}} exec -f {{.MIRRORD_CONFIG}} -- /tmp/kafka-consumer"

  statefulset:status:
    desc: "Show StatefulSet Kafka consumer status"
    cmds:
      - echo "=== StatefulSet ==="
      - kubectl get statefulset kafka-consumer -n {{.NAMESPACE}} -o wide 2>/dev/null || echo "Not deployed"
      - echo ""
      - echo "=== Pods ==="
      - kubectl get pods -n {{.NAMESPACE}} -l app=kafka-consumer -o wide 2>/dev/null || echo "No pods"
      - echo ""
      - echo "=== MirrordKafkaTopicsConsumer ==="
      - kubectl get mirrordkafkatopicsconsumers -n {{.NAMESPACE}} 2>/dev/null || echo "No consumers"
      - echo ""
      - echo "=== Operator logs (last 20 lines) ==="
      - kubectl logs -n mirrord -l app=mirrord-operator --tail=20 2>/dev/null || echo "No operator"

  statefulset:clean:
    desc: "Clean StatefulSet Kafka test resources"
    cmds:
      - kubectl delete -k {{.ROOT_DIR}}/k8s/overlays/kafka-statefulset --ignore-not-found=true
      - kubectl delete -f {{.ROOT_DIR}}/k8s/kafka/kafka-client-config.yaml --ignore-not-found=true

  multi-topic:deploy:
    desc: "Deploy Kafka with 4-topic consumer (tests per-topic restart behavior)"
    cmds:
      - kubectl apply -k {{.ROOT_DIR}}/k8s/overlays/kafka-multi-topic
      - kubectl apply -f {{.ROOT_DIR}}/k8s/kafka/kafka-client-config.yaml
      - task: _wait:kafka
      - task: _wait:consumer
      - task: _create:multi-topics
      - echo "Kafka multi-topic consumer deployed (4 topics)."

  multi-topic:split:
    desc: "Run mirrord Kafka split against 4-topic consumer (watch for per-topic restarts)"
    dir: "{{.ROOT_DIR}}/apps/kafka-consumer"
    vars:
      MIRRORD_CONFIG: '{{.MIRRORD_CONFIG | default (print .ROOT_DIR "/k8s/overlays/kafka-multi-topic/mirrord.json")}}'
    cmds:
      - go build -o /tmp/kafka-consumer main.go
      - "{{.MIRRORD_BIN}} exec -f {{.MIRRORD_CONFIG}} -- /tmp/kafka-consumer"

  multi-topic:test:
    desc: "Full multi-topic test: clean, deploy, split (reproduces per-topic restart issue)"
    cmds:
      - task: multi-topic:clean
      - task: multi-topic:deploy
      - task: multi-topic:split

  multi-topic:send:bulk:
    desc: "Fast bulk send to all 4 multi-topic topics: COUNT matching (user_id=test-user) + COUNT non-matching per topic"
    vars:
      COUNT: '{{.COUNT | default "20"}}'
      USER_ID: '{{.USER_ID | default "test-user"}}'
    cmds:
      - |
        POD=$(kubectl get pod -n {{.NAMESPACE}} -l app=kafka-cluster -o jsonpath='{.items[0].metadata.name}')
        for TOPIC in topic-orders topic-payments topic-notifications topic-analytics; do
          echo "-> $TOPIC: {{.COUNT}} matching (user_id={{.USER_ID}}) + {{.COUNT}} non-matching"
          # Matching messages go to the local split session, non-matching ones to
          # the remote/fallback consumer. Both batches share one producer process.
          {
            for i in $(seq 1 {{.COUNT}}); do printf 'user_id:{{.USER_ID}}|match-%s\n' "$i"; done
            for i in $(seq 1 {{.COUNT}}); do printf 'user_id:other|remote-%s\n' "$i"; done
          } | kubectl exec -i -n {{.NAMESPACE}} "$POD" -- /opt/kafka/bin/kafka-console-producer.sh \
              --bootstrap-server localhost:9092 --topic "$TOPIC" \
              --property 'parse.headers=true' --property 'headers.delimiter=|'
        done
        echo "All 4 topics done."

  multi-topic:two-sessions:a:
    desc: "Run multi-topic session A (filter user_id=alice)"
    dir: "{{.ROOT_DIR}}/apps/kafka-consumer"
    cmds:
      - go build -o /tmp/kafka-consumer main.go
      - "{{.MIRRORD_BIN}} exec --key shared-multi-key -f {{.ROOT_DIR}}/k8s/overlays/kafka-multi-topic/mirrord-session-a.json -- /tmp/kafka-consumer"

  multi-topic:two-sessions:b:
    desc: "Run multi-topic session B (filter user_id=bob)"
    dir: "{{.ROOT_DIR}}/apps/kafka-consumer"
    cmds:
      - go build -o /tmp/kafka-consumer main.go
      - "{{.MIRRORD_BIN}} exec --key shared-multi-key -f {{.ROOT_DIR}}/k8s/overlays/kafka-multi-topic/mirrord-session-b.json -- /tmp/kafka-consumer"

  multi-topic:clean:
    desc: "Clean multi-topic Kafka test resources"
    cmds:
      - kubectl delete -k {{.ROOT_DIR}}/k8s/overlays/kafka-multi-topic --ignore-not-found=true
      # Deleting the overlay only removes kafka-consumer-multi. A single-topic
      # consumer from a prior `kafka:split` run can linger and target the same
      # workload, so clear every consumer in the namespace for a clean slate.
      - kubectl delete mirrordkafkatopicsconsumers --all -n {{.NAMESPACE}} --ignore-not-found=true
      - kubectl delete -f {{.ROOT_DIR}}/k8s/kafka/kafka-client-config.yaml --ignore-not-found=true
      - kubectl delete mirrordkafkaephemeraltopics --all -n mirrord --ignore-not-found=true
      - task: _clean:workload-patches

  _create:multi-topics:
    internal: true
    cmds:
      - |
        POD=$(kubectl get pod -n {{.NAMESPACE}} -l app=kafka-cluster -o jsonpath='{.items[0].metadata.name}')
        for TOPIC in topic-orders topic-payments topic-notifications topic-analytics; do
          kubectl exec -n {{.NAMESPACE}} "$POD" -- /opt/kafka/bin/kafka-topics.sh \
            --create --if-not-exists --bootstrap-server localhost:9092 \
            --topic $TOPIC --partitions 3 --replication-factor 1 2>&1 || true
        done
        echo "All 4 topics created."

  _clean:workload-patches:
    internal: true
    desc: "Force-delete workload patch requests/patches, clearing stuck finalizers"
    cmds:
      # The operator clears these finalizers only after it reverts the target
      # workload's env. When a session's namespace was already deleted that
      # revert can never finish, so the object sticks in "Terminating" and a
      # plain delete blocks forever. Mark them for deletion without waiting,
      # then strip the finalizers so they go away regardless of operator state.
      - |
        for kind in mirrordclusterworkloadpatchrequests mirrordclusterworkloadpatches; do
          kubectl delete "$kind" --all -A --ignore-not-found=true --wait=false 2>/dev/null || true
          for name in $(kubectl get "$kind" -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' 2>/dev/null); do
            kubectl patch "$kind" "$name" --type=merge -p '{"metadata":{"finalizers":null}}' 2>/dev/null || true
          done
        done

  two-sessions:deploy:
    desc: "Deploy Kafka for two-session test (single topic, two filters: alice + bob)"
    cmds:
      - task: deploy
      - |
        echo ""
        echo "Ready. Now run in separate terminals:"
        echo "  task kafka:two-sessions:a    # session A (user_id=alice)"
        echo "  task kafka:two-sessions:b    # session B (user_id=bob)"
        echo ""
        echo "Then send messages:"
        echo "  task kafka:send TOPIC=test-topic MESSAGE=for-alice USER_ID=alice"
        echo "  task kafka:send TOPIC=test-topic MESSAGE=for-bob USER_ID=bob"
        echo "  task kafka:send TOPIC=test-topic MESSAGE=for-remote"

  two-sessions:a:
    desc: "Run session A (filter user_id=alice)"
    dir: "{{.ROOT_DIR}}/apps/kafka-consumer"
    cmds:
      - go build -o /tmp/kafka-consumer main.go
      - "{{.MIRRORD_BIN}} exec --key shared-test-key -f {{.ROOT_DIR}}/k8s/overlays/kafka/mirrord-session-a.json -- /tmp/kafka-consumer"

  two-sessions:b:
    desc: "Run session B (filter user_id=bob)"
    dir: "{{.ROOT_DIR}}/apps/kafka-consumer"
    cmds:
      - go build -o /tmp/kafka-consumer main.go
      - "{{.MIRRORD_BIN}} exec --key shared-test-key -f {{.ROOT_DIR}}/k8s/overlays/kafka/mirrord-session-b.json -- /tmp/kafka-consumer"

  two-sessions:clean:
    desc: "Clean two-session test resources"
    cmds:
      - task: clean
      - kubectl delete mirrordkafkaephemeraltopics --all -n mirrord --ignore-not-found=true
      - task: _clean:workload-patches

  ttl-drain:deploy:
    desc: "Deploy Kafka with splitTtl=30s"
    cmds:
      - kubectl apply -k {{.ROOT_DIR}}/k8s/overlays/kafka-ttl-drain
      - kubectl apply -f {{.ROOT_DIR}}/k8s/kafka/kafka-client-config.yaml
      - task: _wait:kafka
      - task: _wait:consumer
      - echo "Kafka deployed with splitTtl=30s"

  ttl-drain:test:
    desc: "TTL forwarding test (deploy + run automated test script)"
    cmds:
      - task: ttl-drain:deploy
      - "{{.ROOT_DIR}}/scripts/test-kafka-ttl-drain.sh"

  ttl-drain:run:local:
    desc: "Run Kafka consumer locally with mirrord (ttl-drain overlay)"
    dir: "{{.ROOT_DIR}}/apps/kafka-consumer"
    vars:
      MIRRORD_CONFIG: '{{.MIRRORD_CONFIG | default (print .ROOT_DIR "/k8s/overlays/kafka-ttl-drain/mirrord.json")}}'
    cmds:
      - go build -o /tmp/kafka-consumer main.go
      - "{{.MIRRORD_BIN}} exec -f {{.MIRRORD_CONFIG}} -- /tmp/kafka-consumer"

  ttl-drain:status:
    desc: "Show TTL test environment status"
    cmds:
      - echo "=== Consumer CRD (check splitTtl) ==="
      - kubectl get mirrordkafkatopicsconsumers -n {{.NAMESPACE}} -o yaml 2>/dev/null | grep -A5 "spec:" || echo "Not deployed"
      - echo ""
      - echo "=== Consumer Pod ==="
      - kubectl get pods -n {{.NAMESPACE}} -l app=kafka-consumer 2>/dev/null || echo "Not deployed"
      - echo ""
      - echo "=== Operator Logs (last 30 lines) ==="
      - kubectl logs -n mirrord -l app=mirrord-operator --tail=30 2>/dev/null || echo "No operator"

  ttl-drain:clean:
    desc: "Clean TTL test resources"
    cmds:
      - kubectl delete -k {{.ROOT_DIR}}/k8s/overlays/kafka-ttl-drain --ignore-not-found=true
      - kubectl delete -f {{.ROOT_DIR}}/k8s/kafka/kafka-client-config.yaml --ignore-not-found=true
      - kubectl delete mirrordkafkaephemeraltopics --all -n mirrord --ignore-not-found=true
      - task: _clean:workload-patches

  split:reset:
    desc: "Full reset of Kafka splitting state: kill the local consumer, delete every split-session / recovery CRD, delete the operator's temp topics, and restart the operator so no stale in-memory split keeps routing topics that the next session does not match. Keeps the consumer/client-config CRDs so you can re-run a split right after."
    cmds:
      - echo "killing any local consumer processes"
      - pkill -f /tmp/kafka-consumer 2>/dev/null || true
      - echo "deleting unified split-session CRDs"
      - kubectl delete mirrordclustersplitsession --all -A --wait=false 2>/dev/null || true
      # Split sessions carry the `mirrord-queue-splitting` finalizer. An orphaned
      # session (consumer gone, operator restarted) never gets reconciled and
      # stays stuck in Terminating, so strip finalizers since this full reset
      # also restarts the operator and wipes the temp topics anyway.
      - echo "clearing finalizers on any stuck split-session CRDs"
      - |
        for name in $(kubectl get mirrordclustersplitsession -o jsonpath='{.items[*].metadata.name}' 2>/dev/null); do
          echo "  clearing finalizers on $name"
          kubectl patch mirrordclustersplitsession "$name" --type=merge -p '{"metadata":{"finalizers":[]}}' 2>/dev/null || true
        done
      # These drive crash recovery. If left behind, the operator rebuilds the old
      # split (with the old topic set) on restart, which is exactly what causes
      # "queue ... not found in resolved params" when the next session asks for a
      # topic the recovered split never had.
      - echo "deleting workload-patch and external-resource recovery CRDs"
      - task: _clean:workload-patches
      - kubectl delete mirrordclusterexternalresources --all -A --wait=false 2>/dev/null || true
      - echo "deleting leftover legacy ephemeral-topic CRDs"
      - kubectl delete mirrordkafkaephemeraltopics --all -n mirrord --wait=false 2>/dev/null || true
      - echo "deleting the operator's temporary Kafka topics (mirrord-tmp-*)"
      - |
        POD=$(kubectl get pod -n {{.NAMESPACE}} -l app=kafka-cluster -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
        if [ -n "$POD" ]; then
          kubectl exec -n {{.NAMESPACE}} "$POD" -- /opt/kafka/bin/kafka-topics.sh \
            --bootstrap-server localhost:9092 --list 2>/dev/null \
            | grep '^mirrord-tmp-' | while read -r topic; do
              echo "  deleting topic $topic"
              kubectl exec -n {{.NAMESPACE}} "$POD" -- /opt/kafka/bin/kafka-topics.sh \
                --bootstrap-server localhost:9092 --delete --topic "$topic" 2>/dev/null || true
            done
        else
          echo "  (kafka-cluster pod not found, skipping topic cleanup)"
        fi
      - echo "restarting operator to clear in-memory split state"
      - kubectl rollout restart deployment/mirrord-operator -n mirrord
      - kubectl rollout status deployment/mirrord-operator -n mirrord --timeout=120s
      - echo "reset complete - start a fresh split session now"

  clean:
    desc: "Clean Kafka test resources"
    cmds:
      - kubectl delete -k {{.ROOT_DIR}}/k8s/overlays/kafka --ignore-not-found=true
      - kubectl delete -f {{.ROOT_DIR}}/k8s/kafka/kafka-client-config.yaml --ignore-not-found=true

  _wait:kafka:
    internal: true
    cmds:
      - echo "Waiting for Kafka cluster..."
      - kubectl wait --for=condition=ready pod -l app=kafka-cluster -n {{.NAMESPACE}} --timeout=300s

  _wait:kafka:short-hostname:
    internal: true
    cmds:
      - echo "Waiting for cp-kafka broker..."
      - kubectl wait --for=condition=ready pod -l app=cp-kafka -n {{.NAMESPACE}} --timeout=300s

  _wait:consumer:
    internal: true
    cmds:
      - echo "Waiting for Kafka consumer..."
      - kubectl wait --for=condition=ready pod -l app=kafka-consumer -n {{.NAMESPACE}} --timeout=120s

  _wait:consumer:statefulset:
    internal: true
    cmds:
      - echo "Waiting for StatefulSet Kafka consumer..."
      - kubectl wait --for=condition=ready pod -l app=kafka-consumer -n {{.NAMESPACE}} --timeout=120s
