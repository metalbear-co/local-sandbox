# Multi-Cluster Test Environment
#
# Quick Start:
#   task test:multicluster:clean        # Full setup from scratch
#   task test:multicluster:clean:nocache # Full setup with no-cache build
#
# After code changes:
#   task multicluster:operator:rebuild:upgrade  # Rebuild and upgrade operator
#
# Testing:
#   task multicluster:test:generate:traffic
#   task multicluster:test:steal:multi-cluster:with-config
#
# Monitoring:
#   task multicluster:monitoring:install
#   task multicluster:monitoring:open

version: "3"

vars:
  ROOT_DIR:
    sh: cd .. && pwd
  CHARTS_DIR: '{{.ROOT_DIR}}/../charts/mirrord-operator'
  APPS_DIR: '{{.ROOT_DIR}}/apps'
  K8S_DIR: '{{.ROOT_DIR}}/k8s'
  
  PRIMARY_CLUSTER: '{{.PRIMARY_CLUSTER | default "mirrord-primary"}}'
  REMOTE_CLUSTER_1: '{{.REMOTE_CLUSTER_1 | default "mirrord-remote-1"}}'
  REMOTE_CLUSTER_2: '{{.REMOTE_CLUSTER_2 | default "mirrord-remote-2"}}'
  NUM_CLUSTERS: '{{.NUM_CLUSTERS | default "2"}}'
  PRIMARY_MANAGEMENT_ONLY: '{{.PRIMARY_MANAGEMENT_ONLY | default "false"}}'
  MC_NAMESPACE: '{{.MC_NAMESPACE | default "test-multicluster"}}'
  MC_CONFIG_DIR: '{{.ROOT_DIR}}/multicluster'
  
  OPERATOR_IMAGE: '{{.OPERATOR_IMAGE | default "mirrord-operator:custom"}}'
  ECHO_APP_IMAGE: '{{.ECHO_APP_IMAGE | default "echo-app:latest"}}'
  MIRRORD_BIN: '{{.MIRRORD_BIN | default "mirrord"}}'
  CONTAINER_RUNTIME: '{{.CONTAINER_RUNTIME | default "docker"}}'

tasks:
  # ===========================================================================
  # Cluster Management
  # ===========================================================================

  clusters:create:
    desc: Create minikube clusters
    cmds:
      - task: cluster:create
        vars: { CLUSTER: "{{.PRIMARY_CLUSTER}}" }
      - task: cluster:create
        vars: { CLUSTER: "{{.REMOTE_CLUSTER_1}}" }
      - |
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          task multicluster:cluster:create CLUSTER={{.REMOTE_CLUSTER_2}}
        fi
      - echo "Clusters created (NUM_CLUSTERS={{.NUM_CLUSTERS}})"

  cluster:create:
    vars:
      CLUSTER: '{{.CLUSTER}}'
    cmds:
      - |
        APISERVER_NAMES="{{.PRIMARY_CLUSTER}},{{.REMOTE_CLUSTER_1}}"
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          APISERVER_NAMES="$APISERVER_NAMES,{{.REMOTE_CLUSTER_2}}"
        fi
        minikube start -p {{.CLUSTER}} \
          --driver={{.CONTAINER_RUNTIME}} \
          --memory=2048 \
          --cpus=2 \
          --disk-size=10g \
          --apiserver-names=$APISERVER_NAMES
      - minikube update-context -p {{.CLUSTER}}
      - |
        minikube ssh -p {{.CLUSTER}} -- "sudo sysctl -w fs.inotify.max_user_instances=1280" || true
        minikube ssh -p {{.CLUSTER}} -- "sudo sysctl -w fs.inotify.max_user_watches=655360" || true

  clusters:delete:
    desc: Delete all minikube clusters
    cmds:
      - minikube delete -p {{.PRIMARY_CLUSTER}} || true
      - minikube delete -p {{.REMOTE_CLUSTER_1}} || true
      - |
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          minikube delete -p {{.REMOTE_CLUSTER_2}} || true
        fi

  teardown:all:
    desc: Teardown entire environment
    cmds:
      - task: clusters:delete

  # ===========================================================================
  # Remote Cluster Setup (ServiceAccount + RBAC)
  # ===========================================================================

  remote:setup:
    desc: Setup remote cluster access
    cmds:
      - task: remote:setup:cluster
        vars: { CLUSTER: "{{.REMOTE_CLUSTER_1}}" }
      - |
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          task multicluster:remote:setup:cluster CLUSTER={{.REMOTE_CLUSTER_2}}
        fi

  remote:setup:cluster:
    vars:
      CLUSTER: '{{.CLUSTER}}'
    cmds:
      - |
        kubectl --context {{.CLUSTER}} create namespace mirrord --dry-run=client -o yaml | kubectl --context {{.CLUSTER}} apply -f -
        kubectl --context {{.CLUSTER}} apply -f {{.MC_CONFIG_DIR}}/remote-cluster-setup.yaml

  # ===========================================================================
  # Secrets (Cluster Credentials)
  # ===========================================================================

  secrets:create:
    desc: Create cluster credential Secrets
    cmds:
      - |
        echo "Connecting Docker networks..."
        docker network connect mirrord-remote-1 mirrord-primary 2>/dev/null || true
        docker network connect mirrord-primary mirrord-remote-1 2>/dev/null || true
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          docker network connect mirrord-remote-2 mirrord-primary 2>/dev/null || true
          docker network connect mirrord-primary mirrord-remote-2 2>/dev/null || true
        fi
      - task: secrets:create:cluster
        vars: 
          CLUSTER: "{{.REMOTE_CLUSTER_1}}"
          CLUSTER_NAME: "remote-1"
      - |
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          task multicluster:secrets:create:cluster CLUSTER={{.REMOTE_CLUSTER_2}} CLUSTER_NAME=remote-2
        fi

  secrets:create:cluster:
    vars:
      CLUSTER: '{{.CLUSTER}}'
      CLUSTER_NAME: '{{.CLUSTER_NAME}}'
    cmds:
      - |
        echo "Creating credential Secret for {{.CLUSTER_NAME}}..."
        
        KUBECONFIG_SERVER=$(kubectl config view --raw -o jsonpath='{.clusters[?(@.name=="{{.CLUSTER}}")].cluster.server}')
        
        if echo "$KUBECONFIG_SERVER" | grep -qE '^(https?://)?(127\.0\.0\.1|localhost)'; then
          MINIKUBE_IP=$(minikube -p {{.CLUSTER}} ip)
          SERVER="https://${MINIKUBE_IP}:8443"
        else
          SERVER="$KUBECONFIG_SERVER"
        fi
        
        CA_DATA=$(kubectl config view --raw -o jsonpath='{.clusters[?(@.name=="{{.CLUSTER}}")].cluster.certificate-authority-data}')
        if [ -z "$CA_DATA" ]; then
          CA_FILE=$(kubectl config view --raw -o jsonpath='{.clusters[?(@.name=="{{.CLUSTER}}")].cluster.certificate-authority}')
          if [ -n "$CA_FILE" ] && [ -f "$CA_FILE" ]; then
            CA_DATA=$(base64 < "$CA_FILE" | tr -d '\n')
          fi
        fi
        
        TOKEN=$(kubectl --context {{.CLUSTER}} create token mirrord-primary-access -n mirrord --duration=1h)
        
        cat <<EOF | kubectl --context {{.PRIMARY_CLUSTER}} apply -f -
        apiVersion: v1
        kind: Secret
        metadata:
          name: mirrord-cluster-{{.CLUSTER_NAME}}
          namespace: mirrord
          labels:
            mirrord.metalbear.co/remote-cluster: "true"
        type: Opaque
        stringData:
          name: "{{.CLUSTER_NAME}}"
          server: "$SERVER"
          caData: "$CA_DATA"
          bearerToken: "$TOKEN"
        EOF
        echo "  ✓ Secret created"

  secrets:delete:
    desc: Delete cluster credential Secrets
    cmds:
      - kubectl --context {{.PRIMARY_CLUSTER}} delete secrets -n mirrord -l mirrord.metalbear.co/remote-cluster=true --ignore-not-found=true

  # ===========================================================================
  # Operator
  # ===========================================================================

  operator:load:images:
    desc: Load operator image to all clusters
    cmds:
      - minikube -p {{.PRIMARY_CLUSTER}} ssh "docker rmi {{.OPERATOR_IMAGE}} --force" 2>/dev/null || true
      - minikube -p {{.REMOTE_CLUSTER_1}} ssh "docker rmi {{.OPERATOR_IMAGE}} --force" 2>/dev/null || true
      - |
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          minikube -p {{.REMOTE_CLUSTER_2}} ssh "docker rmi {{.OPERATOR_IMAGE}} --force" 2>/dev/null || true
        fi
      - minikube -p {{.PRIMARY_CLUSTER}} image load {{.OPERATOR_IMAGE}}
      - minikube -p {{.REMOTE_CLUSTER_1}} image load {{.OPERATOR_IMAGE}}
      - |
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          minikube -p {{.REMOTE_CLUSTER_2}} image load {{.OPERATOR_IMAGE}}
        fi

  operator:rebuild:
    desc: Rebuild operator image and reload to clusters
    cmds:
      - |
        cd {{.ROOT_DIR}}/../operator && {{.CONTAINER_RUNTIME}} build \
          -f Dockerfile \
          -t {{.OPERATOR_IMAGE}} \
          --build-arg OPERATOR_LICENSE_ISSUER_PUBLIC_KEY="$(cat {{.ROOT_DIR}}/scripts/license-issuer.pem)" \
          .
      - task: operator:load:images

  operator:upgrade:
    desc: Upgrade operator in all clusters
    cmds:
      - task: operator:upgrade:cluster
        vars: { CLUSTER: "{{.REMOTE_CLUSTER_1}}" }
      - |
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          task multicluster:operator:upgrade:cluster CLUSTER={{.REMOTE_CLUSTER_2}}
        fi
      - task: operator:upgrade:primary

  operator:upgrade:cluster:
    vars:
      CLUSTER: '{{.CLUSTER}}'
    cmds:
      - |
        helm upgrade mirrord-operator {{.CHARTS_DIR}} \
          --kube-context {{.CLUSTER}} \
          --namespace mirrord \
          --reuse-values \
          --set operator.image.repository={{.OPERATOR_IMAGE | replace ":custom" ""}} \
          --set operator.image.tag=custom \
          --set operator.image.pullPolicy=Never \
          --wait --timeout=60s
      - kubectl --context {{.CLUSTER}} rollout restart deploy/mirrord-operator -n mirrord
      - kubectl --context {{.CLUSTER}} rollout status deploy/mirrord-operator -n mirrord --timeout=60s

  operator:upgrade:primary:
    cmds:
      - |
        helm upgrade mirrord-operator {{.CHARTS_DIR}} \
          --kube-context {{.PRIMARY_CLUSTER}} \
          --namespace mirrord \
          --reuse-values \
          --set operator.image.repository={{.OPERATOR_IMAGE | replace ":custom" ""}} \
          --set operator.image.tag=custom \
          --set operator.image.pullPolicy=Never \
          --wait --timeout=60s
      - kubectl --context {{.PRIMARY_CLUSTER}} rollout restart deploy/mirrord-operator -n mirrord
      - kubectl --context {{.PRIMARY_CLUSTER}} rollout status deploy/mirrord-operator -n mirrord --timeout=60s

  operator:rebuild:upgrade:
    desc: Rebuild and upgrade operator
    cmds:
      - task: operator:rebuild
      - task: operator:upgrade

  operator:install:all:
    desc: Install operator to all clusters
    cmds:
      - task: remote:setup
      - task: secrets:create
      - task: operator:install:remote
        vars: { CLUSTER: "{{.REMOTE_CLUSTER_1}}" }
      - |
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          task multicluster:operator:install:remote CLUSTER={{.REMOTE_CLUSTER_2}}
        fi
      - task: operator:install:primary

  operator:install:remote:
    vars:
      CLUSTER: '{{.CLUSTER}}'
    cmds:
      - |
        kubectl --context {{.CLUSTER}} create namespace mirrord --dry-run=client -o yaml | kubectl --context {{.CLUSTER}} apply -f -
        helm upgrade --install mirrord-operator {{.CHARTS_DIR}} \
          --kube-context {{.CLUSTER}} \
          --namespace mirrord \
          --set operator.image.repository={{.OPERATOR_IMAGE | replace ":custom" ""}} \
          --set operator.image.tag=custom \
          --set operator.image.pullPolicy=Never \
          --set license.key="$(cat {{.ROOT_DIR}}/scripts/license.pem)" \
          --wait --timeout=120s

  operator:install:primary:
    cmds:
      - |
        PRIMARY_IP=$(docker inspect {{.PRIMARY_CLUSTER}} --format '{{`{{index .NetworkSettings.Networks "mirrord-primary" "IPAddress"}}`}}')
        REMOTE1_IP=$(docker inspect {{.REMOTE_CLUSTER_1}} --format '{{`{{range $k, $v := .NetworkSettings.Networks}}{{if eq $k "mirrord-primary"}}{{$v.IPAddress}}{{end}}{{end}}`}}')
        
        kubectl --context {{.PRIMARY_CLUSTER}} create namespace mirrord --dry-run=client -o yaml | kubectl --context {{.PRIMARY_CLUSTER}} apply -f -
        
        helm upgrade --install mirrord-operator {{.CHARTS_DIR}} \
          --kube-context {{.PRIMARY_CLUSTER}} \
          --namespace mirrord \
          --set operator.image.repository={{.OPERATOR_IMAGE | replace ":custom" ""}} \
          --set operator.image.tag=custom \
          --set operator.image.pullPolicy=Never \
          --set license.key="$(cat {{.ROOT_DIR}}/scripts/license.pem)" \
          --set operator.multiCluster.enabled=true \
          --set operator.multiCluster.defaultCluster=remote-1 \
          --set operator.multiCluster.primaryManagementOnly={{.PRIMARY_MANAGEMENT_ONLY}} \
          --set "operator.podHostAliases[0].ip=$REMOTE1_IP" \
          --set "operator.podHostAliases[0].hostnames[0]=mirrord-remote-1" \
          --wait --timeout=120s

  # ===========================================================================
  # Echo App
  # ===========================================================================

  echo-app:build:
    desc: Build echo-app image
    cmds:
      - '{{.CONTAINER_RUNTIME}} build -t {{.ECHO_APP_IMAGE}} {{.APPS_DIR}}/echo-app'

  echo-app:load:all:
    desc: Load echo-app to all clusters
    cmds:
      - minikube -p {{.PRIMARY_CLUSTER}} image load {{.ECHO_APP_IMAGE}}
      - minikube -p {{.REMOTE_CLUSTER_1}} image load {{.ECHO_APP_IMAGE}}
      - |
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          minikube -p {{.REMOTE_CLUSTER_2}} image load {{.ECHO_APP_IMAGE}}
        fi

  # ===========================================================================
  # Test Apps
  # ===========================================================================

  test:deploy:echo-apps:
    desc: Deploy echo apps to all clusters
    deps: [echo-app:load:all]
    cmds:
      - |
        MGMT_ONLY="{{.PRIMARY_MANAGEMENT_ONLY}}"
        if [ "$MGMT_ONLY" != "true" ]; then
          kubectl --context {{.PRIMARY_CLUSTER}} create namespace {{.MC_NAMESPACE}} --dry-run=client -o yaml | kubectl --context {{.PRIMARY_CLUSTER}} apply -f -
          kubectl --context {{.PRIMARY_CLUSTER}} apply -k {{.K8S_DIR}}/overlays/multicluster-primary
        fi
      - |
        kubectl --context {{.REMOTE_CLUSTER_1}} create namespace {{.MC_NAMESPACE}} --dry-run=client -o yaml | kubectl --context {{.REMOTE_CLUSTER_1}} apply -f -
        kubectl --context {{.REMOTE_CLUSTER_1}} apply -k {{.K8S_DIR}}/overlays/multicluster-remote-1
      - |
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          kubectl --context {{.REMOTE_CLUSTER_2}} create namespace {{.MC_NAMESPACE}} --dry-run=client -o yaml | kubectl --context {{.REMOTE_CLUSTER_2}} apply -f -
          kubectl --context {{.REMOTE_CLUSTER_2}} apply -k {{.K8S_DIR}}/overlays/multicluster-remote-2
        fi

  test:delete:echo-apps:
    desc: Delete echo apps from all clusters
    cmds:
      - kubectl --context {{.PRIMARY_CLUSTER}} delete -k {{.K8S_DIR}}/overlays/multicluster-primary --ignore-not-found=true || true
      - kubectl --context {{.REMOTE_CLUSTER_1}} delete -k {{.K8S_DIR}}/overlays/multicluster-remote-1 --ignore-not-found=true || true
      - |
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          kubectl --context {{.REMOTE_CLUSTER_2}} delete -k {{.K8S_DIR}}/overlays/multicluster-remote-2 --ignore-not-found=true || true
        fi

  # ===========================================================================
  # Traffic Testing
  # ===========================================================================

  test:generate:traffic:
    desc: Generate traffic to echo-apps in all clusters
    cmds:
      - |
        MGMT_ONLY="{{.PRIMARY_MANAGEMENT_ONLY}}"
        if [ "$MGMT_ONLY" != "true" ]; then
          PRIMARY_URL=$(minikube -p {{.PRIMARY_CLUSTER}} service echo-app -n {{.MC_NAMESPACE}} --url 2>/dev/null | head -1)
        fi
        REMOTE1_URL=$(minikube -p {{.REMOTE_CLUSTER_1}} service echo-app -n {{.MC_NAMESPACE}} --url 2>/dev/null | head -1)
        
        echo "Generating traffic every 2 seconds..."
        while true; do
          if [ -n "$PRIMARY_URL" ]; then
            curl -s "$PRIMARY_URL" 2>/dev/null | head -1 || true
          fi
          curl -s "$REMOTE1_URL" 2>/dev/null | head -1 || true
          sleep 2
        done

  test:steal:multi-cluster:
    desc: Steal traffic from all clusters
    cmds:
      - |
        MGMT_ONLY="{{.PRIMARY_MANAGEMENT_ONLY}}"
        if [ "$MGMT_ONLY" = "true" ]; then
          TARGET_CLUSTER="{{.REMOTE_CLUSTER_1}}"
        else
          TARGET_CLUSTER="{{.PRIMARY_CLUSTER}}"
        fi
        
        cd {{.APPS_DIR}}/echo-app
        MIRRORD_OPERATOR_ENABLE_MULTI_CLUSTER=true \
        RUST_LOG=mirrord=debug \
        {{.MIRRORD_BIN}} exec \
          --context $TARGET_CLUSTER \
          -n {{.MC_NAMESPACE}} \
          --target deploy/echo-app \
          --steal \
          -- node server.js

  test:steal:multi-cluster:with-config:
    desc: Steal with mirrord config file (HTTP filter)
    cmds:
      - |
        MGMT_ONLY="{{.PRIMARY_MANAGEMENT_ONLY}}"
        if [ "$MGMT_ONLY" = "true" ]; then
          TARGET_CLUSTER="{{.REMOTE_CLUSTER_1}}"
        else
          TARGET_CLUSTER="{{.PRIMARY_CLUSTER}}"
        fi
        
        cd {{.APPS_DIR}}/echo-app
        RUST_LOG=mirrord=debug \
        {{.MIRRORD_BIN}} exec \
          --context $TARGET_CLUSTER \
          -f .mirrord/mirrord.json \
          -- node server.js

  # ===========================================================================
  # Verification
  # ===========================================================================

  test:verify:clusters:
    desc: Verify clusters are running
    cmds:
      - minikube update-context -p {{.PRIMARY_CLUSTER}} 2>/dev/null || true
      - minikube update-context -p {{.REMOTE_CLUSTER_1}} 2>/dev/null || true
      - kubectl --context {{.PRIMARY_CLUSTER}} cluster-info
      - kubectl --context {{.REMOTE_CLUSTER_1}} cluster-info

  test:verify:operator:
    desc: Verify operators are running
    cmds:
      - kubectl --context {{.PRIMARY_CLUSTER}} get pods -n mirrord -l app=mirrord-operator
      - kubectl --context {{.REMOTE_CLUSTER_1}} get pods -n mirrord -l app=mirrord-operator

  # ===========================================================================
  # Logs
  # ===========================================================================

  logs:primary:
    desc: Show primary operator logs
    cmds:
      - kubectl --context {{.PRIMARY_CLUSTER}} logs -n mirrord -l app=mirrord-operator -f --tail=100

  logs:remote1:
    desc: Show remote-1 operator logs
    cmds:
      - kubectl --context {{.REMOTE_CLUSTER_1}} logs -n mirrord -l app=mirrord-operator -f --tail=100

  # ===========================================================================
  # PostgreSQL
  # ===========================================================================

  postgres:deploy:
    desc: Deploy PostgreSQL to default cluster
    cmds:
      - |
        kubectl --context {{.REMOTE_CLUSTER_1}} create namespace {{.MC_NAMESPACE}} --dry-run=client -o yaml | kubectl --context {{.REMOTE_CLUSTER_1}} apply -f -
        kubectl --context {{.REMOTE_CLUSTER_1}} apply -k {{.K8S_DIR}}/overlays/multicluster-postgres

  postgres:delete:
    desc: Delete PostgreSQL
    cmds:
      - kubectl --context {{.REMOTE_CLUSTER_1}} delete -k {{.K8S_DIR}}/overlays/multicluster-postgres --ignore-not-found=true || true

  postgres:run:
    desc: Run mirrord with PostgreSQL branching
    cmds:
      - |
        cd {{.APPS_DIR}}/echo-app
        RUST_LOG=mirrord=debug \
        {{.MIRRORD_BIN}} exec \
          --context {{.REMOTE_CLUSTER_1}} \
          -f .mirrord/mirrord-postgres.json \
          -- node server.js

  # ===========================================================================
  # Credential Scenario Tests
  # ===========================================================================
  # Each test switches the active credential type and verifies connectivity.
  # Usage:
  #   task multicluster:test:credentials:use CRED_TYPE=bearer-ca    # Switch to bearer+CA
  #   task multicluster:test:credentials:use CRED_TYPE=bearer-only  # Switch to bearer only
  #   task multicluster:test:credentials:use CRED_TYPE=mtls         # Switch to mTLS
  #   task multicluster:test:credentials:use CRED_TYPE=mtls-ca      # Switch to mTLS+CA

  test:credentials:all:
    desc: Run all credential scenario tests
    cmds:
      - task: test:credentials:use
        vars: { CRED_TYPE: "bearer-ca" }
      - task: test:credentials:use
        vars: { CRED_TYPE: "bearer-only" }
      - task: test:credentials:use
        vars: { CRED_TYPE: "mtls-ca" }
      - |
        echo ""
        echo "=== All Credential Tests Passed ==="
        echo "Restoring default (bearer-ca)..."
      - task: test:credentials:use
        vars: { CRED_TYPE: "bearer-ca" }

  test:credentials:use:
    desc: Switch to a specific credential type and verify connectivity
    vars:
      CRED_TYPE: '{{.CRED_TYPE | default "bearer-ca"}}'
    cmds:
      - |
        echo ""
        echo "=========================================="
        echo "  Switching to: {{.CRED_TYPE}}"
        echo "=========================================="
        echo ""
        
        # Get common values
        MINIKUBE_IP=$(minikube -p {{.REMOTE_CLUSTER_1}} ip)
        SERVER="https://${MINIKUBE_IP}:8443"
        CA_DATA=$(kubectl config view --raw -o jsonpath='{.clusters[?(@.name=="{{.REMOTE_CLUSTER_1}}")].cluster.certificate-authority-data}')
        
        # Delete existing remote-1 secret
        kubectl --context {{.PRIMARY_CLUSTER}} delete secret mirrord-cluster-remote-1 -n mirrord --ignore-not-found=true
        
        case "{{.CRED_TYPE}}" in
          bearer-ca)
            echo "Creating: bearerToken + caData"
            TOKEN=$(kubectl --context {{.REMOTE_CLUSTER_1}} create token mirrord-primary-access -n mirrord --duration=1h)
            cat <<EOF | kubectl --context {{.PRIMARY_CLUSTER}} apply -f -
        apiVersion: v1
        kind: Secret
        metadata:
          name: mirrord-cluster-remote-1
          namespace: mirrord
          labels:
            mirrord.metalbear.co/remote-cluster: "true"
        type: Opaque
        stringData:
          name: "remote-1"
          server: "$SERVER"
          caData: "$CA_DATA"
          bearerToken: "$TOKEN"
        EOF
            ;;
            
          bearer-only)
            echo "Creating: bearerToken only (insecure, no CA)"
            TOKEN=$(kubectl --context {{.REMOTE_CLUSTER_1}} create token mirrord-primary-access -n mirrord --duration=1h)
            cat <<EOF | kubectl --context {{.PRIMARY_CLUSTER}} apply -f -
        apiVersion: v1
        kind: Secret
        metadata:
          name: mirrord-cluster-remote-1
          namespace: mirrord
          labels:
            mirrord.metalbear.co/remote-cluster: "true"
        type: Opaque
        stringData:
          name: "remote-1"
          server: "$SERVER"
          bearerToken: "$TOKEN"
        EOF
            ;;
            
          mtls)
            echo "Creating: clientCert + clientKey only (mTLS, no CA)"
            TEMP_DIR=$(mktemp -d)
            MINIKUBE_CA_KEY="$HOME/.minikube/ca.key"
            MINIKUBE_CA_CRT="$HOME/.minikube/ca.crt"
            
            if [ ! -f "$MINIKUBE_CA_KEY" ]; then
              echo "ERROR: minikube CA key not found at $MINIKUBE_CA_KEY"
              echo "Cannot generate client certificate for mTLS test"
              exit 1
            fi
            
            openssl genrsa -out "$TEMP_DIR/client.key" 2048 2>/dev/null
            openssl req -new -key "$TEMP_DIR/client.key" -out "$TEMP_DIR/client.csr" \
              -subj "/CN=mirrord-primary-access/O=system:masters" 2>/dev/null
            openssl x509 -req -in "$TEMP_DIR/client.csr" \
              -CA "$MINIKUBE_CA_CRT" -CAkey "$MINIKUBE_CA_KEY" \
              -CAcreateserial -out "$TEMP_DIR/client.crt" -days 1 2>/dev/null
            
            CLIENT_CERT=$(base64 < "$TEMP_DIR/client.crt" | tr -d '\n')
            CLIENT_KEY=$(base64 < "$TEMP_DIR/client.key" | tr -d '\n')
            rm -rf "$TEMP_DIR"
            
            cat <<EOF | kubectl --context {{.PRIMARY_CLUSTER}} apply -f -
        apiVersion: v1
        kind: Secret
        metadata:
          name: mirrord-cluster-remote-1
          namespace: mirrord
          labels:
            mirrord.metalbear.co/remote-cluster: "true"
        type: Opaque
        stringData:
          name: "remote-1"
          server: "$SERVER"
          clientCertData: "$CLIENT_CERT"
          clientKeyData: "$CLIENT_KEY"
        EOF
            ;;
            
          mtls-ca)
            echo "Creating: clientCert + clientKey + caData (mTLS with CA)"
            TEMP_DIR=$(mktemp -d)
            MINIKUBE_CA_KEY="$HOME/.minikube/ca.key"
            MINIKUBE_CA_CRT="$HOME/.minikube/ca.crt"
            
            if [ ! -f "$MINIKUBE_CA_KEY" ]; then
              echo "ERROR: minikube CA key not found at $MINIKUBE_CA_KEY"
              exit 1
            fi
            
            openssl genrsa -out "$TEMP_DIR/client.key" 2048 2>/dev/null
            openssl req -new -key "$TEMP_DIR/client.key" -out "$TEMP_DIR/client.csr" \
              -subj "/CN=mirrord-primary-access/O=system:masters" 2>/dev/null
            openssl x509 -req -in "$TEMP_DIR/client.csr" \
              -CA "$MINIKUBE_CA_CRT" -CAkey "$MINIKUBE_CA_KEY" \
              -CAcreateserial -out "$TEMP_DIR/client.crt" -days 1 2>/dev/null
            
            CLIENT_CERT=$(base64 < "$TEMP_DIR/client.crt" | tr -d '\n')
            CLIENT_KEY=$(base64 < "$TEMP_DIR/client.key" | tr -d '\n')
            rm -rf "$TEMP_DIR"
            
            cat <<EOF | kubectl --context {{.PRIMARY_CLUSTER}} apply -f -
        apiVersion: v1
        kind: Secret
        metadata:
          name: mirrord-cluster-remote-1
          namespace: mirrord
          labels:
            mirrord.metalbear.co/remote-cluster: "true"
        type: Opaque
        stringData:
          name: "remote-1"
          server: "$SERVER"
          caData: "$CA_DATA"
          clientCertData: "$CLIENT_CERT"
          clientKeyData: "$CLIENT_KEY"
        EOF
            ;;
            
          *)
            echo "ERROR: Unknown credential type: {{.CRED_TYPE}}"
            echo "Valid types: bearer-ca, bearer-only, mtls, mtls-ca"
            exit 1
            ;;
        esac
        
        echo ""
        echo "Secret created. Restarting operator to re-discover clusters..."
        kubectl --context {{.PRIMARY_CLUSTER}} rollout restart deploy/mirrord-operator -n mirrord
        kubectl --context {{.PRIMARY_CLUSTER}} rollout status deploy/mirrord-operator -n mirrord --timeout=60s
        
        echo ""
        echo "Waiting for cluster discovery..."
        sleep 5
        
        # Check operator logs for successful connection
        echo "Checking operator logs..."
        if kubectl --context {{.PRIMARY_CLUSTER}} logs -n mirrord -l app=mirrord-operator --tail=50 | grep -q "Registered cluster.*remote-1"; then
          echo ""
          echo "✓ SUCCESS: Cluster 'remote-1' connected with {{.CRED_TYPE}}"
        else
          echo ""
          echo "Checking for errors..."
          kubectl --context {{.PRIMARY_CLUSTER}} logs -n mirrord -l app=mirrord-operator --tail=20 | grep -iE "(error|fail|remote-1)" || true
          echo ""
          echo "⚠ WARNING: Could not confirm cluster registration"
          echo "Check logs: task multicluster:logs:primary"
        fi

  test:credentials:status:
    desc: Show current credential configuration
    cmds:
      - |
        echo "=== Current Credential Configuration ==="
        echo ""
        SECRET=$(kubectl --context {{.PRIMARY_CLUSTER}} get secret mirrord-cluster-remote-1 -n mirrord -o json 2>/dev/null)
        
        if [ -z "$SECRET" ]; then
          echo "No credential secret found for remote-1"
          exit 0
        fi
        
        echo "Secret: mirrord-cluster-remote-1"
        echo ""
        echo "Fields present:"
        
        HAS_TOKEN=$(echo "$SECRET" | jq -r '.data.bearerToken // empty')
        HAS_CA=$(echo "$SECRET" | jq -r '.data.caData // empty')
        HAS_CERT=$(echo "$SECRET" | jq -r '.data.clientCertData // empty')
        HAS_KEY=$(echo "$SECRET" | jq -r '.data.clientKeyData // empty')
        
        [ -n "$HAS_TOKEN" ] && echo "  ✓ bearerToken" || echo "  ✗ bearerToken"
        [ -n "$HAS_CA" ] && echo "  ✓ caData" || echo "  ✗ caData"
        [ -n "$HAS_CERT" ] && echo "  ✓ clientCertData" || echo "  ✗ clientCertData"
        [ -n "$HAS_KEY" ] && echo "  ✓ clientKeyData" || echo "  ✗ clientKeyData"
        
        echo ""
        echo "Detected type:"
        if [ -n "$HAS_CERT" ] && [ -n "$HAS_KEY" ]; then
          if [ -n "$HAS_CA" ]; then
            echo "  → mtls-ca (mTLS with CA verification)"
          else
            echo "  → mtls (mTLS without CA verification)"
          fi
        elif [ -n "$HAS_TOKEN" ]; then
          if [ -n "$HAS_CA" ]; then
            echo "  → bearer-ca (Bearer token with CA verification)"
          else
            echo "  → bearer-only (Bearer token, insecure)"
          fi
        else
          echo "  → INVALID (no valid auth method)"
        fi

  # ===========================================================================
  # Monitoring (Loki + Alloy + Grafana)
  # ===========================================================================

  monitoring:install:
    desc: Install logging stack (Loki + Alloy + Grafana)
    cmds:
      - helm repo add grafana https://grafana.github.io/helm-charts 2>/dev/null || true
      - helm repo update grafana
      - task: monitoring:install:loki
      - task: monitoring:install:alloy
        vars: { CLUSTER: "{{.PRIMARY_CLUSTER}}", CLUSTER_NAME: "primary" }
      - task: monitoring:install:alloy
        vars: { CLUSTER: "{{.REMOTE_CLUSTER_1}}", CLUSTER_NAME: "remote-1" }
      - task: monitoring:install:grafana
      - |
        echo ""
        echo "=== Logging Stack Installed ==="
        echo "Open: task multicluster:monitoring:open"
        echo "Credentials: admin / admin"

  monitoring:install:loki:
    cmds:
      - |
        kubectl --context {{.PRIMARY_CLUSTER}} create namespace monitoring --dry-run=client -o yaml | kubectl --context {{.PRIMARY_CLUSTER}} apply -f -
        helm upgrade --install loki grafana/loki \
          --kube-context {{.PRIMARY_CLUSTER}} \
          --namespace monitoring \
          -f {{.MC_CONFIG_DIR}}/monitoring/loki-values.yaml \
          --wait --timeout=3m

  monitoring:install:alloy:
    vars:
      CLUSTER: '{{.CLUSTER}}'
      CLUSTER_NAME: '{{.CLUSTER_NAME}}'
    cmds:
      - |
        kubectl --context {{.CLUSTER}} create namespace monitoring --dry-run=client -o yaml | kubectl --context {{.CLUSTER}} apply -f -
        
        if [ "{{.CLUSTER}}" = "{{.PRIMARY_CLUSTER}}" ]; then
          LOKI_URL="http://loki:3100/loki/api/v1/push"
        else
          PRIMARY_IP=$(docker inspect {{.PRIMARY_CLUSTER}} --format '{{`{{range $k, $v := .NetworkSettings.Networks}}{{$v.IPAddress}}{{break}}{{end}}`}}')
          docker network connect {{.PRIMARY_CLUSTER}} {{.CLUSTER}} 2>/dev/null || true
          LOKI_URL="http://${PRIMARY_IP}:3100/loki/api/v1/push"
        fi
        
        helm upgrade --install alloy grafana/alloy \
          --kube-context {{.CLUSTER}} \
          --namespace monitoring \
          -f {{.MC_CONFIG_DIR}}/monitoring/alloy-values.yaml \
          --set "alloy.extraEnv[0].name=CLUSTER_NAME" \
          --set "alloy.extraEnv[0].value={{.CLUSTER_NAME}}" \
          --set "alloy.extraEnv[1].name=LOKI_URL" \
          --set "alloy.extraEnv[1].value=$LOKI_URL" \
          --wait --timeout=2m

  monitoring:install:grafana:
    cmds:
      - |
        kubectl --context {{.PRIMARY_CLUSTER}} create namespace monitoring --dry-run=client -o yaml | kubectl --context {{.PRIMARY_CLUSTER}} apply -f -
        helm upgrade --install grafana grafana/grafana \
          --kube-context {{.PRIMARY_CLUSTER}} \
          --namespace monitoring \
          -f {{.MC_CONFIG_DIR}}/monitoring/grafana-values.yaml \
          --wait --timeout=2m

  monitoring:open:
    desc: Open Grafana (port-forward)
    cmds:
      - |
        echo "Opening Grafana..."
        echo "  URL: http://localhost:3000"
        echo "  User: admin / admin"
        echo ""
        lsof -ti:3000 | xargs kill -9 2>/dev/null || true
        sleep 1
        (sleep 2 && open "http://localhost:3000" 2>/dev/null || xdg-open "http://localhost:3000" 2>/dev/null) &
        kubectl --context {{.PRIMARY_CLUSTER}} port-forward -n monitoring svc/grafana 3000:80

  monitoring:delete:
    desc: Remove monitoring stack
    cmds:
      - helm uninstall grafana --kube-context {{.PRIMARY_CLUSTER}} --namespace monitoring 2>/dev/null || true
      - helm uninstall loki --kube-context {{.PRIMARY_CLUSTER}} --namespace monitoring 2>/dev/null || true
      - helm uninstall alloy --kube-context {{.PRIMARY_CLUSTER}} --namespace monitoring 2>/dev/null || true
      - helm uninstall alloy --kube-context {{.REMOTE_CLUSTER_1}} --namespace monitoring 2>/dev/null || true
      - kubectl --context {{.PRIMARY_CLUSTER}} delete namespace monitoring --ignore-not-found=true
      - kubectl --context {{.REMOTE_CLUSTER_1}} delete namespace monitoring --ignore-not-found=true
