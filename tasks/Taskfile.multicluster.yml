# Multi-Cluster Test Environment
# Sets up a simulated multi-cluster environment using minikube
# for testing mirrord operator's multi-cluster features
#
# Usage:
#   task multicluster:setup                              # 2 clusters, primary has workloads
#   NUM_CLUSTERS=3 task multicluster:setup               # 3 clusters, primary has workloads
#   PRIMARY_MANAGEMENT_ONLY=true task multicluster:setup # 2 clusters, primary is management-only
#
#   task multicluster:test:generate:traffic    # Generate traffic
#   task multicluster:test:steal:multi-cluster # Steal from all clusters
#
# Variables:
#   NUM_CLUSTERS=2|3           - Number of clusters (default: 2)
#   PRIMARY_MANAGEMENT_ONLY    - If "true", primary only runs Envoy, no workloads (default: false)
#   PRIMARY_CLUSTER            - Name of primary cluster (default: mirrord-primary)
#   REMOTE_CLUSTER_1           - Name of first remote cluster (default: mirrord-remote-1)
#   REMOTE_CLUSTER_2           - Name of second remote cluster (default: mirrord-remote-2)
#
# Modes:
#   PRIMARY_MANAGEMENT_ONLY=false (default):
#     - Primary cluster runs Envoy AND has workloads (echo-app)
#     - Traffic comes from primary + remote clusters
#     - default_cluster = primary
#
#   PRIMARY_MANAGEMENT_ONLY=true:
#     - Primary cluster ONLY runs Envoy (no workloads)
#     - Traffic comes from remote clusters only
#     - default_cluster = remote-1 (first remote cluster)

version: "3"

vars:
  # ROOT_DIR is local-sandbox/ (parent of tasks/) - same pattern as other taskfiles
  ROOT_DIR:
    sh: cd .. && pwd
  CHARTS_DIR: '{{.ROOT_DIR}}/../charts/mirrord-operator'
  APPS_DIR: '{{.ROOT_DIR}}/apps'
  K8S_DIR: '{{.ROOT_DIR}}/k8s'
  
  PRIMARY_CLUSTER: '{{.PRIMARY_CLUSTER | default "mirrord-primary"}}'
  REMOTE_CLUSTER_1: '{{.REMOTE_CLUSTER_1 | default "mirrord-remote-1"}}'
  REMOTE_CLUSTER_2: '{{.REMOTE_CLUSTER_2 | default "mirrord-remote-2"}}'
  
  # Number of clusters: 2 (primary + 1 remote) or 3 (primary + 2 remotes)
  # Usage: NUM_CLUSTERS=3 task multicluster:setup
  NUM_CLUSTERS: '{{.NUM_CLUSTERS | default "2"}}'
  
  # If true, primary cluster is management-only (no workloads, only Envoy)
  # Usage: PRIMARY_MANAGEMENT_ONLY=true task multicluster:setup
  PRIMARY_MANAGEMENT_ONLY: '{{.PRIMARY_MANAGEMENT_ONLY | default "false"}}'
  
  # Use MC_NAMESPACE to avoid collision with parent Taskfile's NAMESPACE
  MC_NAMESPACE: '{{.MC_NAMESPACE | default "test-multicluster"}}'
  
  # Directory for multi-cluster config files
  MC_CONFIG_DIR: '{{.ROOT_DIR}}/multicluster'
  
  OPERATOR_IMAGE: '{{.OPERATOR_IMAGE | default "mirrord-operator:custom"}}'
  ECHO_APP_IMAGE: '{{.ECHO_APP_IMAGE | default "echo-app:latest"}}'
  MIRRORD_BIN: '{{.MIRRORD_BIN | default "mirrord"}}'
  CONTAINER_RUNTIME: '{{.CONTAINER_RUNTIME | default "docker"}}'

tasks:
  clusters:create:
    desc: Create minikube profiles for multi-cluster testing (NUM_CLUSTERS=2 or 3)
    cmds:
      - task: cluster:create
        vars: { CLUSTER: "{{.PRIMARY_CLUSTER}}" }
      - task: cluster:create
        vars: { CLUSTER: "{{.REMOTE_CLUSTER_1}}" }
      - |
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          task multicluster:cluster:create CLUSTER={{.REMOTE_CLUSTER_2}}
        fi
      - 'echo "All clusters created (NUM_CLUSTERS={{.NUM_CLUSTERS}})"'
      - 'echo " - Primary: {{.PRIMARY_CLUSTER}}"'
      - 'echo " - Remote-1: {{.REMOTE_CLUSTER_1}}"'
      - |
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          echo " - Remote-2: {{.REMOTE_CLUSTER_2}}"
        fi

  cluster:create:
    desc: Create a single minikube cluster profile
    vars:
      CLUSTER: '{{.CLUSTER}}'
    cmds:
      # Add cluster hostnames to the apiserver cert SANs
      # This allows cross-cluster communication using hostnames + hostAliases
      - |
        APISERVER_NAMES="{{.PRIMARY_CLUSTER}},{{.REMOTE_CLUSTER_1}}"
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          APISERVER_NAMES="$APISERVER_NAMES,{{.REMOTE_CLUSTER_2}}"
        fi
        minikube start -p {{.CLUSTER}} \
          --driver={{.CONTAINER_RUNTIME}} \
          --memory=2048 \
          --cpus=2 \
          --disk-size=10g \
          --apiserver-names=$APISERVER_NAMES
      - minikube update-context -p {{.CLUSTER}}
      - |
        # Fix "too many open files" errors in kube-proxy by increasing inotify limits
        # See: https://github.com/kubeflow/manifests/issues/2087
        echo "Configuring inotify limits for {{.CLUSTER}}..."
        minikube ssh -p {{.CLUSTER}} -- "sudo sysctl -w fs.inotify.max_user_instances=1280" || true
        minikube ssh -p {{.CLUSTER}} -- "sudo sysctl -w fs.inotify.max_user_watches=655360" || true
        # Make changes persistent across reboots
        minikube ssh -p {{.CLUSTER}} -- "echo 'fs.inotify.max_user_instances=1280' | sudo tee -a /etc/sysctl.conf" || true
        minikube ssh -p {{.CLUSTER}} -- "echo 'fs.inotify.max_user_watches=655360' | sudo tee -a /etc/sysctl.conf" || true
      - echo "Cluster {{.CLUSTER}} created and context updated"

  clusters:delete:
    desc: Delete all minikube cluster profiles
    cmds:
      - minikube delete -p {{.PRIMARY_CLUSTER}} || true
      - minikube delete -p {{.REMOTE_CLUSTER_1}} || true
      - |
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          minikube delete -p {{.REMOTE_CLUSTER_2}} || true
        fi
      - echo "All clusters deleted"

  clusters:list:
    desc: List all minikube profiles
    cmds:
      - minikube profile list

  clusters:fix:inotify:
    desc: Fix inotify limits on all clusters (fixes "too many open files" in kube-proxy)
    cmds:
      - |
        echo "Fixing inotify limits on all clusters..."
        echo "This addresses 'too many open files' errors in kube-proxy"
        echo "See: https://github.com/kubeflow/manifests/issues/2087"
        echo ""
      - task: cluster:fix:inotify
        vars: { CLUSTER: "{{.PRIMARY_CLUSTER}}" }
      - task: cluster:fix:inotify
        vars: { CLUSTER: "{{.REMOTE_CLUSTER_1}}" }
      - |
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          task multicluster:cluster:fix:inotify CLUSTER={{.REMOTE_CLUSTER_2}}
        fi
      - echo "Inotify limits updated on all clusters"

  cluster:fix:inotify:
    desc: Fix inotify limits on a single cluster
    vars:
      CLUSTER: '{{.CLUSTER}}'
    cmds:
      - |
        echo "Configuring inotify limits for {{.CLUSTER}}..."
        minikube ssh -p {{.CLUSTER}} -- "sudo sysctl -w fs.inotify.max_user_instances=1280" || echo "Failed to set max_user_instances"
        minikube ssh -p {{.CLUSTER}} -- "sudo sysctl -w fs.inotify.max_user_watches=655360" || echo "Failed to set max_user_watches"
        echo "  fs.inotify.max_user_instances=1280"
        echo "  fs.inotify.max_user_watches=655360"

  kubeconfig:generate:
    desc: Generate multi-cluster kubeconfig for operator with embedded certificates and Docker network IPs
    cmds:
      - |
        # Update contexts to get latest ports (minikube ports can change)
        echo "Updating minikube contexts..."
        minikube update-context -p {{.PRIMARY_CLUSTER}} 2>/dev/null || true
        minikube update-context -p {{.REMOTE_CLUSTER_1}} 2>/dev/null || true
        
        # Generate a flattened kubeconfig with embedded certificates
        # This is required because the operator runs in a container and can't access
        # local filesystem paths like /Users/.../.minikube/...
        #
        # IMPORTANT: We also need to replace 127.0.0.1 URLs with Docker network IPs
        # because the operator pod can't reach the host's localhost
        
        echo "Connecting minikube clusters to each other's Docker networks..."
        docker network connect mirrord-remote-1 mirrord-primary 2>/dev/null || true
        docker network connect mirrord-primary mirrord-remote-1 2>/dev/null || true
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          docker network connect mirrord-remote-2 mirrord-primary 2>/dev/null || true
          docker network connect mirrord-primary mirrord-remote-2 2>/dev/null || true
        fi
        
        echo "Getting Docker network IPs..."
        # Get mirrord-remote-1's IP on mirrord-primary's network (reachable from primary pods)
        REMOTE1_IP=$(docker inspect mirrord-remote-1 --format '{{`{{range $k, $v := .NetworkSettings.Networks}}{{if eq $k "mirrord-primary"}}{{$v.IPAddress}}{{end}}{{end}}`}}')
        # Get mirrord-primary's IP on its own network
        PRIMARY_IP=$(docker inspect mirrord-primary --format '{{`{{.NetworkSettings.Networks}}`}}' | sed -n 's/.*mirrord-primary[^}]*IPAddress:\([0-9.]*\).*/\1/p')
        PRIMARY_IP=$(docker inspect mirrord-primary --format '{{`{{index .NetworkSettings.Networks "mirrord-primary" "IPAddress"}}`}}')
        
        REMOTE2_IP=""
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          REMOTE2_IP=$(docker inspect mirrord-remote-2 --format '{{`{{range $k, $v := .NetworkSettings.Networks}}{{if eq $k "mirrord-primary"}}{{$v.IPAddress}}{{end}}{{end}}`}}')
        fi
        
        echo "  mirrord-primary IP: $PRIMARY_IP"
        echo "  mirrord-remote-1 IP (on primary network): $REMOTE1_IP"
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          echo "  mirrord-remote-2 IP (on primary network): $REMOTE2_IP"
        fi
        
        echo "Generating flattened kubeconfig..."
        mkdir -p {{.MC_CONFIG_DIR}}
        KUBECONFIG="" kubectl config view --flatten > {{.MC_CONFIG_DIR}}/multi-cluster-kubeconfig.yaml.tmp
        
        # Get the port numbers from the original config
        PRIMARY_PORT=$(kubectl config view --raw -o jsonpath='{.clusters[?(@.name=="mirrord-primary")].cluster.server}' | sed 's/.*://')
        REMOTE1_PORT=$(kubectl config view --raw -o jsonpath='{.clusters[?(@.name=="mirrord-remote-1")].cluster.server}' | sed 's/.*://')
        
        echo "Replacing 127.0.0.1 URLs with hostnames (TLS certs include these names)..."
        # Use hostnames instead of IPs - the certs have these names in SANs
        # We'll use hostAliases to resolve them to Docker network IPs
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          REMOTE2_PORT=$(kubectl config view --raw -o jsonpath='{.clusters[?(@.name=="mirrord-remote-2")].cluster.server}' | sed 's/.*://')
          sed -e "s|https://127.0.0.1:$PRIMARY_PORT|https://{{.PRIMARY_CLUSTER}}:8443|g" \
              -e "s|https://127.0.0.1:$REMOTE1_PORT|https://{{.REMOTE_CLUSTER_1}}:8443|g" \
              -e "s|https://127.0.0.1:$REMOTE2_PORT|https://{{.REMOTE_CLUSTER_2}}:8443|g" \
              {{.MC_CONFIG_DIR}}/multi-cluster-kubeconfig.yaml.tmp > {{.MC_CONFIG_DIR}}/multi-cluster-kubeconfig.yaml
        else
          sed -e "s|https://127.0.0.1:$PRIMARY_PORT|https://{{.PRIMARY_CLUSTER}}:8443|g" \
              -e "s|https://127.0.0.1:$REMOTE1_PORT|https://{{.REMOTE_CLUSTER_1}}:8443|g" \
              {{.MC_CONFIG_DIR}}/multi-cluster-kubeconfig.yaml.tmp > {{.MC_CONFIG_DIR}}/multi-cluster-kubeconfig.yaml
        fi
        
        rm {{.MC_CONFIG_DIR}}/multi-cluster-kubeconfig.yaml.tmp
        
        # Save host aliases for operator deployment
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          cat > {{.MC_CONFIG_DIR}}/multi-cluster-host-aliases.yaml << EOF
        hostAliases:
        - ip: "$PRIMARY_IP"
          hostnames:
          - "{{.PRIMARY_CLUSTER}}"
        - ip: "$REMOTE1_IP"
          hostnames:
          - "{{.REMOTE_CLUSTER_1}}"
        - ip: "$REMOTE2_IP"
          hostnames:
          - "{{.REMOTE_CLUSTER_2}}"
        EOF
        else
          cat > {{.MC_CONFIG_DIR}}/multi-cluster-host-aliases.yaml << EOF
        hostAliases:
        - ip: "$PRIMARY_IP"
          hostnames:
          - "{{.PRIMARY_CLUSTER}}"
        - ip: "$REMOTE1_IP"
          hostnames:
          - "{{.REMOTE_CLUSTER_1}}"
        EOF
        fi
        
        echo "Multi-cluster kubeconfig generated at multicluster/multi-cluster-kubeconfig.yaml"
        echo "Cluster URLs:"
        grep "server:" {{.MC_CONFIG_DIR}}/multi-cluster-kubeconfig.yaml
        echo ""
        echo "Host aliases (for operator pod):"
        echo "  {{.PRIMARY_CLUSTER}} -> $PRIMARY_IP"
        echo "  {{.REMOTE_CLUSTER_1}} -> $REMOTE1_IP"
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          echo "  {{.REMOTE_CLUSTER_2}} -> $REMOTE2_IP"
        fi
        echo ""
        echo "Contexts available:"
        kubectl --kubeconfig={{.MC_CONFIG_DIR}}/multi-cluster-kubeconfig.yaml config get-contexts -o name

  kubeconfig:create:secret:
    desc: Create kubeconfig secret in primary cluster
    deps: [kubeconfig:generate]
    cmds:
      - kubectl --context {{.PRIMARY_CLUSTER}} create namespace mirrord --dry-run=client -o yaml | kubectl --context {{.PRIMARY_CLUSTER}} apply -f -
      - kubectl --context {{.PRIMARY_CLUSTER}} create secret generic mirrord-multi-cluster-kubeconfig --from-file=config={{.MC_CONFIG_DIR}}/multi-cluster-kubeconfig.yaml -n mirrord --dry-run=client -o yaml | kubectl --context {{.PRIMARY_CLUSTER}} apply -f -
      - echo "Kubeconfig secret created in {{.PRIMARY_CLUSTER}}"

  operator:load:images:
    desc: Load operator image to all clusters
    cmds:
      - minikube -p {{.PRIMARY_CLUSTER}} image load {{.OPERATOR_IMAGE}}
      - minikube -p {{.REMOTE_CLUSTER_1}} image load {{.OPERATOR_IMAGE}}
      - |
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          minikube -p {{.REMOTE_CLUSTER_2}} image load {{.OPERATOR_IMAGE}}
        fi
      - echo "Image loaded to all clusters (NUM_CLUSTERS={{.NUM_CLUSTERS}})"

  operator:install:remote:
    desc: Install operator in remote clusters (without multi-cluster)
    cmds:
      - |
        CLUSTERS="{{.REMOTE_CLUSTER_1}}"
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          CLUSTERS="{{.REMOTE_CLUSTER_1}} {{.REMOTE_CLUSTER_2}}"
        fi
        
        for cluster in $CLUSTERS; do
          echo "Installing operator in $cluster..."
          # Create namespace and license secret first
          kubectl --context $cluster create namespace mirrord --dry-run=client -o yaml | kubectl --context $cluster apply -f -
          kubectl --context $cluster create secret generic mirrord-operator-license-pem \
            --from-file=license.pem={{.ROOT_DIR}}/scripts/company-license.pem \
            -n mirrord --dry-run=client -o yaml | kubectl --context $cluster apply -f -
          
          helm upgrade --install mirrord-operator {{.CHARTS_DIR}} \
            --kube-context $cluster \
            --namespace mirrord \
            -f {{.ROOT_DIR}}/operator-values.yaml \
            --set operator.image=mirrord-operator \
            --set operator.imageTag=custom \
            --set extraEnv.MIRRORD_MULTI_CLUSTER_ENABLED=true \
            --set extraEnv.MIRRORD_IS_PRIMARY_CLUSTER=false \
            --wait
          echo "Operator installed in $cluster"
        done

  operator:install:primary:
    desc: Install operator in primary cluster with multi-cluster enabled
    deps: [kubeconfig:create:secret]
    cmds:
      - |
        echo "Installing operator in {{.PRIMARY_CLUSTER}} with multi-cluster..."
        echo "  NUM_CLUSTERS={{.NUM_CLUSTERS}}"
        
        # Get Docker network IPs for hostAliases
        PRIMARY_IP=$(docker inspect {{.PRIMARY_CLUSTER}} --format '{{`{{index .NetworkSettings.Networks "mirrord-primary" "IPAddress"}}`}}')
        REMOTE1_IP=$(docker inspect {{.REMOTE_CLUSTER_1}} --format '{{`{{range $k, $v := .NetworkSettings.Networks}}{{if eq $k "mirrord-primary"}}{{$v.IPAddress}}{{end}}{{end}}`}}')
        echo "  Host aliases: {{.PRIMARY_CLUSTER}}=$PRIMARY_IP, {{.REMOTE_CLUSTER_1}}=$REMOTE1_IP"
        
        REMOTE2_IP=""
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          REMOTE2_IP=$(docker inspect {{.REMOTE_CLUSTER_2}} --format '{{`{{range $k, $v := .NetworkSettings.Networks}}{{if eq $k "mirrord-primary"}}{{$v.IPAddress}}{{end}}{{end}}`}}')
          echo "                {{.REMOTE_CLUSTER_2}}=$REMOTE2_IP"
        fi
        
        # Select values file based on NUM_CLUSTERS
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          VALUES_FILE="{{.MC_CONFIG_DIR}}/operator-values-multicluster-3-clusters.yaml"
        else
          VALUES_FILE="{{.MC_CONFIG_DIR}}/operator-values-multicluster-2-clusters.yaml"
        fi
        echo "  Using values file: $VALUES_FILE"
        
        # Create namespace and license secret first
        kubectl --context {{.PRIMARY_CLUSTER}} create namespace mirrord --dry-run=client -o yaml | kubectl --context {{.PRIMARY_CLUSTER}} apply -f -
        kubectl --context {{.PRIMARY_CLUSTER}} create secret generic mirrord-operator-license-pem \
          --from-file=license.pem={{.ROOT_DIR}}/scripts/company-license.pem \
          -n mirrord --dry-run=client -o yaml | kubectl --context {{.PRIMARY_CLUSTER}} apply -f -
        
        # Build helm command with dynamic hostAliases
        HELM_ARGS=(
          upgrade --install mirrord-operator {{.CHARTS_DIR}}
          --kube-context {{.PRIMARY_CLUSTER}}
          --namespace mirrord
          -f "$VALUES_FILE"
          --set operator.image=mirrord-operator
          --set operator.imageTag=custom
          --set operator.multiCluster.kubeconfigSecret=mirrord-multi-cluster-kubeconfig
          --set operator.multiCluster.kubeconfigPath=/etc/kubeconfig/config
          --set "operator.hostAliases[0].ip=$PRIMARY_IP"
          --set "operator.hostAliases[0].hostnames[0]={{.PRIMARY_CLUSTER}}"
          --set "operator.hostAliases[1].ip=$REMOTE1_IP"
          --set "operator.hostAliases[1].hostnames[0]={{.REMOTE_CLUSTER_1}}"
        )

        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          HELM_ARGS+=(
            --set "operator.hostAliases[2].ip=$REMOTE2_IP"
            --set "operator.hostAliases[2].hostnames[0]={{.REMOTE_CLUSTER_2}}"
          )
        fi

        HELM_ARGS+=(--wait)

        helm "${HELM_ARGS[@]}"
        echo "Operator installed in {{.PRIMARY_CLUSTER}} with multi-cluster ({{.NUM_CLUSTERS}} clusters)"

  operator:install:all:
    desc: Install operator in all clusters
    cmds:
      - task: operator:install:remote
      - task: operator:install:primary

  apps:deploy:
    desc: Deploy test applications to all clusters
    cmds:
      - task: app:deploy
        vars: { CLUSTER: "{{.PRIMARY_CLUSTER}}", APP_NAME: "nginx-primary", REPLICAS: "2" }
      - task: app:deploy
        vars: { CLUSTER: "{{.REMOTE_CLUSTER_1}}", APP_NAME: "nginx-remote-1", REPLICAS: "2" }
      - |
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          task multicluster:app:deploy CLUSTER={{.REMOTE_CLUSTER_2}} APP_NAME=nginx-remote-2 REPLICAS=2
        fi
      - echo "Test apps deployed to all clusters (NUM_CLUSTERS={{.NUM_CLUSTERS}})"

  app:deploy:
    internal: true
    desc: Deploy a test application to a cluster
    vars:
      CLUSTER: '{{.CLUSTER}}'
      APP_NAME: '{{.APP_NAME}}'
      REPLICAS: '{{.REPLICAS | default "1"}}'
    cmds:
      - |
        kubectl --context {{.CLUSTER}} create namespace {{.MC_NAMESPACE}} --dry-run=client -o yaml | kubectl --context {{.CLUSTER}} apply -f -
        
        cat <<EOF | kubectl --context {{.CLUSTER}} apply -f -
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: {{.APP_NAME}}
          namespace: {{.MC_NAMESPACE}}
          labels:
            app: {{.APP_NAME}}
        spec:
          replicas: {{.REPLICAS}}
          selector:
            matchLabels:
              app: {{.APP_NAME}}
          template:
            metadata:
              labels:
                app: {{.APP_NAME}}
            spec:
              containers:
              - name: nginx
                image: nginx:alpine
                ports:
                - containerPort: 80
                env:
                - name: CLUSTER_NAME
                  value: "{{.CLUSTER}}"
        ---
        apiVersion: v1
        kind: Service
        metadata:
          name: {{.APP_NAME}}
          namespace: {{.MC_NAMESPACE}}
        spec:
          selector:
            app: {{.APP_NAME}}
          ports:
          - port: 80
            targetPort: 80
        EOF
        echo "App {{.APP_NAME}} deployed to {{.CLUSTER}}"

  apps:delete:
    desc: Delete test applications from all clusters
    cmds:
      - kubectl --context {{.PRIMARY_CLUSTER}} delete namespace {{.MC_NAMESPACE}} --ignore-not-found=true
      - kubectl --context {{.REMOTE_CLUSTER_1}} delete namespace {{.MC_NAMESPACE}} --ignore-not-found=true
      - |
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          kubectl --context {{.REMOTE_CLUSTER_2}} delete namespace {{.MC_NAMESPACE}} --ignore-not-found=true
        fi
      - echo "Test apps deleted from all clusters"

  test:verify:clusters:
    desc: Verify all clusters are running
    cmds:
      - minikube update-context -p {{.PRIMARY_CLUSTER}} 2>/dev/null || true
      - minikube update-context -p {{.REMOTE_CLUSTER_1}} 2>/dev/null || true
      - |
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          minikube update-context -p {{.REMOTE_CLUSTER_2}} 2>/dev/null || true
        fi
      - kubectl --context {{.PRIMARY_CLUSTER}} cluster-info
      - kubectl --context {{.REMOTE_CLUSTER_1}} cluster-info
      - |
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          kubectl --context {{.REMOTE_CLUSTER_2}} cluster-info
        fi
      - echo "All clusters verified"

  test:verify:operator:
    desc: Verify operator is running in all clusters
    cmds:
      - kubectl --context {{.PRIMARY_CLUSTER}} get pods -n mirrord -l app=mirrord-operator
      - kubectl --context {{.REMOTE_CLUSTER_1}} get pods -n mirrord -l app=mirrord-operator
      - echo "Operators verified"

  test:verify:apps:
    desc: Verify test apps are running
    cmds:
      - kubectl --context {{.PRIMARY_CLUSTER}} get pods -n {{.MC_NAMESPACE}}
      - kubectl --context {{.REMOTE_CLUSTER_1}} get pods -n {{.MC_NAMESPACE}}
      - echo "Apps verified"

  test:crds:
    desc: Test multi-cluster CRD creation
    vars:
      K8S_DIR: '{{.SANDBOX_DIR}}/k8s/multicluster'
    cmds:
      - kubectl --context {{.PRIMARY_CLUSTER}} apply -f {{.K8S_DIR}}/test-session.yaml
      - echo "Test multi-cluster session created"
      - kubectl --context {{.PRIMARY_CLUSTER}} get mirrordmulticlustersessions -n {{.MC_NAMESPACE}}

  test:crds:delete:
    desc: Delete test CRDs
    cmds:
      - kubectl --context {{.PRIMARY_CLUSTER}} delete mirrordmulticlustersessions --all -n {{.MC_NAMESPACE}} --ignore-not-found=true
      - echo "Test CRDs deleted"

  logs:primary:
    desc: Show operator logs from primary cluster
    cmds:
      - kubectl --context {{.PRIMARY_CLUSTER}} logs -n mirrord -l app=mirrord-operator --tail=100 -f

  logs:remote1:
    desc: Show operator logs from remote cluster 1
    cmds:
      - kubectl --context {{.REMOTE_CLUSTER_1}} logs -n mirrord -l app=mirrord-operator --tail=100 -f

  logs:remote2:
    desc: Show operator logs from remote cluster 2
    cmds:

  setup:all:clean:
    desc: Clean setup - teardown existing environment and setup from scratch
    cmds:
      - task: teardown:all
      - sleep 2
      - task: setup:all

  setup:all:
    desc: Complete multi-cluster setup from scratch
    cmds:
      - task: clusters:create
      - task: kubeconfig:generate
      - echo "Waiting for clusters to be ready..."
      - sleep 5
      - task: test:verify:clusters
      - task: operator:load:images
      - task: operator:install:all
      - echo "Waiting for operators to be ready..."
      - sleep 10
      - task: test:verify:operator
      - task: apps:deploy
      - echo "Waiting for apps to be ready..."
      - sleep 5
      - task: test:verify:apps
      - echo ""
      - echo "Multi-cluster environment setup complete!"
      - echo ""
      - echo "To test multi-cluster sessions:"
      - echo "  task multicluster:test:crds"
      - echo ""
      - echo "To view logs:"
      - echo "  task multicluster:logs:primary   # Primary cluster logs"
      - echo "  task multicluster:logs:remote1   # Remote 1 cluster logs"
      - echo "  task multicluster:logs:remote2   # Remote 2 cluster logs"

  teardown:all:
    desc: Teardown entire multi-cluster environment
    cmds:
      - task: clusters:delete
      - rm -f {{.MC_CONFIG_DIR}}/multi-cluster-kubeconfig.yaml
      - echo "Multi-cluster environment torn down"

  status:
    desc: Show status of multi-cluster environment
    cmds:
      - echo "=== Clusters ==="
      - kind get clusters
      - echo ""
      - echo "=== Operators ==="
      - 'kubectl --context {{.PRIMARY_CLUSTER}} get pods -n mirrord 2>/dev/null || echo "Primary - Not running"'
      - 'kubectl --context {{.REMOTE_CLUSTER_1}} get pods -n mirrord 2>/dev/null || echo "Remote 1 - Not running"'
      - echo ""
      - echo "=== Apps ==="
      - 'kubectl --context {{.PRIMARY_CLUSTER}} get pods -n {{.MC_NAMESPACE}} 2>/dev/null || echo "Primary - No apps"'
      - 'kubectl --context {{.REMOTE_CLUSTER_1}} get pods -n {{.MC_NAMESPACE}} 2>/dev/null || echo "Remote 1 - No apps"'

  shell:primary:
    desc: Switch kubectl context to primary cluster
    cmds:
      - kubectl config use-context {{.PRIMARY_CLUSTER}}
      - echo "Switched to {{.PRIMARY_CLUSTER}}"

  shell:remote1:
    desc: Switch kubectl context to remote cluster 1
    cmds:
      - kubectl config use-context {{.REMOTE_CLUSTER_1}}
      - echo "Switched to {{.REMOTE_CLUSTER_1}}"

  shell:remote2:
    desc: Switch kubectl context to remote cluster 2
    cmds:

  echo-app:build:
    desc: Build the Go echo-app for multi-cluster testing
    cmds:
      - |
        echo "Building echo-app..."
        cd {{.APPS_DIR}}/echo-app
        docker build -t {{.ECHO_APP_IMAGE}} .
        echo "echo-app built as {{.ECHO_APP_IMAGE}}"

  echo-app:load:
    desc: Load echo-app image to all clusters (with build)
    deps: [echo-app:build]
    cmds:
      - minikube -p {{.PRIMARY_CLUSTER}} image load {{.ECHO_APP_IMAGE}}
      - minikube -p {{.REMOTE_CLUSTER_1}} image load {{.ECHO_APP_IMAGE}}
      - |
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          minikube -p {{.REMOTE_CLUSTER_2}} image load {{.ECHO_APP_IMAGE}}
        fi
      - echo "echo-app image loaded to all clusters (NUM_CLUSTERS={{.NUM_CLUSTERS}})"

  echo-app:load:all:
    desc: Load echo-app image to all clusters (no rebuild)
    cmds:
      - minikube -p {{.PRIMARY_CLUSTER}} image load {{.ECHO_APP_IMAGE}}
      - minikube -p {{.REMOTE_CLUSTER_1}} image load {{.ECHO_APP_IMAGE}}
      - |
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          minikube -p {{.REMOTE_CLUSTER_2}} image load {{.ECHO_APP_IMAGE}}
        fi
      - echo "echo-app image loaded to all clusters (NUM_CLUSTERS={{.NUM_CLUSTERS}})"

  test:deploy:echo-apps:
    desc: Deploy echo apps to all clusters with cluster-specific IDs
    deps: [echo-app:load]
    cmds:
      - |
        MGMT_ONLY="{{.PRIMARY_MANAGEMENT_ONLY}}"
        
        # Deploy to primary only if not management-only
        if [ "$MGMT_ONLY" != "true" ]; then
          echo "Deploying echo-app to {{.PRIMARY_CLUSTER}}..."
          kubectl --context {{.PRIMARY_CLUSTER}} apply -k {{.K8S_DIR}}/overlays/multicluster-primary
        else
          echo "Skipping {{.PRIMARY_CLUSTER}} (management-only mode)"
        fi
      - kubectl --context {{.REMOTE_CLUSTER_1}} apply -k {{.K8S_DIR}}/overlays/multicluster-remote-1
      - |
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          # Create remote-2 overlay if it doesn't exist
          if [ ! -d "{{.K8S_DIR}}/overlays/multicluster-remote-2" ]; then
            mkdir -p {{.K8S_DIR}}/overlays/multicluster-remote-2
            cat > {{.K8S_DIR}}/overlays/multicluster-remote-2/kustomization.yaml << 'EOF'
        apiVersion: kustomize.config.k8s.io/v1beta1
        kind: Kustomization
        resources:
          - ../../base/echo-app
        namespace: test-multicluster
        patches:
          - patch: |-
              - op: replace
                path: /spec/template/spec/containers/0/env/0/value
                value: "REMOTE-2"
            target:
              kind: Deployment
              name: echo-app
        EOF
          fi
          kubectl --context {{.REMOTE_CLUSTER_2}} apply -k {{.K8S_DIR}}/overlays/multicluster-remote-2
        fi
      - |
        MGMT_ONLY="{{.PRIMARY_MANAGEMENT_ONLY}}"
        if [ "$MGMT_ONLY" = "true" ]; then
          echo "Echo apps deployed to remote clusters only (PRIMARY_MANAGEMENT_ONLY=true)"
        else
          echo "Echo apps deployed to all clusters (NUM_CLUSTERS={{.NUM_CLUSTERS}})"
        fi

  test:delete:echo-apps:
    desc: Delete echo apps from all clusters
    cmds:
      - kubectl --context {{.PRIMARY_CLUSTER}} delete -k {{.K8S_DIR}}/overlays/multicluster-primary --ignore-not-found=true
      - kubectl --context {{.REMOTE_CLUSTER_1}} delete -k {{.K8S_DIR}}/overlays/multicluster-remote-1 --ignore-not-found=true
      - |
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          kubectl --context {{.REMOTE_CLUSTER_2}} delete -k {{.K8S_DIR}}/overlays/multicluster-remote-2 --ignore-not-found=true
        fi
      - echo "Echo apps deleted from all clusters"

  test:generate:traffic:
    desc: Generate traffic to echo-apps in all clusters (NO filter header)
    cmds:
      - |
        MGMT_ONLY="{{.PRIMARY_MANAGEMENT_ONLY}}"
        echo "Generating traffic (NUM_CLUSTERS={{.NUM_CLUSTERS}})..."
        echo "NO filter header - this traffic should NOT be stolen with http_filter"
        echo "Press Ctrl+C to stop"
        echo ""
        
        i=1
        while true; do
          echo "--- Round $i ---"
          
          # Traffic to primary (only if not management-only)
          if [ "$MGMT_ONLY" != "true" ]; then
            echo -n "PRIMARY: "
            kubectl --context {{.PRIMARY_CLUSTER}} exec -n {{.MC_NAMESPACE}} deploy/echo-app -- \
              wget -q -O- http://echo-app:8080/echo?from=primary 2>/dev/null | head -1 || echo "failed"
          fi
          
          # Traffic to remote-1
          echo -n "REMOTE-1: "
          kubectl --context {{.REMOTE_CLUSTER_1}} exec -n {{.MC_NAMESPACE}} deploy/echo-app -- \
            wget -q -O- http://echo-app:8080/echo?from=remote-1 2>/dev/null | head -1 || echo "failed"
          
          # Traffic to remote-2 (only if NUM_CLUSTERS=3)
          if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
            echo -n "REMOTE-2: "
            kubectl --context {{.REMOTE_CLUSTER_2}} exec -n {{.MC_NAMESPACE}} deploy/echo-app -- \
              wget -q -O- http://echo-app:8080/echo?from=remote-2 2>/dev/null | head -1 || echo "failed"
          fi
          
          echo ""
          i=$((i + 1))
          sleep 2
        done

  test:generate:traffic:burst:
    desc: Generate a burst of traffic to all clusters (for quick testing)
    cmds:
      - |
        MGMT_ONLY="{{.PRIMARY_MANAGEMENT_ONLY}}"
        echo "Sending burst of 10 requests to each cluster..."
        echo "  NUM_CLUSTERS={{.NUM_CLUSTERS}}, PRIMARY_MANAGEMENT_ONLY=$MGMT_ONLY"
        echo ""

        for i in $(seq 1 10); do
          # Primary only if not management-only
          if [ "$MGMT_ONLY" != "true" ]; then
            kubectl --context {{.PRIMARY_CLUSTER}} exec -n {{.MC_NAMESPACE}} deploy/echo-app -- \
              wget -q -O- "http://echo-app:8080/echo?req=$i" 2>/dev/null &
          fi
          kubectl --context {{.REMOTE_CLUSTER_1}} exec -n {{.MC_NAMESPACE}} deploy/echo-app -- \
            wget -q -O- "http://echo-app:8080/echo?req=$i" 2>/dev/null &
          if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
            kubectl --context {{.REMOTE_CLUSTER_2}} exec -n {{.MC_NAMESPACE}} deploy/echo-app -- \
              wget -q -O- "http://echo-app:8080/echo?req=$i" 2>/dev/null &
          fi
        done
        
        wait
        echo "Burst complete"

  test:steal:single-cluster:
    desc: Test stealing traffic from a single cluster (baseline test)
    cmds:
      - |
        echo "=== Single-Cluster Traffic Steal Test ==="
        echo ""
        echo "Target: echo-app in {{.PRIMARY_CLUSTER}}"
        echo "This tests the baseline single-cluster behavior."
        echo ""
        echo "In another terminal, run:"
        echo "  task multicluster:test:generate:traffic"
        echo ""
        echo "You should see requests ONLY from PRIMARY cluster."
        echo ""
        
        cd {{.APPS_DIR}}/echo-app
        {{.MIRRORD_BIN}} exec \
          --context {{.PRIMARY_CLUSTER}} \
          --target deploy/echo-app \
          --target-namespace {{.MC_NAMESPACE}} \
          --steal \
          -- ./echo-app

  test:steal:multi-cluster:
    desc: Test stealing traffic from multiple clusters via Envoy aggregation
    cmds:
      - |
        echo "=== Multi-Cluster Traffic Steal Test ==="
        echo ""
        echo "Connecting to PRIMARY cluster: {{.PRIMARY_CLUSTER}}"
        echo "Envoy should aggregate traffic from:"
        echo "  - {{.PRIMARY_CLUSTER}} (PRIMARY)"
        echo "  - {{.REMOTE_CLUSTER_1}} (REMOTE-1)"
        echo "  - {{.REMOTE_CLUSTER_2}} (REMOTE-2)"
        echo ""
        echo "In another terminal, run:"
        echo "  task multicluster:test:generate:traffic"
        echo ""
        echo "You should see requests from ALL clusters!"
        echo ""
        
        cd {{.APPS_DIR}}/echo-app
        {{.MIRRORD_BIN}} exec \
          --context {{.PRIMARY_CLUSTER}} \
          --target deploy/echo-app \
          --target-namespace {{.MC_NAMESPACE}} \
          --steal \
          -- ./echo-app

  test:steal:multi-cluster:with-config:
    desc: Test with mirrord config file (includes HTTP filter)
    cmds:
      - |
        echo "=== Multi-Cluster Traffic Steal with Config ==="
        echo ""
        echo "Using config: mirrord-local.json"
        echo "HTTP Filter: X-My-Header: filtered-data"
        echo ""
        echo "To test filtering, use:"
        echo "  task multicluster:test:generate:traffic:filtered   # SHOULD be stolen"
        echo "  task multicluster:test:generate:traffic            # Should NOT be stolen"
        echo ""
        
        cd {{.APPS_DIR}}/echo-app
        {{.MIRRORD_BIN}} exec \
          --context {{.PRIMARY_CLUSTER}} \
          -f mirrord-local.json \
          -- ./echo-app

  test:generate:traffic:filtered:
    desc: Generate traffic with X-My-Header header (for filter testing)
    cmds:
      - |
        echo "Generating FILTERED traffic (with X-My-Header: filtered-data)..."
        echo "This traffic SHOULD be stolen when using http_filter"
        echo "Press Ctrl+C to stop"
        echo ""
        
        i=1
        while true; do
          echo "--- Round $i (FILTERED) ---"
          
          # Traffic to primary with filter header
          echo -n "PRIMARY (filtered): "
          kubectl --context {{.PRIMARY_CLUSTER}} exec -n {{.MC_NAMESPACE}} deploy/echo-app -- \
            wget -q -O- --header="X-My-Header: filtered-data" --header="X-Source-Cluster: PRIMARY" \
            http://echo-app:8080/echo?from=filtered 2>/dev/null | head -1 || echo "failed"
          
          # Traffic to remote-1 with filter header
          echo -n "REMOTE-1 (filtered): "
          kubectl --context {{.REMOTE_CLUSTER_1}} exec -n {{.MC_NAMESPACE}} deploy/echo-app -- \
            wget -q -O- --header="X-My-Header: filtered-data" --header="X-Source-Cluster: REMOTE-1" \
            http://echo-app:8080/echo?from=filtered 2>/dev/null | head -1 || echo "failed"
          
          if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
            echo -n "REMOTE-2 (filtered): "
            kubectl --context {{.REMOTE_CLUSTER_2}} exec -n {{.MC_NAMESPACE}} deploy/echo-app -- \
              wget -q -O- --header="X-My-Header: filtered-data" --header="X-Source-Cluster: REMOTE-2" \
              http://echo-app:8080/echo?from=filtered 2>/dev/null | head -1 || echo "failed"
          fi
          
          echo ""
          i=$((i + 1))
          sleep 2
        done

  test:generate:traffic:mixed:
    desc: Generate mixed traffic (some filtered, some not) for filter testing
    cmds:
      - |
        echo "Generating MIXED traffic..."
        echo "  - With X-My-Header: filtered-data -> SHOULD be stolen"
        echo "  - Without header -> Should NOT be stolen"
        echo "Press Ctrl+C to stop"
        echo ""
        
        i=1
        while true; do
          echo "--- Round $i ---"
          
          # Filtered traffic (should be stolen)
          echo -n "FILTERED (primary): "
          kubectl --context {{.PRIMARY_CLUSTER}} exec -n {{.MC_NAMESPACE}} deploy/echo-app -- \
            wget -q -O- --header="X-My-Header: filtered-data" \
            http://echo-app:8080/echo?type=filtered 2>/dev/null | head -1 || echo "failed"
          
          # Non-filtered traffic (should NOT be stolen)
          echo -n "NON-FILTERED (primary): "
          kubectl --context {{.PRIMARY_CLUSTER}} exec -n {{.MC_NAMESPACE}} deploy/echo-app -- \
            wget -q -O- http://echo-app:8080/echo?type=non-filtered 2>/dev/null | head -1 || echo "failed"
          
          echo ""
          i=$((i + 1))
          sleep 2
        done

  test:verify:operator-status:
    desc: Verify operator multi-cluster configuration
    cmds:
      - |
        echo "=== Operator Status in Primary Cluster ==="
        kubectl --context {{.PRIMARY_CLUSTER}} get mirrordoperators -o yaml 2>/dev/null || \
          echo "MirrordOperator CRD not found"
        
        echo ""
        echo "=== Operator Pod Env Vars (multi-cluster related) ==="
        kubectl --context {{.PRIMARY_CLUSTER}} get pods -n mirrord -l app=mirrord-operator \
          -o jsonpath='{range .items[0].spec.containers[0].env[*]}{.name}={.value}{"\n"}{end}' 2>/dev/null | \
          grep -iE "(multi|cluster|primary|default)" || echo "No multi-cluster env vars found"
        
        echo ""
        echo "=== Operator Logs (last 30 lines) ==="
        kubectl --context {{.PRIMARY_CLUSTER}} logs -n mirrord -l app=mirrord-operator --tail=30

  test:watch:sessions:
    desc: Watch MirrordMultiClusterSessions
    cmds:
      - kubectl --context {{.PRIMARY_CLUSTER}} get mirrordmulticlustersessions -A -w

  test:watch:cluster-sessions:
    desc: Show MirrordClusterSessions in all clusters
    cmds:
      - |
        echo "=== Cluster Sessions in Primary ==="
        kubectl --context {{.PRIMARY_CLUSTER}} get mirrordclustersessions -A 2>/dev/null || echo "None"
        
        echo ""
        echo "=== Cluster Sessions in Remote-1 ==="
        kubectl --context {{.REMOTE_CLUSTER_1}} get mirrordclustersessions -A 2>/dev/null || echo "None"
        
        echo ""
        echo "=== Cluster Sessions in Remote-2 ==="

  test:cleanup:sessions:
    desc: Clean up all test sessions
    cmds:
      - kubectl --context {{.PRIMARY_CLUSTER}} delete mirrordmulticlustersessions --all -A --ignore-not-found=true
      - kubectl --context {{.PRIMARY_CLUSTER}} delete mirrordclustersessions --all -A --ignore-not-found=true
      - kubectl --context {{.REMOTE_CLUSTER_1}} delete mirrordclustersessions --all -A --ignore-not-found=true
      - |
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          kubectl --context {{.REMOTE_CLUSTER_2}} delete mirrordclustersessions --all -A --ignore-not-found=true
        fi
      - echo "All sessions cleaned up"

  test:full:
    desc: Run full multi-cluster test setup
    cmds:
      - |
        MGMT_ONLY="{{.PRIMARY_MANAGEMENT_ONLY}}"
        echo "=== MULTI-CLUSTER TEST SUITE ==="
        echo "  NUM_CLUSTERS={{.NUM_CLUSTERS}}, PRIMARY_MANAGEMENT_ONLY=$MGMT_ONLY"
        echo ""
      - task: test:verify:clusters
      - task: test:verify:operator
      - task: test:deploy:echo-apps
      - echo "Waiting for echo apps to be ready..."
      - |
        MGMT_ONLY="{{.PRIMARY_MANAGEMENT_ONLY}}"
        if [ "$MGMT_ONLY" != "true" ]; then
          kubectl --context {{.PRIMARY_CLUSTER}} wait --for=condition=available deploy/echo-app -n {{.MC_NAMESPACE}} --timeout=60s
        fi
      - kubectl --context {{.REMOTE_CLUSTER_1}} wait --for=condition=available deploy/echo-app -n {{.MC_NAMESPACE}} --timeout=60s
      - |
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          kubectl --context {{.REMOTE_CLUSTER_2}} wait --for=condition=available deploy/echo-app -n {{.MC_NAMESPACE}} --timeout=60s
        fi
      - echo ""
      - task: test:verify:operator-status
      - echo ""
      - echo "=== Test Environment Ready ==="
      - echo ""
      - echo "To test multi-cluster traffic stealing:"
      - echo ""
      - echo "1. Terminal 1 - Generate traffic:"
      - echo "   task multicluster:test:generate:traffic"
      - echo ""
      - echo "2. Terminal 2 - Steal from single cluster (baseline):"
      - echo "   task multicluster:test:steal:single-cluster"
      - echo ""
      - echo "3. Terminal 2 - Steal from all clusters (multi-cluster):"
      - echo "   task multicluster:test:steal:multi-cluster"
      - echo ""
      - |
        MGMT_ONLY="{{.PRIMARY_MANAGEMENT_ONLY}}"
        if [ "$MGMT_ONLY" = "true" ]; then
          echo "Mode: PRIMARY_MANAGEMENT_ONLY - traffic comes from remote clusters only"
        elif [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          echo "Compare the output - multi-cluster should show traffic from all 3 clusters!"
        else
          echo "Compare the output - multi-cluster should show traffic from both clusters!"
        fi

  test:e2e:
    desc: Run automated end-to-end multi-cluster test
    cmds:
      - |
        MGMT_ONLY="{{.PRIMARY_MANAGEMENT_ONLY}}"
        echo "=== Automated E2E Multi-Cluster Test ==="
        echo "  NUM_CLUSTERS={{.NUM_CLUSTERS}}, PRIMARY_MANAGEMENT_ONLY=$MGMT_ONLY"
        echo ""
        
        # Ensure apps are deployed
        task multicluster:test:deploy:echo-apps
        
        echo "Waiting for apps to be ready..."
        if [ "$MGMT_ONLY" != "true" ]; then
          kubectl --context {{.PRIMARY_CLUSTER}} wait --for=condition=available deploy/echo-app -n {{.MC_NAMESPACE}} --timeout=60s
        fi
        kubectl --context {{.REMOTE_CLUSTER_1}} wait --for=condition=available deploy/echo-app -n {{.MC_NAMESPACE}} --timeout=60s
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          kubectl --context {{.REMOTE_CLUSTER_2}} wait --for=condition=available deploy/echo-app -n {{.MC_NAMESPACE}} --timeout=60s
        fi
        
        echo ""
        echo "Verifying apps respond with correct cluster IDs..."
        
        if [ "$MGMT_ONLY" != "true" ]; then
          echo -n "PRIMARY responds: "
          kubectl --context {{.PRIMARY_CLUSTER}} exec -n {{.MC_NAMESPACE}} deploy/echo-app -- \
            wget -q -O- http://localhost:8080/info 2>/dev/null | grep -o '"cluster_id":"[^"]*"'
        else
          echo "PRIMARY: (management-only, no workloads)"
        fi
        
        echo -n "REMOTE-1 responds: "
        kubectl --context {{.REMOTE_CLUSTER_1}} exec -n {{.MC_NAMESPACE}} deploy/echo-app -- \
          wget -q -O- http://localhost:8080/info 2>/dev/null | grep -o '"cluster_id":"[^"]*"'
        
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          echo -n "REMOTE-2 responds: "
          kubectl --context {{.REMOTE_CLUSTER_2}} exec -n {{.MC_NAMESPACE}} deploy/echo-app -- \
            wget -q -O- http://localhost:8080/info 2>/dev/null | grep -o '"cluster_id":"[^"]*"'
        fi
        
        echo ""
        echo "E2E test complete. Apps are correctly deployed with cluster-specific IDs."
        echo ""
        echo "Next steps:"
        echo "  1. Run: task multicluster:test:generate:traffic (in background)"
        echo "  2. Run: task multicluster:test:steal:multi-cluster"
        if [ "$MGMT_ONLY" = "true" ]; then
          echo "  3. Verify you see traffic from remote clusters only (primary is management-only)"
        elif [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          echo "  3. Verify you see traffic from all 3 clusters"
        else
          echo "  3. Verify you see traffic from both clusters"
        fi
