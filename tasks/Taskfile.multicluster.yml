# Multi-Cluster Test Environment
# Sets up a simulated multi-cluster environment using kind
# for testing mirrord operator's multi-cluster features

version: "3"

vars:
  # ROOT_DIR is local-sandbox/ (parent of tasks/) - same pattern as other taskfiles
  ROOT_DIR:
    sh: cd .. && pwd
  CHARTS_DIR: '{{.ROOT_DIR}}/../charts/mirrord-operator'
  APPS_DIR: '{{.ROOT_DIR}}/apps'
  K8S_DIR: '{{.ROOT_DIR}}/k8s'
  
  PRIMARY_CLUSTER: '{{.PRIMARY_CLUSTER | default "mirrord-primary"}}'
  REMOTE_CLUSTER_1: '{{.REMOTE_CLUSTER_1 | default "mirrord-remote-1"}}'
  REMOTE_CLUSTER_2: '{{.REMOTE_CLUSTER_2 | default "mirrord-remote-2"}}'
  
  NAMESPACE: '{{.NAMESPACE | default "test-multicluster"}}'
  
  OPERATOR_IMAGE: '{{.OPERATOR_IMAGE | default "mirrord-operator:custom"}}'
  ECHO_APP_IMAGE: '{{.ECHO_APP_IMAGE | default "echo-app:latest"}}'
  MIRRORD_BIN: '{{.MIRRORD_BIN | default "mirrord"}}'
  CONTAINER_RUNTIME: '{{.CONTAINER_RUNTIME | default "docker"}}'

tasks:
  clusters:create:
    desc: Create all 3 minikube profiles for multi-cluster testing
    cmds:
      - task: cluster:create
        vars: { CLUSTER: "{{.PRIMARY_CLUSTER}}" }
      - task: cluster:create
        vars: { CLUSTER: "{{.REMOTE_CLUSTER_1}}" }
      - task: cluster:create
        vars: { CLUSTER: "{{.REMOTE_CLUSTER_2}}" }
      - 'echo "All clusters created"'
      - 'echo " - Primary: {{.PRIMARY_CLUSTER}}"'
      - 'echo " - Remote 1: {{.REMOTE_CLUSTER_1}}"'
      - 'echo " - Remote 2: {{.REMOTE_CLUSTER_2}}"'

  cluster:create:
    internal: true
    desc: Create a single minikube cluster profile
    vars:
      CLUSTER: '{{.CLUSTER}}'
    cmds:
      - minikube start -p {{.CLUSTER}} --driver={{.CONTAINER_RUNTIME}}
      - minikube -p {{.CLUSTER}} addons enable metrics-server
      - echo "Cluster {{.CLUSTER}} created"

  clusters:delete:
    desc: Delete all minikube cluster profiles
    cmds:
      - minikube delete -p {{.PRIMARY_CLUSTER}} || true
      - minikube delete -p {{.REMOTE_CLUSTER_1}} || true
      - minikube delete -p {{.REMOTE_CLUSTER_2}} || true
      - echo "All clusters deleted"

  clusters:list:
    desc: List all minikube profiles
    cmds:
      - minikube profile list

  kubeconfig:generate:
    desc: Generate multi-cluster kubeconfig for operator
    cmds:
      - |
        # Get minikube kubeconfig paths and merge them
        PRIMARY_KUBECONFIG=$(minikube -p {{.PRIMARY_CLUSTER}} ssh-key 2>/dev/null | xargs dirname)/kubeconfig || echo ""
        
        # Use kubectl config to merge contexts from all profiles
        # Minikube automatically adds contexts to ~/.kube/config
        kubectl config view --flatten --context={{.PRIMARY_CLUSTER}} --context={{.REMOTE_CLUSTER_1}} --context={{.REMOTE_CLUSTER_2}} > {{.ROOT_DIR}}/multi-cluster-kubeconfig.yaml 2>/dev/null || \
        cp ~/.kube/config {{.ROOT_DIR}}/multi-cluster-kubeconfig.yaml
        
        # Rename contexts to match our cluster names
        kubectl config rename-context {{.PRIMARY_CLUSTER}} {{.PRIMARY_CLUSTER}} \
          --kubeconfig={{.ROOT_DIR}}/multi-cluster-kubeconfig.yaml
        kubectl config rename-context {{.REMOTE_CLUSTER_1}} {{.REMOTE_CLUSTER_1}} \
          --kubeconfig={{.ROOT_DIR}}/multi-cluster-kubeconfig.yaml
        kubectl config rename-context {{.REMOTE_CLUSTER_2}} {{.REMOTE_CLUSTER_2}} \
          --kubeconfig={{.ROOT_DIR}}/multi-cluster-kubeconfig.yaml
        
        echo "Multi-cluster kubeconfig generated at multi-cluster-kubeconfig.yaml"

  kubeconfig:create:secret:
    desc: Create kubeconfig secret in primary cluster
    deps: [kubeconfig:generate]
    cmds:
      - kubectl --context {{.PRIMARY_CLUSTER}} create namespace mirrord --dry-run=client -o yaml | kubectl --context {{.PRIMARY_CLUSTER}} apply -f -
      - kubectl --context {{.PRIMARY_CLUSTER}} create secret generic mirrord-multi-cluster-kubeconfig --from-file=config={{.ROOT_DIR}}/multi-cluster-kubeconfig.yaml -n mirrord --dry-run=client -o yaml | kubectl --context {{.PRIMARY_CLUSTER}} apply -f -
      - echo "Kubeconfig secret created in {{.PRIMARY_CLUSTER}}"

  operator:load:images:
    desc: Load operator image to all clusters
    cmds:
      - minikube -p {{.PRIMARY_CLUSTER}} image load {{.OPERATOR_IMAGE}}
      - minikube -p {{.REMOTE_CLUSTER_1}} image load {{.OPERATOR_IMAGE}}
      - minikube -p {{.REMOTE_CLUSTER_2}} image load {{.OPERATOR_IMAGE}}
      - echo "Image loaded to all clusters"

  operator:install:remote:
    desc: Install operator in remote clusters (without multi-cluster)
    cmds:
      - |
        for cluster in {{.REMOTE_CLUSTER_1}} {{.REMOTE_CLUSTER_2}}; do
          echo "Installing operator in $cluster..."
          helm upgrade --install mirrord-operator {{.CHARTS_DIR}} \
            --kube-context $cluster \
            --namespace mirrord \
            --create-namespace \
            --set operator.image={{.OPERATOR_IMAGE}} \
            --set operator.imagePullPolicy=Never \
            --wait
          echo "Operator installed in $cluster"
        done

  operator:install:primary:
    desc: Install operator in primary cluster with multi-cluster enabled
    deps: [kubeconfig:create:secret]
    cmds:
      - |
        echo "Installing operator in {{.PRIMARY_CLUSTER}} with multi-cluster..."
        helm upgrade --install mirrord-operator {{.CHARTS_DIR}} \
          --kube-context {{.PRIMARY_CLUSTER}} \
          --namespace mirrord \
          --create-namespace \
          --set operator.image={{.OPERATOR_IMAGE}} \
          --set operator.imagePullPolicy=Never \
          --set operator.multiCluster.enabled=true \
          --set operator.multiCluster.kubeconfigSecret=mirrord-multi-cluster-kubeconfig \
          --set operator.multiCluster.kubeconfigPath=/etc/kubeconfig/config \
          --set "operator.multiCluster.clusterContexts.remote-1={{.REMOTE_CLUSTER_1}}" \
          --set "operator.multiCluster.clusterContexts.remote-2={{.REMOTE_CLUSTER_2}}" \
          --wait
        echo "Operator installed in {{.PRIMARY_CLUSTER}} with multi-cluster"

  operator:install:all:
    desc: Install operator in all clusters
    cmds:
      - task: operator:install:remote
      - task: operator:install:primary

  apps:deploy:
    desc: Deploy test applications to all clusters
    cmds:
      - task: app:deploy
        vars: { CLUSTER: "{{.PRIMARY_CLUSTER}}", APP_NAME: "nginx-primary", REPLICAS: "2" }
      - task: app:deploy
        vars: { CLUSTER: "{{.REMOTE_CLUSTER_1}}", APP_NAME: "nginx-remote-1", REPLICAS: "2" }
      - task: app:deploy
        vars: { CLUSTER: "{{.REMOTE_CLUSTER_2}}", APP_NAME: "nginx-remote-2", REPLICAS: "2" }
      - echo "Test apps deployed to all clusters"

  app:deploy:
    internal: true
    desc: Deploy a test application to a cluster
    vars:
      CLUSTER: '{{.CLUSTER}}'
      APP_NAME: '{{.APP_NAME}}'
      REPLICAS: '{{.REPLICAS | default "1"}}'
    cmds:
      - |
        kubectl --context {{.CLUSTER}} create namespace {{.NAMESPACE}} --dry-run=client -o yaml | kubectl --context {{.CLUSTER}} apply -f -
        
        cat <<EOF | kubectl --context {{.CLUSTER}} apply -f -
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: {{.APP_NAME}}
          namespace: {{.NAMESPACE}}
          labels:
            app: {{.APP_NAME}}
        spec:
          replicas: {{.REPLICAS}}
          selector:
            matchLabels:
              app: {{.APP_NAME}}
          template:
            metadata:
              labels:
                app: {{.APP_NAME}}
            spec:
              containers:
              - name: nginx
                image: nginx:alpine
                ports:
                - containerPort: 80
                env:
                - name: CLUSTER_NAME
                  value: "{{.CLUSTER}}"
        ---
        apiVersion: v1
        kind: Service
        metadata:
          name: {{.APP_NAME}}
          namespace: {{.NAMESPACE}}
        spec:
          selector:
            app: {{.APP_NAME}}
          ports:
          - port: 80
            targetPort: 80
        EOF
        echo "App {{.APP_NAME}} deployed to {{.CLUSTER}}"

  apps:delete:
    desc: Delete test applications from all clusters
    cmds:
      - kubectl --context {{.PRIMARY_CLUSTER}} delete namespace {{.NAMESPACE}} --ignore-not-found=true
      - kubectl --context {{.REMOTE_CLUSTER_1}} delete namespace {{.NAMESPACE}} --ignore-not-found=true
      - kubectl --context {{.REMOTE_CLUSTER_2}} delete namespace {{.NAMESPACE}} --ignore-not-found=true
      - echo "Test apps deleted from all clusters"

  test:verify:clusters:
    desc: Verify all clusters are running
    cmds:
      - kubectl --context {{.PRIMARY_CLUSTER}} cluster-info
      - kubectl --context {{.REMOTE_CLUSTER_1}} cluster-info
      - kubectl --context {{.REMOTE_CLUSTER_2}} cluster-info
      - echo "All clusters verified"

  test:verify:operator:
    desc: Verify operator is running in all clusters
    cmds:
      - kubectl --context {{.PRIMARY_CLUSTER}} get pods -n mirrord -l app=mirrord-operator
      - kubectl --context {{.REMOTE_CLUSTER_1}} get pods -n mirrord -l app=mirrord-operator
      - kubectl --context {{.REMOTE_CLUSTER_2}} get pods -n mirrord -l app=mirrord-operator
      - echo "Operators verified"

  test:verify:apps:
    desc: Verify test apps are running
    cmds:
      - kubectl --context {{.PRIMARY_CLUSTER}} get pods -n {{.NAMESPACE}}
      - kubectl --context {{.REMOTE_CLUSTER_1}} get pods -n {{.NAMESPACE}}
      - kubectl --context {{.REMOTE_CLUSTER_2}} get pods -n {{.NAMESPACE}}
      - echo "Apps verified"

  test:crds:
    desc: Test multi-cluster CRD creation
    vars:
      K8S_DIR: '{{.SANDBOX_DIR}}/k8s/multicluster'
    cmds:
      - kubectl --context {{.PRIMARY_CLUSTER}} apply -f {{.K8S_DIR}}/test-session.yaml
      - echo "Test multi-cluster session created"
      - kubectl --context {{.PRIMARY_CLUSTER}} get mirrordmulticlustersessions -n {{.NAMESPACE}}

  test:crds:delete:
    desc: Delete test CRDs
    cmds:
      - kubectl --context {{.PRIMARY_CLUSTER}} delete mirrordmulticlustersessions --all -n {{.NAMESPACE}} --ignore-not-found=true
      - echo "Test CRDs deleted"

  logs:primary:
    desc: Show operator logs from primary cluster
    cmds:
      - kubectl --context {{.PRIMARY_CLUSTER}} logs -n mirrord -l app=mirrord-operator --tail=100 -f

  logs:remote1:
    desc: Show operator logs from remote cluster 1
    cmds:
      - kubectl --context {{.REMOTE_CLUSTER_1}} logs -n mirrord -l app=mirrord-operator --tail=100 -f

  logs:remote2:
    desc: Show operator logs from remote cluster 2
    cmds:
      - kubectl --context {{.REMOTE_CLUSTER_2}} logs -n mirrord -l app=mirrord-operator --tail=100 -f

  setup:all:clean:
    desc: Clean setup - teardown existing environment and setup from scratch
    cmds:
      - task: teardown:all
      - sleep 2
      - task: setup:all

  setup:all:
    desc: Complete multi-cluster setup from scratch
    cmds:
      - task: clusters:create
      - task: kubeconfig:generate
      - echo "Waiting for clusters to be ready..."
      - sleep 5
      - task: test:verify:clusters
      - task: operator:load:images
      - task: operator:install:all
      - echo "Waiting for operators to be ready..."
      - sleep 10
      - task: test:verify:operator
      - task: apps:deploy
      - echo "Waiting for apps to be ready..."
      - sleep 5
      - task: test:verify:apps
      - echo ""
      - echo "Multi-cluster environment setup complete!"
      - echo ""
      - echo "To test multi-cluster sessions:"
      - echo "  task multicluster:test:crds"
      - echo ""
      - echo "To view logs:"
      - echo "  task multicluster:logs:primary   # Primary cluster logs"
      - echo "  task multicluster:logs:remote1   # Remote 1 cluster logs"
      - echo "  task multicluster:logs:remote2   # Remote 2 cluster logs"

  teardown:all:
    desc: Teardown entire multi-cluster environment
    cmds:
      - task: clusters:delete
      - rm -f {{.ROOT_DIR}}/multi-cluster-kubeconfig.yaml
      - echo "Multi-cluster environment torn down"

  status:
    desc: Show status of multi-cluster environment
    cmds:
      - echo "=== Clusters ==="
      - kind get clusters
      - echo ""
      - echo "=== Operators ==="
      - 'kubectl --context {{.PRIMARY_CLUSTER}} get pods -n mirrord 2>/dev/null || echo "Primary - Not running"'
      - 'kubectl --context {{.REMOTE_CLUSTER_1}} get pods -n mirrord 2>/dev/null || echo "Remote 1 - Not running"'
      - 'kubectl --context {{.REMOTE_CLUSTER_2}} get pods -n mirrord 2>/dev/null || echo "Remote 2 - Not running"'
      - echo ""
      - echo "=== Apps ==="
      - 'kubectl --context {{.PRIMARY_CLUSTER}} get pods -n {{.NAMESPACE}} 2>/dev/null || echo "Primary - No apps"'
      - 'kubectl --context {{.REMOTE_CLUSTER_1}} get pods -n {{.NAMESPACE}} 2>/dev/null || echo "Remote 1 - No apps"'
      - 'kubectl --context {{.REMOTE_CLUSTER_2}} get pods -n {{.NAMESPACE}} 2>/dev/null || echo "Remote 2 - No apps"'

  shell:primary:
    desc: Switch kubectl context to primary cluster
    cmds:
      - kubectl config use-context {{.PRIMARY_CLUSTER}}
      - echo "Switched to {{.PRIMARY_CLUSTER}}"

  shell:remote1:
    desc: Switch kubectl context to remote cluster 1
    cmds:
      - kubectl config use-context {{.REMOTE_CLUSTER_1}}
      - echo "Switched to {{.REMOTE_CLUSTER_1}}"

  shell:remote2:
    desc: Switch kubectl context to remote cluster 2
    cmds:
      - kubectl config use-context {{.REMOTE_CLUSTER_2}}
      - echo "Switched to {{.REMOTE_CLUSTER_2}}"

  echo-app:build:
    desc: Build the Go echo-app for multi-cluster testing
    cmds:
      - |
        echo "Building echo-app..."
        cd {{.APPS_DIR}}/echo-app
        docker build -t {{.ECHO_APP_IMAGE}} .
        echo "echo-app built as {{.ECHO_APP_IMAGE}}"

  echo-app:load:
    desc: Load echo-app image to all clusters (with build)
    deps: [echo-app:build]
    cmds:
      - minikube -p {{.PRIMARY_CLUSTER}} image load {{.ECHO_APP_IMAGE}}
      - minikube -p {{.REMOTE_CLUSTER_1}} image load {{.ECHO_APP_IMAGE}}
      - minikube -p {{.REMOTE_CLUSTER_2}} image load {{.ECHO_APP_IMAGE}}
      - echo "echo-app image loaded to all clusters"

  echo-app:load:all:
    desc: Load echo-app image to all clusters (no rebuild)
    cmds:
      - minikube -p {{.PRIMARY_CLUSTER}} image load {{.ECHO_APP_IMAGE}}
      - minikube -p {{.REMOTE_CLUSTER_1}} image load {{.ECHO_APP_IMAGE}}
      - minikube -p {{.REMOTE_CLUSTER_2}} image load {{.ECHO_APP_IMAGE}}
      - echo "echo-app image loaded to all clusters"

  test:deploy:echo-apps:
    desc: Deploy echo apps to all clusters with cluster-specific IDs
    deps: [echo-app:load]
    cmds:
      - kubectl --context {{.PRIMARY_CLUSTER}} apply -k {{.K8S_DIR}}/overlays/multicluster-primary
      - kubectl --context {{.REMOTE_CLUSTER_1}} apply -k {{.K8S_DIR}}/overlays/multicluster-remote-1
      - kubectl --context {{.REMOTE_CLUSTER_2}} apply -k {{.K8S_DIR}}/overlays/multicluster-remote-2
      - echo "Echo apps deployed to all clusters using kustomize"

  test:delete:echo-apps:
    desc: Delete echo apps from all clusters
    cmds:
      - kubectl --context {{.PRIMARY_CLUSTER}} delete -k {{.K8S_DIR}}/overlays/multicluster-primary --ignore-not-found=true
      - kubectl --context {{.REMOTE_CLUSTER_1}} delete -k {{.K8S_DIR}}/overlays/multicluster-remote-1 --ignore-not-found=true
      - kubectl --context {{.REMOTE_CLUSTER_2}} delete -k {{.K8S_DIR}}/overlays/multicluster-remote-2 --ignore-not-found=true
      - echo "Echo apps deleted from all clusters"

  test:generate:traffic:
    desc: Generate traffic to echo-apps in all clusters
    cmds:
      - |
        echo "Generating traffic to all clusters..."
        echo "Press Ctrl+C to stop"
        echo ""
        
        i=1
        while true; do
          echo "--- Round $i ---"
          
          # Traffic to primary
          echo -n "PRIMARY: "
          kubectl --context {{.PRIMARY_CLUSTER}} exec -n {{.NAMESPACE}} deploy/echo-app -- \
            wget -q -O- http://echo-app:8080/echo?from=traffic-gen 2>/dev/null | head -1 || echo "failed"
          
          # Traffic to remote-1
          echo -n "REMOTE-1: "
          kubectl --context {{.REMOTE_CLUSTER_1}} exec -n {{.NAMESPACE}} deploy/echo-app -- \
            wget -q -O- http://echo-app:8080/echo?from=traffic-gen 2>/dev/null | head -1 || echo "failed"
          
          # Traffic to remote-2
          echo -n "REMOTE-2: "
          kubectl --context {{.REMOTE_CLUSTER_2}} exec -n {{.NAMESPACE}} deploy/echo-app -- \
            wget -q -O- http://echo-app:8080/echo?from=traffic-gen 2>/dev/null | head -1 || echo "failed"
          
          echo ""
          i=$((i + 1))
          sleep 2
        done

  test:generate:traffic:burst:
    desc: Generate a burst of traffic to all clusters (for quick testing)
    cmds:
      - |
        echo "Sending burst of 10 requests to each cluster..."
        echo ""
        
        for i in $(seq 1 10); do
          kubectl --context {{.PRIMARY_CLUSTER}} exec -n {{.NAMESPACE}} deploy/echo-app -- \
            wget -q -O- "http://echo-app:8080/echo?req=$i" 2>/dev/null &
          kubectl --context {{.REMOTE_CLUSTER_1}} exec -n {{.NAMESPACE}} deploy/echo-app -- \
            wget -q -O- "http://echo-app:8080/echo?req=$i" 2>/dev/null &
          kubectl --context {{.REMOTE_CLUSTER_2}} exec -n {{.NAMESPACE}} deploy/echo-app -- \
            wget -q -O- "http://echo-app:8080/echo?req=$i" 2>/dev/null &
        done
        
        wait
        echo "Burst complete - 30 total requests sent (10 per cluster)"

  test:steal:single-cluster:
    desc: Test stealing traffic from a single cluster (baseline test)
    cmds:
      - |
        echo "=== Single-Cluster Traffic Steal Test ==="
        echo ""
        echo "Target: echo-app in {{.PRIMARY_CLUSTER}}"
        echo "This tests the baseline single-cluster behavior."
        echo ""
        echo "In another terminal, run:"
        echo "  task multicluster:test:generate:traffic"
        echo ""
        echo "You should see requests ONLY from PRIMARY cluster."
        echo ""
        
        cd {{.APPS_DIR}}/echo-app
        {{.MIRRORD_BIN}} exec \
          --context {{.PRIMARY_CLUSTER}} \
          --target deploy/echo-app \
          --target-namespace {{.NAMESPACE}} \
          --steal \
          -- ./echo-app

  test:steal:multi-cluster:
    desc: Test stealing traffic from multiple clusters via Envoy aggregation
    cmds:
      - |
        echo "=== Multi-Cluster Traffic Steal Test ==="
        echo ""
        echo "Connecting to PRIMARY cluster: {{.PRIMARY_CLUSTER}}"
        echo "Envoy should aggregate traffic from:"
        echo "  - {{.PRIMARY_CLUSTER}} (PRIMARY)"
        echo "  - {{.REMOTE_CLUSTER_1}} (REMOTE-1)"
        echo "  - {{.REMOTE_CLUSTER_2}} (REMOTE-2)"
        echo ""
        echo "In another terminal, run:"
        echo "  task multicluster:test:generate:traffic"
        echo ""
        echo "You should see requests from ALL clusters!"
        echo ""
        
        cd {{.APPS_DIR}}/echo-app
        {{.MIRRORD_BIN}} exec \
          --context {{.PRIMARY_CLUSTER}} \
          --target deploy/echo-app \
          --target-namespace {{.NAMESPACE}} \
          --steal \
          -- ./echo-app

  test:steal:with-config:
    desc: Test with mirrord config file
    cmds:
      - |
        echo "=== Multi-Cluster Traffic Steal with Config ==="
        echo ""
        
        cd {{.APPS_DIR}}/echo-app
        {{.MIRRORD_BIN}} exec \
          --context {{.PRIMARY_CLUSTER}} \
          -f mirrord-local.json \
          -- ./echo-app

  test:verify:operator-status:
    desc: Verify operator multi-cluster configuration
    cmds:
      - |
        echo "=== Operator Status in Primary Cluster ==="
        kubectl --context {{.PRIMARY_CLUSTER}} get mirrordoperators -o yaml 2>/dev/null || \
          echo "MirrordOperator CRD not found"
        
        echo ""
        echo "=== Operator Pod Env Vars (multi-cluster related) ==="
        kubectl --context {{.PRIMARY_CLUSTER}} get pods -n mirrord -l app=mirrord-operator \
          -o jsonpath='{range .items[0].spec.containers[0].env[*]}{.name}={.value}{"\n"}{end}' 2>/dev/null | \
          grep -iE "(multi|cluster|primary|default)" || echo "No multi-cluster env vars found"
        
        echo ""
        echo "=== Operator Logs (last 30 lines) ==="
        kubectl --context {{.PRIMARY_CLUSTER}} logs -n mirrord -l app=mirrord-operator --tail=30

  test:watch:sessions:
    desc: Watch MirrordMultiClusterSessions
    cmds:
      - kubectl --context {{.PRIMARY_CLUSTER}} get mirrordmulticlustersessions -A -w

  test:watch:cluster-sessions:
    desc: Show MirrordClusterSessions in all clusters
    cmds:
      - |
        echo "=== Cluster Sessions in Primary ==="
        kubectl --context {{.PRIMARY_CLUSTER}} get mirrordclustersessions -A 2>/dev/null || echo "None"
        
        echo ""
        echo "=== Cluster Sessions in Remote-1 ==="
        kubectl --context {{.REMOTE_CLUSTER_1}} get mirrordclustersessions -A 2>/dev/null || echo "None"
        
        echo ""
        echo "=== Cluster Sessions in Remote-2 ==="
        kubectl --context {{.REMOTE_CLUSTER_2}} get mirrordclustersessions -A 2>/dev/null || echo "None"

  test:cleanup:sessions:
    desc: Clean up all test sessions
    cmds:
      - kubectl --context {{.PRIMARY_CLUSTER}} delete mirrordmulticlustersessions --all -A --ignore-not-found=true
      - kubectl --context {{.PRIMARY_CLUSTER}} delete mirrordclustersessions --all -A --ignore-not-found=true
      - kubectl --context {{.REMOTE_CLUSTER_1}} delete mirrordclustersessions --all -A --ignore-not-found=true
      - kubectl --context {{.REMOTE_CLUSTER_2}} delete mirrordclustersessions --all -A --ignore-not-found=true
      - echo "All sessions cleaned up"

  test:full:
    desc: Run full multi-cluster test setup
    cmds:
      - echo "=== MULTI-CLUSTER TEST SUITE ==="
      - echo ""
      - task: test:verify:clusters
      - task: test:verify:operator
      - task: test:deploy:echo-apps
      - echo "Waiting for echo apps to be ready..."
      - kubectl --context {{.PRIMARY_CLUSTER}} wait --for=condition=available deploy/echo-app -n {{.NAMESPACE}} --timeout=60s
      - kubectl --context {{.REMOTE_CLUSTER_1}} wait --for=condition=available deploy/echo-app -n {{.NAMESPACE}} --timeout=60s
      - kubectl --context {{.REMOTE_CLUSTER_2}} wait --for=condition=available deploy/echo-app -n {{.NAMESPACE}} --timeout=60s
      - echo ""
      - task: test:verify:operator-status
      - echo ""
      - echo "=== Test Environment Ready ==="
      - echo ""
      - echo "To test multi-cluster traffic stealing:"
      - echo ""
      - echo "1. Terminal 1 - Generate traffic:"
      - echo "   task multicluster:test:generate:traffic"
      - echo ""
      - echo "2. Terminal 2 - Steal from single cluster (baseline):"
      - echo "   task multicluster:test:steal:single-cluster"
      - echo ""
      - echo "3. Terminal 2 - Steal from all clusters (multi-cluster):"
      - echo "   task multicluster:test:steal:multi-cluster"
      - echo ""
      - echo "Compare the output - multi-cluster should show traffic from all 3 clusters!"

  test:e2e:
    desc: Run automated end-to-end multi-cluster test
    cmds:
      - |
        echo "=== Automated E2E Multi-Cluster Test ==="
        echo ""
        
        # Ensure apps are deployed
