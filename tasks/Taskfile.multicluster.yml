# Multi-Cluster Test Environment
# Sets up a simulated multi-cluster environment using minikube
# for testing mirrord operator's multi-cluster features
#
# ## Cluster Discovery
#
# Clusters are discovered from Kubernetes Secrets with label:
#   operator.metalbear.co/remote-cluster-credentials=true
#
# Tokens are auto-refreshed using TokenRequest API every 45 minutes.
#
# ## Usage
#
#   task multicluster:setup:all                        # 2 clusters (primary + 1 remote)
#   MC_NUM_CLUSTERS=3 task multicluster:setup:all      # 3 clusters (primary + 2 remotes)
#
#   task multicluster:test:generate:traffic    # Generate traffic
#   task multicluster:test:steal:multi-cluster # Steal from all clusters
#
# ## Single-Cluster Session on Multi-Cluster Primary
#
# Tests the multi_cluster=false config flag, which forces a single-cluster
# session on the Primary operator instead of routing through the MC flow.
# The branch CRD is created in the target namespace with a skip-sync label
# so the sync controller ignores it and the local branching controller
# handles it directly on the Primary.
#
#   task multicluster:postgres:deploy:primary          # Deploy DB to primary
#   task multicluster:postgres:run:single-cluster      # Run app with multi_cluster=false
#   task multicluster:test:single-cluster:postgres     # Both steps combined
#   task multicluster:test:single-cluster:verify       # Check CRDs and labels
#
# ## Variables
#
#   MC_NUM_CLUSTERS=2|3     - Number of clusters (default: 2)
#   MC_PRIMARY              - Name of primary cluster (default: mirrord-primary)
#   MC_REMOTE_1             - Name of first remote cluster (default: mirrord-remote-1)
#   MC_REMOTE_2             - Name of second remote cluster (default: mirrord-remote-2)
#
# ## Architecture
#
#   Primary cluster: Runs Envoy (multi-cluster orchestrator), management-only
#   Remote clusters: Run standard operators with workloads
#   Default cluster: remote-1 (handles stateful operations like db branches)

version: "3"

vars:
  # ROOT_DIR is local-sandbox/ (parent of tasks/) - same pattern as other taskfiles
  ROOT_DIR:
    sh: cd .. && pwd
  CHARTS_DIR: "{{.ROOT_DIR}}/../operator/public/charts/mirrord-operator"
  APPS_DIR: "{{.ROOT_DIR}}/apps"
  K8S_DIR: "{{.ROOT_DIR}}/k8s"

  # Cluster names default to the local minikube profiles. To override for a
  # different environment (e.g. EKS), pass them as Task variables:
  #   task multicluster:setup:all PRIMARY_CLUSTER=eks-primary REMOTE_CLUSTER_1=eks-remote-1
  # Shell env vars with the same names (e.g. export REMOTE_CLUSTER_1=eks-remote-1)
  # would silently override these defaults, so we read from MC_PRIMARY /
  # MC_REMOTE_1 / MC_REMOTE_2 instead to avoid accidental leaks.
  PRIMARY_CLUSTER: '{{.MC_PRIMARY | default "mirrord-primary"}}'
  REMOTE_CLUSTER_1: '{{.MC_REMOTE_1 | default "mirrord-remote-1"}}'
  REMOTE_CLUSTER_2: '{{.MC_REMOTE_2 | default "mirrord-remote-2"}}'

  # Number of clusters: 2 (primary + 1 remote) or 3 (primary + 2 remotes)
  # Usage: MC_NUM_CLUSTERS=3 task multicluster:setup
  NUM_CLUSTERS: '{{.MC_NUM_CLUSTERS | default "2"}}'

  # If true, primary cluster is management-only (no workloads, only Envoy)
  # Usage: MC_MANAGEMENT_ONLY=true task multicluster:setup
  PRIMARY_MANAGEMENT_ONLY: '{{.MC_MANAGEMENT_ONLY | default "false"}}'

  # Use MC_NAMESPACE to avoid collision with parent Taskfile's NAMESPACE
  MC_NAMESPACE: '{{.MC_NAMESPACE | default "test-multicluster"}}'

  # Directory for multi-cluster config files
  MC_CONFIG_DIR: "{{.ROOT_DIR}}/multicluster"

  OPERATOR_IMAGE: '{{.OPERATOR_IMAGE | default "mirrord-operator:custom"}}'
  AGENT_IMAGE: '{{.AGENT_IMAGE | default "mirrord-agent:custom"}}'
  ECHO_APP_IMAGE: '{{.ECHO_APP_IMAGE | default "echo-app:latest"}}'
  MIRRORD_BIN: '{{.MIRRORD_BIN | default "mirrord"}}'
  CONTAINER_RUNTIME: '{{.CONTAINER_RUNTIME | default "docker"}}'
  # Path to local mirrord repo for building custom agent
  MIRRORD_REPO: '{{.MIRRORD_REPO | default (printf "%s/../mirrord" .ROOT_DIR)}}'

  # Token duration for initial bearer tokens created via `kubectl create token`.
  # Default is 1h. Set to a short value like "10m" to test token expiry and refresh.
  TOKEN_DURATION: '{{.TOKEN_DURATION | default "10m"}}'

tasks:
  clusters:create:
    desc: Create minikube profiles for multi-cluster testing (NUM_CLUSTERS=2 or 3)
    cmds:
      - task: cluster:create
        vars: { CLUSTER: "{{.PRIMARY_CLUSTER}}" }
      - task: cluster:create
        vars: { CLUSTER: "{{.REMOTE_CLUSTER_1}}" }
      - |
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          task multicluster:cluster:create CLUSTER={{.REMOTE_CLUSTER_2}}
        fi
      - 'echo "All clusters created (NUM_CLUSTERS={{.NUM_CLUSTERS}})"'
      - 'echo " - Primary: {{.PRIMARY_CLUSTER}}"'
      - 'echo " - Remote-1: {{.REMOTE_CLUSTER_1}}"'
      - |
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          echo " - Remote-2: {{.REMOTE_CLUSTER_2}}"
        fi

  cluster:create:
    desc: Create a single minikube cluster profile
    vars:
      CLUSTER: "{{.CLUSTER}}"
      MC_CLUSTER_MEMORY: '{{.MC_CLUSTER_MEMORY | default "2048"}}'
      MC_CLUSTER_CPUS: '{{.MC_CLUSTER_CPUS | default "2"}}'
    cmds:
      # Add cluster hostnames to the apiserver cert SANs
      # This allows cross-cluster communication using hostnames + hostAliases
      - |
        APISERVER_NAMES="{{.PRIMARY_CLUSTER}},{{.REMOTE_CLUSTER_1}}"
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          APISERVER_NAMES="$APISERVER_NAMES,{{.REMOTE_CLUSTER_2}}"
        fi
        minikube start -p {{.CLUSTER}} \
          --driver={{.CONTAINER_RUNTIME}} \
          --memory={{.MC_CLUSTER_MEMORY}} \
          --cpus={{.MC_CLUSTER_CPUS}} \
          --disk-size=10g \
          --apiserver-names=$APISERVER_NAMES
      - minikube update-context -p {{.CLUSTER}}
      - |
        # Fix "too many open files" errors in kube-proxy by increasing inotify limits
        # See: https://github.com/kubeflow/manifests/issues/2087
        echo "Configuring inotify limits for {{.CLUSTER}}..."
        minikube ssh -p {{.CLUSTER}} -- "sudo sysctl -w fs.inotify.max_user_instances=1280" || true
        minikube ssh -p {{.CLUSTER}} -- "sudo sysctl -w fs.inotify.max_user_watches=655360" || true
        # Make changes persistent across reboots
        minikube ssh -p {{.CLUSTER}} -- "echo 'fs.inotify.max_user_instances=1280' | sudo tee -a /etc/sysctl.conf" || true
        minikube ssh -p {{.CLUSTER}} -- "echo 'fs.inotify.max_user_watches=655360' | sudo tee -a /etc/sysctl.conf" || true
      - echo "Cluster {{.CLUSTER}} created and context updated"

  clusters:delete:
    desc: Delete all minikube cluster profiles
    cmds:
      - minikube delete -p {{.PRIMARY_CLUSTER}} || true
      - minikube delete -p {{.REMOTE_CLUSTER_1}} || true
      - |
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          minikube delete -p {{.REMOTE_CLUSTER_2}} || true
        fi
      - echo "All clusters deleted"

  clusters:list:
    desc: List all minikube profiles
    cmds:
      - minikube profile list

  clusters:fix:inotify:
    desc: Fix inotify limits on all clusters (fixes "too many open files" in kube-proxy)
    cmds:
      - |
        echo "Fixing inotify limits on all clusters..."
        echo "This addresses 'too many open files' errors in kube-proxy"
        echo "See: https://github.com/kubeflow/manifests/issues/2087"
        echo ""
      - task: cluster:fix:inotify
        vars: { CLUSTER: "{{.PRIMARY_CLUSTER}}" }
      - task: cluster:fix:inotify
        vars: { CLUSTER: "{{.REMOTE_CLUSTER_1}}" }
      - |
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          task multicluster:cluster:fix:inotify CLUSTER={{.REMOTE_CLUSTER_2}}
        fi
      - echo "Inotify limits updated on all clusters"

  cluster:fix:inotify:
    desc: Fix inotify limits on a single cluster
    vars:
      CLUSTER: "{{.CLUSTER}}"
    cmds:
      - |
        echo "Configuring inotify limits for {{.CLUSTER}}..."
        minikube ssh -p {{.CLUSTER}} -- "sudo sysctl -w fs.inotify.max_user_instances=1280" || echo "Failed to set max_user_instances"
        minikube ssh -p {{.CLUSTER}} -- "sudo sysctl -w fs.inotify.max_user_watches=655360" || echo "Failed to set max_user_watches"
        echo "  fs.inotify.max_user_instances=1280"
        echo "  fs.inotify.max_user_watches=655360"

  # =============================================================================
  # Secret-Based Cluster Discovery Setup
  # =============================================================================

  remote:setup:
    desc: Setup remote cluster access (ServiceAccount + RBAC) on all remote clusters
    cmds:
      - |
        echo "Setting up remote cluster access..."
        echo "This creates ServiceAccount + RBAC on remote clusters for primary operator access"
        echo ""
      - task: remote:setup:cluster
        vars: { CLUSTER: "{{.REMOTE_CLUSTER_1}}" }
      - |
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          task multicluster:remote:setup:cluster CLUSTER={{.REMOTE_CLUSTER_2}}
        fi
      - echo "Remote cluster access setup complete"

  remote:setup:cluster:
    desc: Setup a single remote cluster for primary access
    vars:
      CLUSTER: "{{.CLUSTER}}"
    cmds:
      - |
        echo "Setting up {{.CLUSTER}}..."
        kubectl --context {{.CLUSTER}} create namespace mirrord --dry-run=client -o yaml | kubectl --context {{.CLUSTER}} apply -f -

  secrets:create:
    desc: Create cluster credential Secrets on the primary cluster
    cmds:
      - |
        echo "Creating cluster credential Secrets on primary cluster..."
        echo ""

        # Connect Docker networks so primary can reach remote clusters
        echo "Connecting Docker networks..."
        docker network connect mirrord-remote-1 mirrord-primary 2>/dev/null || true
        docker network connect mirrord-primary mirrord-remote-1 2>/dev/null || true
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          docker network connect mirrord-remote-2 mirrord-primary 2>/dev/null || true
          docker network connect mirrord-primary mirrord-remote-2 2>/dev/null || true
        fi

        # Update kubectl contexts - Docker network changes can break port mappings
        echo "Updating kubectl contexts..."
        minikube update-context -p {{.PRIMARY_CLUSTER}} 2>/dev/null || true
        minikube update-context -p {{.REMOTE_CLUSTER_1}} 2>/dev/null || true
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          minikube update-context -p {{.REMOTE_CLUSTER_2}} 2>/dev/null || true
        fi

        # Create namespace
        kubectl --context {{.PRIMARY_CLUSTER}} create namespace mirrord --dry-run=client -o yaml | kubectl --context {{.PRIMARY_CLUSTER}} apply -f -
      - task: secrets:create:cluster
        vars:
          CLUSTER: "{{.REMOTE_CLUSTER_1}}"
          CLUSTER_NAME: "mirrord-remote-1"
          IS_DEFAULT: "true"
      - |
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          task multicluster:secrets:create:cluster CLUSTER={{.REMOTE_CLUSTER_2}} CLUSTER_NAME=mirrord-remote-2 IS_DEFAULT=false
        fi
      - echo ""
      - echo "Cluster credential Secrets created. Verify with:"
      - echo "  kubectl --context {{.PRIMARY_CLUSTER}} get secrets -n mirrord -l operator.metalbear.co/remote-cluster-credentials=true"

  secrets:create:cluster:
    desc: Create a cluster credential Secret for a single remote cluster (auth only)
    vars:
      CLUSTER: "{{.CLUSTER}}" # minikube context (e.g., mirrord-remote-1)
      CLUSTER_NAME: "{{.CLUSTER_NAME}}" # logical name (e.g., remote-1)
      IS_DEFAULT: '{{.IS_DEFAULT | default "false"}}'
    cmds:
      - |
        echo "Creating credential Secret for {{.CLUSTER_NAME}} (from {{.CLUSTER}})..."

        # Get a token for the mirrord-operator-envoy ServiceAccount
        # Note: Cluster config (server, caData) is in ConfigMap via Helm values
        #       This Secret only contains auth credentials (bearerToken)
        TOKEN=$(kubectl --context {{.CLUSTER}} create token mirrord-operator-envoy -n mirrord --duration={{.TOKEN_DURATION}} 2>/dev/null || echo "")
        if [ -z "$TOKEN" ]; then
          echo "  ERROR: Failed to get token. Make sure remote:setup was run first."
          echo "  Debug: Run 'kubectl --context {{.CLUSTER}} get sa -n mirrord' to check ServiceAccount"
          exit 1
        fi
        echo "  Token: (${#TOKEN} chars)"

        # Create the Secret on the primary cluster
        # Only contains auth credentials - cluster config (server, caData) is in ConfigMap
        # Secret name must be: mirrord-cluster-{cluster-name} (naming convention)
        cat <<EOF | kubectl --context {{.PRIMARY_CLUSTER}} apply -f -
        apiVersion: v1
        kind: Secret
        metadata:
          name: mirrord-cluster-{{.CLUSTER_NAME}}
          namespace: mirrord
          labels:
            operator.metalbear.co/remote-cluster-credentials: "true"
        type: Opaque
        stringData:
          bearerToken: "$TOKEN"
        EOF

        echo "  ✓ Secret mirrord-cluster-{{.CLUSTER_NAME}} created (auth credentials only)"

  secrets:delete:
    desc: Delete all cluster credential Secrets from primary cluster
    cmds:
      - kubectl --context {{.PRIMARY_CLUSTER}} delete secrets -n mirrord -l operator.metalbear.co/remote-cluster-credentials=true --ignore-not-found=true
      - echo "Cluster credential Secrets deleted"

  secrets:list:
    desc: List all cluster credential Secrets
    cmds:
      - |
        echo "=== Cluster Credential Secrets ==="
        kubectl --context {{.PRIMARY_CLUSTER}} get secrets -n mirrord -l operator.metalbear.co/remote-cluster-credentials=true
        echo ""
        echo "Details (auth credentials only - cluster config is in ConfigMap):"
        for secret in $(kubectl --context {{.PRIMARY_CLUSTER}} get secrets -n mirrord -l operator.metalbear.co/remote-cluster-credentials=true -o name 2>/dev/null); do
          NAME=$(echo $secret | sed 's|secret/mirrord-cluster-||')
          SERVER=$(kubectl --context {{.PRIMARY_CLUSTER}} get $secret -n mirrord -o jsonpath='{.data.server}' | base64 -d)
          IS_DEFAULT=$(kubectl --context {{.PRIMARY_CLUSTER}} get $secret -n mirrord -o jsonpath='{.data.isDefault}' | base64 -d)
          echo "  $NAME: $SERVER (isDefault: $IS_DEFAULT)"
        done

  secrets:refresh:
    desc: Refresh tokens in cluster credential Secrets (run before they expire)
    cmds:
      - echo "Refreshing tokens in cluster credential Secrets..."
      - task: secrets:create
      - echo "Tokens refreshed"

  test:token:break:
    desc: Break token refresh by deleting the ServiceAccount on remote clusters
    cmds:
      - |
        echo "Deleting mirrord-operator-envoy ServiceAccount on remote clusters..."
        echo "This will cause TokenRequest to fail on the next refresh attempt."
        echo ""
        kubectl --context {{.REMOTE_CLUSTER_1}} delete sa mirrord-operator-envoy -n mirrord --ignore-not-found=true
        echo "  SA deleted on {{.REMOTE_CLUSTER_1}}"
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          kubectl --context {{.REMOTE_CLUSTER_2}} delete sa mirrord-operator-envoy -n mirrord --ignore-not-found=true
          echo "  SA deleted on {{.REMOTE_CLUSTER_2}}"
        fi
        echo ""
        echo "Token refresh will now fail. Watch primary operator logs:"
        echo "  kubectl logs -f -n mirrord -l app.kubernetes.io/name=mirrord-operator --context {{.PRIMARY_CLUSTER}} | grep 'Token refresh'"

  test:token:restore:
    desc: Restore the ServiceAccount on remote clusters (fixes broken token refresh)
    cmds:
      - |
        echo "Recreating mirrord-operator-envoy ServiceAccount on remote clusters..."
        kubectl --context {{.REMOTE_CLUSTER_1}} create sa mirrord-operator-envoy -n mirrord 2>/dev/null || echo "  SA already exists on {{.REMOTE_CLUSTER_1}}"
        echo "  SA restored on {{.REMOTE_CLUSTER_1}}"
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          kubectl --context {{.REMOTE_CLUSTER_2}} create sa mirrord-operator-envoy -n mirrord 2>/dev/null || echo "  SA already exists on {{.REMOTE_CLUSTER_2}}"
          echo "  SA restored on {{.REMOTE_CLUSTER_2}}"
        fi
        echo ""
        echo "Refreshing tokens with new SA..."
      - task: secrets:refresh
      - |
        echo ""
        echo "Restarting primary operator to pick up fresh tokens..."
        kubectl --context {{.PRIMARY_CLUSTER}} delete pod -n mirrord -l app.kubernetes.io/name=mirrord-operator --force --grace-period=0
        kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=mirrord-operator -n mirrord --context {{.PRIMARY_CLUSTER}} --timeout=120s
        echo "Restored. Token refresh should work again."

  test:token:short:
    desc: Recreate Secrets with short-lived tokens (10m) to test expiry quickly
    cmds:
      - |
        echo "Recreating Secrets with 10-minute tokens..."
        echo "The refresh buffer is 5 minutes, so refresh triggers at ~5 min."
        echo "If refresh fails, the token expires at 10 min."
        echo ""
      - task: secrets:create
        vars:
          TOKEN_DURATION: "10m"
      - |
        echo ""
        echo "Restarting primary operator to pick up new tokens..."
        kubectl --context {{.PRIMARY_CLUSTER}} delete pod -n mirrord -l app.kubernetes.io/name=mirrord-operator --force --grace-period=0
        kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=mirrord-operator -n mirrord --context {{.PRIMARY_CLUSTER}} --timeout=120s
        echo ""
        echo "Short-lived tokens active. Watch refresh logs:"
        echo "  kubectl logs -f -n mirrord -l app.kubernetes.io/name=mirrord-operator --context {{.PRIMARY_CLUSTER}} | grep -E '(token|Token)'"

  operator:load:images:
    desc: Load operator image to all clusters (removes old image first)
    cmds:
      # Remove old images first to ensure new image is loaded
      - minikube -p {{.PRIMARY_CLUSTER}} ssh "docker rmi {{.OPERATOR_IMAGE}} --force" 2>/dev/null || true
      - minikube -p {{.REMOTE_CLUSTER_1}} ssh "docker rmi {{.OPERATOR_IMAGE}} --force" 2>/dev/null || true
      - |
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          minikube -p {{.REMOTE_CLUSTER_2}} ssh "docker rmi {{.OPERATOR_IMAGE}} --force" 2>/dev/null || true
        fi
      # Load new images
      - minikube -p {{.PRIMARY_CLUSTER}} image load {{.OPERATOR_IMAGE}}
      - minikube -p {{.REMOTE_CLUSTER_1}} image load {{.OPERATOR_IMAGE}}
      - |
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          minikube -p {{.REMOTE_CLUSTER_2}} image load {{.OPERATOR_IMAGE}}
        fi
      - echo "Image loaded to all clusters (NUM_CLUSTERS={{.NUM_CLUSTERS}})"
  operator:lease:delete:
    desc: Delete leader election leases for operators in all clusters
    cmds:
      - kubectl delete lease mirrord-operator-leader -n mirrord --context {{.PRIMARY_CLUSTER}} 2>/dev/null || true
      - kubectl delete lease mirrord-operator-leader -n mirrord --context {{.REMOTE_CLUSTER_1}} 2>/dev/null || true
      - |
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          kubectl delete lease mirrord-operator-leader -n mirrord --context {{.REMOTE_CLUSTER_2}} 2>/dev/null || true
        fi
      - echo "Leader election leases deleted"
      - echo "Restarting operators..."
      - kubectl delete pods -n mirrord -l app.kubernetes.io/name=mirrord-operator --context {{.PRIMARY_CLUSTER}} --force --grace-period=0 2>/dev/null || true
      - kubectl delete pods -n mirrord -l app.kubernetes.io/name=mirrord-operator --context {{.REMOTE_CLUSTER_1}} --force --grace-period=0 2>/dev/null || true
      - |
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          kubectl delete pods -n mirrord -l app.kubernetes.io/name=mirrord-operator --context {{.REMOTE_CLUSTER_2}} --force --grace-period=0 2>/dev/null || true
        fi
      - echo "Waiting for operators to be ready..."
      - sleep 2
      - kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=mirrord-operator -n mirrord --context {{.PRIMARY_CLUSTER}} --timeout=120s
      - kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=mirrord-operator -n mirrord --context {{.REMOTE_CLUSTER_1}} --timeout=120s
      - |
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=mirrord-operator -n mirrord --context {{.REMOTE_CLUSTER_2}} --timeout=120s
        fi
      - echo "Operators restarted and ready!"
  operator:rebuild:
    desc: Build, load, and restart operators in all clusters (quick update)
    cmds:
      - echo "Building operator image..."
      - |
        cd {{.ROOT_DIR}}/../operator/.. && docker build \
          -f operator/public/operator/Dockerfile \
          -t {{.OPERATOR_IMAGE}} \
          --build-arg OPERATOR_LICENSE_ISSUER_PUBLIC_KEY="$(cat {{.ROOT_DIR}}/scripts/license-issuer.pem)" \
          operator
      - |
        # Verify the binary size is reasonable (should be > 10MB)
        echo "Verifying operator binary size..."
        CONTAINER_ID=$(docker create {{.OPERATOR_IMAGE}})
        docker cp $CONTAINER_ID:/operator-service /tmp/operator-service-check
        docker rm $CONTAINER_ID > /dev/null
        SIZE=$(stat -f%z /tmp/operator-service-check 2>/dev/null || stat -c%s /tmp/operator-service-check 2>/dev/null)
        rm /tmp/operator-service-check
        echo "Binary size: $SIZE bytes"
        if [ "$SIZE" -lt 10000000 ]; then
          echo ""
          echo "ERROR: Binary too small ($SIZE bytes). Build likely failed or used stale cache."
          echo ""
          echo "Try cleaning cache and rebuilding:"
          echo "  docker builder prune -af"
          echo "  docker rmi mirrord-operator:custom --force"
          echo "  task multicluster:operator:rebuild:clean"
          echo ""
          exit 1
        fi
        echo "Binary size OK (>10MB)"
      - echo "Removing old images from clusters (required for minikube to load new image)..."
      - minikube -p {{.PRIMARY_CLUSTER}} ssh "docker rmi {{.OPERATOR_IMAGE}} --force" 2>/dev/null || true
      - minikube -p {{.REMOTE_CLUSTER_1}} ssh "docker rmi {{.OPERATOR_IMAGE}} --force" 2>/dev/null || true
      - |
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          minikube -p {{.REMOTE_CLUSTER_2}} ssh "docker rmi {{.OPERATOR_IMAGE}} --force" 2>/dev/null || true
        fi
      - echo "Loading image to all clusters..."
      - minikube -p {{.PRIMARY_CLUSTER}} image load {{.OPERATOR_IMAGE}}
      - minikube -p {{.REMOTE_CLUSTER_1}} image load {{.OPERATOR_IMAGE}}
      - |
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          minikube -p {{.REMOTE_CLUSTER_2}} image load {{.OPERATOR_IMAGE}}
        fi
      - echo "Deleting leader election leases (speeds up restart)..."
      - kubectl delete lease mirrord-operator-leader -n mirrord --context {{.PRIMARY_CLUSTER}} 2>/dev/null || true
      - kubectl delete lease mirrord-operator-leader -n mirrord --context {{.REMOTE_CLUSTER_1}} 2>/dev/null || true
      - |
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          kubectl delete lease mirrord-operator-leader -n mirrord --context {{.REMOTE_CLUSTER_2}} 2>/dev/null || true
        fi
      - echo "Restarting operators..."
      - kubectl delete pods -n mirrord -l app.kubernetes.io/name=mirrord-operator --context {{.PRIMARY_CLUSTER}} --force --grace-period=0 2>/dev/null || true
      - kubectl delete pods -n mirrord -l app.kubernetes.io/name=mirrord-operator --context {{.REMOTE_CLUSTER_1}} --force --grace-period=0 2>/dev/null || true
      - |
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          kubectl delete pods -n mirrord -l app.kubernetes.io/name=mirrord-operator --context {{.REMOTE_CLUSTER_2}} --force --grace-period=0 2>/dev/null || true
        fi
      - echo "Waiting for operators to be ready..."
      - sleep 2
      - kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=mirrord-operator -n mirrord --context {{.PRIMARY_CLUSTER}} --timeout=120s
      - kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=mirrord-operator -n mirrord --context {{.REMOTE_CLUSTER_1}} --timeout=120s
      - |
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=mirrord-operator -n mirrord --context {{.REMOTE_CLUSTER_2}} --timeout=120s
        fi
      - echo ""
      - echo "=== VERIFICATION ==="
      - |
        # Check operators are actually running (not CrashLoopBackOff)
        echo "Checking operator pod status..."
        sleep 5
        PRIMARY_STATUS=$(kubectl get pods -n mirrord -l app.kubernetes.io/name=mirrord-operator --context {{.PRIMARY_CLUSTER}} -o jsonpath='{.items[0].status.phase}')
        REMOTE1_STATUS=$(kubectl get pods -n mirrord -l app.kubernetes.io/name=mirrord-operator --context {{.REMOTE_CLUSTER_1}} -o jsonpath='{.items[0].status.phase}')
        echo "Primary: $PRIMARY_STATUS"
        echo "Remote-1: $REMOTE1_STATUS"
        if [ "$PRIMARY_STATUS" != "Running" ] || [ "$REMOTE1_STATUS" != "Running" ]; then
          echo "ERROR: Operators not running properly!"
          echo "Primary logs:"
          kubectl logs -n mirrord -l app.kubernetes.io/name=mirrord-operator --context {{.PRIMARY_CLUSTER}} --tail=20
          exit 1
        fi
      - echo "Image age in clusters (should show 'seconds ago' or 'About a minute ago'):"
      - echo "Primary:"
      - minikube -p {{.PRIMARY_CLUSTER}} ssh "docker images {{.OPERATOR_IMAGE}} --format 'table {{ "{{" }}.Repository{{ "}}" }}:{{ "{{" }}.Tag{{ "}}" }} - Created {{ "{{" }}.CreatedSince{{ "}}" }}'"
      - echo "Remote-1:"
      - minikube -p {{.REMOTE_CLUSTER_1}} ssh "docker images {{.OPERATOR_IMAGE}} --format 'table {{ "{{" }}.Repository{{ "}}" }}:{{ "{{" }}.Tag{{ "}}" }} - Created {{ "{{" }}.CreatedSince{{ "}}" }}'"
      - |
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          echo "Remote-2:"
          minikube -p {{.REMOTE_CLUSTER_2}} ssh "docker images {{.OPERATOR_IMAGE}} --format 'table {{ "{{" }}.Repository{{ "}}" }}:{{ "{{" }}.Tag{{ "}}" }} - Created {{ "{{" }}.CreatedSince{{ "}}" }}'"
        fi
      - echo ""
      - echo "All operators updated and running!"

  operator:rebuild:clean:
    desc: Force clean rebuild (clears docker cache) - use when build seems stale
    cmds:
      - |
        echo "=== Clean Rebuild ==="
        echo ""
        echo "If this fails, try manually clearing ALL cache:"
        echo "  docker builder prune -af"
        echo "  docker rmi mirrord-operator:custom --force"
        echo "  task multicluster:operator:rebuild:clean"
        echo ""
      - echo "Cleaning docker build cache for operator..."
      - docker builder prune -f --filter "until=24h" 2>/dev/null || true
      - docker rmi {{.OPERATOR_IMAGE}} --force 2>/dev/null || true
      - echo "Building operator image from scratch (no cache)..."
      - |
        cd {{.ROOT_DIR}}/../operator/.. && docker build \
          -f operator/public/operator/Dockerfile \
          -t {{.OPERATOR_IMAGE}} \
          --no-cache \
          --build-arg OPERATOR_LICENSE_ISSUER_PUBLIC_KEY="$(cat {{.ROOT_DIR}}/scripts/license-issuer.pem)" \
          operator
      - |
        # Verify the binary size is reasonable (should be > 10MB)
        echo "Verifying operator binary size..."
        CONTAINER_ID=$(docker create {{.OPERATOR_IMAGE}})
        docker cp $CONTAINER_ID:/operator-service /tmp/operator-service-check
        docker rm $CONTAINER_ID > /dev/null
        SIZE=$(stat -f%z /tmp/operator-service-check 2>/dev/null || stat -c%s /tmp/operator-service-check 2>/dev/null)
        rm /tmp/operator-service-check
        echo "Binary size: $SIZE bytes"
        if [ "$SIZE" -lt 10000000 ]; then
          echo "ERROR: Binary too small ($SIZE bytes). Build failed."
          exit 1
        fi
        echo "Binary size OK (>10MB)"
      - echo "Removing old images from clusters..."
      - minikube -p {{.PRIMARY_CLUSTER}} ssh "docker rmi {{.OPERATOR_IMAGE}} --force" 2>/dev/null || true
      - minikube -p {{.REMOTE_CLUSTER_1}} ssh "docker rmi {{.OPERATOR_IMAGE}} --force" 2>/dev/null || true
      - |
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          minikube -p {{.REMOTE_CLUSTER_2}} ssh "docker rmi {{.OPERATOR_IMAGE}} --force" 2>/dev/null || true
        fi
      - echo "Loading image to all clusters..."
      - minikube -p {{.PRIMARY_CLUSTER}} image load {{.OPERATOR_IMAGE}}
      - minikube -p {{.REMOTE_CLUSTER_1}} image load {{.OPERATOR_IMAGE}}
      - |
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          minikube -p {{.REMOTE_CLUSTER_2}} image load {{.OPERATOR_IMAGE}}
        fi
      - echo "Restarting operators..."
      - kubectl delete pods -n mirrord -l app.kubernetes.io/name=mirrord-operator --context {{.PRIMARY_CLUSTER}} --force --grace-period=0 2>/dev/null || true
      - kubectl delete pods -n mirrord -l app.kubernetes.io/name=mirrord-operator --context {{.REMOTE_CLUSTER_1}} --force --grace-period=0 2>/dev/null || true
      - |
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          kubectl delete pods -n mirrord -l app.kubernetes.io/name=mirrord-operator --context {{.REMOTE_CLUSTER_2}} --force --grace-period=0 2>/dev/null || true
        fi
      - echo "Waiting for operators to be ready..."
      - sleep 10
      - kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=mirrord-operator -n mirrord --context {{.PRIMARY_CLUSTER}} --timeout=120s
      - kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=mirrord-operator -n mirrord --context {{.REMOTE_CLUSTER_1}} --timeout=120s
      - echo ""
      - echo "=== Clean rebuild complete! ==="

  operator:upgrade:
    desc: Helm upgrade operators in all clusters (applies values changes only, no rebuild)
    cmds:
      - echo "Upgrading operators via helm (values only, no rebuild)..."
      - task: operator:install:remote
      - task: operator:install:primary
      - echo "Restarting operator pods to pick up new values..."
      - kubectl delete pods -n mirrord -l app.kubernetes.io/name=mirrord-operator --context {{.PRIMARY_CLUSTER}} --force --grace-period=0 2>/dev/null || true
      - kubectl delete pods -n mirrord -l app.kubernetes.io/name=mirrord-operator --context {{.REMOTE_CLUSTER_1}} --force --grace-period=0 2>/dev/null || true
      - |
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          kubectl delete pods -n mirrord -l app.kubernetes.io/name=mirrord-operator --context {{.REMOTE_CLUSTER_2}} --force --grace-period=0 2>/dev/null || true
        fi
      - echo "Waiting for operators to be ready..."
      - kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=mirrord-operator -n mirrord --context {{.PRIMARY_CLUSTER}} --timeout=120s
      - kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=mirrord-operator -n mirrord --context {{.REMOTE_CLUSTER_1}} --timeout=120s
      - |
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=mirrord-operator -n mirrord --context {{.REMOTE_CLUSTER_2}} --timeout=120s
        fi
      - echo "All operators upgraded with new values!"

  operator:rebuild:upgrade:
    desc: Build, load, and helm upgrade operators in all clusters (applies chart AND code changes)
    cmds:
      - echo "Building operator image..."
      - |
        cd {{.ROOT_DIR}}/../operator/.. && docker build \
          -f operator/public/operator/Dockerfile \
          -t {{.OPERATOR_IMAGE}} \
          --build-arg OPERATOR_LICENSE_ISSUER_PUBLIC_KEY="$(cat {{.ROOT_DIR}}/scripts/license-issuer.pem)" \
          operator
      - echo "Loading image to all clusters..."
      - task: operator:load:images
      - echo "Upgrading operators via helm..."
      - task: operator:install:remote
      - task: operator:install:primary
      - echo "Deleting leader election leases (speeds up restart)..."
      - kubectl delete lease mirrord-operator-leader -n mirrord --context {{.PRIMARY_CLUSTER}} 2>/dev/null || true
      - kubectl delete lease mirrord-operator-leader -n mirrord --context {{.REMOTE_CLUSTER_1}} 2>/dev/null || true
      - |
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          kubectl delete lease mirrord-operator-leader -n mirrord --context {{.REMOTE_CLUSTER_2}} 2>/dev/null || true
        fi
      - echo "Restarting operator pods to pick up new image..."
      - kubectl delete pods -n mirrord -l app.kubernetes.io/name=mirrord-operator --context {{.PRIMARY_CLUSTER}} --force --grace-period=0 2>/dev/null || true
      - kubectl delete pods -n mirrord -l app.kubernetes.io/name=mirrord-operator --context {{.REMOTE_CLUSTER_1}} --force --grace-period=0 2>/dev/null || true
      - |
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          kubectl delete pods -n mirrord -l app.kubernetes.io/name=mirrord-operator --context {{.REMOTE_CLUSTER_2}} --force --grace-period=0 2>/dev/null || true
        fi
      - echo "Waiting for operators to be ready..."
      - sleep 2
      - kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=mirrord-operator -n mirrord --context {{.PRIMARY_CLUSTER}} --timeout=120s
      - kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=mirrord-operator -n mirrord --context {{.REMOTE_CLUSTER_1}} --timeout=120s
      - |
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=mirrord-operator -n mirrord --context {{.REMOTE_CLUSTER_2}} --timeout=120s
        fi
      - echo "Waiting for operators to acquire leadership and serve API..."
      - |
        # Wait for the operator to actually serve the MirrordOperator API (not just pod ready)
        for i in $(seq 1 30); do
          if kubectl --context {{.PRIMARY_CLUSTER}} get mirrordoperators.operator.metalbear.co operator -o name 2>/dev/null; then
            echo "Primary operator API is ready!"
            break
          fi
          if [ $i -eq 30 ]; then
            echo "Warning: Primary operator API not ready after 30 attempts"
          fi
          sleep 1
        done
      - echo ""
      - echo "=== VERIFICATION ==="
      - echo "Image age in clusters (should show 'seconds ago' or 'About a minute ago'):"
      - echo "Primary:"
      - minikube -p {{.PRIMARY_CLUSTER}} ssh "docker images {{.OPERATOR_IMAGE}} --format 'table {{ "{{" }}.Repository{{ "}}" }}:{{ "{{" }}.Tag{{ "}}" }} - Created {{ "{{" }}.CreatedSince{{ "}}" }}'"
      - echo "Remote-1:"
      - minikube -p {{.REMOTE_CLUSTER_1}} ssh "docker images {{.OPERATOR_IMAGE}} --format 'table {{ "{{" }}.Repository{{ "}}" }}:{{ "{{" }}.Tag{{ "}}" }} - Created {{ "{{" }}.CreatedSince{{ "}}" }}'"
      - |
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          echo "Remote-2:"
          minikube -p {{.REMOTE_CLUSTER_2}} ssh "docker images {{.OPERATOR_IMAGE}} --format 'table {{ "{{" }}.Repository{{ "}}" }}:{{ "{{" }}.Tag{{ "}}" }} - Created {{ "{{" }}.CreatedSince{{ "}}" }}'"
        fi
      - echo ""
      - echo "All operators upgraded and restarted!"

  operator:install:remote:
    desc: Install operator in remote clusters (standard operators, not multi-cluster)
    cmds:
      - |
        # Get LocalStack URL (NodePort on remote-1)
        LOCALSTACK_IP=$(minikube -p {{.REMOTE_CLUSTER_1}} ip)
        LOCALSTACK_URL="http://${LOCALSTACK_IP}:31566"
        echo "LocalStack URL for SQS: $LOCALSTACK_URL"

        # Install on remote-1 (standard operator, NOT multi-cluster)
        echo "Installing operator in {{.REMOTE_CLUSTER_1}}..."
        kubectl --context {{.REMOTE_CLUSTER_1}} create namespace mirrord --dry-run=client -o yaml | kubectl --context {{.REMOTE_CLUSTER_1}} apply -f -
        kubectl --context {{.REMOTE_CLUSTER_1}} create secret generic mirrord-operator-license-pem \
          --from-file=license.pem={{.ROOT_DIR}}/scripts/company-license.pem \
          -n mirrord --dry-run=client -o yaml | kubectl --context {{.REMOTE_CLUSTER_1}} apply -f -

        # Delete old pods first to free up hostNetwork ports
        echo "Deleting old operator pods in {{.REMOTE_CLUSTER_1}}..."
        kubectl --context {{.REMOTE_CLUSTER_1}} delete pods -n mirrord -l app.kubernetes.io/name=mirrord-operator --force --grace-period=0 2>/dev/null || true
        sleep 2

        # Remove hostNetwork from existing deployment if present (conflicts with sysctls in chart)
        kubectl --context {{.REMOTE_CLUSTER_1}} patch deployment mirrord-operator -n mirrord --type=strategic \
          -p '{"spec":{"template":{"spec":{"hostNetwork":null,"dnsPolicy":"ClusterFirst","hostAliases":null}}}}' 2>/dev/null || true

        helm upgrade --install mirrord-operator {{.CHARTS_DIR}} \
          --kube-context {{.REMOTE_CLUSTER_1}} \
          --namespace mirrord \
          -f {{.MC_CONFIG_DIR}}/operator-values-remote.yaml \
          --set operator.image=mirrord-operator \
          --set operator.imageTag=custom \
          --set agent.image={{.AGENT_IMAGE}} \
          --set operator.extraEnv.AWS_ENDPOINT_URL="$LOCALSTACK_URL" \
          --wait

        # Patch deployment with hostNetwork (for local multicluster testing only)
        # Must remove sysctls first (not allowed with hostNetwork)
        echo "Patching operator deployment with hostNetwork..."
        kubectl --context {{.REMOTE_CLUSTER_1}} patch deployment mirrord-operator -n mirrord --type=json -p '[{"op":"remove","path":"/spec/template/spec/securityContext/sysctls"}]' 2>/dev/null || true
        kubectl --context {{.REMOTE_CLUSTER_1}} patch deployment mirrord-operator -n mirrord --type=strategic -p '{"spec":{"template":{"spec":{"hostNetwork":true,"dnsPolicy":"ClusterFirstWithHostNet"}}}}'
        kubectl --context {{.REMOTE_CLUSTER_1}} rollout status deployment/mirrord-operator -n mirrord --timeout=120s
        echo "Operator installed in {{.REMOTE_CLUSTER_1}}"

        # Install on remote-2 if 3 clusters
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          echo "Installing operator in {{.REMOTE_CLUSTER_2}}..."
          kubectl --context {{.REMOTE_CLUSTER_2}} create namespace mirrord --dry-run=client -o yaml | kubectl --context {{.REMOTE_CLUSTER_2}} apply -f -
          kubectl --context {{.REMOTE_CLUSTER_2}} create secret generic mirrord-operator-license-pem \
            --from-file=license.pem={{.ROOT_DIR}}/scripts/company-license.pem \
            -n mirrord --dry-run=client -o yaml | kubectl --context {{.REMOTE_CLUSTER_2}} apply -f -
          
          # Delete old pods first to free up hostNetwork ports
          echo "Deleting old operator pods in {{.REMOTE_CLUSTER_2}}..."
          kubectl --context {{.REMOTE_CLUSTER_2}} delete pods -n mirrord -l app.kubernetes.io/name=mirrord-operator --force --grace-period=0 2>/dev/null || true
          sleep 2
          
          # Remove hostNetwork from existing deployment if present (conflicts with sysctls in chart)
          kubectl --context {{.REMOTE_CLUSTER_2}} patch deployment mirrord-operator -n mirrord --type=strategic \
            -p '{"spec":{"template":{"spec":{"hostNetwork":null,"dnsPolicy":"ClusterFirst","hostAliases":null}}}}' 2>/dev/null || true
          
          helm upgrade --install mirrord-operator {{.CHARTS_DIR}} \
            --kube-context {{.REMOTE_CLUSTER_2}} \
            --namespace mirrord \
            -f {{.MC_CONFIG_DIR}}/operator-values-remote.yaml \
            --set operator.image=mirrord-operator \
            --set operator.imageTag=custom \
            --set agent.image={{.AGENT_IMAGE}} \
            --set operator.extraEnv.AWS_ENDPOINT_URL="$LOCALSTACK_URL" \
            --wait
          
          # Patch deployment with hostNetwork (for local multicluster testing only)
          # Must remove sysctls first (not allowed with hostNetwork)
          echo "Patching operator deployment with hostNetwork..."
          kubectl --context {{.REMOTE_CLUSTER_2}} patch deployment mirrord-operator -n mirrord --type=json -p '[{"op":"remove","path":"/spec/template/spec/securityContext/sysctls"}]' 2>/dev/null || true
          kubectl --context {{.REMOTE_CLUSTER_2}} patch deployment mirrord-operator -n mirrord --type=strategic -p '{"spec":{"template":{"spec":{"hostNetwork":true,"dnsPolicy":"ClusterFirstWithHostNet"}}}}'
          kubectl --context {{.REMOTE_CLUSTER_2}} rollout status deployment/mirrord-operator -n mirrord --timeout=120s
          echo "Operator installed in {{.REMOTE_CLUSTER_2}}"
        fi

  operator:install:primary:
    desc: Install operator in primary cluster with multi-cluster enabled (ConfigMap + Secrets)
    cmds:
      # Run setup sequentially (deps run in parallel which breaks secrets:create)
      - task: remote:setup
      - task: secrets:create
      - |
        echo "Installing operator in {{.PRIMARY_CLUSTER}} with multi-cluster..."
        echo "  NUM_CLUSTERS={{.NUM_CLUSTERS}}"
        echo "  Discovery: ConfigMap (cluster config) + Secrets (auth credentials)"

        # Get Docker network IPs for hostAliases
        PRIMARY_IP=$(docker inspect {{.PRIMARY_CLUSTER}} --format '{{`{{index .NetworkSettings.Networks "mirrord-primary" "IPAddress"}}`}}')
        REMOTE1_IP=$(docker inspect {{.REMOTE_CLUSTER_1}} --format '{{`{{range $k, $v := .NetworkSettings.Networks}}{{if eq $k "mirrord-primary"}}{{$v.IPAddress}}{{end}}{{end}}`}}')
        echo "  Host aliases: {{.PRIMARY_CLUSTER}}=$PRIMARY_IP, {{.REMOTE_CLUSTER_1}}=$REMOTE1_IP"

        REMOTE2_IP=""
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          REMOTE2_IP=$(docker inspect {{.REMOTE_CLUSTER_2}} --format '{{`{{range $k, $v := .NetworkSettings.Networks}}{{if eq $k "mirrord-primary"}}{{$v.IPAddress}}{{end}}{{end}}`}}')
          echo "                {{.REMOTE_CLUSTER_2}}=$REMOTE2_IP"
        fi

        # Select values file based on NUM_CLUSTERS
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          VALUES_FILE="{{.MC_CONFIG_DIR}}/operator-values-multicluster-3-clusters.yaml"
        else
          VALUES_FILE="{{.MC_CONFIG_DIR}}/operator-values-multicluster-2-clusters.yaml"
        fi
        echo "  Using values file: $VALUES_FILE"

        # Create namespace and license secret first
        kubectl --context {{.PRIMARY_CLUSTER}} create namespace mirrord --dry-run=client -o yaml | kubectl --context {{.PRIMARY_CLUSTER}} apply -f -
        kubectl --context {{.PRIMARY_CLUSTER}} create secret generic mirrord-operator-license-pem \
          --from-file=license.pem={{.ROOT_DIR}}/scripts/company-license.pem \
          -n mirrord --dry-run=client -o yaml | kubectl --context {{.PRIMARY_CLUSTER}} apply -f -

        # Get LocalStack URL (NodePort on remote-1)
        LOCALSTACK_IP=$(minikube -p {{.REMOTE_CLUSTER_1}} ip)
        LOCALSTACK_URL="http://${LOCALSTACK_IP}:31566"
        echo "  LocalStack URL: $LOCALSTACK_URL"

        # Get cluster config for remote-1 (server URL and CA data)
        # Server uses cluster hostname for TLS cert validation (resolved via hostAliases)
        REMOTE1_SERVER="https://{{.REMOTE_CLUSTER_1}}:8443"
        REMOTE1_CA=$(kubectl config view --raw -o jsonpath='{.clusters[?(@.name=="{{.REMOTE_CLUSTER_1}}")].cluster.certificate-authority-data}' 2>/dev/null)
        if [ -z "$REMOTE1_CA" ]; then
          CA_FILE=$(kubectl config view --raw -o jsonpath='{.clusters[?(@.name=="{{.REMOTE_CLUSTER_1}}")].cluster.certificate-authority}' 2>/dev/null)
          if [ -n "$CA_FILE" ] && [ -f "$CA_FILE" ]; then
            REMOTE1_CA=$(base64 < "$CA_FILE" | tr -d '\n')
          fi
        fi
        echo "  remote-1: server=$REMOTE1_SERVER, caData=${#REMOTE1_CA} bytes"

        # Get cluster config for remote-2 if 3 clusters
        REMOTE2_SERVER=""
        REMOTE2_CA=""
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          REMOTE2_SERVER="https://{{.REMOTE_CLUSTER_2}}:8443"
          REMOTE2_CA=$(kubectl config view --raw -o jsonpath='{.clusters[?(@.name=="{{.REMOTE_CLUSTER_2}}")].cluster.certificate-authority-data}' 2>/dev/null)
          if [ -z "$REMOTE2_CA" ]; then
            CA_FILE=$(kubectl config view --raw -o jsonpath='{.clusters[?(@.name=="{{.REMOTE_CLUSTER_2}}")].cluster.certificate-authority}' 2>/dev/null)
            if [ -n "$CA_FILE" ] && [ -f "$CA_FILE" ]; then
              REMOTE2_CA=$(base64 < "$CA_FILE" | tr -d '\n')
            fi
          fi
          echo "  remote-2: server=$REMOTE2_SERVER, caData=${#REMOTE2_CA} bytes"
        fi

        # Delete old pods first to free up hostNetwork ports
        echo "Deleting old operator pods in {{.PRIMARY_CLUSTER}}..."
        kubectl --context {{.PRIMARY_CLUSTER}} delete pods -n mirrord -l app.kubernetes.io/name=mirrord-operator --force --grace-period=0 2>/dev/null || true
        sleep 2

        # Remove hostNetwork from existing deployment if present (conflicts with sysctls in chart)
        echo "Removing hostNetwork from existing deployment (if present)..."
        kubectl --context {{.PRIMARY_CLUSTER}} patch deployment mirrord-operator -n mirrord --type=strategic \
          -p '{"spec":{"template":{"spec":{"hostNetwork":null,"dnsPolicy":"ClusterFirst","hostAliases":null}}}}' 2>/dev/null || true

        # Build helm command with cluster config passed via --set
        # Cluster config goes to ConfigMap, auth credentials are in Secrets (created separately)
        HELM_ARGS=(
          upgrade --install mirrord-operator {{.CHARTS_DIR}}
          --kube-context {{.PRIMARY_CLUSTER}}
          --namespace mirrord
          -f "$VALUES_FILE"
          --set operator.image=mirrord-operator
          --set operator.imageTag=custom
          --set agent.image={{.AGENT_IMAGE}}
          --set "operator.extraEnv.AWS_ENDPOINT_URL=$LOCALSTACK_URL"
          --set "operator.multiCluster.clusters.mirrord-remote-1.server=$REMOTE1_SERVER"
          --set "operator.multiCluster.clusters.mirrord-remote-1.caData=$REMOTE1_CA"
          --wait
        )

        # Add remote-2 cluster config if 3 clusters
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          HELM_ARGS+=(
            --set "operator.multiCluster.clusters.mirrord-remote-2.server=$REMOTE2_SERVER"
            --set "operator.multiCluster.clusters.mirrord-remote-2.caData=$REMOTE2_CA"
          )
        fi

        helm "${HELM_ARGS[@]}"

        # Patch deployment with hostNetwork and hostAliases (for local multicluster testing only)
        # Must remove sysctls first (not allowed with hostNetwork)
        echo "Patching operator deployment with hostNetwork and hostAliases..."

        # Build hostAliases JSON array
        HOST_ALIASES="[{\"ip\":\"$PRIMARY_IP\",\"hostnames\":[\"{{.PRIMARY_CLUSTER}}\"]},{\"ip\":\"$REMOTE1_IP\",\"hostnames\":[\"{{.REMOTE_CLUSTER_1}}\"]}]"
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          HOST_ALIASES="[{\"ip\":\"$PRIMARY_IP\",\"hostnames\":[\"{{.PRIMARY_CLUSTER}}\"]},{\"ip\":\"$REMOTE1_IP\",\"hostnames\":[\"{{.REMOTE_CLUSTER_1}}\"]},{\"ip\":\"$REMOTE2_IP\",\"hostnames\":[\"{{.REMOTE_CLUSTER_2}}\"]}]"
        fi

        kubectl --context {{.PRIMARY_CLUSTER}} patch deployment mirrord-operator -n mirrord --type=json -p '[{"op":"remove","path":"/spec/template/spec/securityContext/sysctls"}]' 2>/dev/null || true
        kubectl --context {{.PRIMARY_CLUSTER}} patch deployment mirrord-operator -n mirrord --type=strategic -p "{\"spec\":{\"template\":{\"spec\":{\"hostNetwork\":true,\"dnsPolicy\":\"ClusterFirstWithHostNet\",\"hostAliases\":$HOST_ALIASES}}}}"

        # Wait for rollout to complete after patch
        kubectl --context {{.PRIMARY_CLUSTER}} rollout status deployment/mirrord-operator -n mirrord --timeout=120s

        echo ""
        echo "Operator installed in {{.PRIMARY_CLUSTER}} with multi-cluster ({{.NUM_CLUSTERS}} clusters)"
        echo ""
        echo "Cluster credential Secrets:"
        kubectl --context {{.PRIMARY_CLUSTER}} get secrets -n mirrord -l operator.metalbear.co/remote-cluster-credentials=true --no-headers

  operator:install:all:
    desc: Install operator in all clusters
    cmds:
      - task: operator:install:remote
      - task: operator:install:primary

  agent:build:
    desc: Build custom mirrord-agent image from local mirrord repo
    cmds:
      - |
        echo "=== Building custom mirrord-agent image ==="
        echo "Source: {{.MIRRORD_REPO}}"
        echo "Image: {{.AGENT_IMAGE}}"
        echo ""

        if [ ! -d "{{.MIRRORD_REPO}}/mirrord/agent" ]; then
          echo "ERROR: mirrord repo not found at {{.MIRRORD_REPO}}"
          echo "Set MIRRORD_REPO to point to your local mirrord checkout"
          exit 1
        fi

        cd {{.MIRRORD_REPO}}
        docker build -t {{.AGENT_IMAGE}} -f mirrord/agent/Dockerfile .
      - echo "Agent image built {{.AGENT_IMAGE}}"

  agent:load:
    desc: Load custom agent image to all clusters
    cmds:
      - echo "Removing old agent images from clusters..."
      - minikube -p {{.PRIMARY_CLUSTER}} ssh "docker rmi {{.AGENT_IMAGE}} --force" 2>/dev/null || true
      - minikube -p {{.REMOTE_CLUSTER_1}} ssh "docker rmi {{.AGENT_IMAGE}} --force" 2>/dev/null || true
      - |
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          minikube -p {{.REMOTE_CLUSTER_2}} ssh "docker rmi {{.AGENT_IMAGE}} --force" 2>/dev/null || true
        fi
      - echo "Loading agent image to all clusters..."
      - minikube -p {{.PRIMARY_CLUSTER}} image load {{.AGENT_IMAGE}}
      - minikube -p {{.REMOTE_CLUSTER_1}} image load {{.AGENT_IMAGE}}
      - |
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          minikube -p {{.REMOTE_CLUSTER_2}} image load {{.AGENT_IMAGE}}
        fi
      - echo "Agent image loaded to all clusters (NUM_CLUSTERS={{.NUM_CLUSTERS}})"

  agent:rebuild:
    desc: Build and load custom agent image to all clusters
    cmds:
      - task: agent:build
      - task: agent:load
      - echo ""
      - echo "=== Agent image updated ==="
      - echo "Now restart operators to use new agent:"
      - echo "  task multicluster:operator:upgrade"

  rebuild:all:
    desc: Rebuild and reload both operator and agent (use after protocol changes)
    cmds:
      - |
        echo "=== Rebuilding Operator and Agent ==="
        echo "This is required after protocol changes (e.g., adding hostname field)"
        echo ""
      - task: agent:build
      - task: operator:rebuild
      - task: agent:load
      - echo ""
      - echo "=== All components updated ==="
      - echo "Both operator and agent now use the latest code"

  apps:deploy:
    desc: Deploy test applications to all clusters
    cmds:
      - task: app:deploy
        vars:
          {
            CLUSTER: "{{.PRIMARY_CLUSTER}}",
            APP_NAME: "nginx-primary",
            REPLICAS: "2",
          }
      - task: app:deploy
        vars:
          {
            CLUSTER: "{{.REMOTE_CLUSTER_1}}",
            APP_NAME: "nginx-remote-1",
            REPLICAS: "2",
          }
      - task: app:deploy:remote-2
      - echo "Test apps deployed to all clusters (NUM_CLUSTERS={{.NUM_CLUSTERS}})"

  app:deploy:remote-2:
    internal: true
    status:
      - test "{{.NUM_CLUSTERS}}" != "3"
    cmds:
      - task: app:deploy
        vars:
          {
            CLUSTER: "{{.REMOTE_CLUSTER_2}}",
            APP_NAME: "nginx-remote-2",
            REPLICAS: "2",
          }

  app:deploy:
    internal: true
    desc: Deploy a test application to a cluster
    vars:
      CLUSTER: "{{.CLUSTER}}"
      APP_NAME: "{{.APP_NAME}}"
      REPLICAS: '{{.REPLICAS | default "1"}}'
    cmds:
      - |
        kubectl --context {{.CLUSTER}} create namespace {{.MC_NAMESPACE}} --dry-run=client -o yaml | kubectl --context {{.CLUSTER}} apply -f -

        cat <<EOF | kubectl --context {{.CLUSTER}} apply -f -
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: {{.APP_NAME}}
          namespace: {{.MC_NAMESPACE}}
          labels:
            app: {{.APP_NAME}}
        spec:
          replicas: {{.REPLICAS}}
          selector:
            matchLabels:
              app: {{.APP_NAME}}
          template:
            metadata:
              labels:
                app: {{.APP_NAME}}
            spec:
              containers:
              - name: nginx
                image: nginx:alpine
                ports:
                - containerPort: 80
                env:
                - name: CLUSTER_NAME
                  value: "{{.CLUSTER}}"
        ---
        apiVersion: v1
        kind: Service
        metadata:
          name: {{.APP_NAME}}
          namespace: {{.MC_NAMESPACE}}
        spec:
          selector:
            app: {{.APP_NAME}}
          ports:
          - port: 80
            targetPort: 80
        EOF
        echo "App {{.APP_NAME}} deployed to {{.CLUSTER}}"

  apps:delete:
    desc: Delete test applications from all clusters
    cmds:
      - kubectl --context {{.PRIMARY_CLUSTER}} delete namespace {{.MC_NAMESPACE}} --ignore-not-found=true
      - kubectl --context {{.REMOTE_CLUSTER_1}} delete namespace {{.MC_NAMESPACE}} --ignore-not-found=true
      - |
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          kubectl --context {{.REMOTE_CLUSTER_2}} delete namespace {{.MC_NAMESPACE}} --ignore-not-found=true
        fi
      - echo "Test apps deleted from all clusters"

  test:verify:clusters:
    desc: Verify all clusters are running
    cmds:
      - minikube update-context -p {{.PRIMARY_CLUSTER}} 2>/dev/null || true
      - minikube update-context -p {{.REMOTE_CLUSTER_1}} 2>/dev/null || true
      - |
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          minikube update-context -p {{.REMOTE_CLUSTER_2}} 2>/dev/null || true
        fi
      - kubectl --context {{.PRIMARY_CLUSTER}} cluster-info
      - kubectl --context {{.REMOTE_CLUSTER_1}} cluster-info
      - |
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          kubectl --context {{.REMOTE_CLUSTER_2}} cluster-info
        fi
      - echo "All clusters verified"

  test:verify:operator:
    desc: Verify operator is running in all clusters
    cmds:
      - kubectl --context {{.PRIMARY_CLUSTER}} get pods -n mirrord -l app=mirrord-operator
      - kubectl --context {{.REMOTE_CLUSTER_1}} get pods -n mirrord -l app=mirrord-operator
      - echo "Operators verified"

  test:verify:apps:
    desc: Verify test apps are running
    cmds:
      - kubectl --context {{.PRIMARY_CLUSTER}} get pods -n {{.MC_NAMESPACE}}
      - kubectl --context {{.REMOTE_CLUSTER_1}} get pods -n {{.MC_NAMESPACE}}
      - echo "Apps verified"

  test:crds:
    desc: Test multi-cluster CRD creation
    vars:
      K8S_DIR: "{{.SANDBOX_DIR}}/k8s/multicluster"
    cmds:
      - kubectl --context {{.PRIMARY_CLUSTER}} apply -f {{.K8S_DIR}}/test-session.yaml
      - echo "Test multi-cluster session created"
      - kubectl --context {{.PRIMARY_CLUSTER}} get mirrordmulticlustersessions -n {{.MC_NAMESPACE}}

  test:crds:delete:
    desc: Delete test CRDs
    cmds:
      - kubectl --context {{.PRIMARY_CLUSTER}} delete mirrordmulticlustersessions --all -n {{.MC_NAMESPACE}} --ignore-not-found=true
      - echo "Test CRDs deleted"

  logs:primary:
    desc: Show operator logs from primary cluster
    cmds:
      - kubectl --context {{.PRIMARY_CLUSTER}} logs -n mirrord -l app=mirrord-operator --tail=100 -f

  logs:remote1:
    desc: Show operator logs from remote cluster 1
    cmds:
      - kubectl --context {{.REMOTE_CLUSTER_1}} logs -n mirrord -l app=mirrord-operator --tail=100 -f

  logs:remote2:
    desc: Show operator logs from remote cluster 2
    cmds:

  setup:all:clean:
    desc: Clean setup - teardown existing environment and setup from scratch
    cmds:
      - task: teardown:all
      - sleep 2
      - task: setup:all

  setup:all:with-databases:clean:
    desc: Complete setup with PostgreSQL and MySQL databases
    cmds:
      - task: teardown:all
      - sleep 2
      - task: setup:all:with-databases
      - echo ""
      - echo "Databases also deployed! Use 'task multicluster:databases:status' to check"

  setup:all:with-databases:
    desc: Complete setup with PostgreSQL and MySQL databases
    cmds:
      - task: setup:all
      - task: databases:deploy
      - echo ""
      - echo "Databases also deployed! Use 'task multicluster:databases:status' to check"

  setup:all:with-pubsub:clean:
    desc: Clean setup with Pub/Sub emulator for queue splitting tests
    cmds:
      - task: teardown:all
      - sleep 2
      - task: setup:all:with-pubsub
      - echo ""
      - echo "=== Pub/Sub Setup Complete ==="
      - echo ""
      - echo "Single session:"
      - echo "  task multicluster:pubsub:test:split"
      - echo ""
      - echo "Multi-session (print instructions then run in separate terminals):"
      - echo "  task multicluster:pubsub:test:two-sessions"
      - echo "  task multicluster:pubsub:test:three-sessions"
      - echo "  task multicluster:pubsub:test:three-sessions:all-different"
      - echo ""
      - echo "Send messages:"
      - echo "  task multicluster:pubsub:send:match"
      - echo "  task multicluster:pubsub:send:nomatch"
      - echo "  task multicluster:pubsub:send:beta"
      - echo "  task multicluster:pubsub:send:gamma"
      - echo "  task multicluster:pubsub:send:all-tenants"
      - echo "  task multicluster:pubsub:send:flood COUNT=20"

  setup:all:with-pubsub:
    desc: Complete setup with Pub/Sub emulator for queue splitting tests
    cmds:
      - task: setup:all
      - task: pubsub:setup
      - echo ""
      - echo "Pub/Sub setup complete! Use 'task multicluster:pubsub:status' to check"

  setup:all:with-sqs:clean:
    desc: Clean setup with SQS (LocalStack) for queue splitting tests
    cmds:
      - task: teardown:all
      - sleep 2
      - task: setup:all:with-sqs
      - echo ""
      - echo "=== SQS Setup Complete (Single LocalStack) ==="
      - echo ""
      - echo "All clusters share one LocalStack on the primary cluster."
      - echo ""
      - echo "To test SQS splitting:"
      - echo "  task multicluster:sqs:send FILTERED=2 UNFILTERED=2"

  setup:all:with-sqs:
    desc: Complete setup with SQS (LocalStack) for queue splitting tests
    cmds:
      - task: setup:all
      - task: sqs:setup:single
      - echo ""
      - echo "SQS setup complete! Use 'task multicluster:sqs:status' to check"

  setup:all:with-sqs:single:clean:
    desc: Clean setup with single shared SQS (matches production - all clusters share one SQS)
    cmds:
      - task: teardown:all
      - sleep 2
      - task: setup:all:with-sqs:single
      - echo ""
      - echo "=== Single SQS Setup Complete ==="
      - echo ""
      - echo "All clusters share one LocalStack on the default cluster."
      - echo "This matches production where all clusters share AWS SQS."
      - echo ""
      - echo "To test SQS splitting:"
      - 'echo "  Terminal 1: task multicluster:sqs:send:messages:single"'
      - 'echo "  Terminal 2: task multicluster:test:sqs:split:multi-cluster"'

  setup:all:with-sqs:single:
    desc: Complete setup with single shared SQS (matches production)
    cmds:
      - task: setup:all
      - task: sqs:setup:single
      - echo ""
      - echo "Single-SQS setup complete! All clusters share one LocalStack."
      - echo "Use 'task multicluster:sqs:status' to check"

  setup:all:with-copy-target:clean:
    desc: Clean setup with echo-apps for copy_target tests
    cmds:
      - task: teardown:all
      - sleep 2
      - task: setup:all:with-copy-target
      - echo ""
      - echo "=== Copy Target Setup Complete ==="
      - echo ""
      - echo "To test copy_target:"
      - echo "  Terminal 1 task multicluster:test:copy-target:watch"
      - echo "  Terminal 2 task multicluster:test:copy-target:basic"

  setup:all:with-copy-target:
    desc: Complete setup with echo-apps for copy_target tests
    cmds:
      - task: setup:all
      - task: test:deploy:echo-apps
      - echo ""
      - echo "Copy target setup complete!"
      - echo "Echo apps deployed to all clusters."

  setup:all:with-all:clean:
    desc: Clean setup with everything (databases, SQS, echo-apps)
    cmds:
      - task: teardown:all
      - sleep 2
      - task: setup:all:with-all
      - echo ""
      - echo "=== Full Setup Complete ==="
      - echo "All features ready for testing!"

  setup:all:with-all:
    desc: Complete setup with everything (databases, SQS, echo-apps)
    cmds:
      - task: setup:all
      - task: databases:deploy
      - task: sqs:setup
      - task: test:deploy:echo-apps
      - echo ""
      - echo "Full setup complete!"
      - echo "  - Databases task multicluster:databases:status"
      - echo "  - SQS task multicluster:sqs:status"
      - echo "  - Echo apps deployed to all clusters"

  update:sqs:
    desc: Add/refresh SQS resources (LocalStack + consumer) - no clean
    cmds:
      - echo "Adding/refreshing SQS resources..."
      - task: sqs:setup
      - echo ""
      - echo "SQS updated! Status:"
      - task: sqs:status

  update:copy-target:
    desc: Add/refresh echo-apps for copy_target testing - no clean
    cmds:
      - echo "Adding/refreshing echo-apps..."
      - task: test:deploy:echo-apps
      - echo ""
      - echo "Echo apps updated!"

  update:databases:
    desc: Add/refresh databases (PostgreSQL + MySQL) - no clean
    cmds:
      - echo "Adding/refreshing databases..."
      - task: databases:deploy
      - echo ""
      - echo "Databases updated! Status:"
      - task: databases:status

  update:operator:
    desc: Rebuild and reload operator in all clusters - no clean
    cmds:
      - echo "Rebuilding and reloading operator..."
      - task: operator:rebuild
      - echo ""
      - echo "Operator updated!"

  update:agent:
    desc: Rebuild and reload agent in all clusters - no clean
    cmds:
      - echo "Rebuilding and reloading agent..."
      - task: agent:rebuild
      - task: operator:upgrade
      - echo ""
      - echo "Agent updated and operators restarted to use new agent!"

  update:protocol:
    desc: Rebuild both operator and agent (required after protocol changes)
    cmds:
      - echo "Rebuilding operator and agent after protocol changes..."
      - task: rebuild:all
      - echo ""
      - echo "Protocol update complete!"

  update:all:
    desc: Refresh all resources (operator, agent, databases, SQS, echo-apps) - no clean
    cmds:
      - echo "Refreshing all resources..."
      - task: agent:rebuild
      - task: operator:rebuild
      - task: databases:deploy
      - task: sqs:setup
      - task: test:deploy:echo-apps
      - echo ""
      - echo "All resources updated!"

  setup:all:
    desc: Complete multi-cluster setup from scratch (Secret-based discovery)
    cmds:
      - |
        echo "=== Multi-Cluster Setup ==="
        echo "  NUM_CLUSTERS={{.NUM_CLUSTERS}}"
        echo "  Discovery: Secret-based"
        echo ""
      - task: clusters:create
      - echo "Waiting for clusters to be ready..."
      - sleep 5
      - task: test:verify:clusters
      # Agent image must be built separately (requires GHCR auth):
      #   task multicluster:agent:rebuild
      - task: agent:load
      - task: operator:load:images
      - task: operator:install:all
      - echo "Waiting for operators to be ready..."
      - sleep 10
      - task: test:verify:operator
      - task: apps:deploy
      - echo "Waiting for apps to be ready..."
      - sleep 5
      - task: test:verify:apps
      - echo ""
      - echo "Setting kubectl context to primary cluster ({{.PRIMARY_CLUSTER}})..."
      - kubectl config use-context {{.PRIMARY_CLUSTER}}
      - echo ""
      - echo "=== Multi-Cluster Setup Complete ==="
      - echo ""
      - echo "Cluster Credential Secrets:"
      - kubectl --context {{.PRIMARY_CLUSTER}} get secrets -n mirrord -l operator.metalbear.co/remote-cluster-credentials=true --no-headers
      - echo ""
      - echo "To test multi-cluster sessions:"
      - echo "  task multicluster:test:crds"
      - echo ""
      - echo "To refresh tokens (if they expire):"
      - echo "  task multicluster:secrets:refresh"

  teardown:all:
    desc: Teardown entire multi-cluster environment
    cmds:
      - task: clusters:delete
      - echo "Multi-cluster environment torn down"

  status:
    desc: Show status of multi-cluster environment
    cmds:
      - |
        echo "=== Clusters ==="
        minikube profile list 2>/dev/null | grep -E "mirrord-primary|mirrord-remote" || echo "No mirrord clusters found"
        echo ""

        echo "=== Operators ==="
        echo "Primary:"
        kubectl --context {{.PRIMARY_CLUSTER}} get pods -n mirrord -l app=mirrord-operator --no-headers 2>/dev/null || echo "  Not running"
        echo "Remote-1:"
        kubectl --context {{.REMOTE_CLUSTER_1}} get pods -n mirrord -l app=mirrord-operator --no-headers 2>/dev/null || echo "  Not running"
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          echo "Remote-2:"
          kubectl --context {{.REMOTE_CLUSTER_2}} get pods -n mirrord -l app=mirrord-operator --no-headers 2>/dev/null || echo "  Not running"
        fi
        echo ""

        echo "=== Apps ({{.MC_NAMESPACE}}) ==="
        MGMT_ONLY="{{.PRIMARY_MANAGEMENT_ONLY}}"
        if [ "$MGMT_ONLY" != "true" ]; then
          echo "Primary:"
          kubectl --context {{.PRIMARY_CLUSTER}} get pods -n {{.MC_NAMESPACE}} --no-headers 2>/dev/null || echo "  No apps"
        else
          echo "Primary: (management-only, no workloads)"
        fi
        echo "Remote-1:"
        kubectl --context {{.REMOTE_CLUSTER_1}} get pods -n {{.MC_NAMESPACE}} --no-headers 2>/dev/null || echo "  No apps"
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          echo "Remote-2:"
          kubectl --context {{.REMOTE_CLUSTER_2}} get pods -n {{.MC_NAMESPACE}} --no-headers 2>/dev/null || echo "  No apps"
        fi
        echo ""

        echo "=== Sessions ==="
        echo "MultiClusterSessions:"
        kubectl --context {{.PRIMARY_CLUSTER}} get mirrordmulticlustersessions -A --no-headers 2>/dev/null || echo "  None"
        echo "ClusterSessions (remote-1):"
        kubectl --context {{.REMOTE_CLUSTER_1}} get mirrordclustersessions -A --no-headers 2>/dev/null || echo "  None"

  shell:primary:
    desc: Switch kubectl context to primary cluster
    cmds:
      - kubectl config use-context {{.PRIMARY_CLUSTER}}
      - echo "Switched to {{.PRIMARY_CLUSTER}}"

  shell:remote1:
    desc: Switch kubectl context to remote cluster 1
    cmds:
      - kubectl config use-context {{.REMOTE_CLUSTER_1}}
      - echo "Switched to {{.REMOTE_CLUSTER_1}}"

  shell:remote2:
    desc: Switch kubectl context to remote cluster 2
    cmds:

  echo-app:build:
    desc: Build the Go echo-app for multi-cluster testing
    cmds:
      - |
        echo "Building echo-app..."
        cd {{.APPS_DIR}}/echo-app
        docker build -t {{.ECHO_APP_IMAGE}} .
        echo "echo-app built as {{.ECHO_APP_IMAGE}}"

  echo-app:load:
    desc: Load echo-app image to all clusters (with build)
    deps: [echo-app:build]
    cmds:
      - minikube -p {{.PRIMARY_CLUSTER}} image load {{.ECHO_APP_IMAGE}}
      - minikube -p {{.REMOTE_CLUSTER_1}} image load {{.ECHO_APP_IMAGE}}
      - |
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          minikube -p {{.REMOTE_CLUSTER_2}} image load {{.ECHO_APP_IMAGE}}
        fi
      - echo "echo-app image loaded to all clusters (NUM_CLUSTERS={{.NUM_CLUSTERS}})"

  echo-app:load:all:
    desc: Load echo-app image to all clusters (no rebuild)
    cmds:
      - minikube -p {{.PRIMARY_CLUSTER}} image load {{.ECHO_APP_IMAGE}}
      - minikube -p {{.REMOTE_CLUSTER_1}} image load {{.ECHO_APP_IMAGE}}
      - |
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          minikube -p {{.REMOTE_CLUSTER_2}} image load {{.ECHO_APP_IMAGE}}
        fi
      - echo "echo-app image loaded to all clusters (NUM_CLUSTERS={{.NUM_CLUSTERS}})"

  test:deploy:echo-apps:
    desc: Deploy echo apps to all clusters with cluster-specific IDs
    deps: [echo-app:load:all]
    cmds:
      - |
        MGMT_ONLY="{{.PRIMARY_MANAGEMENT_ONLY}}"

        # Deploy to primary only if not management-only
        if [ "$MGMT_ONLY" != "true" ]; then
          echo "Deploying echo-app to {{.PRIMARY_CLUSTER}}..."
          kubectl --context {{.PRIMARY_CLUSTER}} apply -k {{.K8S_DIR}}/overlays/multicluster-primary
        else
          echo "Skipping {{.PRIMARY_CLUSTER}} (management-only mode)"
        fi
      - kubectl --context {{.REMOTE_CLUSTER_1}} apply -k {{.K8S_DIR}}/overlays/multicluster-remote-1
      - |
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          # Create remote-2 overlay if it doesn't exist
          if [ ! -d "{{.K8S_DIR}}/overlays/multicluster-remote-2" ]; then
            mkdir -p {{.K8S_DIR}}/overlays/multicluster-remote-2
            cat > {{.K8S_DIR}}/overlays/multicluster-remote-2/kustomization.yaml << 'EOF'
        apiVersion: kustomize.config.k8s.io/v1beta1
        kind: Kustomization
        resources:
          - ../../base/echo-app
        namespace: test-multicluster
        patches:
          - patch: |-
              - op: replace
                path: /spec/template/spec/containers/0/env/0/value
                value: "REMOTE-2"
            target:
              kind: Deployment
              name: echo-app
        EOF
          fi
          kubectl --context {{.REMOTE_CLUSTER_2}} apply -k {{.K8S_DIR}}/overlays/multicluster-remote-2
        fi
      - |
        MGMT_ONLY="{{.PRIMARY_MANAGEMENT_ONLY}}"
        if [ "$MGMT_ONLY" = "true" ]; then
          echo "Echo apps deployed to remote clusters only (PRIMARY_MANAGEMENT_ONLY=true)"
        else
          echo "Echo apps deployed to all clusters (NUM_CLUSTERS={{.NUM_CLUSTERS}})"
        fi

  test:delete:echo-apps:
    desc: Delete echo apps from all clusters
    cmds:
      - kubectl --context {{.PRIMARY_CLUSTER}} delete -k {{.K8S_DIR}}/overlays/multicluster-primary --ignore-not-found=true
      - kubectl --context {{.REMOTE_CLUSTER_1}} delete -k {{.K8S_DIR}}/overlays/multicluster-remote-1 --ignore-not-found=true
      - |
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          kubectl --context {{.REMOTE_CLUSTER_2}} delete -k {{.K8S_DIR}}/overlays/multicluster-remote-2 --ignore-not-found=true
        fi
      - echo "Echo apps deleted from all clusters"

  test:generate:traffic:
    desc: Generate traffic to echo-apps in all clusters (NO filter header)
    cmds:
      - |
        MGMT_ONLY="{{.PRIMARY_MANAGEMENT_ONLY}}"
        echo "Generating traffic (NUM_CLUSTERS={{.NUM_CLUSTERS}})..."
        echo "NO filter header - this traffic should NOT be stolen with http_filter"
        echo "Press Ctrl+C to stop"
        echo ""

        i=1
        while true; do
          echo "--- Round $i ---"
          
          # Traffic to primary (only if not management-only)
          if [ "$MGMT_ONLY" != "true" ]; then
            echo -n "PRIMARY: "
            kubectl --context {{.PRIMARY_CLUSTER}} exec -n {{.MC_NAMESPACE}} deploy/echo-app -- \
              wget -q -O- http://echo-app:8080/echo?from=primary 2>/dev/null | head -1 || echo "failed"
          fi
          
          # Traffic to remote-1
          echo -n "REMOTE-1: "
          kubectl --context {{.REMOTE_CLUSTER_1}} exec -n {{.MC_NAMESPACE}} deploy/echo-app -- \
            wget -q -O- http://echo-app:8080/echo?from=remote-1 2>/dev/null | head -1 || echo "failed"
          
          # Traffic to remote-2 (only if NUM_CLUSTERS=3)
          if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
            echo -n "REMOTE-2: "
            kubectl --context {{.REMOTE_CLUSTER_2}} exec -n {{.MC_NAMESPACE}} deploy/echo-app -- \
              wget -q -O- http://echo-app:8080/echo?from=remote-2 2>/dev/null | head -1 || echo "failed"
          fi
          
          echo ""
          i=$((i + 1))
          sleep 2
        done

  test:generate:traffic:burst:
    desc: Generate a burst of traffic to all clusters (for quick testing)
    cmds:
      - |
        MGMT_ONLY="{{.PRIMARY_MANAGEMENT_ONLY}}"
        echo "Sending burst of 10 requests to each cluster..."
        echo "  NUM_CLUSTERS={{.NUM_CLUSTERS}}, PRIMARY_MANAGEMENT_ONLY=$MGMT_ONLY"
        echo ""

        for i in $(seq 1 10); do
          # Primary only if not management-only
          if [ "$MGMT_ONLY" != "true" ]; then
            kubectl --context {{.PRIMARY_CLUSTER}} exec -n {{.MC_NAMESPACE}} deploy/echo-app -- \
              wget -q -O- "http://echo-app:8080/echo?req=$i" 2>/dev/null &
          fi
          kubectl --context {{.REMOTE_CLUSTER_1}} exec -n {{.MC_NAMESPACE}} deploy/echo-app -- \
            wget -q -O- "http://echo-app:8080/echo?req=$i" 2>/dev/null &
          if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
            kubectl --context {{.REMOTE_CLUSTER_2}} exec -n {{.MC_NAMESPACE}} deploy/echo-app -- \
              wget -q -O- "http://echo-app:8080/echo?req=$i" 2>/dev/null &
          fi
        done

        wait
        echo "Burst complete"

  test:steal:single-cluster:
    desc: Test stealing traffic from a single cluster (baseline test)
    cmds:
      - |
        echo "=== Single-Cluster Traffic Steal Test ==="
        echo ""
        echo "Target: echo-app in {{.PRIMARY_CLUSTER}}"
        echo "This tests the baseline single-cluster behavior."
        echo ""
        echo "In another terminal, run:"
        echo "  task multicluster:test:generate:traffic"
        echo ""
        echo "You should see requests ONLY from PRIMARY cluster."
        echo ""

        cd {{.APPS_DIR}}/echo-app
        {{.MIRRORD_BIN}} exec \
          --context {{.REMOTE_CLUSTER_1}} \
          --target deploy/echo-app \
          --target-namespace {{.MC_NAMESPACE}} \
          --steal \
          -- ./echo-app

  test:steal:multi-cluster:
    desc: Test stealing traffic from multiple clusters via Envoy aggregation
    cmds:
      - |
        echo "=== Multi-Cluster Traffic Steal Test ==="
        echo ""
        echo "Connecting to PRIMARY cluster: {{.PRIMARY_CLUSTER}}"
        echo "Envoy should aggregate traffic from:"
        echo "  - {{.PRIMARY_CLUSTER}} (PRIMARY)"
        echo "  - {{.REMOTE_CLUSTER_1}} (REMOTE-1)"
        echo "  - {{.REMOTE_CLUSTER_2}} (REMOTE-2)"
        echo ""
        echo "In another terminal, run:"
        echo "  task multicluster:test:generate:traffic"
        echo ""
        echo "You should see requests from ALL clusters!"
        echo ""

        cd {{.APPS_DIR}}/echo-app
        {{.MIRRORD_BIN}} exec \
          --target deploy/echo-app \
          --context {{.PRIMARY_CLUSTER}} \
          --target-namespace {{.MC_NAMESPACE}} \
          --steal \
          -- ./echo-app

  test:steal:multi-cluster:with-config:
    desc: Test with mirrord config file (includes HTTP filter)
    cmds:
      - |
        echo "=== Multi-Cluster Traffic Steal with Config ==="
        echo ""
        echo "Using config: mirrord-local.json"
        echo "HTTP Filter: X-My-Header: filtered-data"
        echo ""
        echo "To test filtering, use:"
        echo "  task multicluster:test:generate:traffic:filtered   # SHOULD be stolen"
        echo "  task multicluster:test:generate:traffic            # Should NOT be stolen"
        echo ""

        cd {{.APPS_DIR}}/echo-app
        {{.MIRRORD_BIN}} exec \
          --context {{.PRIMARY_CLUSTER}} \
          -f mirrord-local-no-container.json \
          -- ./echo-app

  test:generate:traffic:filtered:
    desc: Generate traffic with X-My-Header header (for filter testing)
    cmds:
      - |
        echo "Generating FILTERED traffic (with X-My-Header: filtered-data)..."
        echo "This traffic SHOULD be stolen when using http_filter"
        echo "Press Ctrl+C to stop"
        echo ""

        i=1
        while true; do
          echo "--- Round $i (FILTERED) ---"
          
          # Traffic to primary with filter header
          echo -n "PRIMARY (filtered): "
          kubectl --context {{.PRIMARY_CLUSTER}} exec -n {{.MC_NAMESPACE}} deploy/echo-app -- \
            wget -q -O- --header="X-My-Header: filtered-data" --header="X-Source-Cluster: PRIMARY" \
            http://echo-app:8080/echo?from=filtered 2>/dev/null | head -1 || echo "failed"
          
          # Traffic to remote-1 with filter header
          echo -n "REMOTE-1 (filtered): "
          kubectl --context {{.REMOTE_CLUSTER_1}} exec -n {{.MC_NAMESPACE}} deploy/echo-app -- \
            wget -q -O- --header="X-My-Header: filtered-data" --header="X-Source-Cluster: REMOTE-1" \
            http://echo-app:8080/echo?from=filtered 2>/dev/null | head -1 || echo "failed"
          
          if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
            echo -n "REMOTE-2 (filtered): "
            kubectl --context {{.REMOTE_CLUSTER_2}} exec -n {{.MC_NAMESPACE}} deploy/echo-app -- \
              wget -q -O- --header="X-My-Header: filtered-data" --header="X-Source-Cluster: REMOTE-2" \
              http://echo-app:8080/echo?from=filtered 2>/dev/null | head -1 || echo "failed"
          fi
          
          echo ""
          i=$((i + 1))
          sleep 2
        done

  test:generate:traffic:mixed:
    desc: Generate mixed traffic (some filtered, some not) for filter testing
    cmds:
      - |
        echo "Generating MIXED traffic..."
        echo "  - With X-My-Header: filtered-data -> SHOULD be stolen"
        echo "  - Without header -> Should NOT be stolen"
        echo "Press Ctrl+C to stop"
        echo ""

        i=1
        while true; do
          echo "--- Round $i ---"
          
          # Filtered traffic (should be stolen)
          echo -n "FILTERED (primary): "
          kubectl --context {{.PRIMARY_CLUSTER}} exec -n {{.MC_NAMESPACE}} deploy/echo-app -- \
            wget -q -O- --header="X-My-Header: filtered-data" \
            http://echo-app:8080/echo?type=filtered 2>/dev/null | head -1 || echo "failed"
          
          # Non-filtered traffic (should NOT be stolen)
          echo -n "NON-FILTERED (primary): "
          kubectl --context {{.PRIMARY_CLUSTER}} exec -n {{.MC_NAMESPACE}} deploy/echo-app -- \
            wget -q -O- http://echo-app:8080/echo?type=non-filtered 2>/dev/null | head -1 || echo "failed"
          
          echo ""
          i=$((i + 1))
          sleep 2
        done

  test:verify:operator-status:
    desc: Verify operator multi-cluster configuration
    cmds:
      - |
        echo "=== Operator Status in Primary Cluster ==="
        kubectl --context {{.PRIMARY_CLUSTER}} get mirrordoperators -o yaml 2>/dev/null || \
          echo "MirrordOperator CRD not found"

        echo ""
        echo "=== Operator Pod Env Vars (multi-cluster related) ==="
        kubectl --context {{.PRIMARY_CLUSTER}} get pods -n mirrord -l app=mirrord-operator \
          -o jsonpath='{range .items[0].spec.containers[0].env[*]}{.name}={.value}{"\n"}{end}' 2>/dev/null | \
          grep -iE "(multi|cluster|primary|default)" || echo "No multi-cluster env vars found"

        echo ""
        echo "=== Operator Logs (last 30 lines) ==="
        kubectl --context {{.PRIMARY_CLUSTER}} logs -n mirrord -l app=mirrord-operator --tail=30

  test:watch:sessions:
    desc: Watch MirrordMultiClusterSessions
    cmds:
      - kubectl --context {{.PRIMARY_CLUSTER}} get mirrordmulticlustersessions -A -w

  test:watch:cluster-sessions:
    desc: Show MirrordClusterSessions in all clusters
    cmds:
      - |
        echo "=== Cluster Sessions in Primary ==="
        kubectl --context {{.PRIMARY_CLUSTER}} get mirrordclustersessions -A 2>/dev/null || echo "None"

        echo ""
        echo "=== Cluster Sessions in Remote-1 ==="
        kubectl --context {{.REMOTE_CLUSTER_1}} get mirrordclustersessions -A 2>/dev/null || echo "None"

        echo ""
        echo "=== Cluster Sessions in Remote-2 ==="

  test:copy-target:status:
    desc: Show all CRDs involved in a copy target session across clusters
    cmds:
      - |
        # MC session on the primary - orchestrates the whole flow
        echo "=== Primary: MC Sessions ==="
        kubectl --context {{.PRIMARY_CLUSTER}} get mirrordmulticlustersessions -A -o wide 2>/dev/null || echo "  (none)"
        echo ""

        for ctx in {{.PRIMARY_CLUSTER}} {{.REMOTE_CLUSTER_1}} {{.REMOTE_CLUSTER_2}}; do
          [ -z "$ctx" ] && continue
          echo "=== $ctx: Child Sessions ==="
          # Child session on default cluster owns the copy pod
          # Child scaledown sessions on downstream clusters own the patch request
          kubectl --context $ctx get mirrordclustersessions -A -o wide 2>/dev/null || echo "  (none)"
          echo ""

          echo "=== $ctx: Copy Pod ==="
          # The copied pod where the mirrord agent runs
          kubectl --context $ctx get pods -A -l operator.metalbear.co/resource-type=copy-target -o wide 2>/dev/null || echo "  (none)"
          echo ""

          echo "=== $ctx: Scaledown Patch Requests ==="
          # Triggers replica scaledown on downstream clusters
          kubectl --context $ctx get mirrordclusterworkloadpatchrequests -A -o wide 2>/dev/null || echo "  (none)"
          echo ""

          echo "=== $ctx: SQS Sessions ==="
          # Manages queue splitting (only present with SQS config)
          kubectl --context $ctx get mirrordsqssessions -A -o wide 2>/dev/null || echo "  (none)"
          echo ""
        done

  test:cleanup:sessions:
    desc: Clean up all test sessions
    cmds:
      - kubectl --context {{.PRIMARY_CLUSTER}} delete mirrordmulticlustersessions --all -A --ignore-not-found=true
      - kubectl --context {{.PRIMARY_CLUSTER}} delete mirrordclustersessions --all -A --ignore-not-found=true
      - kubectl --context {{.REMOTE_CLUSTER_1}} delete mirrordclustersessions --all -A --ignore-not-found=true
      - |
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          kubectl --context {{.REMOTE_CLUSTER_2}} delete mirrordclustersessions --all -A --ignore-not-found=true
        fi
      - echo "All sessions cleaned up"

  test:cleanup:resources:
    desc: Delete leftover test deployments, services, and copy pods across all clusters
    cmds:
      - |
        for ctx in {{.PRIMARY_CLUSTER}} {{.REMOTE_CLUSTER_1}}; do
          echo "=== Cleaning $ctx ==="
          kubectl --context $ctx delete deployments,services -n {{.MC_NAMESPACE}} -l mirrord-e2e-test-resource=true --ignore-not-found=true --wait=false
          kubectl --context $ctx delete pods -n {{.MC_NAMESPACE}} -l operator.metalbear.co/resource-type=copy-target --ignore-not-found=true --wait=false
        done
      - |
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          echo "=== Cleaning {{.REMOTE_CLUSTER_2}} ==="
          kubectl --context {{.REMOTE_CLUSTER_2}} delete deployments,services -n {{.MC_NAMESPACE}} -l mirrord-e2e-test-resource=true --ignore-not-found=true --wait=false
          kubectl --context {{.REMOTE_CLUSTER_2}} delete pods -n {{.MC_NAMESPACE}} -l operator.metalbear.co/resource-type=copy-target --ignore-not-found=true --wait=false
        fi
      - echo "All leftover test resources cleaned up"

  test:cleanup:all:
    desc: Clean up all test sessions and leftover resources
    cmds:
      - task: test:cleanup:sessions
      - task: test:cleanup:resources

  test:full:
    desc: Run full multi-cluster test setup
    cmds:
      - |
        MGMT_ONLY="{{.PRIMARY_MANAGEMENT_ONLY}}"
        echo "=== MULTI-CLUSTER TEST SUITE ==="
        echo "  NUM_CLUSTERS={{.NUM_CLUSTERS}}, PRIMARY_MANAGEMENT_ONLY=$MGMT_ONLY"
        echo ""
      - task: test:verify:clusters
      - task: test:verify:operator
      - task: test:deploy:echo-apps
      - echo "Waiting for echo apps to be ready..."
      - |
        MGMT_ONLY="{{.PRIMARY_MANAGEMENT_ONLY}}"
        if [ "$MGMT_ONLY" != "true" ]; then
          kubectl --context {{.PRIMARY_CLUSTER}} wait --for=condition=available deploy/echo-app -n {{.MC_NAMESPACE}} --timeout=60s
        fi
      - kubectl --context {{.REMOTE_CLUSTER_1}} wait --for=condition=available deploy/echo-app -n {{.MC_NAMESPACE}} --timeout=60s
      - |
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          kubectl --context {{.REMOTE_CLUSTER_2}} wait --for=condition=available deploy/echo-app -n {{.MC_NAMESPACE}} --timeout=60s
        fi
      - echo ""
      - task: test:verify:operator-status
      - echo ""
      - echo "=== Test Environment Ready ==="
      - echo ""
      - echo "To test multi-cluster traffic stealing:"
      - echo ""
      - echo "1. Terminal 1 - Generate traffic:"
      - echo "   task multicluster:test:generate:traffic"
      - echo ""
      - echo "2. Terminal 2 - Steal from single cluster (baseline):"
      - echo "   task multicluster:test:steal:single-cluster"
      - echo ""
      - echo "3. Terminal 2 - Steal from all clusters (multi-cluster):"
      - echo "   task multicluster:test:steal:multi-cluster"
      - echo ""
      - |
        MGMT_ONLY="{{.PRIMARY_MANAGEMENT_ONLY}}"
        if [ "$MGMT_ONLY" = "true" ]; then
          echo "Mode: PRIMARY_MANAGEMENT_ONLY - traffic comes from remote clusters only"
        elif [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          echo "Compare the output - multi-cluster should show traffic from all 3 clusters!"
        else
          echo "Compare the output - multi-cluster should show traffic from both clusters!"
        fi

  test:e2e:
    desc: Run automated end-to-end multi-cluster test
    cmds:
      - |
        MGMT_ONLY="{{.PRIMARY_MANAGEMENT_ONLY}}"
        echo "=== Automated E2E Multi-Cluster Test ==="
        echo "  NUM_CLUSTERS={{.NUM_CLUSTERS}}, PRIMARY_MANAGEMENT_ONLY=$MGMT_ONLY"
        echo ""

        # Ensure apps are deployed
        task multicluster:test:deploy:echo-apps

        echo "Waiting for apps to be ready..."
        if [ "$MGMT_ONLY" != "true" ]; then
          kubectl --context {{.PRIMARY_CLUSTER}} wait --for=condition=available deploy/echo-app -n {{.MC_NAMESPACE}} --timeout=60s
        fi
        kubectl --context {{.REMOTE_CLUSTER_1}} wait --for=condition=available deploy/echo-app -n {{.MC_NAMESPACE}} --timeout=60s
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          kubectl --context {{.REMOTE_CLUSTER_2}} wait --for=condition=available deploy/echo-app -n {{.MC_NAMESPACE}} --timeout=60s
        fi

        echo ""
        echo "Verifying apps respond with correct cluster IDs..."

        if [ "$MGMT_ONLY" != "true" ]; then
          echo -n "PRIMARY responds: "
          kubectl --context {{.PRIMARY_CLUSTER}} exec -n {{.MC_NAMESPACE}} deploy/echo-app -- \
            wget -q -O- http://localhost:8080/info 2>/dev/null | grep -o '"cluster_id":"[^"]*"'
        else
          echo "PRIMARY: (management-only, no workloads)"
        fi

        echo -n "REMOTE-1 responds: "
        kubectl --context {{.REMOTE_CLUSTER_1}} exec -n {{.MC_NAMESPACE}} deploy/echo-app -- \
          wget -q -O- http://localhost:8080/info 2>/dev/null | grep -o '"cluster_id":"[^"]*"'

        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          echo -n "REMOTE-2 responds: "
          kubectl --context {{.REMOTE_CLUSTER_2}} exec -n {{.MC_NAMESPACE}} deploy/echo-app -- \
            wget -q -O- http://localhost:8080/info 2>/dev/null | grep -o '"cluster_id":"[^"]*"'
        fi

        echo ""
        echo "E2E test complete. Apps are correctly deployed with cluster-specific IDs."
        echo ""
        echo "Next steps:"
        echo "  1. Run: task multicluster:test:generate:traffic (in background)"
        echo "  2. Run: task multicluster:test:steal:multi-cluster"
        if [ "$MGMT_ONLY" = "true" ]; then
          echo "  3. Verify you see traffic from remote clusters only (primary is management-only)"
        elif [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          echo "  3. Verify you see traffic from all 3 clusters"
        else
          echo "  3. Verify you see traffic from both clusters"
        fi

  # =============================================================================
  # Database Deployments for Multi-Cluster Testing
  # =============================================================================

  postgres:deploy:
    desc: Deploy PostgreSQL to ALL clusters (to verify routing uses correct default cluster)
    cmds:
      - |
        echo "Deploying PostgreSQL to ALL clusters..."
        echo "(This verifies routing correctly uses default cluster even when DB exists in primary)"

        # Always deploy to primary (for testing routing logic)
        echo "Deploying to {{.PRIMARY_CLUSTER}}..."
        # kubectl --context {{.PRIMARY_CLUSTER}} create namespace {{.MC_NAMESPACE}} --dry-run=client -o yaml | kubectl --context {{.PRIMARY_CLUSTER}} apply -f -
        # kubectl --context {{.PRIMARY_CLUSTER}} apply -k {{.K8S_DIR}}/overlays/multicluster-postgres

        echo "Deploying to {{.REMOTE_CLUSTER_1}}..."
        kubectl --context {{.REMOTE_CLUSTER_1}} create namespace {{.MC_NAMESPACE}} --dry-run=client -o yaml | kubectl --context {{.REMOTE_CLUSTER_1}} apply -f -
        kubectl --context {{.REMOTE_CLUSTER_1}} apply -k {{.K8S_DIR}}/overlays/multicluster-postgres

        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          echo "Deploying to {{.REMOTE_CLUSTER_2}}..."
          kubectl --context {{.REMOTE_CLUSTER_2}} create namespace {{.MC_NAMESPACE}} --dry-run=client -o yaml | kubectl --context {{.REMOTE_CLUSTER_2}} apply -f -
          kubectl --context {{.REMOTE_CLUSTER_2}} apply -k {{.K8S_DIR}}/overlays/multicluster-postgres
        fi

        echo "PostgreSQL deployed to ALL clusters"

  postgres:delete:
    desc: Delete PostgreSQL from all clusters
    cmds:
      - kubectl --context {{.PRIMARY_CLUSTER}} delete -k {{.K8S_DIR}}/overlays/multicluster-postgres --ignore-not-found=true || true
      - kubectl --context {{.REMOTE_CLUSTER_1}} delete -k {{.K8S_DIR}}/overlays/multicluster-postgres --ignore-not-found=true || true
      - |
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          kubectl --context {{.REMOTE_CLUSTER_2}} delete -k {{.K8S_DIR}}/overlays/multicluster-postgres --ignore-not-found=true || true
        fi
      - echo "PostgreSQL deleted from all clusters"

  postgres:wait:
    desc: Wait for PostgreSQL to be ready in all clusters
    cmds:
      - |
        MGMT_ONLY="{{.PRIMARY_MANAGEMENT_ONLY}}"
        echo "Waiting for PostgreSQL to be ready..."

        if [ "$MGMT_ONLY" != "true" ]; then
          echo "Waiting on {{.PRIMARY_CLUSTER}}..."
          kubectl --context {{.PRIMARY_CLUSTER}} wait --for=condition=ready pod/postgres-test -n {{.MC_NAMESPACE}} --timeout=120s || true
        fi

        echo "Waiting on {{.REMOTE_CLUSTER_1}}..."
        kubectl --context {{.REMOTE_CLUSTER_1}} wait --for=condition=ready pod/postgres-test -n {{.MC_NAMESPACE}} --timeout=120s || true

        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          echo "Waiting on {{.REMOTE_CLUSTER_2}}..."
          kubectl --context {{.REMOTE_CLUSTER_2}} wait --for=condition=ready pod/postgres-test -n {{.MC_NAMESPACE}} --timeout=120s || true
        fi

        echo "PostgreSQL is ready"

  mysql:deploy:
    desc: Deploy MySQL to ALL clusters (to verify routing uses correct default cluster)
    cmds:
      - |
        echo "Deploying MySQL to ALL clusters..."
        echo "(This verifies routing correctly uses default cluster even when DB exists in primary)"

        # Always deploy to primary (for testing routing logic)
        echo "Deploying to {{.PRIMARY_CLUSTER}}..."
        kubectl --context {{.PRIMARY_CLUSTER}} create namespace {{.MC_NAMESPACE}} --dry-run=client -o yaml | kubectl --context {{.PRIMARY_CLUSTER}} apply -f -
        kubectl --context {{.PRIMARY_CLUSTER}} apply -k {{.K8S_DIR}}/overlays/multicluster-mysql

        echo "Deploying to {{.REMOTE_CLUSTER_1}}..."
        kubectl --context {{.REMOTE_CLUSTER_1}} create namespace {{.MC_NAMESPACE}} --dry-run=client -o yaml | kubectl --context {{.REMOTE_CLUSTER_1}} apply -f -
        kubectl --context {{.REMOTE_CLUSTER_1}} apply -k {{.K8S_DIR}}/overlays/multicluster-mysql

        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          echo "Deploying to {{.REMOTE_CLUSTER_2}}..."
          kubectl --context {{.REMOTE_CLUSTER_2}} create namespace {{.MC_NAMESPACE}} --dry-run=client -o yaml | kubectl --context {{.REMOTE_CLUSTER_2}} apply -f -
          kubectl --context {{.REMOTE_CLUSTER_2}} apply -k {{.K8S_DIR}}/overlays/multicluster-mysql
        fi

        echo "MySQL deployed to ALL clusters"

  mysql:delete:
    desc: Delete MySQL from all clusters
    cmds:
      - kubectl --context {{.PRIMARY_CLUSTER}} delete -k {{.K8S_DIR}}/overlays/multicluster-mysql --ignore-not-found=true || true
      - kubectl --context {{.REMOTE_CLUSTER_1}} delete -k {{.K8S_DIR}}/overlays/multicluster-mysql --ignore-not-found=true || true
      - |
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          kubectl --context {{.REMOTE_CLUSTER_2}} delete -k {{.K8S_DIR}}/overlays/multicluster-mysql --ignore-not-found=true || true
        fi
      - echo "MySQL deleted from all clusters"

  mysql:wait:
    desc: Wait for MySQL to be ready in all clusters
    cmds:
      - |
        MGMT_ONLY="{{.PRIMARY_MANAGEMENT_ONLY}}"
        echo "Waiting for MySQL to be ready..."

        if [ "$MGMT_ONLY" != "true" ]; then
          echo "Waiting on {{.PRIMARY_CLUSTER}}..."
          kubectl --context {{.PRIMARY_CLUSTER}} wait --for=condition=available deploy/mysql -n {{.MC_NAMESPACE}} --timeout=120s || true
        fi

        echo "Waiting on {{.REMOTE_CLUSTER_1}}..."
        kubectl --context {{.REMOTE_CLUSTER_1}} wait --for=condition=available deploy/mysql -n {{.MC_NAMESPACE}} --timeout=120s || true

        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          echo "Waiting on {{.REMOTE_CLUSTER_2}}..."
          kubectl --context {{.REMOTE_CLUSTER_2}} wait --for=condition=available deploy/mysql -n {{.MC_NAMESPACE}} --timeout=120s || true
        fi

        echo "MySQL is ready"

  databases:deploy:
    desc: Deploy both PostgreSQL and MySQL to all clusters
    cmds:
      - task: postgres:deploy
      - task: mysql:deploy
      - task: postgres:wait
      - task: mysql:wait
      - echo "All databases deployed and ready"

  databases:delete:
    desc: Delete both PostgreSQL and MySQL from all clusters
    cmds:
      - task: postgres:delete
      - task: mysql:delete
      - echo "All databases deleted"

  databases:status:
    desc: Show database status in all clusters
    cmds:
      - |
        MGMT_ONLY="{{.PRIMARY_MANAGEMENT_ONLY}}"
        echo "=== Database Status ==="
        echo ""

        if [ "$MGMT_ONLY" != "true" ]; then
          echo "--- {{.PRIMARY_CLUSTER}} ---"
          kubectl --context {{.PRIMARY_CLUSTER}} get pods -n {{.MC_NAMESPACE}} -l 'app in (postgres-test, mysql)' 2>/dev/null || echo "No databases"
        else
          echo "--- {{.PRIMARY_CLUSTER}} (management-only) ---"
          echo "No workloads deployed"
        fi

        echo ""
        echo "--- {{.REMOTE_CLUSTER_1}} ---"
        kubectl --context {{.REMOTE_CLUSTER_1}} get pods -n {{.MC_NAMESPACE}} -l 'app in (postgres-test, mysql)' 2>/dev/null || echo "No databases"

        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          echo ""
          echo "--- {{.REMOTE_CLUSTER_2}} ---"
          kubectl --context {{.REMOTE_CLUSTER_2}} get pods -n {{.MC_NAMESPACE}} -l 'app in (postgres-test, mysql)' 2>/dev/null || echo "No databases"
        fi

  # =============================================================================
  # Run Database Apps with mirrord (Multi-Cluster)
  # =============================================================================

  postgres:run:
    desc: Run postgres-app locally with mirrord (multi-cluster mode)
    cmds:
      - |
        echo "=== PostgreSQL App (Multi-Cluster) ==="
        echo "Target: postgres-test in {{.MC_NAMESPACE}}"
        echo "Note: Connects to primary operator, routes stateful ops to default cluster"
        echo ""

        cd {{.APPS_DIR}}/postgres-app
        echo "Building postgres-app..."
        go build -o /tmp/postgres-app main.go

        echo "Running with mirrord..."
        # Primary operator routes stateful operations (db branches) to the default cluster
        {{.MIRRORD_BIN}} exec \
          --context {{.PRIMARY_CLUSTER}} \
          -f {{.K8S_DIR}}/overlays/multicluster-postgres/mirrord.json \
          -- /tmp/postgres-app

  postgres:deploy:primary:
    desc: Deploy PostgreSQL to the primary cluster (needed for single-cluster-in-MC tests)
    cmds:
      - |
        echo "Deploying PostgreSQL to {{.PRIMARY_CLUSTER}} for single-cluster-in-MC testing..."
        kubectl --context {{.PRIMARY_CLUSTER}} create namespace {{.MC_NAMESPACE}} --dry-run=client -o yaml | kubectl --context {{.PRIMARY_CLUSTER}} apply -f -
        kubectl --context {{.PRIMARY_CLUSTER}} apply -k {{.K8S_DIR}}/overlays/multicluster-postgres
        echo "Waiting for PostgreSQL to be ready on primary..."
        kubectl --context {{.PRIMARY_CLUSTER}} wait pod/postgres-test -n {{.MC_NAMESPACE}} --for=condition=Ready --timeout=120s
        echo "PostgreSQL ready on primary cluster"

  postgres:run:single-cluster:
    desc: Run postgres-app with multi_cluster=false (single-cluster session on primary)
    cmds:
      - |
        echo "=== PostgreSQL App (Single-Cluster on MC Primary) ==="
        echo "Target: postgres-test in {{.MC_NAMESPACE}} on {{.PRIMARY_CLUSTER}}"
        echo "Config: multi_cluster=false - forces single-cluster session"
        echo ""

        cd {{.APPS_DIR}}/postgres-app
        echo "Building postgres-app..."
        go build -o /tmp/postgres-app main.go

        echo "Running with mirrord (single-cluster mode)..."
        {{.MIRRORD_BIN}} exec \
          --context {{.PRIMARY_CLUSTER}} \
          -f {{.K8S_DIR}}/overlays/multicluster-postgres/mirrord-single-cluster.json \
          -- /tmp/postgres-app

  test:single-cluster:postgres:
    desc: Full test - deploy DB to primary and run postgres-app with multi_cluster=false
    cmds:
      - task: postgres:deploy:primary
      - task: postgres:run:single-cluster

  test:single-cluster:verify:
    desc: Verify single-cluster branch CRDs have the skip-sync label on primary
    cmds:
      - |
        echo "=== Verifying Single-Cluster Branch CRDs ==="
        echo ""
        echo "BranchDatabase CRDs on primary ({{.PRIMARY_CLUSTER}}):"
        kubectl --context {{.PRIMARY_CLUSTER}} get branchdatabase -n {{.MC_NAMESPACE}} -o wide 2>/dev/null || echo "(none found)"
        echo ""
        echo "Checking for skip-mc-sync label:"
        kubectl --context {{.PRIMARY_CLUSTER}} get branchdatabase -n {{.MC_NAMESPACE}} \
          -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.metadata.labels.operator\.metalbear\.co/skip-mc-sync}{"\n"}{end}' 2>/dev/null || echo "(no CRDs)"
        echo ""
        echo "BranchDatabase CRDs on remote-1 ({{.REMOTE_CLUSTER_1}}) - should be empty for single-cluster branches:"
        kubectl --context {{.REMOTE_CLUSTER_1}} get branchdatabase -n {{.MC_NAMESPACE}} -o wide 2>/dev/null || echo "(none found)"

  mysql:run:
    desc: Run mysql-app locally with mirrord (multi-cluster mode)
    cmds:
      - |
        echo "=== MySQL App (Multi-Cluster) ==="
        echo "Target: deploy/mysql in {{.MC_NAMESPACE}}"
        echo "Note: Connects to primary operator, routes stateful ops to default cluster"
        echo ""

        cd {{.APPS_DIR}}/mysql-app
        echo "Building mysql-app..."
        go build -o /tmp/mysql-app main.go

        echo "Running with mirrord..."
        # Primary operator routes stateful operations (db branches) to the default cluster
        {{.MIRRORD_BIN}} exec \
          --context {{.PRIMARY_CLUSTER}} \
          -f {{.K8S_DIR}}/overlays/multicluster-mysql/mirrord.json \
          -- /tmp/mysql-app

  postgres:shell:source:
    desc: Connect to PostgreSQL source database (psql shell)
    cmds:
      - |
        MGMT_ONLY="{{.PRIMARY_MANAGEMENT_ONLY}}"
        if [ "$MGMT_ONLY" = "true" ]; then
          CLUSTER="{{.REMOTE_CLUSTER_1}}"
        else
          CLUSTER="{{.PRIMARY_CLUSTER}}"
        fi
        echo "Connecting to PostgreSQL on $CLUSTER..."
        kubectl --context $CLUSTER exec -it -n {{.MC_NAMESPACE}} postgres-test -- psql -U postgres -d source_db

  postgres:query:
    desc: Run a query on PostgreSQL (QUERY="SELECT * FROM users")
    vars:
      QUERY: '{{.QUERY | default "SELECT * FROM users;"}}'
    cmds:
      - |
        MGMT_ONLY="{{.PRIMARY_MANAGEMENT_ONLY}}"
        if [ "$MGMT_ONLY" = "true" ]; then
          CLUSTER="{{.REMOTE_CLUSTER_1}}"
        else
          CLUSTER="{{.PRIMARY_CLUSTER}}"
        fi
        kubectl --context $CLUSTER exec -n {{.MC_NAMESPACE}} postgres-test -- psql -U postgres -d source_db -c "{{.QUERY}}"

  mysql:shell:source:
    desc: Connect to MySQL source database (mysql shell)
    cmds:
      - |
        MGMT_ONLY="{{.PRIMARY_MANAGEMENT_ONLY}}"
        if [ "$MGMT_ONLY" = "true" ]; then
          CLUSTER="{{.REMOTE_CLUSTER_1}}"
        else
          CLUSTER="{{.PRIMARY_CLUSTER}}"
        fi
        echo "Connecting to MySQL on $CLUSTER..."
        kubectl --context $CLUSTER exec -it -n {{.MC_NAMESPACE}} deploy/mysql -- mysql -u myuser -pmypassword mydatabase

  mysql:query:
    desc: Run a query on MySQL (QUERY="SELECT * FROM users")
    vars:
      QUERY: '{{.QUERY | default "SHOW TABLES;"}}'
    cmds:
      - |
        MGMT_ONLY="{{.PRIMARY_MANAGEMENT_ONLY}}"
        if [ "$MGMT_ONLY" = "true" ]; then
          CLUSTER="{{.REMOTE_CLUSTER_1}}"
        else
          CLUSTER="{{.PRIMARY_CLUSTER}}"
        fi
        kubectl --context $CLUSTER exec -n {{.MC_NAMESPACE}} deploy/mysql -- mysql -u myuser -pmypassword mydatabase -e "{{.QUERY}}"

  test:copy-target:deploy:
    desc: Deploy echo-app for copy_target testing
    cmds:
      - task: test:deploy:echo-apps
      - echo ""
      - echo "Echo apps deployed. Ready for copy_target tests."

  test:copy-target:basic:
    desc: Test basic copy_target in multi-cluster (no scale_down)
    cmds:
      - |
        echo "=== Copy Target Test (Multi-Cluster) ==="
        echo ""
        echo "This tests copy_target behavior when connecting via primary cluster."
        echo "Expected behavior: copy should be created on the default cluster."
        echo ""
        echo "Config: {{.K8S_DIR}}/overlays/multicluster-copy-target/mirrord.json"
        echo "  - copy_target.enabled: true"
        echo "  - copy_target.scale_down: false"
        echo ""

        echo "Running mirrord with copy_target..."
        cd {{.APPS_DIR}}/echo-app
        {{.MIRRORD_BIN}} exec \
          --context {{.PRIMARY_CLUSTER}} \
          -f {{.K8S_DIR}}/overlays/multicluster-copy-target/mirrord.json \
          -- ./echo-app

  test:copy-target:scale-down:
    desc: Test copy_target with scale_down in multi-cluster
    cmds:
      - |
        echo "=== Copy Target + Scale Down Test (Multi-Cluster) ==="
        echo ""
        echo "This tests copy_target with scale_down via primary cluster."
        echo "Expected: Original deployment scaled to 0, copy pod created."
        echo ""
        echo "WARNING: This will scale down the echo-app deployment!"
        echo ""
        echo "Config: {{.K8S_DIR}}/overlays/multicluster-copy-target/mirrord-scale-down.json"
        echo "  - copy_target.enabled: true"
        echo "  - copy_target.scale_down: true"
        echo ""

        echo "Running mirrord with copy_target + scale_down..."
        cd {{.APPS_DIR}}/echo-app
        {{.MIRRORD_BIN}} exec \
          --context {{.PRIMARY_CLUSTER}} \
          -f {{.K8S_DIR}}/overlays/multicluster-copy-target/mirrord-scale-down.json \
          -- ./echo-app

  test:copy-target:watch:
    desc: Watch for copy pods in all clusters
    cmds:
      - |
        echo "Watching for copy pods in all clusters..."
        echo "Look for pods with 'mirrord-copy' in the name"
        echo ""
        while true; do
          echo "=== $(date) ==="
          echo ""
          echo "--- {{.PRIMARY_CLUSTER}} ---"
          kubectl --context {{.PRIMARY_CLUSTER}} get pods -n {{.MC_NAMESPACE}} 2>/dev/null | grep -E "mirrord-copy|echo-app" || echo "  No matching pods"
          echo ""
          echo "--- {{.REMOTE_CLUSTER_1}} ---"
          kubectl --context {{.REMOTE_CLUSTER_1}} get pods -n {{.MC_NAMESPACE}} 2>/dev/null | grep -E "mirrord-copy|echo-app" || echo "  No matching pods"
          if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
            echo ""
            echo "--- {{.REMOTE_CLUSTER_2}} ---"
            kubectl --context {{.REMOTE_CLUSTER_2}} get pods -n {{.MC_NAMESPACE}} 2>/dev/null | grep -E "mirrord-copy|echo-app" || echo "  No matching pods"
          fi
          echo ""
          sleep 3
        done

  sqs:deploy:localstack:
    desc: Deploy LocalStack (for SQS) to clusters (respects PRIMARY_MANAGEMENT_ONLY)
    cmds:
      - |
        MGMT_ONLY="{{.PRIMARY_MANAGEMENT_ONLY}}"
        echo "Deploying LocalStack for SQS testing..."
        echo ""

        # Deploy to primary if not management-only
        if [ "$MGMT_ONLY" != "true" ]; then
          echo "Deploying to {{.PRIMARY_CLUSTER}}..."
          kubectl --context {{.PRIMARY_CLUSTER}} create namespace localstack --dry-run=client -o yaml | kubectl --context {{.PRIMARY_CLUSTER}} apply -f -
          kubectl --context {{.PRIMARY_CLUSTER}} create configmap localstack-init \
            --from-file=init.sh={{.K8S_DIR}}/overlays/multicluster-sqs/init.sh \
            -n localstack --dry-run=client -o yaml | kubectl --context {{.PRIMARY_CLUSTER}} apply -f -
          kubectl --context {{.PRIMARY_CLUSTER}} apply -f {{.K8S_DIR}}/overlays/multicluster-sqs/localstack.yaml -n localstack
        else
          echo "Skipping {{.PRIMARY_CLUSTER}} (management-only mode)"
        fi

        # Deploy to remote-1 (default cluster)
        echo "Deploying to {{.REMOTE_CLUSTER_1}}..."
        kubectl --context {{.REMOTE_CLUSTER_1}} create namespace localstack --dry-run=client -o yaml | kubectl --context {{.REMOTE_CLUSTER_1}} apply -f -

        # Create ConfigMap for init scripts (uses multicluster-sqs config)
        kubectl --context {{.REMOTE_CLUSTER_1}} create configmap localstack-init \
          --from-file=init.sh={{.K8S_DIR}}/overlays/multicluster-sqs/init.sh \
          -n localstack --dry-run=client -o yaml | kubectl --context {{.REMOTE_CLUSTER_1}} apply -f -

        kubectl --context {{.REMOTE_CLUSTER_1}} apply -f {{.K8S_DIR}}/overlays/multicluster-sqs/localstack.yaml -n localstack

        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          echo "Deploying to {{.REMOTE_CLUSTER_2}}..."
          kubectl --context {{.REMOTE_CLUSTER_2}} create namespace localstack --dry-run=client -o yaml | kubectl --context {{.REMOTE_CLUSTER_2}} apply -f -
          
          # Create ConfigMap for init scripts (uses multicluster-sqs config)
          kubectl --context {{.REMOTE_CLUSTER_2}} create configmap localstack-init \
            --from-file=init.sh={{.K8S_DIR}}/overlays/multicluster-sqs/init.sh \
            -n localstack --dry-run=client -o yaml | kubectl --context {{.REMOTE_CLUSTER_2}} apply -f -
          
          kubectl --context {{.REMOTE_CLUSTER_2}} apply -f {{.K8S_DIR}}/overlays/multicluster-sqs/localstack.yaml -n localstack
        fi

        echo "LocalStack deployed. Waiting for it to be ready..."

  sqs:wait:localstack:
    desc: Wait for LocalStack to be ready
    cmds:
      - |
        MGMT_ONLY="{{.PRIMARY_MANAGEMENT_ONLY}}"
        echo "Waiting for LocalStack..."
        if [ "$MGMT_ONLY" != "true" ]; then
          kubectl --context {{.PRIMARY_CLUSTER}} wait --for=condition=available deploy/localstack -n localstack --timeout=120s
        fi
        kubectl --context {{.REMOTE_CLUSTER_1}} wait --for=condition=available deploy/localstack -n localstack --timeout=120s
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          kubectl --context {{.REMOTE_CLUSTER_2}} wait --for=condition=available deploy/localstack -n localstack --timeout=120s
        fi
        echo "LocalStack is ready"

  sqs:create:queue:
    desc: Create test SQS queue in LocalStack (respects PRIMARY_MANAGEMENT_ONLY)
    cmds:
      - |
        MGMT_ONLY="{{.PRIMARY_MANAGEMENT_ONLY}}"
        echo "Creating test SQS queue..."

        # Create queue on primary if not management-only
        if [ "$MGMT_ONLY" != "true" ]; then
          echo "Creating queue on {{.PRIMARY_CLUSTER}}..."
          kubectl --context {{.PRIMARY_CLUSTER}} exec -n localstack deploy/localstack -- \
            awslocal sqs create-queue --queue-name test-queue 2>/dev/null || echo "Queue may already exist"
          echo "Queues on {{.PRIMARY_CLUSTER}}:"
          kubectl --context {{.PRIMARY_CLUSTER}} exec -n localstack deploy/localstack -- \
            awslocal sqs list-queues
        fi

        # Create queue on remote-1
        echo "Creating queue on {{.REMOTE_CLUSTER_1}}..."
        kubectl --context {{.REMOTE_CLUSTER_1}} exec -n localstack deploy/localstack -- \
          awslocal sqs create-queue --queue-name test-queue 2>/dev/null || echo "Queue may already exist"

        # Verify
        echo "Queues on {{.REMOTE_CLUSTER_1}}:"
        kubectl --context {{.REMOTE_CLUSTER_1}} exec -n localstack deploy/localstack -- \
          awslocal sqs list-queues

        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          echo ""
          echo "Creating queue on {{.REMOTE_CLUSTER_2}}..."
          kubectl --context {{.REMOTE_CLUSTER_2}} exec -n localstack deploy/localstack -- \
            awslocal sqs create-queue --queue-name test-queue 2>/dev/null || echo "Queue may already exist"
          
          echo "Queues on {{.REMOTE_CLUSTER_2}}:"
          kubectl --context {{.REMOTE_CLUSTER_2}} exec -n localstack deploy/localstack -- \
            awslocal sqs list-queues
        fi

  sqs:deploy:consumer:
    desc: Deploy SQS consumer app to clusters (respects PRIMARY_MANAGEMENT_ONLY)
    cmds:
      - |
        MGMT_ONLY="{{.PRIMARY_MANAGEMENT_ONLY}}"
        echo "Building SQS consumer..."
        cd {{.APPS_DIR}}/sqs-consumer
        docker build -t sqs-consumer:latest . 2>/dev/null || echo "Build may have failed, continuing..."

        echo "Loading image to clusters..."
        minikube -p {{.REMOTE_CLUSTER_1}} image load sqs-consumer:latest 2>/dev/null || true
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          minikube -p {{.REMOTE_CLUSTER_2}} image load sqs-consumer:latest 2>/dev/null || true
        fi
        # Load to primary if not management-only
        if [ "$MGMT_ONLY" != "true" ]; then
          minikube -p {{.PRIMARY_CLUSTER}} image load sqs-consumer:latest 2>/dev/null || true
        fi

        echo "Deploying SQS consumer..."

        # Deploy to primary if not management-only
        if [ "$MGMT_ONLY" != "true" ]; then
          echo "Deploying to {{.PRIMARY_CLUSTER}}..."
          cat <<EOF | kubectl --context {{.PRIMARY_CLUSTER}} apply -f -
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: sqs-consumer
          namespace: {{.MC_NAMESPACE}}
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: sqs-consumer
          template:
            metadata:
              labels:
                app: sqs-consumer
            spec:
              containers:
              - name: sqs-consumer
                image: sqs-consumer:latest
                imagePullPolicy: Never
                env:
                - name: QUEUE_NAME
                  value: "test-queue"
                - name: AWS_ACCESS_KEY_ID
                  value: "test"
                - name: AWS_SECRET_ACCESS_KEY
                  value: "test"
                - name: AWS_REGION
                  value: "us-east-1"
                - name: AWS_ENDPOINT_URL
                  value: "http://localstack.localstack.svc.cluster.local:4566"
                - name: CLUSTER_ID
                  value: "PRIMARY"
        EOF
        else
          echo "Skipping {{.PRIMARY_CLUSTER}} (management-only mode)"
        fi

        # Deploy to remote-1
        echo "Deploying to {{.REMOTE_CLUSTER_1}}..."
        cat <<EOF | kubectl --context {{.REMOTE_CLUSTER_1}} apply -f -
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: sqs-consumer
          namespace: {{.MC_NAMESPACE}}
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: sqs-consumer
          template:
            metadata:
              labels:
                app: sqs-consumer
            spec:
              containers:
              - name: sqs-consumer
                image: sqs-consumer:latest
                imagePullPolicy: Never
                env:
                - name: QUEUE_NAME
                  value: "test-queue"
                - name: AWS_ACCESS_KEY_ID
                  value: "test"
                - name: AWS_SECRET_ACCESS_KEY
                  value: "test"
                - name: AWS_REGION
                  value: "us-east-1"
                - name: AWS_ENDPOINT_URL
                  value: "http://localstack.localstack.svc.cluster.local:4566"
                - name: CLUSTER_ID
                  value: "REMOTE-1"
        EOF

        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          echo "Deploying to {{.REMOTE_CLUSTER_2}}..."
          cat <<EOF | kubectl --context {{.REMOTE_CLUSTER_2}} apply -f -
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: sqs-consumer
          namespace: {{.MC_NAMESPACE}}
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: sqs-consumer
          template:
            metadata:
              labels:
                app: sqs-consumer
            spec:
              containers:
              - name: sqs-consumer
                image: sqs-consumer:latest
                imagePullPolicy: Never
                env:
                - name: QUEUE_NAME
                  value: "test-queue"
                - name: AWS_ACCESS_KEY_ID
                  value: "test"
                - name: AWS_SECRET_ACCESS_KEY
                  value: "test"
                - name: AWS_REGION
                  value: "us-east-1"
                - name: AWS_ENDPOINT_URL
                  value: "http://localstack.localstack.svc.cluster.local:4566"
                - name: CLUSTER_ID
                  value: "REMOTE-2"
        EOF
        fi

        if [ "$MGMT_ONLY" = "true" ]; then
          echo "SQS consumer deployed to remote clusters only (PRIMARY_MANAGEMENT_ONLY=true)"
        else
          echo "SQS consumer deployed to all clusters"
        fi

  sqs:setup:
    desc: Complete SQS setup for multi-cluster testing
    cmds:
      - task: sqs:deploy:localstack
      - task: sqs:wait:localstack
      - task: sqs:create:queue
      - task: sqs:deploy:consumer
      # - task: sqs:deploy:queue-registry
      - echo ""
      - echo "SQS setup complete. Run 'task multicluster:sqs:send:messages' to send test messages."

  sqs:setup:single:
    desc: SQS setup with single LocalStack on default cluster (matches production)
    cmds:
      - task: sqs:deploy:localstack:single
      - task: sqs:wait:localstack:single
      - task: sqs:create:queue:single
      - task: sqs:deploy:consumer:single
      # - task: sqs:deploy:queue-registry
      - echo ""
      - echo "Single-SQS setup complete!"
      - echo "All clusters now share one LocalStack on {{.REMOTE_CLUSTER_1}}"
      - echo ""
      - 'echo "To test: task multicluster:sqs:send:messages:single"'

  sqs:deploy:localstack:single:
    desc: Deploy LocalStack only to default cluster with NodePort (shared SQS)
    cmds:
      - |
        echo "Deploying LocalStack to default cluster only ({{.REMOTE_CLUSTER_1}})..."
        echo "This matches production where all clusters share one AWS SQS"
        echo ""

        # Connect all minikube clusters to the same Docker network
        # This allows cross-cluster communication via NodePort
        echo "Connecting Docker networks for cross-cluster access..."
        docker network connect {{.REMOTE_CLUSTER_1}} {{.PRIMARY_CLUSTER}} 2>/dev/null || true
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          docker network connect {{.REMOTE_CLUSTER_1}} {{.REMOTE_CLUSTER_2}} 2>/dev/null || true
        fi

        # Deploy only to remote-1 (default cluster)
        kubectl --context {{.REMOTE_CLUSTER_1}} create namespace localstack --dry-run=client -o yaml | kubectl --context {{.REMOTE_CLUSTER_1}} apply -f -

        # Create ConfigMap for init scripts
        kubectl --context {{.REMOTE_CLUSTER_1}} create configmap localstack-init \
          --from-file=init.sh={{.K8S_DIR}}/overlays/multicluster-sqs/init.sh \
          -n localstack --dry-run=client -o yaml | kubectl --context {{.REMOTE_CLUSTER_1}} apply -f -

        # Deploy with NodePort service
        kubectl --context {{.REMOTE_CLUSTER_1}} apply -f {{.K8S_DIR}}/overlays/multicluster-sqs/localstack-single.yaml -n localstack

        echo ""
        echo "LocalStack deployed to {{.REMOTE_CLUSTER_1}} with NodePort 31566"

  sqs:wait:localstack:single:
    desc: Wait for single LocalStack to be ready
    cmds:
      - |
        echo "Waiting for LocalStack on {{.REMOTE_CLUSTER_1}}..."
        kubectl --context {{.REMOTE_CLUSTER_1}} wait --for=condition=available deploy/localstack -n localstack --timeout=120s
        echo "LocalStack is ready"

  sqs:create:queue:single:
    desc: Create test queue on single LocalStack with receive wait time
    cmds:
      - |
        echo "Creating test queue on {{.REMOTE_CLUSTER_1}} with ReceiveMessageWaitTimeSeconds=5..."
        kubectl --context {{.REMOTE_CLUSTER_1}} exec -n localstack deploy/localstack -- \
          awslocal sqs create-queue --queue-name test-queue \
            --attributes ReceiveMessageWaitTimeSeconds=5,VisibilityTimeout=30 \
          2>/dev/null || echo "Queue may already exist, updating attributes..."

        # Update attributes if queue already exists
        kubectl --context {{.REMOTE_CLUSTER_1}} exec -n localstack deploy/localstack -- \
          awslocal sqs set-queue-attributes \
            --queue-url http://localhost:4566/000000000000/test-queue \
            --attributes ReceiveMessageWaitTimeSeconds=5 \
          2>/dev/null || true

        echo "Queues:"
        kubectl --context {{.REMOTE_CLUSTER_1}} exec -n localstack deploy/localstack -- \
          awslocal sqs list-queues

  sqs:deploy:consumer:single:
    desc: Deploy SQS consumer to all clusters, all pointing to single LocalStack
    cmds:
      - |
        echo "Building SQS consumer..."
        cd {{.APPS_DIR}}/sqs-consumer
        docker build -t sqs-consumer:latest . 2>/dev/null || echo "Build may have failed, continuing..."

        # Get the minikube IP of the default cluster (where LocalStack runs)
        LOCALSTACK_IP=$(minikube -p {{.REMOTE_CLUSTER_1}} ip)
        LOCALSTACK_URL="http://${LOCALSTACK_IP}:31566"
        echo ""
        echo "LocalStack URL: $LOCALSTACK_URL"
        echo ""

        echo "Loading image to clusters..."
        minikube -p {{.REMOTE_CLUSTER_1}} image load sqs-consumer:latest 2>/dev/null || true
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          minikube -p {{.REMOTE_CLUSTER_2}} image load sqs-consumer:latest 2>/dev/null || true
        fi

        # Deploy to remote-1 (default cluster)
        echo "Deploying to {{.REMOTE_CLUSTER_1}}..."
        cat <<EOF | kubectl --context {{.REMOTE_CLUSTER_1}} apply -f -
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: sqs-consumer
          namespace: {{.MC_NAMESPACE}}
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: sqs-consumer
          template:
            metadata:
              labels:
                app: sqs-consumer
            spec:
              containers:
              - name: sqs-consumer
                image: sqs-consumer:latest
                imagePullPolicy: Never
                env:
                - name: QUEUE_NAME
                  value: "test-queue"
                - name: AWS_ACCESS_KEY_ID
                  value: "test"
                - name: AWS_SECRET_ACCESS_KEY
                  value: "test"
                - name: AWS_REGION
                  value: "us-east-1"
                - name: AWS_ENDPOINT_URL
                  value: "$LOCALSTACK_URL"
                - name: CLUSTER_ID
                  value: "REMOTE-1"
        EOF

        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          echo "Deploying to {{.REMOTE_CLUSTER_2}}..."
          cat <<EOF | kubectl --context {{.REMOTE_CLUSTER_2}} apply -f -
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: sqs-consumer
          namespace: {{.MC_NAMESPACE}}
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: sqs-consumer
          template:
            metadata:
              labels:
                app: sqs-consumer
            spec:
              containers:
              - name: sqs-consumer
                image: sqs-consumer:latest
                imagePullPolicy: Never
                env:
                - name: QUEUE_NAME
                  value: "test-queue"
                - name: AWS_ACCESS_KEY_ID
                  value: "test"
                - name: AWS_SECRET_ACCESS_KEY
                  value: "test"
                - name: AWS_REGION
                  value: "us-east-1"
                - name: AWS_ENDPOINT_URL
                  value: "$LOCALSTACK_URL"
                - name: CLUSTER_ID
                  value: "REMOTE-2"
        EOF
        fi

        echo ""
        echo "SQS consumers deployed - all pointing to $LOCALSTACK_URL"

  sqs:send:messages:single:
    desc: Send test messages to single shared LocalStack
    cmds:
      - |
        QUEUE_URL="http://localhost:4566/000000000000/test-queue"

        echo "Sending test messages via LocalStack on {{.REMOTE_CLUSTER_1}}..."
        echo "Press Ctrl+C to stop"
        echo ""

        i=1
        while true; do
          echo "--- Round $i ---"

          # Send premium message (should go to local mirrord consumer)
          echo -n "Premium: "
          kubectl --context {{.REMOTE_CLUSTER_1}} exec -n localstack deploy/localstack -- \
            awslocal sqs send-message \
              --queue-url $QUEUE_URL \
              --message-body "{\"order_id\": \"ORD-P$i\", \"amount\": $((RANDOM % 1000)), \"tenant\": \"premium-customer\"}" \
              --message-attributes '{"type":{"DataType":"String","StringValue":"premium"}}' \
              --output text --query 'MessageId' 2>/dev/null || echo "failed"

          # Send basic message (should stay with pod consumer)
          echo -n "Basic:   "
          kubectl --context {{.REMOTE_CLUSTER_1}} exec -n localstack deploy/localstack -- \
            awslocal sqs send-message \
              --queue-url $QUEUE_URL \
              --message-body "{\"order_id\": \"ORD-B$i\", \"amount\": $((RANDOM % 100)), \"tenant\": \"basic-customer\"}" \
              --message-attributes '{"type":{"DataType":"String","StringValue":"basic"}}' \
              --output text --query 'MessageId' 2>/dev/null || echo "failed"

          echo ""
          i=$((i + 1))
          sleep 3
        done

  sqs:deploy:producer:single:
    desc: Deploy SQS producer to all clusters (sends to shared LocalStack)
    cmds:
      - |
        echo "Building SQS producer..."
        cd {{.APPS_DIR}}/sqs-producer
        docker build -t sqs-producer:latest . 2>/dev/null || { echo "Build failed"; exit 1; }

        # Get the LocalStack URL
        LOCALSTACK_IP=$(minikube -p {{.REMOTE_CLUSTER_1}} ip)
        LOCALSTACK_URL="http://${LOCALSTACK_IP}:31566"
        echo "LocalStack URL: $LOCALSTACK_URL"
        echo ""

        echo "Loading image to clusters..."
        minikube -p {{.REMOTE_CLUSTER_1}} image load sqs-producer:latest 2>/dev/null || true
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          minikube -p {{.REMOTE_CLUSTER_2}} image load sqs-producer:latest 2>/dev/null || true
        fi

        # Deploy to remote-1
        echo "Deploying producer to {{.REMOTE_CLUSTER_1}}..."
        cat <<EOF | kubectl --context {{.REMOTE_CLUSTER_1}} apply -f -
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: sqs-producer
          namespace: {{.MC_NAMESPACE}}
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: sqs-producer
          template:
            metadata:
              labels:
                app: sqs-producer
            spec:
              containers:
              - name: sqs-producer
                image: sqs-producer:latest
                imagePullPolicy: Never
                env:
                - name: QUEUE_NAME
                  value: "test-queue"
                - name: AWS_ACCESS_KEY_ID
                  value: "test"
                - name: AWS_SECRET_ACCESS_KEY
                  value: "test"
                - name: AWS_REGION
                  value: "us-east-1"
                - name: AWS_ENDPOINT_URL
                  value: "$LOCALSTACK_URL"
                - name: CLUSTER_ID
                  value: "REMOTE-1"
                - name: SEND_INTERVAL
                  value: "5"
        EOF

        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          echo "Deploying producer to {{.REMOTE_CLUSTER_2}}..."
          cat <<EOF | kubectl --context {{.REMOTE_CLUSTER_2}} apply -f -
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: sqs-producer
          namespace: {{.MC_NAMESPACE}}
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: sqs-producer
          template:
            metadata:
              labels:
                app: sqs-producer
            spec:
              containers:
              - name: sqs-producer
                image: sqs-producer:latest
                imagePullPolicy: Never
                env:
                - name: QUEUE_NAME
                  value: "test-queue"
                - name: AWS_ACCESS_KEY_ID
                  value: "test"
                - name: AWS_SECRET_ACCESS_KEY
                  value: "test"
                - name: AWS_REGION
                  value: "us-east-1"
                - name: AWS_ENDPOINT_URL
                  value: "$LOCALSTACK_URL"
                - name: CLUSTER_ID
                  value: "REMOTE-2"
                - name: SEND_INTERVAL
                  value: "5"
        EOF
        fi

        echo ""
        echo "Producers deployed! They will send messages every 5 seconds."
        echo "Check logs: task multicluster:sqs:logs:producer"

  sqs:logs:producer:
    desc: Show SQS producer logs from all clusters
    cmds:
      - |
        echo "=== Producer Logs ==="
        echo ""
        echo "--- {{.REMOTE_CLUSTER_1}} ---"
        kubectl --context {{.REMOTE_CLUSTER_1}} logs -n {{.MC_NAMESPACE}} deploy/sqs-producer --tail=10 2>/dev/null || echo "No producer in remote-1"

        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          echo ""
          echo "--- {{.REMOTE_CLUSTER_2}} ---"
          kubectl --context {{.REMOTE_CLUSTER_2}} logs -n {{.MC_NAMESPACE}} deploy/sqs-producer --tail=10 2>/dev/null || echo "No producer in remote-2"
        fi

  sqs:delete:producer:
    desc: Delete SQS producer from all clusters
    cmds:
      - kubectl --context {{.REMOTE_CLUSTER_1}} delete deploy/sqs-producer -n {{.MC_NAMESPACE}} --ignore-not-found=true
      - |
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          kubectl --context {{.REMOTE_CLUSTER_2}} delete deploy/sqs-producer -n {{.MC_NAMESPACE}} --ignore-not-found=true
        fi
      - echo "Producers deleted"

  # ============================================================================
  # LOCAL PRODUCER TESTING
  # ============================================================================

  sqs:send:
    desc: "Send messages: task sqs:send FILTERED=5 UNFILTERED=5"
    vars:
      FILTERED: '{{.FILTERED | default "5"}}'
      UNFILTERED: '{{.UNFILTERED | default "5"}}'
    cmds:
      - |
        echo "Sending {{.FILTERED}} filtered (type=premium) + {{.UNFILTERED}} unfiltered (type=basic) messages..."
        QUEUE_URL="http://localhost:4566/000000000000/test-queue"

        # Send filtered messages (type=premium - will be split to local app)
        for i in $(seq 1 {{.FILTERED}}); do
          kubectl --context {{.REMOTE_CLUSTER_1}} exec -n localstack deploy/localstack -- \
            awslocal sqs send-message \
              --queue-url $QUEUE_URL \
              --message-body "{\"order\": \"ORD-F$i\", \"amount\": \"$((RANDOM % 1000)).99\", \"tenant\": \"premium-customer\"}" \
              --message-attributes '{"type":{"DataType":"String","StringValue":"premium"}}' \
              2>/dev/null | jq -r '"FILTERED: " + .MessageId' || echo "FILTERED: failed"
        done

        # Send unfiltered messages (type=basic - stays in original queue)
        for i in $(seq 1 {{.UNFILTERED}}); do
          kubectl --context {{.REMOTE_CLUSTER_1}} exec -n localstack deploy/localstack -- \
            awslocal sqs send-message \
              --queue-url $QUEUE_URL \
              --message-body "{\"order\": \"ORD-U$i\", \"amount\": \"$((RANDOM % 100)).99\", \"tenant\": \"basic-customer\"}" \
              --message-attributes '{"type":{"DataType":"String","StringValue":"basic"}}' \
              2>/dev/null | jq -r '"UNFILTERED: " + .MessageId' || echo "UNFILTERED: failed"
        done

        echo ""
        echo "Done! Sent {{.FILTERED}} filtered + {{.UNFILTERED}} unfiltered = $(({{.FILTERED}} + {{.UNFILTERED}})) total"

  sqs:send:burst:
    desc: "Send messages in PARALLEL for burst testing: task sqs:send:burst FILTERED=50 UNFILTERED=50"
    vars:
      FILTERED: '{{.FILTERED | default "20"}}'
      UNFILTERED: '{{.UNFILTERED | default "20"}}'
      PARALLEL: '{{.PARALLEL | default "10"}}'
    cmds:
      - |
        echo "BURST MODE: Sending {{.FILTERED}} filtered + {{.UNFILTERED}} unfiltered messages ({{.PARALLEL}} parallel)..."
        QUEUE_URL="http://localhost:4566/000000000000/test-queue"
        CONTEXT="{{.REMOTE_CLUSTER_1}}"

        # Generate work items and run in parallel using background jobs
        for i in $(seq 1 {{.FILTERED}}); do
          (
            kubectl --context $CONTEXT exec -n localstack deploy/localstack -- \
              awslocal sqs send-message \
                --queue-url $QUEUE_URL \
                --message-body "{\"order\": \"ORD-F$i\", \"amount\": \"$((RANDOM % 1000)).99\", \"tenant\": \"premium-customer\"}" \
                --message-attributes '{"type":{"DataType":"String","StringValue":"premium"}}' \
                2>/dev/null | jq -r '"premium: " + .MessageId' || echo "premium: failed"
          ) &
          # Limit parallel jobs (ignore wait -n exit code)
          [ $(jobs -r | wc -l) -ge {{.PARALLEL}} ] && { wait -n || true; }
        done

        for i in $(seq 1 {{.UNFILTERED}}); do
          (
            kubectl --context $CONTEXT exec -n localstack deploy/localstack -- \
              awslocal sqs send-message \
                --queue-url $QUEUE_URL \
                --message-body "{\"order\": \"ORD-U$i\", \"amount\": \"$((RANDOM % 100)).99\", \"tenant\": \"basic-customer\"}" \
                --message-attributes '{"type":{"DataType":"String","StringValue":"basic"}}' \
                2>/dev/null | jq -r '"basic: " + .MessageId' || echo "basic: failed"
          ) &
          [ $(jobs -r | wc -l) -ge {{.PARALLEL}} ] && { wait -n || true; }
        done

        # Wait for all remaining jobs (ignore exit codes from individual jobs)
        wait || true

        echo ""
        echo "BURST COMPLETE! Sent $(({{.FILTERED}} + {{.UNFILTERED}})) messages with {{.PARALLEL}} parallel workers"

  sqs:send:multi-filter:
    desc: "Send messages with MULTIPLE filter types: task sqs:send:multi-filter COUNT=10 PARALLEL=20"
    vars:
      COUNT: '{{.COUNT | default "5"}}'
      PARALLEL: '{{.PARALLEL | default "20"}}'
    cmds:
      - |
        echo "MULTI-FILTER MODE: Sending {{.COUNT}} messages for EACH filter type..."
        echo "Filter types: premium, gold, vip, enterprise, basic"
        echo "Parallelism: {{.PARALLEL}}"
        echo ""

        # Generate all messages as "type index" pairs and pipe to xargs
        (
          for i in $(seq 1 {{.COUNT}}); do echo "premium $i"; done
          for i in $(seq 1 {{.COUNT}}); do echo "gold $i"; done
          for i in $(seq 1 {{.COUNT}}); do echo "vip $i"; done
          for i in $(seq 1 {{.COUNT}}); do echo "enterprise $i"; done
          for i in $(seq 1 {{.COUNT}}); do echo "basic $i"; done
        ) | xargs -P {{.PARALLEL}} -L 1 sh -c '
          TYPE=$1
          IDX=$2
          QUEUE_URL="http://localhost:4566/000000000000/test-queue"
          kubectl --context {{.REMOTE_CLUSTER_1}} exec -n localstack deploy/localstack -- \
            awslocal sqs send-message --queue-url $QUEUE_URL \
            --message-body "{\"order\": \"ORD-$TYPE-$IDX\", \"tenant\": \"$TYPE-customer\"}" \
            --message-attributes "{\"type\":{\"DataType\":\"String\",\"StringValue\":\"$TYPE\"}}" \
            2>/dev/null | jq -r "\"$TYPE: \" + .MessageId" || echo "$TYPE: failed"
        ' _

        echo ""
        echo "MULTI-FILTER COMPLETE! Sent $(({{.COUNT}} * 5)) total messages ({{.COUNT}} per type)"
        echo ""
        echo "Available mirrord configs to test:"
        echo "  - mirrord-premium.json    (type=premium)"
        echo "  - mirrord-gold.json       (type=gold)"
        echo "  - mirrord-vip.json        (type=vip)"
        echo "  - mirrord-enterprise.json (type=enterprise)"
        echo "  - mirrord-all.json        (type=.* matches all)"

  sqs:send:continuous:
    desc: "Continuously send messages with random filter types: task sqs:send:continuous INTERVAL=1"
    vars:
      INTERVAL: '{{.INTERVAL | default "2"}}'
    cmds:
      - |
        echo "CONTINUOUS MODE: Sending messages every {{.INTERVAL}}s with random filter types..."
        echo "Press Ctrl+C to stop"
        echo ""
        QUEUE_URL="http://localhost:4566/000000000000/test-queue"
        CONTEXT="{{.REMOTE_CLUSTER_1}}"

        i=1

        while true; do
          # Pick random type using modulo on process substitution
          RAND=$((RANDOM % 5))
          case $RAND in
            0) TYPE="premium" ;;
            1) TYPE="gold" ;;
            2) TYPE="vip" ;;
            3) TYPE="enterprise" ;;
            *) TYPE="basic" ;;
          esac
          
          kubectl --context $CONTEXT exec -n localstack deploy/localstack -- \
            awslocal sqs send-message \
              --queue-url $QUEUE_URL \
              --message-body "{\"order\": \"ORD-$TYPE-$i\", \"amount\": \"$((RANDOM % 1000)).99\", \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" \
              --message-attributes "{\"type\":{\"DataType\":\"String\",\"StringValue\":\"$TYPE\"}}" \
              2>/dev/null | jq -r "\"[$i] $TYPE: \" + .MessageId" || echo "[$i] $TYPE: failed"
          
          i=$((i + 1))
          sleep {{.INTERVAL}}
        done

  sqs:run:producer:local:
    desc: Run SQS producer continuously (sends random messages)
    cmds:
      - |
        LOCALSTACK_IP=$(minikube -p {{.REMOTE_CLUSTER_1}} ip)
        LOCALSTACK_URL="http://${LOCALSTACK_IP}:31566"

        echo "Sending continuous random messages..."
        echo "Queue: test-queue"
        echo "Endpoint: $LOCALSTACK_URL"
        echo ""

        cd apps/sqs-producer && \
          QUEUE_NAME=test-queue \
          SQS_ENDPOINT=$LOCALSTACK_URL \
          SEND_INTERVAL=${SEND_INTERVAL:-2} \
          go run main.go 0 0  # Will fall back to continuous mode if we add it back

  sqs:logs:consumer:
    desc: Show SQS consumer logs from all clusters (follow mode)
    cmds:
      - |
        echo "╔════════════════════════════════════════════════════════════════╗"
        echo "║           SQS CONSUMER LOGS (all clusters)                     ║"
        echo "╚════════════════════════════════════════════════════════════════╝"
        echo ""
        echo "Use Ctrl+C to stop watching logs"
        echo ""

        # Show recent logs and follow
        kubectl --context {{.REMOTE_CLUSTER_1}} logs -n {{.MC_NAMESPACE}} deploy/sqs-consumer -f --tail=50 &
        PID1=$!

        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          kubectl --context {{.REMOTE_CLUSTER_2}} logs -n {{.MC_NAMESPACE}} deploy/sqs-consumer -f --tail=50 &
          PID2=$!
        fi

        # Wait for Ctrl+C
        trap "kill $PID1 2>/dev/null; kill $PID2 2>/dev/null; exit 0" INT
        wait

  sqs:logs:consumer:cluster1:
    desc: Show SQS consumer logs from cluster 1 only
    cmds:
      - kubectl --context {{.REMOTE_CLUSTER_1}} logs -n {{.MC_NAMESPACE}} deploy/sqs-consumer -f --tail=100

  sqs:logs:consumer:cluster2:
    desc: Show SQS consumer logs from cluster 2 only
    cmds:
      - kubectl --context {{.REMOTE_CLUSTER_2}} logs -n {{.MC_NAMESPACE}} deploy/sqs-consumer -f --tail=100

  sqs:test:full:
    desc: "Complete SQS test: Setup + run local producer (use in separate terminal)"
    cmds:
      - |
        echo "╔════════════════════════════════════════════════════════════════╗"
        echo "║           COMPLETE SQS SPLITTING TEST                          ║"
        echo "╚════════════════════════════════════════════════════════════════╝"
        echo ""
        echo "This test requires TWO terminals:"
        echo ""
        echo "Terminal 1 (this one): Run the producer"
        echo "Terminal 2: Watch consumer logs with:"
        echo "  task multicluster:sqs:logs:consumer"
        echo ""
        echo "Or test with mirrord:"
        echo "  1. Run local producer (this terminal)"
        echo "  2. Run your local app with mirrord and SQS filter"
        echo ""
        echo "Press Enter to start the producer, or Ctrl+C to cancel..."
        read

        task multicluster:sqs:run:producer:local

  sqs:queue:stats:
    desc: Show queue statistics (message counts)
    cmds:
      - |
        LOCALSTACK_IP=$(minikube -p {{.REMOTE_CLUSTER_1}} ip)

        echo "╔════════════════════════════════════════════════════════════════╗"
        echo "║           SQS QUEUE STATISTICS                                 ║"
        echo "╚════════════════════════════════════════════════════════════════╝"
        echo ""

        echo "Queues:"
        kubectl --context {{.REMOTE_CLUSTER_1}} exec -n localstack deploy/localstack -- \
          awslocal sqs list-queues --output json | jq -r '.QueueUrls[]?' 2>/dev/null || echo "  (none found)"

        echo ""
        echo "test-queue stats:"
        kubectl --context {{.REMOTE_CLUSTER_1}} exec -n localstack deploy/localstack -- \
          awslocal sqs get-queue-attributes \
            --queue-url http://localhost:4566/000000000000/test-queue \
            --attribute-names ApproximateNumberOfMessages ApproximateNumberOfMessagesNotVisible \
            --output json 2>/dev/null | jq -r '.Attributes' || echo "  (queue not found)"

  sqs:queue:purge:
    desc: Purge all messages from test-queue
    cmds:
      - |
        echo "Purging test-queue..."
        kubectl --context {{.REMOTE_CLUSTER_1}} exec -n localstack deploy/localstack -- \
          awslocal sqs purge-queue \
            --queue-url http://localhost:4566/000000000000/test-queue 2>/dev/null || echo "Queue not found or already empty"
        echo "Done!"

  sqs:consumer:restart:
    desc: Restart SQS consumer apps on remote clusters
    cmds:
      - |
        echo "Restarting SQS consumers..."
        kubectl --context {{.REMOTE_CLUSTER_1}} rollout restart deployment/sqs-consumer -n test-multicluster 2>/dev/null || echo "No consumer on remote-1"
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          kubectl --context {{.REMOTE_CLUSTER_2}} rollout restart deployment/sqs-consumer -n test-multicluster 2>/dev/null || echo "No consumer on remote-2"
        fi
        echo "Waiting for consumers to be ready..."
        kubectl --context {{.REMOTE_CLUSTER_1}} rollout status deployment/sqs-consumer -n test-multicluster --timeout=60s 2>/dev/null || true
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          kubectl --context {{.REMOTE_CLUSTER_2}} rollout status deployment/sqs-consumer -n test-multicluster --timeout=60s 2>/dev/null || true
        fi
        echo "Done!"

  sqs:verify:connectivity:
    desc: Verify all clusters can reach the shared LocalStack
    cmds:
      - |
        LOCALSTACK_IP=$(minikube -p {{.REMOTE_CLUSTER_1}} ip)
        LOCALSTACK_URL="http://${LOCALSTACK_IP}:31566"

        echo "=== Verifying Shared LocalStack Connectivity ==="
        echo "LocalStack URL: $LOCALSTACK_URL"
        echo ""

        echo "--- Testing from {{.REMOTE_CLUSTER_1}} ---"
        kubectl --context {{.REMOTE_CLUSTER_1}} exec -n {{.MC_NAMESPACE}} deploy/sqs-consumer -- \
          sh -c "AWS_ACCESS_KEY_ID=test AWS_SECRET_ACCESS_KEY=test aws sqs list-queues \
            --endpoint-url $LOCALSTACK_URL --region us-east-1 2>&1" && echo "✓ REMOTE-1 can reach LocalStack" || echo "✗ REMOTE-1 FAILED"
        echo ""

        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          echo "--- Testing from {{.REMOTE_CLUSTER_2}} ---"
          kubectl --context {{.REMOTE_CLUSTER_2}} exec -n {{.MC_NAMESPACE}} deploy/sqs-consumer -- \
            sh -c "AWS_ACCESS_KEY_ID=test AWS_SECRET_ACCESS_KEY=test aws sqs list-queues \
              --endpoint-url $LOCALSTACK_URL --region us-east-1 2>&1" && echo "✓ REMOTE-2 can reach LocalStack" || echo "✗ REMOTE-2 FAILED"
          echo ""
        fi

        echo "--- Queue contents ---"
        kubectl --context {{.REMOTE_CLUSTER_1}} exec -n localstack deploy/localstack -- \
          awslocal sqs get-queue-attributes \
            --queue-url http://localhost:4566/000000000000/test-queue \
            --attribute-names ApproximateNumberOfMessages 2>/dev/null || echo "Could not get queue attributes"

  sqs:deploy:queue-registry:
    desc: Deploy MirrordWorkloadQueueRegistry to all clusters
    cmds:
      - |
        echo "Deploying MirrordWorkloadQueueRegistry to all clusters..."

        # Deploy to primary (for sync controller to pick up)
        echo "Deploying to {{.PRIMARY_CLUSTER}}..."
        kubectl --context {{.PRIMARY_CLUSTER}} apply -f {{.K8S_DIR}}/overlays/multicluster-sqs/queue-registry.yaml

        # Deploy to remote-1
        echo "Deploying to {{.REMOTE_CLUSTER_1}}..."
        kubectl --context {{.REMOTE_CLUSTER_1}} apply -f {{.K8S_DIR}}/overlays/multicluster-sqs/queue-registry.yaml

        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          echo "Deploying to {{.REMOTE_CLUSTER_2}}..."
          kubectl --context {{.REMOTE_CLUSTER_2}} apply -f {{.K8S_DIR}}/overlays/multicluster-sqs/queue-registry.yaml
        fi

        echo "Queue registry deployed to all clusters"

  sqs:deploy:queue-registry:primary:
    desc: Deploy MirrordWorkloadQueueRegistry to primary only (sync controller will sync to remotes)
    cmds:
      - |
        echo "Deploying MirrordWorkloadQueueRegistry to primary..."
        kubectl --context {{.PRIMARY_CLUSTER}} apply -f {{.K8S_DIR}}/overlays/multicluster-sqs/queue-registry.yaml
        echo "Queue registry deployed. Sync controller will sync to remote clusters."

  sqs:deploy:queue-registry:primary:operator-ns:
    desc: Deploy MirrordWorkloadQueueRegistry to primary only (sync controller will sync to remotes)
    cmds:
      - |
        echo "Deploying MirrordWorkloadQueueRegistry to primary..."
        kubectl --context {{.PRIMARY_CLUSTER}} apply -f {{.K8S_DIR}}/overlays/multicluster-sqs/queue-registry-operator-ns.yaml
        echo "Queue registry deployed. Sync controller will sync to remote clusters."
  sqs:check:queue-registry:
    desc: Check MirrordWorkloadQueueRegistry on all clusters
    cmds:
      - |
        echo "=== Primary cluster ({{.PRIMARY_CLUSTER}}) ==="
        kubectl --context {{.PRIMARY_CLUSTER}} get mirrordworkloadqueueregistries -A

        echo ""
        echo "=== Remote cluster 1 ({{.REMOTE_CLUSTER_1}}) ==="
        kubectl --context {{.REMOTE_CLUSTER_1}} get mirrordworkloadqueueregistries -A

        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          echo ""
          echo "=== Remote cluster 2 ({{.REMOTE_CLUSTER_2}}) ==="
          kubectl --context {{.REMOTE_CLUSTER_2}} get mirrordworkloadqueueregistries -A
        fi

  sqs:delete:
    desc: Delete SQS resources from all clusters
    cmds:
      - kubectl --context {{.PRIMARY_CLUSTER}} delete deploy/sqs-consumer -n {{.MC_NAMESPACE}} --ignore-not-found=true
      - kubectl --context {{.PRIMARY_CLUSTER}} delete namespace localstack --ignore-not-found=true
      - kubectl --context {{.REMOTE_CLUSTER_1}} delete deploy/sqs-consumer -n {{.MC_NAMESPACE}} --ignore-not-found=true
      - kubectl --context {{.REMOTE_CLUSTER_1}} delete namespace localstack --ignore-not-found=true
      - |
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          kubectl --context {{.REMOTE_CLUSTER_2}} delete deploy/sqs-consumer -n {{.MC_NAMESPACE}} --ignore-not-found=true
          kubectl --context {{.REMOTE_CLUSTER_2}} delete namespace localstack --ignore-not-found=true
        fi
      - echo "SQS resources deleted"

  sqs:send:messages:
    desc: Send test messages to SQS queues in all clusters
    cmds:
      - |
        echo "Sending test messages to SQS queues..."
        echo "Press Ctrl+C to stop"
        echo ""

        i=1
        while true; do
          echo "--- Round $i ---"
          
          # Send to remote-1
          echo -n "REMOTE-1: "
          kubectl --context {{.REMOTE_CLUSTER_1}} exec -n localstack deploy/localstack -- \
            awslocal sqs send-message \
              --queue-url http://localhost:4566/000000000000/test-queue \
              --message-body "{\"msg\": \"test-$i\", \"cluster\": \"remote-1\", \"time\": \"$(date -Iseconds)\"}" \
              --message-attributes '{"tenant":{"DataType":"String","StringValue":"Avi.test"}}' \
              2>/dev/null | jq -r '.MessageId' || echo "failed"
          
          if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
            echo -n "REMOTE-2: "
            kubectl --context {{.REMOTE_CLUSTER_2}} exec -n localstack deploy/localstack -- \
              awslocal sqs send-message \
                --queue-url http://localhost:4566/000000000000/test-queue \
                --message-body "{\"msg\": \"test-$i\", \"cluster\": \"remote-2\", \"time\": \"$(date -Iseconds)\"}" \
                --message-attributes '{"tenant":{"DataType":"String","StringValue":"Avi.test"}}' \
                2>/dev/null | jq -r '.MessageId' || echo "failed"
          fi
          
          echo ""
          i=$((i + 1))
          sleep 3
        done

  sqs:send:messages:unfiltered:
    desc: Send messages WITHOUT the filter attribute (should NOT be split)
    cmds:
      - |
        echo "Sending UNFILTERED messages (no tenant attribute)..."
        echo "These should NOT be split to local app"
        echo "Press Ctrl+C to stop"
        echo ""

        i=1
        while true; do
          echo "--- Round $i (UNFILTERED) ---"
          
          kubectl --context {{.REMOTE_CLUSTER_1}} exec -n localstack deploy/localstack -- \
            awslocal sqs send-message \
              --queue-url http://localhost:4566/000000000000/test-queue \
              --message-body "{\"msg\": \"unfiltered-$i\", \"cluster\": \"remote-1\"}" \
              2>/dev/null | jq -r '.MessageId'
          
          echo ""
          i=$((i + 1))
          sleep 3
        done

  test:sqs:split:multi-cluster:
    desc: "Test SQS splitting: task test:sqs:split:multi-cluster FILTER=premium|gold|vip|enterprise|all"
    vars:
      FILTER: '{{.FILTER | default "premium"}}'
    cmds:
      - |
        echo "=== SQS Split Test (Multi-Cluster) ==="
        echo "Filter type: {{.FILTER}}"
        echo ""

        # Determine config file based on filter
        case "{{.FILTER}}" in
          premium)   CONFIG="mirrord-premium.json" ;;
          gold)      CONFIG="mirrord-gold.json" ;;
          vip)       CONFIG="mirrord-vip.json" ;;
          enterprise) CONFIG="mirrord-enterprise.json" ;;
          all)       CONFIG="mirrord-all.json" ;;
          *)         CONFIG="mirrord.json" ;;
        esac

        echo "Using config: $CONFIG"
        echo ""

        cd {{.APPS_DIR}}/sqs-consumer

        # Build the consumer
        go build -o /tmp/sqs-consumer main.go 2>/dev/null || echo "Build may have failed"

        export AWS_ACCESS_KEY_ID=test
        export AWS_SECRET_ACCESS_KEY=test
        export AWS_REGION=us-east-1
        export QUEUE_NAME=test-queue

        echo "Starting mirrord session..."
        echo "Send messages with: task multicluster:sqs:send:multi-filter"
        echo ""

        {{.MIRRORD_BIN}} exec \
          --context {{.PRIMARY_CLUSTER}} \
          -f {{.K8S_DIR}}/overlays/multicluster-sqs/$CONFIG \
          -- /tmp/sqs-consumer

  test:sqs:split:multi-cluster:all:
    desc: "Run multiple filter tests in parallel (opens 4 terminals)"
    cmds:
      - |
        echo "=== Multi-Filter SQS Test ==="
        echo ""
        echo "This will show commands to run in separate terminals."
        echo "Each terminal will receive only messages matching its filter."
        echo ""
        echo "Step 1: Open 4 terminals and run these commands:"
        echo ""
        echo "  Terminal 1 (premium):    task multicluster:test:sqs:split:multi-cluster FILTER=premium"
        echo "  Terminal 2 (gold):       task multicluster:test:sqs:split:multi-cluster FILTER=gold"
        echo "  Terminal 3 (vip):        task multicluster:test:sqs:split:multi-cluster FILTER=vip"
        echo "  Terminal 4 (enterprise): task multicluster:test:sqs:split:multi-cluster FILTER=enterprise"
        echo ""
        echo "Step 2: Send test messages from another terminal:"
        echo ""
        echo "  task multicluster:sqs:send:multi-filter COUNT=10"
        echo ""
        echo "Step 3: Watch each terminal receive only its matching messages!"
        echo ""
        echo "Available filter types: premium, gold, vip, enterprise, all"

  test:sqs:split:single-cluster:
    desc: Test SQS splitting in single-cluster mode (directly to remote-1)
    cmds:
      - |
        echo "=== SQS Split Test (Single-Cluster via remote-1) ==="
        echo ""
        echo "This connects directly to remote-1 operator (bypassing multi-cluster primary)"
        echo "Use this to compare single-cluster vs multi-cluster behavior"
        echo ""

        # Create a mirrord config for single-cluster test
        cat > /tmp/mirrord-single-cluster-sqs.json << 'EOF'
        {
          "target": {
            "path": "deployment/sqs-consumer",
            "namespace": "test-multicluster"
          },
          "operator": true,
          "feature": {
            "split_queues": {
              "test-queue": {
                "queue_type": "SQS",
                "message_filter": {
                  "type": "^premium$"
                }
              }
            },
            "env": true,
            "fs": "local"
          }
        }
        EOF

        echo "Running local SQS consumer with mirrord (single-cluster)..."
        cd {{.APPS_DIR}}/sqs-consumer

        # Build the consumer
        go build -o /tmp/sqs-consumer main.go 2>/dev/null || echo "Build may have failed"

        export AWS_ACCESS_KEY_ID=test
        export AWS_SECRET_ACCESS_KEY=test
        export AWS_REGION=us-east-1
        export QUEUE_NAME=test-queue

        {{.MIRRORD_BIN}} exec \
          --context {{.REMOTE_CLUSTER_1}} \
          -f /tmp/mirrord-single-cluster-sqs.json \
          -- /tmp/sqs-consumer

  sqs:send:single-cluster:
    desc: "Send messages for single-cluster test: task sqs:send:single-cluster FILTERED=5 UNFILTERED=5"
    vars:
      FILTERED: '{{.FILTERED | default "5"}}'
      UNFILTERED: '{{.UNFILTERED | default "5"}}'
    cmds:
      - |
        echo "=== Sending messages for Single-Cluster Test ==="
        echo "Sending {{.FILTERED}} filtered (type=premium) + {{.UNFILTERED}} unfiltered (type=basic) messages..."
        echo ""
        QUEUE_URL="http://localhost:4566/000000000000/test-queue"

        # Send filtered messages (type=premium - will be split to local app)
        for i in $(seq 1 {{.FILTERED}}); do
          kubectl --context {{.REMOTE_CLUSTER_1}} exec -n localstack deploy/localstack -- \
            awslocal sqs send-message \
              --queue-url $QUEUE_URL \
              --message-body "{\"order\": \"ORD-F$i\", \"amount\": \"$((RANDOM % 1000)).99\", \"tenant\": \"premium-customer\"}" \
              --message-attributes '{"type":{"DataType":"String","StringValue":"premium"}}' \
              2>/dev/null | jq -r '"FILTERED: " + .MessageId' || echo "FILTERED: failed"
        done

        # Send unfiltered messages (type=basic - stays in original queue)
        for i in $(seq 1 {{.UNFILTERED}}); do
          kubectl --context {{.REMOTE_CLUSTER_1}} exec -n localstack deploy/localstack -- \
            awslocal sqs send-message \
              --queue-url $QUEUE_URL \
              --message-body "{\"order\": \"ORD-U$i\", \"amount\": \"$((RANDOM % 100)).99\", \"tenant\": \"basic-customer\"}" \
              --message-attributes '{"type":{"DataType":"String","StringValue":"basic"}}' \
              2>/dev/null | jq -r '"UNFILTERED: " + .MessageId' || echo "UNFILTERED: failed"
        done

        echo ""
        echo "Done! Sent {{.FILTERED}} filtered + {{.UNFILTERED}} unfiltered = $(({{.FILTERED}} + {{.UNFILTERED}})) total"

  sqs:status:single-cluster:
    desc: Show SQS session status for single-cluster (remote-1)
    cmds:
      - |
        echo "=== Single-Cluster SQS Status (remote-1) ==="
        echo ""
        echo "--- MirrordClusterSession ---"
        kubectl --context {{.REMOTE_CLUSTER_1}} get mirrordclustersession -n mirrord 2>/dev/null || echo "(none)"
        echo ""
        echo "--- MirrordSqsSession ---"
        kubectl --context {{.REMOTE_CLUSTER_1}} get mirrordsqssession -n mirrord 2>/dev/null || echo "(none)"
        echo ""
        echo "--- Queue Stats ---"
        kubectl --context {{.REMOTE_CLUSTER_1}} exec -n localstack deploy/localstack -- \
          awslocal sqs get-queue-attributes \
            --queue-url http://localhost:4566/000000000000/test-queue \
            --attribute-names ApproximateNumberOfMessages ApproximateNumberOfMessagesNotVisible \
            --output json 2>/dev/null | jq -r '.Attributes' || echo "(queue not found)"

  sqs:cleanup:sessions:single-cluster:
    desc: Delete all stale sessions on remote-1 (for testing)
    cmds:
      - |
        echo "=== Cleaning up single-cluster sessions on remote-1 ==="
        echo ""
        echo "Deleting MirrordClusterSession..."
        kubectl --context {{.REMOTE_CLUSTER_1}} delete mirrordclustersession --all -n mirrord 2>/dev/null || echo "(none to delete)"
        echo ""
        echo "Waiting for SQS sessions to be garbage collected..."
        sleep 3
        echo ""
        echo "Remaining sessions:"
        kubectl --context {{.REMOTE_CLUSTER_1}} get mirrordclustersession,mirrordsqssession -n mirrord 2>/dev/null || echo "(none)"

  test:sqs:copy-target:
    desc: Test SQS with copy_target in multi-cluster
    cmds:
      - |
        echo "=== SQS + Copy Target Test (Multi-Cluster) ==="
        echo ""
        echo "This tests SQS with copy_target via primary cluster."
        echo "The copy should be created and consume from temp queue."
        echo ""
        echo "Config: {{.K8S_DIR}}/overlays/multicluster-sqs/mirrord-copy-target.json"
        echo ""

        echo "Running with copy_target + SQS split..."
        cd {{.APPS_DIR}}/sqs-consumer
        go build -o /tmp/sqs-consumer main.go 2>/dev/null || echo "Build may have failed"

        export AWS_ACCESS_KEY_ID=test
        export AWS_SECRET_ACCESS_KEY=test
        export AWS_REGION=us-east-1
        export QUEUE_NAME=test-queue

        {{.MIRRORD_BIN}} exec \
          --context {{.PRIMARY_CLUSTER}} \
          -f {{.K8S_DIR}}/overlays/multicluster-sqs/mirrord-copy-target.json \
          -- /tmp/sqs-consumer

  sqs:status:
    desc: Show SQS consumer status in all clusters
    cmds:
      - |
        echo "=== SQS Consumer Status ==="
        echo ""
        echo "--- {{.REMOTE_CLUSTER_1}} ---"
        kubectl --context {{.REMOTE_CLUSTER_1}} get pods -n {{.MC_NAMESPACE}} -l app=sqs-consumer 2>/dev/null || echo "No SQS consumer"
        kubectl --context {{.REMOTE_CLUSTER_1}} get pods -n localstack 2>/dev/null || echo "No LocalStack"

        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          echo ""
          echo "--- {{.REMOTE_CLUSTER_2}} ---"
          kubectl --context {{.REMOTE_CLUSTER_2}} get pods -n {{.MC_NAMESPACE}} -l app=sqs-consumer 2>/dev/null || echo "No SQS consumer"
          kubectl --context {{.REMOTE_CLUSTER_2}} get pods -n localstack 2>/dev/null || echo "No LocalStack"
        fi

  sqs:logs:
    desc: Show SQS consumer logs from remote clusters
    cmds:
      - |
        echo "=== SQS Consumer Logs ==="
        echo ""
        echo "--- {{.REMOTE_CLUSTER_1}} ---"
        kubectl --context {{.REMOTE_CLUSTER_1}} logs -n {{.MC_NAMESPACE}} -l app=sqs-consumer --tail=20 2>/dev/null || echo "No logs"

        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          echo ""
          echo "--- {{.REMOTE_CLUSTER_2}} ---"
          kubectl --context {{.REMOTE_CLUSTER_2}} logs -n {{.MC_NAMESPACE}} -l app=sqs-consumer --tail=20 2>/dev/null || echo "No logs"
        fi

  pubsub:setup:
    desc: Deploy Pub/Sub emulator + consumer + CRDs for multi-cluster queue splitting
    cmds:
      - task: pubsub:deploy:emulator
      - task: pubsub:wait:emulator
      - task: pubsub:create:topic
      - task: pubsub:deploy:consumer
      - task: pubsub:deploy:crds
      - echo ""
      - echo "Pub/Sub multi-cluster setup complete."
      - echo "Run 'task multicluster:pubsub:status' to check."

  pubsub:deploy:emulator:
    desc: Deploy Pub/Sub emulator to the default cluster (shared by all clusters via NodePort)
    cmds:
      - |
        echo "Deploying Pub/Sub emulator to default cluster ({{.REMOTE_CLUSTER_1}})..."

        echo "Connecting Docker networks for cross-cluster access..."
        docker network connect {{.REMOTE_CLUSTER_1}} {{.PRIMARY_CLUSTER}} 2>/dev/null || true
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          docker network connect {{.REMOTE_CLUSTER_1}} {{.REMOTE_CLUSTER_2}} 2>/dev/null || true
        fi

        kubectl --context {{.REMOTE_CLUSTER_1}} create namespace pubsub-emulator --dry-run=client -o yaml | kubectl --context {{.REMOTE_CLUSTER_1}} apply -f -
        kubectl --context {{.REMOTE_CLUSTER_1}} apply -f {{.K8S_DIR}}/overlays/pubsub-emulator/namespace.yaml
        kubectl --context {{.REMOTE_CLUSTER_1}} apply -f {{.K8S_DIR}}/overlays/pubsub-emulator/pubsub-emulator.yaml

        echo "Patching emulator service to NodePort 31085..."
        kubectl --context {{.REMOTE_CLUSTER_1}} patch svc pubsub-emulator -n pubsub-emulator \
          --type=merge -p '{"spec":{"type":"NodePort","ports":[{"port":8085,"targetPort":8085,"nodePort":31085,"name":"pubsub"}]}}'

        EMULATOR_IP=$(minikube -p {{.REMOTE_CLUSTER_1}} ip)
        echo "Pub/Sub emulator deployed with NodePort at ${EMULATOR_IP}:31085"

  pubsub:wait:emulator:
    desc: Wait for the Pub/Sub emulator pod to be ready
    cmds:
      - kubectl --context {{.REMOTE_CLUSTER_1}} wait --for=condition=ready pod -l app.kubernetes.io/name=pubsub-emulator -n pubsub-emulator --timeout=300s

  pubsub:create:topic:
    desc: Create test topic and subscription in the emulator
    cmds:
      - |
        POD=$(kubectl --context {{.REMOTE_CLUSTER_1}} get pod -n pubsub-emulator -l app.kubernetes.io/name=pubsub-emulator -o jsonpath='{.items[0].metadata.name}')
        echo "Creating topic test-topic..."
        kubectl --context {{.REMOTE_CLUSTER_1}} exec -n pubsub-emulator $POD -- \
          curl -s -X PUT "http://localhost:8085/v1/projects/test-project/topics/test-topic" \
            -H "Content-Type: application/json" || true
        echo ""
        echo "Creating subscription test-subscription..."
        kubectl --context {{.REMOTE_CLUSTER_1}} exec -n pubsub-emulator $POD -- \
          curl -s -X PUT "http://localhost:8085/v1/projects/test-project/subscriptions/test-subscription" \
            -H "Content-Type: application/json" \
            -d '{"topic": "projects/test-project/topics/test-topic"}' || true
        echo ""

  pubsub:deploy:consumer:
    desc: Deploy Pub/Sub consumer app on all workload clusters
    cmds:
      - |
        echo "Building pubsub-consumer image..."
        cd {{.ROOT_DIR}}/apps/pubsub-consumer && docker build -t pubsub-consumer:local .

        EMULATOR_IP=$(minikube -p {{.REMOTE_CLUSTER_1}} ip)
        EMULATOR_PORT=$(kubectl --context {{.REMOTE_CLUSTER_1}} get svc -n pubsub-emulator pubsub-emulator -o jsonpath='{.spec.ports[0].nodePort}' 2>/dev/null || echo "")

        if [ -z "$EMULATOR_PORT" ]; then
          EMULATOR_HOST="pubsub-emulator.pubsub-emulator.svc.cluster.local:8085"
          echo "No NodePort found, using cluster-local DNS: $EMULATOR_HOST"
        else
          EMULATOR_HOST="${EMULATOR_IP}:${EMULATOR_PORT}"
          echo "Using NodePort endpoint: $EMULATOR_HOST"
        fi

        for CLUSTER in {{.REMOTE_CLUSTER_1}} {{if eq .NUM_CLUSTERS "3"}}{{.REMOTE_CLUSTER_2}}{{end}}; do
          echo "Loading image and deploying consumer on $CLUSTER..."
          minikube -p $CLUSTER image load pubsub-consumer:local

          cat <<EOF | kubectl --context $CLUSTER apply -f -
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: pubsub-consumer
          namespace: {{.MC_NAMESPACE}}
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: pubsub-consumer
          template:
            metadata:
              labels:
                app: pubsub-consumer
            spec:
              containers:
              - name: consumer
                image: pubsub-consumer:local
                imagePullPolicy: Never
                env:
                - name: PUBSUB_PROJECT_ID
                  value: "test-project"
                - name: PUBSUB_SUBSCRIPTION
                  value: "test-subscription"
                - name: PUBSUB_EMULATOR_HOST
                  value: "$EMULATOR_HOST"
        EOF

          echo "Waiting for consumer on $CLUSTER..."
          kubectl --context $CLUSTER wait --for=condition=ready pod -l app=pubsub-consumer -n {{.MC_NAMESPACE}} --timeout=120s || true
        done

  pubsub:deploy:crds:
    desc: Deploy MirrordSplitConfig and MirrordPropertyList on all workload clusters
    cmds:
      - |
        for CLUSTER in {{.REMOTE_CLUSTER_1}} {{if eq .NUM_CLUSTERS "3"}}{{.REMOTE_CLUSTER_2}}{{end}}; do
          echo "Deploying CRDs on $CLUSTER..."

          EMULATOR_IP=$(minikube -p {{.REMOTE_CLUSTER_1}} ip)
          EMULATOR_PORT=$(kubectl --context {{.REMOTE_CLUSTER_1}} get svc -n pubsub-emulator pubsub-emulator -o jsonpath='{.spec.ports[0].nodePort}' 2>/dev/null || echo "")

          if [ -z "$EMULATOR_PORT" ]; then
            EMULATOR_ENDPOINT="http://pubsub-emulator.pubsub-emulator.svc.cluster.local:8085"
          else
            EMULATOR_ENDPOINT="http://${EMULATOR_IP}:${EMULATOR_PORT}"
          fi

          cat <<EOF | kubectl --context $CLUSTER apply -f -
        apiVersion: mirrord.metalbear.co/v1
        kind: MirrordPropertyList
        metadata:
          name: pubsub-emulator-config
          namespace: {{.MC_NAMESPACE}}
        spec:
          properties:
          - name: endpoint
            value: "$EMULATOR_ENDPOINT"
          - name: project_id
            value: "test-project"
        EOF

          cat <<EOF | kubectl --context $CLUSTER apply -f -
        apiVersion: queues.mirrord.metalbear.co/v1
        kind: MirrordSplitConfig
        metadata:
          name: pubsub-test-config
          namespace: {{.MC_NAMESPACE}}
        spec:
          targetRef:
            apiVersion: apps/v1
            kind: Deployment
            name: pubsub-consumer
          clientConfigs:
            googlePubSub: pubsub-emulator-config
          queues:
          - id: test-subscription
            kind: googlePubSub
            appConfig:
              subscription:
              - env: PUBSUB_SUBSCRIPTION
              projectId:
              - env: PUBSUB_PROJECT_ID
        EOF
        done

  pubsub:send:
    desc: "Publish a test message: task multicluster:pubsub:send TENANT=test-user"
    vars:
      TENANT: '{{.TENANT | default "test-user"}}'
    cmds:
      - |
        POD=$(kubectl --context {{.REMOTE_CLUSTER_1}} get pod -n pubsub-emulator -l app.kubernetes.io/name=pubsub-emulator -o jsonpath='{.items[0].metadata.name}')
        BODY=$(echo -n "{\"tenant\":\"{{.TENANT}}\",\"msg\":\"hello\"}" | base64)
        kubectl --context {{.REMOTE_CLUSTER_1}} exec -n pubsub-emulator $POD -- \
          curl -s -X POST \
            "http://localhost:8085/v1/projects/test-project/topics/test-topic:publish" \
            -H "Content-Type: application/json" \
            -d "{\"messages\":[{\"data\":\"$BODY\",\"attributes\":{\"tenant\":\"{{.TENANT}}\"}}]}"
        echo ""
        echo "Published with tenant={{.TENANT}}"

  pubsub:send:match:
    desc: Publish a message matching the default filter (tenant=test-user)
    cmds:
      - task: pubsub:send
        vars: { TENANT: "test-user" }

  pubsub:send:nomatch:
    desc: Publish a message not matching any filter (tenant=other)
    cmds:
      - task: pubsub:send
        vars: { TENANT: "other" }

  pubsub:send:beta:
    desc: Publish a message for session B (tenant=beta)
    cmds:
      - task: pubsub:send
        vars: { TENANT: "beta" }

  pubsub:send:gamma:
    desc: Publish a message for session C (tenant=gamma)
    cmds:
      - task: pubsub:send
        vars: { TENANT: "gamma" }

  pubsub:send:all-tenants:
    desc: Send one message per tenant (test-user, beta, gamma, other)
    cmds:
      - task: pubsub:send
        vars: { TENANT: "test-user" }
      - task: pubsub:send
        vars: { TENANT: "beta" }
      - task: pubsub:send
        vars: { TENANT: "gamma" }
      - task: pubsub:send
        vars: { TENANT: "other" }

  pubsub:send:flood:
    desc: "Send many messages with random tenants: task multicluster:pubsub:send:flood COUNT=20"
    vars:
      COUNT: '{{.COUNT | default "20"}}'
    cmds:
      - |
        TENANTS=("test-user" "beta" "gamma" "other" "unknown")
        POD=$(kubectl --context {{.REMOTE_CLUSTER_1}} get pod -n pubsub-emulator -l app.kubernetes.io/name=pubsub-emulator -o jsonpath='{.items[0].metadata.name}')

        for i in $(seq 1 {{.COUNT}}); do
          T=${TENANTS[$((RANDOM % ${#TENANTS[@]}))]}
          BODY=$(echo -n "{\"tenant\":\"$T\",\"msg\":\"flood-$i\"}" | base64)
          kubectl --context {{.REMOTE_CLUSTER_1}} exec -n pubsub-emulator $POD -- \
            curl -s -X POST \
              "http://localhost:8085/v1/projects/test-project/topics/test-topic:publish" \
              -H "Content-Type: application/json" \
              -d "{\"messages\":[{\"data\":\"$BODY\",\"attributes\":{\"tenant\":\"$T\"}}]}" >/dev/null
          echo "$i: tenant=$T"
        done
        echo ""
        echo "Sent {{.COUNT}} messages."

  pubsub:status:
    desc: Show Pub/Sub multi-cluster status
    cmds:
      - |
        echo "=== Pub/Sub Multi-Cluster Status ==="
        echo ""
        for CLUSTER in {{.REMOTE_CLUSTER_1}} {{if eq .NUM_CLUSTERS "3"}}{{.REMOTE_CLUSTER_2}}{{end}}; do
          echo "--- $CLUSTER ---"
          echo "Consumer:"
          kubectl --context $CLUSTER get pods -n {{.MC_NAMESPACE}} -l app=pubsub-consumer 2>/dev/null || echo "  Not deployed"
          echo "Split Sessions:"
          kubectl --context $CLUSTER get mirrordclustersplitsessions -A 2>/dev/null || echo "  (none)"
          echo "Split Config:"
          kubectl --context $CLUSTER get mirrordsplitconfigs -n {{.MC_NAMESPACE}} 2>/dev/null || echo "  (none)"
          echo ""
        done

        echo "--- Emulator ({{.REMOTE_CLUSTER_1}}) ---"
        kubectl --context {{.REMOTE_CLUSTER_1}} get pods -n pubsub-emulator -l app.kubernetes.io/name=pubsub-emulator 2>/dev/null || echo "  Not deployed"

  pubsub:logs:
    desc: Show Pub/Sub consumer logs from workload clusters
    cmds:
      - |
        echo "=== Pub/Sub Consumer Logs ==="
        echo ""
        echo "--- {{.REMOTE_CLUSTER_1}} ---"
        kubectl --context {{.REMOTE_CLUSTER_1}} logs -n {{.MC_NAMESPACE}} -l app=pubsub-consumer --tail=20 2>/dev/null || echo "No logs"

        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          echo ""
          echo "--- {{.REMOTE_CLUSTER_2}} ---"
          kubectl --context {{.REMOTE_CLUSTER_2}} logs -n {{.MC_NAMESPACE}} -l app=pubsub-consumer --tail=20 2>/dev/null || echo "No logs"
        fi

  pubsub:clean:
    desc: Remove all Pub/Sub multi-cluster resources
    cmds:
      - |
        for CLUSTER in {{.REMOTE_CLUSTER_1}} {{if eq .NUM_CLUSTERS "3"}}{{.REMOTE_CLUSTER_2}}{{end}}; do
          echo "Cleaning Pub/Sub resources on $CLUSTER..."
          kubectl --context $CLUSTER delete mirrordclustersplitsessions --all -A 2>/dev/null || true
          kubectl --context $CLUSTER delete mirrordclusterexternalresources --all -A 2>/dev/null || true
          kubectl --context $CLUSTER delete mirrordclusterworkloadpatchrequests --all -A 2>/dev/null || true
          kubectl --context $CLUSTER delete mirrordsplitconfig pubsub-test-config -n {{.MC_NAMESPACE}} 2>/dev/null || true
          kubectl --context $CLUSTER delete mirrordpropertylist pubsub-emulator-config -n {{.MC_NAMESPACE}} 2>/dev/null || true
          kubectl --context $CLUSTER delete deploy pubsub-consumer -n {{.MC_NAMESPACE}} 2>/dev/null || true
        done

        echo "Cleaning emulator on {{.REMOTE_CLUSTER_1}}..."
        kubectl --context {{.REMOTE_CLUSTER_1}} delete -f {{.K8S_DIR}}/overlays/pubsub-emulator/pubsub-emulator.yaml --ignore-not-found=true 2>/dev/null || true
        kubectl --context {{.REMOTE_CLUSTER_1}} delete namespace pubsub-emulator --ignore-not-found=true 2>/dev/null || true
        echo "Done."

  pubsub:test:split:
    desc: Run multi-cluster Pub/Sub split test with mirrord exec
    cmds:
      - |
        echo "=== Multi-Cluster Pub/Sub Split Test ==="
        echo ""
        echo "Starting mirrord exec with GcpPubSub split filter (tenant=^test)..."
        echo ""

        cd {{.ROOT_DIR}}/apps/pubsub-consumer && go build -o /tmp/pubsub-consumer-mc main.go

        MIRRORD_CONFIG=$(mktemp /tmp/mirrord-mc-pubsub-XXXXX.json)
        cat > $MIRRORD_CONFIG <<'MIRRORD_EOF'
        {
          "operator": true,
          "target": "deploy/pubsub-consumer",
          "feature": {
            "split_queues": {
              "test-subscription": {
                "queue_type": "GCPPubSub",
                "message_filter": {
                  "tenant": "^test"
                }
              }
            }
          }
        }
        MIRRORD_EOF

        echo "Config: $MIRRORD_CONFIG"
        echo ""
        echo "Starting session (Ctrl+C to stop)..."
        MIRRORD_KUBE_CONTEXT={{.PRIMARY_CLUSTER}} {{.MIRRORD_BIN}} exec \
          -f $MIRRORD_CONFIG \
          -n {{.MC_NAMESPACE}} \
          -- /tmp/pubsub-consumer-mc

  pubsub:test:split:session:
    desc: "Run a single MC Pub/Sub session with a custom tenant filter"
    vars:
      TENANT_FILTER: '{{.TENANT_FILTER | default "^test"}}'
      SESSION_LABEL: '{{.SESSION_LABEL | default "session"}}'
    cmds:
      - |
        cd {{.ROOT_DIR}}/apps/pubsub-consumer && go build -o /tmp/pubsub-consumer-mc-{{.SESSION_LABEL}} main.go

        MIRRORD_CONFIG="/tmp/mirrord-mc-{{.SESSION_LABEL}}.json"
        cat > "$MIRRORD_CONFIG" <<EOF
        {
          "operator": true,
          "target": "deploy/pubsub-consumer",
          "feature": {
            "split_queues": {
              "test-subscription": {
                "queue_type": "GCPPubSub",
                "message_filter": {
                  "tenant": "{{.TENANT_FILTER}}"
                }
              }
            }
          }
        }
        EOF

        echo "Starting {{.SESSION_LABEL}} (filter: tenant={{.TENANT_FILTER}})..."
        echo "Config: $MIRRORD_CONFIG"
        MIRRORD_KUBE_CONTEXT={{.PRIMARY_CLUSTER}} {{.MIRRORD_BIN}} exec \
          -f "$MIRRORD_CONFIG" \
          -n {{.MC_NAMESPACE}} \
          -- /tmp/pubsub-consumer-mc-{{.SESSION_LABEL}}

  pubsub:test:two-sessions:
    desc: "Instructions to run 2 concurrent sessions with different filters"
    cmds:
      - |
        echo ""
        echo "Two-Session Multi-Cluster Pub/Sub Test"
        echo ""
        echo "Both sessions target the same deployment but filter different tenants."
        echo "Unmatched messages (tenant=other) go to the original app."
        echo ""
        echo "  Terminal 1 - Session A (tenant=^test):"
        echo "    cd local-sandbox && task multicluster:pubsub:test:split:session TENANT_FILTER='^test' SESSION_LABEL=session-a"
        echo ""
        echo "  Terminal 2 - Session B (tenant=^beta):"
        echo "    cd local-sandbox && task multicluster:pubsub:test:split:session TENANT_FILTER='^beta' SESSION_LABEL=session-b"
        echo ""
        echo "  Terminal 3 - Send messages and observe:"
        echo "    task multicluster:pubsub:send:all-tenants"
        echo ""
        echo "  Terminal 4 - Consumer logs on each cluster:"
        echo "    kubectl --context {{.REMOTE_CLUSTER_1}} logs -n {{.MC_NAMESPACE}} -l app=pubsub-consumer -f"
        echo "    kubectl --context {{.REMOTE_CLUSTER_2}} logs -n {{.MC_NAMESPACE}} -l app=pubsub-consumer -f"
        echo ""
        echo "  Expected:"
        echo "    Session A receives messages with tenant=test-user"
        echo "    Session B receives messages with tenant=beta"
        echo "    Original app receives messages with tenant=gamma, other, unknown"
        echo ""
        echo "  Inspect state:"
        echo "    task multicluster:pubsub:status"

  pubsub:test:three-sessions:
    desc: "Instructions to run 3 concurrent sessions (2 different filters + 1 duplicate)"
    cmds:
      - |
        echo ""
        echo "Three-Session Multi-Cluster Pub/Sub Test"
        echo ""
        echo "Sessions A and C use the same filter, so they compete for the same"
        echo "messages (GCP Pub/Sub delivers each message to exactly one consumer)."
        echo "Session B uses a different filter."
        echo ""
        echo "  Terminal 1 - Session A (tenant=^test):"
        echo "    cd local-sandbox && task multicluster:pubsub:test:split:session TENANT_FILTER='^test' SESSION_LABEL=session-a"
        echo ""
        echo "  Terminal 2 - Session B (tenant=^beta):"
        echo "    cd local-sandbox && task multicluster:pubsub:test:split:session TENANT_FILTER='^beta' SESSION_LABEL=session-b"
        echo ""
        echo "  Terminal 3 - Session C (tenant=^test - same as A):"
        echo "    cd local-sandbox && task multicluster:pubsub:test:split:session TENANT_FILTER='^test' SESSION_LABEL=session-c"
        echo ""
        echo "  Terminal 4 - Send messages and observe:"
        echo "    task multicluster:pubsub:send:all-tenants"
        echo "    task multicluster:pubsub:send:flood COUNT=30"
        echo ""
        echo "  Terminal 5 - Consumer logs:"
        echo "    kubectl --context {{.REMOTE_CLUSTER_1}} logs -n {{.MC_NAMESPACE}} -l app=pubsub-consumer -f"
        echo "    kubectl --context {{.REMOTE_CLUSTER_2}} logs -n {{.MC_NAMESPACE}} -l app=pubsub-consumer -f"
        echo ""
        echo "  Expected:"
        echo "    Session A and C share tenant=test-user messages (each gets some)"
        echo "    Session B receives messages with tenant=beta"
        echo "    Original app receives messages with tenant=gamma, other, unknown"
        echo ""
        echo "  Inspect state:"
        echo "    task multicluster:pubsub:status"

  pubsub:test:three-sessions:all-different:
    desc: "Instructions to run 3 concurrent sessions with all different filters"
    cmds:
      - |
        echo ""
        echo "Three-Session Multi-Cluster Pub/Sub Test (All Different Filters)"
        echo ""
        echo "Each session filters a unique tenant. Messages not matching any"
        echo "session filter go to the original app."
        echo ""
        echo "  Terminal 1 - Session A (tenant=^test):"
        echo "    cd local-sandbox && task multicluster:pubsub:test:split:session TENANT_FILTER='^test' SESSION_LABEL=session-a"
        echo ""
        echo "  Terminal 2 - Session B (tenant=^beta):"
        echo "    cd local-sandbox && task multicluster:pubsub:test:split:session TENANT_FILTER='^beta' SESSION_LABEL=session-b"
        echo ""
        echo "  Terminal 3 - Session C (tenant=^gamma):"
        echo "    cd local-sandbox && task multicluster:pubsub:test:split:session TENANT_FILTER='^gamma' SESSION_LABEL=session-c"
        echo ""
        echo "  Terminal 4 - Send messages:"
        echo "    task multicluster:pubsub:send:all-tenants"
        echo "    task multicluster:pubsub:send:flood COUNT=30"
        echo ""
        echo "  Terminal 5 - Consumer logs:"
        echo "    kubectl --context {{.REMOTE_CLUSTER_1}} logs -n {{.MC_NAMESPACE}} -l app=pubsub-consumer -f"
        echo "    kubectl --context {{.REMOTE_CLUSTER_2}} logs -n {{.MC_NAMESPACE}} -l app=pubsub-consumer -f"
        echo ""
        echo "  Expected:"
        echo "    Session A receives messages with tenant=test-user"
        echo "    Session B receives messages with tenant=beta"
        echo "    Session C receives messages with tenant=gamma"
        echo "    Original app receives messages with tenant=other, unknown"
        echo ""
        echo "  Inspect state:"
        echo "    task multicluster:pubsub:status"

  preview:start:
    desc: Start a preview environment (multi-cluster, via primary)
    vars:
      PREVIEW_KEY: '{{.PREVIEW_KEY | default "test-preview"}}'
      PREVIEW_IMAGE: '{{.PREVIEW_IMAGE | default "echo-app:latest"}}'
      PREVIEW_TIMEOUT: '{{.PREVIEW_TIMEOUT | default "300"}}'
    cmds:
      - |
        echo "=== Starting Preview Environment (Multi-Cluster) ==="
        echo ""
        echo "  Context:  {{.PRIMARY_CLUSTER}} (primary)"
        echo "  Target:   deploy/echo-app in {{.MC_NAMESPACE}}"
        echo "  Image:    {{.PREVIEW_IMAGE}}"
        echo "  Key:      {{.PREVIEW_KEY}}"
        echo "  Timeout:  {{.PREVIEW_TIMEOUT}}s"
        echo ""
        echo "The PreviewSession CR is created on the primary cluster."
        echo "The sync controller forwards it to the default cluster ({{.REMOTE_CLUSTER_1}})."
        echo "The preview pod runs on {{.REMOTE_CLUSTER_1}}."
        echo ""

        {{.MIRRORD_BIN}} preview start \
          --context {{.PRIMARY_CLUSTER}} \
          -f {{.APPS_DIR}}/echo-app/mirrord-preview.json \
          -i "{{.PREVIEW_IMAGE}}" \
          -k "{{.PREVIEW_KEY}}" \
          --timeout {{.PREVIEW_TIMEOUT}}

  preview:start:single-cluster:
    desc: Start a preview environment (single-cluster, directly on remote-1)
    vars:
      PREVIEW_KEY: '{{.PREVIEW_KEY | default "test-preview-sc"}}'
      PREVIEW_IMAGE: '{{.PREVIEW_IMAGE | default "echo-app:latest"}}'
      PREVIEW_TIMEOUT: '{{.PREVIEW_TIMEOUT | default "300"}}'
    cmds:
      - |
        echo "=== Starting Preview Environment (Single-Cluster) ==="
        echo ""
        echo "  Context:  {{.REMOTE_CLUSTER_1}} (direct)"
        echo "  Target:   deploy/echo-app in {{.MC_NAMESPACE}}"
        echo "  Image:    {{.PREVIEW_IMAGE}}"
        echo "  Key:      {{.PREVIEW_KEY}}"
        echo "  Timeout:  {{.PREVIEW_TIMEOUT}}s"
        echo ""
        echo "The PreviewSession CR is created directly on {{.REMOTE_CLUSTER_1}}."
        echo "No sync controller involved - the local operator handles it."
        echo ""

        {{.MIRRORD_BIN}} preview start \
          --context {{.REMOTE_CLUSTER_1}} \
          -f {{.APPS_DIR}}/echo-app/mirrord-preview.json \
          -i "{{.PREVIEW_IMAGE}}" \
          -k "{{.PREVIEW_KEY}}" \
          --timeout {{.PREVIEW_TIMEOUT}}

  preview:status:
    desc: Show preview session status
    vars:
      PREVIEW_KEY: '{{.PREVIEW_KEY | default "test-preview"}}'
    cmds:
      - |
        echo "=== Preview Status ==="
        echo ""

        echo "--- Primary cluster ({{.PRIMARY_CLUSTER}}) ---"
        kubectl --context {{.PRIMARY_CLUSTER}} get previewsessions -n {{.MC_NAMESPACE}} 2>/dev/null || \
          kubectl --context {{.PRIMARY_CLUSTER}} get previewsessions -n mirrord 2>/dev/null || \
          echo "  No preview sessions"

        echo ""
        echo "--- Default cluster ({{.REMOTE_CLUSTER_1}}) ---"
        kubectl --context {{.REMOTE_CLUSTER_1}} get previewsessions -n {{.MC_NAMESPACE}} 2>/dev/null || echo "  No preview sessions"

        echo ""
        echo "--- Preview pods ({{.REMOTE_CLUSTER_1}}) ---"
        kubectl --context {{.REMOTE_CLUSTER_1}} get pods -n {{.MC_NAMESPACE}} -l operator.metalbear.co/managed-by=preview 2>/dev/null || \
          kubectl --context {{.REMOTE_CLUSTER_1}} get pods -n {{.MC_NAMESPACE}} | grep -i preview 2>/dev/null || \
          echo "  No preview pods"

  preview:stop:
    desc: Stop a preview environment (multi-cluster)
    vars:
      PREVIEW_KEY: '{{.PREVIEW_KEY | default "test-preview"}}'
    cmds:
      - |
        echo "Stopping preview with key: {{.PREVIEW_KEY}} (via {{.PRIMARY_CLUSTER}})"

        {{.MIRRORD_BIN}} preview stop \
          --context {{.PRIMARY_CLUSTER}} \
          -k "{{.PREVIEW_KEY}}" || true

        echo ""
        echo "Preview stopped."

  preview:stop:single-cluster:
    desc: Stop a preview environment (single-cluster)
    vars:
      PREVIEW_KEY: '{{.PREVIEW_KEY | default "test-preview-sc"}}'
    cmds:
      - |
        echo "Stopping preview with key: {{.PREVIEW_KEY}} (via {{.REMOTE_CLUSTER_1}})"

        {{.MIRRORD_BIN}} preview stop \
          --context {{.REMOTE_CLUSTER_1}} \
          -k "{{.PREVIEW_KEY}}" || true

        echo ""
        echo "Preview stopped."

  preview:list:
    desc: List all preview sessions across clusters
    cmds:
      - |
        echo "=== Preview Sessions ==="
        echo ""

        echo "--- Primary ({{.PRIMARY_CLUSTER}}) ---"
        kubectl --context {{.PRIMARY_CLUSTER}} get previewsessions -A 2>/dev/null || echo "  None (or CRD not installed)"

        echo ""
        echo "--- Remote-1 ({{.REMOTE_CLUSTER_1}}) ---"
        kubectl --context {{.REMOTE_CLUSTER_1}} get previewsessions -A 2>/dev/null || echo "  None (or CRD not installed)"

        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          echo ""
          echo "--- Remote-2 ({{.REMOTE_CLUSTER_2}}) ---"
          kubectl --context {{.REMOTE_CLUSTER_2}} get previewsessions -A 2>/dev/null || echo "  None (or CRD not installed)"
        fi

  preview:test:traffic:
    desc: Generate traffic with preview header (should be routed to preview pod)
    vars:
      PREVIEW_KEY: '{{.PREVIEW_KEY | default "test-preview"}}'
    cmds:
      - |
        echo "Generating traffic WITH preview header (X-Preview: {{.PREVIEW_KEY}})"
        echo "This traffic SHOULD be routed to the preview pod."
        echo "Press Ctrl+C to stop"
        echo ""

        i=1
        while true; do
          echo "--- Request $i (with preview header) ---"

          echo -n "REMOTE-1: "
          kubectl --context {{.REMOTE_CLUSTER_1}} exec -n {{.MC_NAMESPACE}} deploy/echo-app -- \
            wget -q -O- --header="X-Preview: {{.PREVIEW_KEY}}" \
            http://echo-app:8080/echo?from=preview 2>/dev/null | head -1 || echo "failed"

          i=$((i + 1))
          sleep 2
        done

  preview:test:traffic:no-header:
    desc: Generate traffic without preview header (should go to original pod)
    cmds:
      - |
        echo "Generating traffic WITHOUT preview header"
        echo "This traffic should go to the ORIGINAL pod (not the preview)."
        echo "Press Ctrl+C to stop"
        echo ""

        i=1
        while true; do
          echo "--- Request $i (no preview header) ---"

          echo -n "REMOTE-1: "
          kubectl --context {{.REMOTE_CLUSTER_1}} exec -n {{.MC_NAMESPACE}} deploy/echo-app -- \
            wget -q -O- http://echo-app:8080/echo?from=normal 2>/dev/null | head -1 || echo "failed"

          i=$((i + 1))
          sleep 2
        done

  preview:test:
    desc: Interactive preview environment test guide
    cmds:
      - |
        echo "============================================"
        echo "  Preview Environment Test Guide"
        echo "============================================"
        echo ""
        echo "Prerequisites:"
        echo "  - Multi-cluster setup is running (task multicluster:setup:all)"
        echo "  - Echo apps are deployed (task multicluster:test:deploy:echo-apps)"
        echo "  - Echo app image is loaded (task multicluster:echo-app:load)"
        echo ""
        echo "============================================"
        echo "  MULTI-CLUSTER TEST"
        echo "============================================"
        echo ""
        echo "1. Start preview (creates PreviewSession on primary, synced to default cluster):"
        echo ""
        echo "   task multicluster:preview:start PREVIEW_KEY=my-preview"
        echo ""
        echo "2. Check status:"
        echo ""
        echo "   task multicluster:preview:status"
        echo "   task multicluster:preview:list"
        echo ""
        echo "3. In another terminal, send traffic WITH the preview header:"
        echo ""
        echo "   task multicluster:preview:test:traffic PREVIEW_KEY=my-preview"
        echo ""
        echo "4. In another terminal, send traffic WITHOUT the header (goes to original pod):"
        echo ""
        echo "   task multicluster:preview:test:traffic:no-header"
        echo ""
        echo "5. Stop the preview:"
        echo ""
        echo "   task multicluster:preview:stop PREVIEW_KEY=my-preview"
        echo ""
        echo "============================================"
        echo "  SINGLE-CLUSTER TEST"
        echo "============================================"
        echo ""
        echo "1. Start preview directly on remote-1 (no sync controller):"
        echo ""
        echo "   task multicluster:preview:start:single-cluster PREVIEW_KEY=my-sc-preview"
        echo ""
        echo "2. Send traffic with the header:"
        echo ""
        echo "   task multicluster:preview:test:traffic PREVIEW_KEY=my-sc-preview"
        echo ""
        echo "3. Stop:"
        echo ""
        echo "   task multicluster:preview:stop:single-cluster PREVIEW_KEY=my-sc-preview"
        echo ""
        echo "============================================"
        echo "  NOTES"
        echo "============================================"
        echo ""
        echo "  - The preview pod uses the echo-app image (echo-app:latest)"
        echo "  - Traffic with 'X-Preview: <key>' header is stolen by the preview pod"
        echo "  - Traffic without the header goes to the original deployment"
        echo "  - Preview sessions have a 30-minute TTL (configurable in mirrord-preview.json)"
        echo "  - The mirrord config is at: apps/echo-app/mirrord-preview.json"
        echo ""

  flaky:setup:
    desc: Setup multi-cluster env with constrained resources to reproduce flaky tests
    cmds:
      - |
        echo "=== Flaky Repro Setup ==="
        echo "Creating clusters with default resources + network latency to stress timing."
        echo ""
      - task: teardown:all
      - sleep 2
      - NUM_CLUSTERS=3 task multicluster:setup:all:with-sqs:single
      - task: flaky:network:slow
      - echo ""
      - echo "=== Constrained environment ready ==="
      - echo ""
      - echo "Run the flaky tests with:"
      - echo "  task multicluster:flaky:run"
      - echo ""
      - echo "Or run them in a loop until failure:"
      - echo "  task multicluster:flaky:loop"

  flaky:network:slow:
    desc: Add network latency between clusters to stress timing-sensitive code paths
    vars:
      LATENCY_MS: '{{.LATENCY_MS | default "150"}}'
      JITTER_MS: '{{.JITTER_MS | default "50"}}'
    cmds:
      - |
        echo "Adding {{.LATENCY_MS}}ms +/- {{.JITTER_MS}}ms latency to cross-cluster traffic..."
        for CLUSTER in {{.PRIMARY_CLUSTER}} {{.REMOTE_CLUSTER_1}} {{.REMOTE_CLUSTER_2}}; do
          if docker inspect "$CLUSTER" >/dev/null 2>&1; then
            docker exec "$CLUSTER" sh -c "apt-get update -qq && apt-get install -y -qq iproute2 >/dev/null 2>&1 || true"
            docker exec "$CLUSTER" tc qdisc replace dev eth0 root netem delay {{.LATENCY_MS}}ms {{.JITTER_MS}}ms 2>/dev/null \
              && echo "  $CLUSTER: latency added" \
              || echo "  $CLUSTER: tc not available (try: docker exec $CLUSTER apt-get install -y iproute2)"
          else
            echo "  $CLUSTER: container not found, skipping"
          fi
        done

  flaky:network:reset:
    desc: Remove artificial network latency from clusters
    cmds:
      - |
        echo "Removing network latency..."
        for CLUSTER in {{.PRIMARY_CLUSTER}} {{.REMOTE_CLUSTER_1}} {{.REMOTE_CLUSTER_2}}; do
          if docker inspect "$CLUSTER" >/dev/null 2>&1; then
            docker exec "$CLUSTER" tc qdisc del dev eth0 root 2>/dev/null \
              && echo "  $CLUSTER: latency removed" \
              || echo "  $CLUSTER: no qdisc to remove"
          fi
        done

  flaky:run:
    desc: Run the two flaky multicluster tests once
    dir: "{{.ROOT_DIR}}/../operator"
    env:
      MC_PRIMARY_CONTEXT: "{{.PRIMARY_CLUSTER}}"
      MC_REMOTE_1_NAME: "{{.REMOTE_CLUSTER_1}}"
      MC_REMOTE_1_CONTEXT: "{{.REMOTE_CLUSTER_1}}"
      MC_REMOTE_2_NAME: "{{.REMOTE_CLUSTER_2}}"
      MC_REMOTE_2_CONTEXT: "{{.REMOTE_CLUSTER_2}}"
      MC_DEFAULT_CLUSTER: "{{.REMOTE_CLUSTER_1}}"
      MIRRORD_AGENT_IMAGE: test
      RUST_LOG: warn,mirrord=debug
    cmds:
      - |
        echo "=== Running flaky multicluster tests ==="
        echo ""
        echo "Tests:"
        echo "  - multicluster_mirror_with_header_filter"
        echo "  - multicluster_copy_target_with_sqs_splitting"
        echo ""
      - task: test:cleanup:all
      - |
        cargo test -p tests -- \
          --ignored \
          --nocapture \
          --test-threads=1 \
          multicluster_mirror_with_header_filter
      # - task: test:cleanup:all
      # - |
      #   cargo test -p tests -- \
      #     --ignored \
      #     --nocapture \
      #     --test-threads=1 \
      #     multicluster_copy_target_with_sqs_splitting

  flaky:loop:
    desc: Run flaky tests in a loop until one fails (max FLAKY_MAX_RUNS iterations)
    dir: "{{.ROOT_DIR}}/../operator"
    vars:
      FLAKY_MAX_RUNS: '{{.FLAKY_MAX_RUNS | default "20"}}'
    env:
      MC_PRIMARY_CONTEXT: "{{.PRIMARY_CLUSTER}}"
      MC_REMOTE_1_NAME: "{{.REMOTE_CLUSTER_1}}"
      MC_REMOTE_1_CONTEXT: "{{.REMOTE_CLUSTER_1}}"
      MC_REMOTE_2_NAME: "{{.REMOTE_CLUSTER_2}}"
      MC_REMOTE_2_CONTEXT: "{{.REMOTE_CLUSTER_2}}"
      MC_DEFAULT_CLUSTER: "{{.REMOTE_CLUSTER_1}}"
      MIRRORD_AGENT_IMAGE: test
      RUST_LOG: warn,mirrord=debug
    cmds:
      - |
        echo "=== Flaky test loop (max {{.FLAKY_MAX_RUNS}} runs) ==="
        echo ""

        run_test() {
          local test_name="$1"
          task multicluster:test:cleanup:all 2>/dev/null || true
          cargo test -p tests -- \
            --ignored \
            --nocapture \
            --test-threads=1 \
            "$test_name"
        }

        for i in $(seq 1 {{.FLAKY_MAX_RUNS}}); do
          echo ""
          echo "========== Run $i / {{.FLAKY_MAX_RUNS}} =========="
          echo ""

          if ! run_test multicluster_mirror_with_header_filter; then
            echo ""
            echo "FAILED multicluster_mirror_with_header_filter on run $i"
            echo ""
            echo "Collecting operator logs..."
            kubectl --context {{.PRIMARY_CLUSTER}} logs -n mirrord deployment/mirrord-operator --tail=50 2>/dev/null || true
            echo "---"
            kubectl --context {{.REMOTE_CLUSTER_1}} logs -n mirrord deployment/mirrord-operator --tail=50 2>/dev/null || true
            exit 1
          fi

          if ! run_test multicluster_copy_target_with_sqs_splitting; then
            echo ""
            echo "FAILED multicluster_copy_target_with_sqs_splitting on run $i"
            echo ""
            echo "Collecting operator logs..."
            kubectl --context {{.PRIMARY_CLUSTER}} logs -n mirrord deployment/mirrord-operator --tail=50 2>/dev/null || true
            echo "---"
            kubectl --context {{.REMOTE_CLUSTER_1}} logs -n mirrord deployment/mirrord-operator --tail=50 2>/dev/null || true
            exit 1
          fi

          echo "Run $i passed"
        done

        echo ""
        echo "All {{.FLAKY_MAX_RUNS}} runs passed - could not reproduce the flake."

  # Wildcard seed test: 5 queue IDs in registry, 3 queues on target,
  # mirrord config uses explicit queue-a + "*" wildcard for queue-b and queue-c.
  # Tests that the seed-based deterministic naming works in MC mode.

  test:sqs:wildcard-seed:setup:
    desc: Set up the multi-queue wildcard seed test (3 queues, 5 registry entries)
    cmds:
      - |
        echo "=== Wildcard Seed Test Setup ==="
        echo ""

        # Single-LocalStack setup: queues only on remote-1
        echo "Creating queues on {{.REMOTE_CLUSTER_1}} (shared LocalStack)..."
        for Q in queue-a queue-b queue-c; do
          kubectl --context {{.REMOTE_CLUSTER_1}} exec -n localstack deploy/localstack -- \
            awslocal sqs create-queue --queue-name $Q 2>/dev/null || true
        done
        echo "Queues on {{.REMOTE_CLUSTER_1}}:"
        kubectl --context {{.REMOTE_CLUSTER_1}} exec -n localstack deploy/localstack -- \
          awslocal sqs list-queues
        echo ""

        # Deploy the queue registry to primary in operator namespace.
        # The sync controller distributes it to all remote clusters.
        kubectl --context {{.PRIMARY_CLUSTER}} apply -f {{.K8S_DIR}}/overlays/multicluster-sqs/queue-registry-multi-operator-ns.yaml

        echo "Queue registry applied to primary (5 queue IDs: queue-a through queue-e)"
        echo "Sync controller will distribute to remote clusters"
        echo "Target will only have env vars for queue-a, queue-b, queue-c"
        echo ""

        # Build the multi-consumer image (reads QUEUE_A, not QUEUE_NAME)
        echo "Building SQS multi-consumer..."
        cd {{.APPS_DIR}}/sqs-multi-consumer
        docker build -t sqs-multi-consumer:latest . 2>/dev/null

        # All clusters share LocalStack on remote-1 via NodePort
        LOCALSTACK_IP=$(minikube -p {{.REMOTE_CLUSTER_1}} ip)
        LOCALSTACK_URL="http://${LOCALSTACK_IP}:31566"
        echo "LocalStack URL: $LOCALSTACK_URL"
        echo ""

        # Build list of all clusters
        CLUSTERS="{{.REMOTE_CLUSTER_1}} {{.PRIMARY_CLUSTER}}"
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          CLUSTERS="$CLUSTERS {{.REMOTE_CLUSTER_2}}"
        fi

        # Load and deploy to each cluster
        for CLUSTER in $CLUSTERS; do
          minikube -p $CLUSTER image load sqs-multi-consumer:latest 2>/dev/null || true

          echo "Deploying sqs-multi-consumer to $CLUSTER..."
          cat <<EOF | kubectl --context $CLUSTER apply -f -
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: sqs-multi-consumer
          namespace: {{.MC_NAMESPACE}}
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: sqs-multi-consumer
          template:
            metadata:
              labels:
                app: sqs-multi-consumer
            spec:
              containers:
              - name: consumer
                image: sqs-multi-consumer:latest
                imagePullPolicy: Never
                env:
                - name: QUEUE_A
                  value: "queue-a"
                - name: QUEUE_B
                  value: "queue-b"
                - name: QUEUE_C
                  value: "queue-c"
                - name: AWS_ACCESS_KEY_ID
                  value: "test"
                - name: AWS_SECRET_ACCESS_KEY
                  value: "test"
                - name: AWS_REGION
                  value: "us-east-1"
                - name: AWS_ENDPOINT_URL
                  value: "$LOCALSTACK_URL"
                - name: CLUSTER_ID
                  value: "$CLUSTER"
        EOF
        done

        echo ""
        echo "Waiting for consumers to be ready..."
        for CLUSTER in $CLUSTERS; do
          kubectl --context $CLUSTER wait --for=condition=available \
            deploy/sqs-multi-consumer -n {{.MC_NAMESPACE}} --timeout=120s || true
        done

        echo ""
        echo "Setup complete!"
        echo ""
        echo "Registry has 5 queue IDs (queue-a through queue-e)"
        echo "Target has 3 env vars (QUEUE_A, QUEUE_B, QUEUE_C)"
        echo "queue-d and queue-e are NOT resolvable from the target"
        echo ""
        echo "To run the test:"
        echo "  task multicluster:test:sqs:wildcard-seed:run"

  test:sqs:wildcard-seed:run:
    desc: "Run the wildcard seed test: explicit queue-a + wildcard * for queue-b and queue-c"
    cmds:
      - |
        echo "=== Wildcard Seed Test ==="
        echo ""
        echo "mirrord config: queue-a (explicit, type=^premium$) + * (wildcard, type=.*)"
        echo "Expected: queue-a gets premium filter, queue-b and queue-c get wildcard filter"
        echo "In MC mode, all queue names are generated deterministically using session_id as seed"
        echo ""

        cd {{.APPS_DIR}}/sqs-multi-consumer
        go build -o /tmp/sqs-multi-consumer main.go 2>/dev/null || echo "Build may have failed"

        export AWS_ACCESS_KEY_ID=test
        export AWS_SECRET_ACCESS_KEY=test
        export AWS_REGION=us-east-1

        echo "Starting mirrord session with wildcard seed config..."
        echo "Send messages with: task multicluster:test:sqs:wildcard-seed:send"
        echo ""

        {{.MIRRORD_BIN}} exec \
          --context {{.PRIMARY_CLUSTER}} \
          -f {{.K8S_DIR}}/overlays/multicluster-sqs/mirrord-wildcard-seed.json \
          -- /tmp/sqs-multi-consumer

  test:sqs:wildcard-seed:send:
    desc: Send test messages to all 3 queues with different type attributes
    cmds:
      - |
        echo "=== Sending messages to queue-a, queue-b, queue-c ==="
        echo ""

        LOCALSTACK_CTX={{.REMOTE_CLUSTER_1}}

        for Q in queue-a queue-b queue-c; do
          for TYPE in premium gold basic; do
            echo "Sending type=$TYPE to $Q..."
            kubectl --context $LOCALSTACK_CTX exec -n localstack deploy/localstack -- \
              awslocal sqs send-message \
                --queue-url http://localhost:4566/000000000000/$Q \
                --message-body "{\"order_id\":\"${Q}-${TYPE}\",\"type\":\"$TYPE\",\"amount\":100}" \
                --message-attributes "type={DataType=String,StringValue=$TYPE}" \
                > /dev/null
          done
        done

        echo ""
        echo "Sent 9 messages (3 queues x 3 types)"
        echo ""
        echo "Expected routing:"
        echo "  queue-a premium -> local consumer (explicit queue-a filter matches)"
        echo "  queue-a gold/basic -> target pod (explicit filter rejects)"
        echo "  queue-b all types -> local consumer (wildcard * matches all)"
        echo "  queue-c all types -> local consumer (wildcard * matches all)"

  test:sqs:wildcard-seed:status:
    desc: Show status of the wildcard seed test sessions and queues
    cmds:
      - |
        CLUSTERS="{{.REMOTE_CLUSTER_1}}"
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          CLUSTERS="$CLUSTERS {{.REMOTE_CLUSTER_2}}"
        fi

        echo "=== MC Sessions ==="
        kubectl --context {{.PRIMARY_CLUSTER}} get mirrordmulticlustersessions -n {{.MC_NAMESPACE}} -o wide 2>/dev/null || echo "No MC sessions"
        echo ""

        echo "=== SQS Sessions ==="
        for CLUSTER in $CLUSTERS; do
          echo "$CLUSTER:"
          kubectl --context $CLUSTER get mirrordsqssessions -n {{.MC_NAMESPACE}} -o wide 2>/dev/null || echo "  No sessions"
          echo ""
        done

        echo "=== Queue Registries ==="
        kubectl --context {{.PRIMARY_CLUSTER}} get mirrordworkloadqueueregistries -n mirrord -o wide 2>/dev/null || echo "None"
        echo ""

        echo "=== Workload Patch Requests ==="
        for CLUSTER in $CLUSTERS; do
          echo "$CLUSTER:"
          kubectl --context $CLUSTER get mirrordclusterworkloadpatchrequests -n {{.MC_NAMESPACE}} -o wide 2>/dev/null || echo "  None"
          echo ""
        done

        echo "=== Consumer Pods ==="
        for CLUSTER in {{.PRIMARY_CLUSTER}} $CLUSTERS; do
          echo "$CLUSTER:"
          kubectl --context $CLUSTER get pods -n {{.MC_NAMESPACE}} -l app=sqs-multi-consumer -o wide 2>/dev/null || echo "  None"
          echo ""
        done

        echo "=== Queues on LocalStack ==="
        kubectl --context {{.REMOTE_CLUSTER_1}} exec -n localstack deploy/localstack -- \
          awslocal sqs list-queues 2>/dev/null || echo "LocalStack not available"

  test:sqs:wildcard-seed:clean:
    desc: Clean up wildcard seed test resources
    cmds:
      - |
        CLUSTERS="{{.PRIMARY_CLUSTER}} {{.REMOTE_CLUSTER_1}}"
        if [ "{{.NUM_CLUSTERS}}" = "3" ]; then
          CLUSTERS="$CLUSTERS {{.REMOTE_CLUSTER_2}}"
        fi
        for CLUSTER in $CLUSTERS; do
          kubectl --context $CLUSTER delete deploy sqs-multi-consumer -n {{.MC_NAMESPACE}} 2>/dev/null || true
        done
        kubectl --context {{.PRIMARY_CLUSTER}} delete mirrordworkloadqueueregistries sqs-multi-registry -n mirrord 2>/dev/null || true
        echo "Cleaned up wildcard seed test resources"
