      - echo "    task servicebus:send TENANT=other TYPE=premium"
      - echo "    task servicebus:send TENANT=other TYPE=basic"
      - echo "    Expected - only type=premium in body JSON received, regardless of tenant"
      - echo ""
      - echo "  Test 4 - Wildcard queue key (split_queues[\"*\"]):"
