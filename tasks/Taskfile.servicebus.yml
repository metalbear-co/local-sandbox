      - kubectl get mirrordclusterexternalresources -A 2>/dev/null || echo "(none)"

  preview:logs:
    desc: "Show logs from the preview pod"
    cmds:
      - kubectl logs -n {{.NAMESPACE}} -l operator.metalbear.co/managed-by=preview --tail=100 -f

  preview:test:
    desc: "Full preview test: deploy, start preview, send messages, verify routing"
    cmds:
      - task: preview:deploy
      - echo ""
      - echo "ASB Preview Environment Test"
      - echo ""
      - echo "  Step 1 - Start the preview session (in a separate terminal):"
      - echo "    cd local-sandbox && task servicebus:preview:start"
      - echo ""
      - echo "  Step 2 - Watch preview pod logs (in another terminal):"
      - echo "    cd local-sandbox && task servicebus:preview:logs"
      - echo ""
      - echo "  Step 3 - Watch target pod logs (in another terminal):"
      - echo "    cd local-sandbox && task servicebus:logs"
      - echo ""
      - echo "  Step 4 - Watch operator logs (in another terminal):"
      - echo "    cd local-sandbox && task logs:operator"
      - echo ""
      - echo "  Step 5 - Send messages (after preview is Ready):"
      - echo "    task servicebus:send:match          (tenant=test-user - should go to preview pod)"
      - echo "    task servicebus:send:nomatch         (tenant=other - should go to target pod)"
      - echo "    task servicebus:preview:status        (check state)"
      - echo ""
      - echo "  Step 6 - Stop the preview:"
      - echo "    task servicebus:preview:stop"
      - echo "    task servicebus:preview:status        (should show no sessions)"

  preview:test:topic:
    desc: "Preview test with topic/subscription model"
    cmds:
      - task: deploy:topic
      - echo ""
      - echo "ASB Preview Environment Test (Topic/Subscription)"
      - echo ""
      - echo "  Step 1 - Start the preview session:"
      - echo "    cd local-sandbox && task servicebus:preview:start:topic"
      - echo ""
      - echo "  Step 2 - Watch preview pod logs:"
      - echo "    cd local-sandbox && task servicebus:preview:logs"
      - echo ""
      - echo "  Step 3 - Watch target pod logs:"
      - echo "    cd local-sandbox && task servicebus:logs:topic"
      - echo ""
      - echo "  Step 4 - Send messages (after preview is Ready):"
      - echo "    task servicebus:send:topic TENANT=test-user  (should go to preview pod)"
      - echo "    task servicebus:send:topic TENANT=other       (should go to target pod)"
      - echo "    task servicebus:preview:status"
      - echo ""
      - echo "  Step 5 - Stop the preview:"
      - echo "    task servicebus:preview:stop PREVIEW_KEY=test-asb-preview-topic"

  preview:test:jq:
    desc: "Preview test with JQ body filter"
    cmds:
      - task: deploy
      - echo ""
      - echo "ASB Preview Environment Test (JQ Body Filter)"
      - echo ""
      - echo "  Step 1 - Start the preview session:"
      - echo "    cd local-sandbox && task servicebus:preview:start:jq"
      - echo ""
      - echo "  Step 2 - Watch preview pod logs:"
      - echo "    cd local-sandbox && task servicebus:preview:logs"
      - echo ""
      - echo "  Step 3 - Send messages (after preview is Ready):"
      - echo "    task servicebus:send TENANT=other TYPE=premium   (body matches .type==premium - should go to preview)"
      - echo "    task servicebus:send TENANT=other TYPE=basic     (body has .type==basic - should go to target)"
      - echo "    task servicebus:preview:status"
      - echo ""
      - echo "  Step 4 - Stop the preview:"
      - echo "    task servicebus:preview:stop PREVIEW_KEY=test-asb-preview-jq"

  preview:clean:
    desc: "Delete all preview sessions and related resources"
    cmds:
      - echo "Deleting preview sessions..."
      - kubectl delete previewsessions --all -n {{.NAMESPACE}} 2>/dev/null || echo "(none)"
      - echo ""
      - echo "Deleting preview pods..."
      - kubectl delete pods -n {{.NAMESPACE}} -l operator.metalbear.co/managed-by=preview 2>/dev/null || echo "(none)"
      - echo ""
      - task: test:split:cleanup

  clean:e2e:
    desc: "Delete stale E2E test namespaces and orphaned cluster resources"
    cmds:
      - |
        set +e
        echo "Looking for stale e2e-tests-servicebus-splitting-* namespaces..."
        STALE_NS=$(kubectl get namespaces -o jsonpath='{.items[*].metadata.name}' 2>/dev/null | tr ' ' '\n' | grep '^e2e-tests-servicebus-splitting-')
        if [ -z "$STALE_NS" ]; then
          echo "  No stale namespaces found."
        else
          COUNT=$(echo "$STALE_NS" | wc -l | tr -d ' ')
          echo "  Found $COUNT stale namespace(s):"
          echo "$STALE_NS" | sed 's/^/    /'
          echo ""
          echo "  Deleting..."
          for ns in $STALE_NS; do
            kubectl delete namespace "$ns" --wait=false 2>/dev/null || true
          done
        fi
        echo ""

        echo "Checking for orphaned MirrordClusterExternalResources..."
        ORPHANS=$(kubectl get mirrordclusterexternalresources -o jsonpath='{.items[*].metadata.name}' 2>/dev/null | tr ' ' '\n')
        if [ -z "$ORPHANS" ]; then
          echo "  No orphaned external resources."
        else
          COUNT=$(echo "$ORPHANS" | wc -l | tr -d ' ')
          echo "  Found $COUNT external resource(s). Removing finalizers and deleting..."
          for res in $ORPHANS; do
            kubectl patch mirrordclusterexternalresource "$res" --type=json -p='[{"op":"remove","path":"/metadata/finalizers"}]' 2>/dev/null || true
          done
          kubectl delete mirrordclusterexternalresources --all 2>/dev/null || true
        fi
        echo ""

        echo "Scaling down test-mirrord servicebus-consumer (prevents queue contention)..."
        kubectl scale deployment servicebus-consumer -n {{.NAMESPACE}} --replicas=0 2>/dev/null || true
        echo ""

        echo "Restarting emulator (SQL Edge + emulator) to clear corrupted state..."
        kubectl delete pod -n {{.EMULATOR_NAMESPACE}} servicebus-emulator azure-sql-edge --wait=true 2>/dev/null || true
        kubectl apply -f {{.OVERLAY_DIR}}/servicebus-emulator.yaml 2>/dev/null || true
        echo "  Waiting for SQL Edge..."
        kubectl wait --for=condition=ready pod azure-sql-edge -n {{.EMULATOR_NAMESPACE}} --timeout=180s 2>/dev/null || true
        echo "  Waiting for Service Bus emulator..."
        kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=servicebus-emulator -n {{.EMULATOR_NAMESPACE}} --timeout=180s 2>/dev/null || true
        echo ""

        echo "test-mirrord servicebus-consumer stays scaled to 0 (prevents queue contention during E2E tests)."
        echo "Run 'kubectl scale deployment servicebus-consumer -n {{.NAMESPACE}} --replicas=1' to restore it for local sandbox testing."
        echo ""
        echo "Cleanup complete. Ready for tests."

  reset:
    desc: "Full reset: clean CRDs, restart emulator, redeploy consumers"
    cmds:
      - echo "Cleaning leftover CRDs..."
      - kubectl delete mirrordclustersplitsessions --all -A 2>/dev/null || true
      - kubectl delete mirrordclusterexternalresources --all -A 2>/dev/null || true
      - kubectl delete mirrordclusterworkloadpatchrequests --all -A 2>/dev/null || true
      - echo ""
      - echo "Bouncing emulator pods..."
      - kubectl delete pod -n {{.EMULATOR_NAMESPACE}} servicebus-emulator --wait=true 2>/dev/null || true
      - kubectl delete pod -n {{.EMULATOR_NAMESPACE}} azure-sql-edge --wait=true 2>/dev/null || true
      - task: _deploy:emulator:amd64
        vars:
          MANIFEST: "{{.OVERLAY_DIR}}/servicebus-emulator.yaml"
      - echo ""
      - echo "Rebuilding consumer image..."
      - task: build
      - echo ""
      - echo "Redeploying single-queue consumer..."
      - kubectl delete -f {{.OVERLAY_DIR}}/consumer.yaml --ignore-not-found=true 2>/dev/null || true
      - kubectl apply -f {{.OVERLAY_DIR}}/consumer.yaml
      - task: _wait:consumer
      - echo ""
      - echo "Redeploying multi-queue consumer..."
      - kubectl delete -f {{.OVERLAY_DIR}}/consumer-multi-queue.yaml --ignore-not-found=true 2>/dev/null || true
      - kubectl apply -f {{.OVERLAY_DIR}}/consumer-multi-queue.yaml
      - kubectl wait --for=condition=ready pod -l app=servicebus-multi-consumer -n {{.NAMESPACE}} --timeout=120s 2>/dev/null || echo "Multi-queue consumer not deployed, skipping"
      - echo ""
      - echo "Reapplying CRDs..."
      - kubectl apply -f {{.OVERLAY_DIR}}/property-list.yaml
      - kubectl apply -f {{.OVERLAY_DIR}}/split-config.yaml
      - kubectl apply -f {{.OVERLAY_DIR}}/split-config-multi-queue.yaml 2>/dev/null || true
      - echo ""
      - echo "Reset complete. Emulator, consumers, and CRDs are fresh."

  reset:emulator:
    desc: "Clean leftover split CRDs and restart the emulator pods for a fresh state"
    cmds:
      - task: _clean:split:crds
      - task: _deploy:emulator:amd64
        vars:
          MANIFEST: "{{.OVERLAY_DIR}}/servicebus-emulator.yaml"
      - echo "Emulator reset complete."

  reset:emulator:e2e:
    desc: "Clean leftover split CRDs and redeploy the emulator using the operator e2e manifest (hostPort + namespace)"
    cmds:
      - task: _clean:split:crds
      - task: _deploy:emulator:amd64
        vars:
          MANIFEST: "{{.E2E_MANIFEST}}"
      - echo "E2E emulator reset complete."

  logs:
    desc: "Show Service Bus consumer logs (target pod)"
    cmds:
      - kubectl logs -n {{.NAMESPACE}} -l app=servicebus-consumer --tail=100 -f

  logs:emulator:
    desc: "Show Service Bus emulator logs"
    cmds:
      - kubectl logs -n {{.EMULATOR_NAMESPACE}} servicebus-emulator --tail=100 -f

  logs:sql-edge:
    desc: "Show SQL Edge logs"
    cmds:
      - kubectl logs -n {{.EMULATOR_NAMESPACE}} azure-sql-edge --tail=100 -f

  status:
    desc: "Show Azure Service Bus test environment status"
    cmds:
      - echo "SQL Edge"
      - kubectl get pods -n {{.EMULATOR_NAMESPACE}} azure-sql-edge 2>/dev/null || echo "Not deployed"
      - echo ""
      - echo "Service Bus Emulator"
      - kubectl get pods -n {{.EMULATOR_NAMESPACE}} -l app.kubernetes.io/name=servicebus-emulator 2>/dev/null || echo "Not deployed"
      - echo ""
      - echo "Service Bus Consumer"
      - kubectl get pods -n {{.NAMESPACE}} -l app=servicebus-consumer 2>/dev/null || echo "Not deployed"
      - echo ""
      - echo "Multi-Queue Consumer"
      - kubectl get pods -n {{.NAMESPACE}} -l app=servicebus-multi-consumer 2>/dev/null || echo "Not deployed"
      - echo ""
      - echo "Split Config"
      - kubectl get mirrordsplitconfigs -n {{.NAMESPACE}} 2>/dev/null || echo "No split config"
      - echo ""
      - echo "Split Sessions"
      - kubectl get mirrordclustersplitsessions -A 2>/dev/null || echo "No sessions"

  list:
    desc: "List all queues, topics, and subscriptions from the Service Bus emulator"
    vars:
      LOCAL_PORT: '{{.LOCAL_PORT | default "5673"}}'
    cmds:
      - |
        extract_titles() {
          sed -n 's/.*<title[^>]*>\([^<]*\)<\/title>.*/\1/gp'
        }

        echo "Port-forwarding to Service Bus emulator on localhost:{{.LOCAL_PORT}}..."
        kubectl port-forward -n {{.EMULATOR_NAMESPACE}} svc/servicebus-emulator {{.LOCAL_PORT}}:5300 &
        PF_PID=$!
        sleep 2

        echo ""
        echo "Queues:"
        curl -s "http://localhost:{{.LOCAL_PORT}}/\$Resources/Queues" \
          -H "Content-Type: application/atom+xml" 2>/dev/null \
          | extract_titles || echo "  (none or emulator not reachable)"

        echo ""
        echo "Topics:"
        TOPICS=$(curl -s "http://localhost:{{.LOCAL_PORT}}/\$Resources/Topics" \
          -H "Content-Type: application/atom+xml" 2>/dev/null \
          | extract_titles)
        echo "$TOPICS"

        echo ""
        echo "Subscriptions (per topic):"
        echo "$TOPICS" | while read -r topic; do
          [ -z "$topic" ] && continue
          echo "  Topic: $topic"
          RAW=$(curl -s "http://localhost:{{.LOCAL_PORT}}/$topic/Subscriptions" \
            -H "Content-Type: application/atom+xml" 2>/dev/null)
          if echo "$RAW" | grep -q '<Error>'; then
            echo "    (listing not supported by emulator)"
          else
            echo "$RAW" | extract_titles | while read -r sub; do
              echo "    - $sub"
            done
          fi
        done

        kill $PF_PID 2>/dev/null || true

  clean:
    desc: "Clean all Azure Service Bus resources"
    cmds:
      - kubectl delete mirrordclustersplitsessions --all -A 2>/dev/null || true
      - kubectl delete mirrordclusterexternalresources --all -A 2>/dev/null || true
      - kubectl delete mirrordclusterworkloadpatchrequests --all -A 2>/dev/null || true
      - kubectl delete -f {{.OVERLAY_DIR}}/split-config.yaml --ignore-not-found=true 2>/dev/null || true
      - kubectl delete -f {{.OVERLAY_DIR}}/split-config-multi-queue.yaml --ignore-not-found=true 2>/dev/null || true
      - kubectl delete -f {{.OVERLAY_DIR}}/property-list.yaml --ignore-not-found=true 2>/dev/null || true
      - kubectl delete -f {{.OVERLAY_DIR}}/consumer.yaml --ignore-not-found=true 2>/dev/null || true
      - kubectl delete -f {{.OVERLAY_DIR}}/consumer-multi-queue.yaml --ignore-not-found=true 2>/dev/null || true
      - kubectl delete -f {{.OVERLAY_DIR}}/servicebus-emulator.yaml --ignore-not-found=true 2>/dev/null || true
      - kubectl delete namespace {{.EMULATOR_NAMESPACE}} --ignore-not-found=true

  _clean:split:crds:
    internal: true
    # Wipe leftover queue-splitting CRDs before recreating the emulator. The
    # emulator reset throws away its queues, so any MirrordClusterExternalResource
    # still pointing at a temp queue would block the next test: the operator can
    # never finish deleting a queue that no longer exists, so its finalizer never
    # clears and the next test's "clean slate" setup gate hangs forever. We strip
    # the finalizers first so the delete actually goes through, then remove the
    # split sessions and workload patch requests that reference them.
    cmds:
      - |
        set +e
        echo "Cleaning leftover queue-splitting CRDs..."
        for r in $(kubectl get mirrordclusterexternalresources -o name 2>/dev/null); do
          kubectl patch "$r" --type=json -p='[{"op":"remove","path":"/metadata/finalizers"}]' >/dev/null 2>&1
        done
        kubectl delete mirrordclustersplitsessions --all -A >/dev/null 2>&1
        kubectl delete mirrordclusterexternalresources --all >/dev/null 2>&1
        kubectl delete mirrordclusterworkloadpatchrequests --all -A >/dev/null 2>&1
        echo "  done."

  _deploy:emulator:amd64:
    internal: true
    # On Apple Silicon the cluster node is arm64, so by default it pulls the
    # arm64 build of the Service Bus emulator. That build's management gateway
    # is broken: it cannot create or delete the temporary queues that queue
    # splitting needs and crashes with "q.qm not found", so every split session
    # fails to start. The amd64 build (the same one CI runs) does not have this
    # bug and runs fine here through Rosetta. Kubernetes has no per-pod platform
    # field, so the only way to force amd64 on an arm64 node is to reference the
    # image by its amd64 manifest digest. We resolve that digest at deploy time
    # so we always track the current "latest" amd64 build.
    requires:
      vars: [MANIFEST]
    cmds:
      - |
        set -euo pipefail
        amd64_digest() {
          docker manifest inspect "$1" \
            | python3 -c 'import sys,json; d=json.load(sys.stdin); print(next(m["digest"] for m in d["manifests"] if m["platform"]["architecture"]=="amd64" and m["platform"]["os"]=="linux"))'
        }
        echo "Resolving amd64 image digests..."
        EMU_DIGEST=$(amd64_digest mcr.microsoft.com/azure-messaging/servicebus-emulator:latest)
        SQL_DIGEST=$(amd64_digest mcr.microsoft.com/azure-sql-edge:latest)
        echo "  emulator amd64: ${EMU_DIGEST}"
        echo "  sql-edge amd64: ${SQL_DIGEST}"
        echo "Bouncing emulator pods..."
        kubectl delete pod -n {{.EMULATOR_NAMESPACE}} servicebus-emulator azure-sql-edge --wait=true --ignore-not-found=true
        echo "Applying {{.MANIFEST}} pinned to the amd64 build..."
        sed -e "s#mcr.microsoft.com/azure-messaging/servicebus-emulator:latest#mcr.microsoft.com/azure-messaging/servicebus-emulator@${EMU_DIGEST}#" \
            -e "s#mcr.microsoft.com/azure-sql-edge:latest#mcr.microsoft.com/azure-sql-edge@${SQL_DIGEST}#" \
            "{{.MANIFEST}}" | kubectl apply -f -
      - task: _wait:sql-edge
      - task: _wait:emulator

  _wait:sql-edge:
    internal: true
    cmds:
      - echo "Waiting for SQL Edge..."
      - kubectl wait --for=condition=ready pod azure-sql-edge -n {{.EMULATOR_NAMESPACE}} --timeout=180s

  _wait:emulator:
    internal: true
    cmds:
      - echo "Waiting for Service Bus emulator..."
      - kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=servicebus-emulator -n {{.EMULATOR_NAMESPACE}} --timeout=180s

  _wait:consumer:
    internal: true
    cmds:
      - echo "Waiting for Service Bus consumer..."
      - kubectl wait --for=condition=ready pod -l app=servicebus-consumer -n {{.NAMESPACE}} --timeout=120s

  _wait:topic-consumer:
    internal: true
    cmds:
      - echo "Waiting for Service Bus topic consumer..."
      - kubectl wait --for=condition=ready pod -l app=servicebus-topic-consumer -n {{.NAMESPACE}} --timeout=120s
