      - echo "Unfiltered messages go to the target pod."
      - echo ""
      - echo "  Window 1 - User A (tenant=^test):"
      - echo "    cd local-sandbox && task servicebus:run:local"
      - echo ""
      - echo "  Window 2 - User B (tenant=^beta):"
      - echo "    cd local-sandbox && task servicebus:run:local:user-b"
      - echo ""
      - echo "  Window 3 - User C (tenant=^gamma):"
      - echo "    cd local-sandbox && task servicebus:run:local:user-c"
      - echo ""
      - echo "  Window 4 - Target pod logs:"
      - echo "    cd local-sandbox && task servicebus:logs"
      - echo ""
      - echo "  Window 5 - Operator logs:"
      - echo "    cd local-sandbox && task logs:operator"
      - echo ""
      - echo "  Window 6 - Send messages:"
      - echo "    task servicebus:send:all-tenants   (one per tenant)"
      - echo "    task servicebus:send:flood COUNT=30 (random mix)"
      - echo "    task servicebus:test:split:status   (inspect state)"

  test:multi-queue:
    desc: "Deploy multi-queue environment and print instructions (tests multiple env vars)"
    cmds:
      - task: deploy:multi-queue
      - echo ""
      - echo "Multi-queue test - 2 queues via separate env vars"
      - echo "The consumer has SERVICEBUS_ORDERS_QUEUE and SERVICEBUS_NOTIFICATIONS_QUEUE."
      - echo "The split config maps each env var to a separate queue entry."
      - echo ""
      - echo "  Scenario A - One session splits only orders:"
      - echo "    cd local-sandbox && task servicebus:run:local:orders-only"
      - echo ""
      - echo "  Scenario B - One session splits only notifications:"
      - echo "    cd local-sandbox && task servicebus:run:local:notifications-only"
      - echo ""
      - echo "  Scenario C - One session splits both queues:"
      - echo "    cd local-sandbox && task servicebus:run:local:both-queues"
      - echo ""
      - echo "  Send messages:"
      - echo "    task servicebus:send:orders TENANT=test-user"
      - echo "    task servicebus:send:orders TENANT=other"
      - echo "    task servicebus:send:notifications TENANT=test-user"
      - echo "    task servicebus:send:notifications TENANT=other"
      - echo "    task servicebus:send:multi-queue:all  (all at once)"
      - echo ""
      - echo "  Logs & status:"
      - echo "    task servicebus:logs:multi-queue"
      - echo "    task servicebus:test:split:status"

  test:multi-queue:two-users:
    desc: "Multi-queue: two users splitting different queues simultaneously"
    cmds:
      - task: deploy:multi-queue
      - echo ""
      - echo "Two users splitting different queues on the same workload"
      - echo "User A splits orders, User B splits notifications."
      - echo ""
      - echo "  Window 1 - User A (orders only):"
      - echo "    cd local-sandbox && task servicebus:run:local:orders-only"
      - echo ""
      - echo "  Window 2 - User B (notifications only):"
      - echo "    cd local-sandbox && task servicebus:run:local:notifications-only"
      - echo ""
      - echo "  Window 3 - Target pod logs:"
      - echo "    cd local-sandbox && task servicebus:logs:multi-queue"
      - echo ""
      - echo "  Window 4 - Send and verify:"
      - echo "    task servicebus:send:multi-queue:all"
      - echo ""
      - echo "  Expected:"
      - echo "    User A gets orders with tenant=test-user"
      - echo "    User B gets notifications with tenant=test-user"
      - echo "    Target pod gets everything else"

  test:multi-queue:overlap:
    desc: "Multi-queue: two users splitting the same queue with different filters"
    cmds:
      - task: deploy:multi-queue
      - echo ""
      - echo "Two users splitting the SAME queue (orders) with different tenant filters"
      - echo ""
      - echo "  Window 1 - User A (orders, tenant=^test):"
      - echo "    cd local-sandbox && task servicebus:run:local:orders-only"
      - echo ""
      - echo "  Window 2 - User B (start with custom config):"
      - echo "    mirrord exec -f k8s/overlays/servicebus-emulator/mirrord-orders-only.json -- /tmp/servicebus-consumer-b"
      - echo "    (edit mirrord-orders-only.json to use tenant=^beta before starting user B,"
      - echo "     or create a custom config)"
      - echo ""
      - echo "  Window 3 - Send:"
      - echo "    task servicebus:send:orders TENANT=test-user"
      - echo "    task servicebus:send:orders TENANT=beta"
      - echo "    task servicebus:send:orders TENANT=other"
      - echo ""
      - echo "  Expected:"
      - echo "    User A gets orders with tenant=test-user"
      - echo "    User B gets orders with tenant=beta"
      - echo "    Target pod gets orders with tenant=other"

  test:reconnect:
    desc: "Test disconnect/reconnect - start session, kill it, start another, verify messages"
    cmds:
      - |
        echo "Service Bus Fast Reconnect Test"
        echo ""

        kubectl delete mirrordclustersplitsessions --all -A 2>/dev/null || true

        cd {{.ROOT_DIR}}/apps/servicebus-consumer
        go build -o /tmp/servicebus-consumer main.go

        MIRRORD_CONFIG="{{.OVERLAY_DIR}}/mirrord.json"
        SESSION1_LOG="/tmp/servicebus-session1.log"
        SESSION2_LOG="/tmp/servicebus-session2.log"

        echo "Step 1: Start Session 1"
        {{.MIRRORD_BIN}} exec -f $MIRRORD_CONFIG -- /tmp/servicebus-consumer > $SESSION1_LOG 2>&1 &
        SESSION1_PID=$!
        echo "  PID: $SESSION1_PID"
        sleep 15

        if ! kill -0 $SESSION1_PID 2>/dev/null; then
          echo "ERROR: Session 1 died"
          cat $SESSION1_LOG
          exit 1
        fi

        echo ""
        echo "Step 2: Send message to Session 1"
        BODY='{"order_id":"ORD-S1","tenant":"test-user","type":"premium","amount":100}'
        kubectl run sb-reconnect-1-$RANDOM --rm -i --restart=Never \
          --image=servicebus-consumer:local \
          --image-pull-policy=Never \
          --namespace={{.EMULATOR_NAMESPACE}} \
          --env="SEND_MODE=true" \
          --env="SERVICEBUS_CONNECTION_STRING={{.CONN_STR}}" \
          --env="SEND_QUEUE={{.QUEUE}}" \
          --env="MESSAGE_BODY=$BODY" \
          --env="MESSAGE_PROPERTIES=tenant=test-user" \
          -- /app/consumer 2>/dev/null
        sleep 5
        echo "  Session 1 output:"
        cat $SESSION1_LOG | grep "\[MSG" || echo "  (no messages yet)"

        echo ""
        echo "Step 3: Kill Session 1"
        kill $SESSION1_PID 2>/dev/null || true
        wait $SESSION1_PID 2>/dev/null || true
        echo "  Session 1 terminated"

        echo ""
        echo "Step 4: Start Session 2 immediately"
        {{.MIRRORD_BIN}} exec -f $MIRRORD_CONFIG -- /tmp/servicebus-consumer > $SESSION2_LOG 2>&1 &
        SESSION2_PID=$!
        echo "  PID: $SESSION2_PID"
        sleep 15

        if ! kill -0 $SESSION2_PID 2>/dev/null; then
          echo "ERROR: Session 2 died"
          cat $SESSION2_LOG
          exit 1
        fi

        echo ""
        echo "Step 5: Send 3 messages"
        for i in 1 2 3; do
          BODY="{\"order_id\":\"ORD-R$i\",\"tenant\":\"test-user\",\"type\":\"premium\",\"amount\":$((i * 100))}"
          kubectl run sb-reconnect-r$i-$RANDOM --rm -i --restart=Never \
            --image=servicebus-consumer:local \
            --image-pull-policy=Never \
            --namespace={{.EMULATOR_NAMESPACE}} \
            --env="SEND_MODE=true" \
            --env="SERVICEBUS_CONNECTION_STRING={{.CONN_STR}}" \
            --env="SEND_QUEUE={{.QUEUE}}" \
            --env="MESSAGE_BODY=$BODY" \
            --env="MESSAGE_PROPERTIES=tenant=test-user" \
            -- /app/consumer 2>/dev/null
          echo "  Sent message $i"
          sleep 1
        done

        echo "Waiting 10s for processing..."
        sleep 10

        echo ""
        echo "Results"
        echo ""
        echo "Session 1 Log:"
        cat $SESSION1_LOG
        echo ""
        echo "Session 2 Log:"
        cat $SESSION2_LOG
        echo ""

        SESSION1_COUNT=$(grep -c "\[MSG" $SESSION1_LOG 2>/dev/null || echo "0")
        SESSION2_COUNT=$(grep -c "\[MSG" $SESSION2_LOG 2>/dev/null || echo "0")

        echo "Summary"
        echo "  Session 1 received: $SESSION1_COUNT messages (expected: 1)"
        echo "  Session 2 received: $SESSION2_COUNT messages (expected: 3)"

        if [ "$SESSION2_COUNT" -lt 3 ]; then
          echo "  WARNING: Session 2 missed messages."
        else
          echo "  SUCCESS: Session 2 received all messages."
        fi

        kill $SESSION2_PID 2>/dev/null || true
        echo ""
        echo "Test complete."

  test:session-churn:
    desc: "Rapidly start/stop sessions to stress the operator"
    cmds:
      - |
        echo "Session churn test: rapidly creating and destroying sessions"
        echo ""

        cd {{.ROOT_DIR}}/apps/servicebus-consumer
        go build -o /tmp/servicebus-consumer main.go

        MIRRORD_CONFIG="{{.OVERLAY_DIR}}/mirrord.json"

        for round in 1 2 3 4 5; do
          echo "Round $round: starting session..."
          {{.MIRRORD_BIN}} exec -f $MIRRORD_CONFIG -- /tmp/servicebus-consumer > /tmp/servicebus-churn-$round.log 2>&1 &
          PID=$!
          sleep 10

          if ! kill -0 $PID 2>/dev/null; then
            echo "  Session died immediately. Log:"
            cat /tmp/servicebus-churn-$round.log
            exit 1
          fi

          echo "  Session alive (PID $PID). Sending a message..."
          BODY="{\"order_id\":\"ORD-CHURN-$round\",\"tenant\":\"test-user\",\"type\":\"premium\"}"
          kubectl run sb-churn-$round-$RANDOM --rm -i --restart=Never \
            --image=servicebus-consumer:local \
            --image-pull-policy=Never \
            --namespace={{.EMULATOR_NAMESPACE}} \
            --env="SEND_MODE=true" \
            --env="SERVICEBUS_CONNECTION_STRING={{.CONN_STR}}" \
            --env="SEND_QUEUE={{.QUEUE}}" \
            --env="MESSAGE_BODY=$BODY" \
            --env="MESSAGE_PROPERTIES=tenant=test-user" \
            -- /app/consumer 2>/dev/null
          sleep 3

          echo "  Killing session..."
          kill $PID 2>/dev/null || true
          wait $PID 2>/dev/null || true
          sleep 2

          MSG_COUNT=$(grep -c "\[MSG" /tmp/servicebus-churn-$round.log 2>/dev/null || echo "0")
          echo "  Round $round: received $MSG_COUNT messages"
          echo ""
        done

        echo "Checking for leftover sessions..."
        kubectl get mirrordclustersplitsessions -A 2>/dev/null || echo "(none)"
        echo ""
        echo "Session churn test complete."

  test:filter-types:
    desc: "Deploy and print instructions for testing all filter types"
    cmds:
      - task: deploy
      - echo ""
      - echo "Filter type comparison (all targeting the same queue)"
      - echo ""
