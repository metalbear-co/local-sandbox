version: "3"

vars:
  ROOT_DIR:
    sh: cd .. && pwd
  NAMESPACE: '{{.NAMESPACE | default "test-mirrord"}}'
  CLUSTER_NAME: '{{.CLUSTER_NAME | default "bearkube"}}'
  MIRRORD_BIN: '{{.MIRRORD_BIN | default "mirrord"}}'
  EMULATOR_NAMESPACE: "servicebus-emulator"
  QUEUE: '{{.QUEUE | default "test-queue"}}'
  OVERLAY_DIR: "{{.ROOT_DIR}}/k8s/overlays/servicebus-emulator"
  # The operator e2e tests deploy their own emulator manifest, which differs
  # from the local-sandbox overlay: it binds hostPort 5672/5300 so operators on
  # every cluster can reach the emulator, and it creates the namespace. Reset
  # against this one when you are debugging the `azure_service_bus_*` e2e tests.
  E2E_MANIFEST: "{{.ROOT_DIR}}/../operator/tests/emulators/azure-servicebus.yaml"
  CONN_STR: "Endpoint=sb://servicebus-emulator.servicebus-emulator.svc.cluster.local;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=SAS_KEY_VALUE;UseDevelopmentEmulator=true"

tasks:
  build:
    desc: "Build and load the servicebus-consumer image into minikube"
    dir: "{{.ROOT_DIR}}/apps/servicebus-consumer"
    cmds:
      - go mod tidy
      - docker build -t servicebus-consumer:local .
      - minikube -p {{.CLUSTER_NAME}} image load servicebus-consumer:local

  deploy:emulator:
    desc: "Deploy only the Azure Service Bus emulator (SQL Edge + emulator pods)"
    cmds:
      - kubectl create namespace {{.EMULATOR_NAMESPACE}} --dry-run=client -o yaml | kubectl apply -f -
      - kubectl apply -f {{.OVERLAY_DIR}}/namespace.yaml
      - task: _deploy:emulator:amd64
        vars:
          MANIFEST: "{{.OVERLAY_DIR}}/servicebus-emulator.yaml"

  deploy:
    desc: "Deploy emulator + consumer pod + CRDs (for manual testing)"
    cmds:
      - task: build
      - kubectl create namespace {{.NAMESPACE}} --dry-run=client -o yaml | kubectl apply -f -
      - kubectl create namespace {{.EMULATOR_NAMESPACE}} --dry-run=client -o yaml | kubectl apply -f -
      - kubectl apply -f {{.OVERLAY_DIR}}/namespace.yaml
      - task: _deploy:emulator:amd64
        vars:
          MANIFEST: "{{.OVERLAY_DIR}}/servicebus-emulator.yaml"
      - kubectl apply -f {{.OVERLAY_DIR}}/consumer.yaml
      - task: _wait:consumer
      - kubectl apply -f {{.OVERLAY_DIR}}/property-list.yaml
      - kubectl apply -f {{.OVERLAY_DIR}}/split-config.yaml

  run:
    desc: "Deploy everything + run local consumer in one shot (tenant=^test filter)"
    cmds:
      - task: deploy
      - task: run:local

  run:local:
    desc: "Run servicebus consumer locally with mirrord (tenant=^test filter)"
    dir: "{{.ROOT_DIR}}/apps/servicebus-consumer"
    vars:
      MIRRORD_CONFIG: '{{.MIRRORD_CONFIG | default (print .ROOT_DIR "/k8s/overlays/servicebus-emulator/mirrord.json")}}'
    cmds:
      - go build -o /tmp/servicebus-consumer main.go
      - '{{.MIRRORD_BIN}} exec -f {{.MIRRORD_CONFIG}} -- /tmp/servicebus-consumer'

  run:copy-target:
    desc: "Deploy everything + run local consumer with copy target (tenant=^test filter)"
    cmds:
      - task: deploy
      - task: run:local:copy-target

  run:local:copy-target:
    desc: "Run servicebus consumer locally with mirrord copy target (tenant=^test filter)"
    dir: "{{.ROOT_DIR}}/apps/servicebus-consumer"
    vars:
      MIRRORD_CONFIG: '{{.ROOT_DIR}}/k8s/overlays/servicebus-emulator/mirrord-copy-target.json'
    cmds:
      - go build -o /tmp/servicebus-consumer-ct main.go
      - '{{.MIRRORD_BIN}} exec -f {{.MIRRORD_CONFIG}} -- /tmp/servicebus-consumer-ct'

  run:local:user-b:
    desc: "Run a second local consumer with mirrord (tenant=^beta filter)"
    dir: "{{.ROOT_DIR}}/apps/servicebus-consumer"
    vars:
      MIRRORD_CONFIG: '{{.ROOT_DIR}}/k8s/overlays/servicebus-emulator/mirrord-user-b.json'
    cmds:
      - go build -o /tmp/servicebus-consumer-b main.go
      - '{{.MIRRORD_BIN}} exec -f {{.MIRRORD_CONFIG}} -- /tmp/servicebus-consumer-b'

  run:local:user-c:
    desc: "Run a third local consumer with mirrord (tenant=^gamma filter)"
    dir: "{{.ROOT_DIR}}/apps/servicebus-consumer"
    vars:
      MIRRORD_CONFIG: '{{.ROOT_DIR}}/k8s/overlays/servicebus-emulator/mirrord-user-c.json'
    cmds:
      - go build -o /tmp/servicebus-consumer-c main.go
      - '{{.MIRRORD_BIN}} exec -f {{.MIRRORD_CONFIG}} -- /tmp/servicebus-consumer-c'

  run:local:multi-attr:
    desc: "Run local consumer matching both tenant=^test AND type=^premium$"
    dir: "{{.ROOT_DIR}}/apps/servicebus-consumer"
    vars:
      MIRRORD_CONFIG: '{{.ROOT_DIR}}/k8s/overlays/servicebus-emulator/mirrord-multi-attr.json'
    cmds:
      - go build -o /tmp/servicebus-consumer-ma main.go
      - '{{.MIRRORD_BIN}} exec -f {{.MIRRORD_CONFIG}} -- /tmp/servicebus-consumer-ma'

  run:local:jq:
    desc: "Run local consumer with JQ body filter (type=premium in JSON body)"
    dir: "{{.ROOT_DIR}}/apps/servicebus-consumer"
    vars:
      MIRRORD_CONFIG: '{{.ROOT_DIR}}/k8s/overlays/servicebus-emulator/mirrord-jq.json'
    cmds:
      - go build -o /tmp/servicebus-consumer-jq main.go
      - '{{.MIRRORD_BIN}} exec -f {{.MIRRORD_CONFIG}} -- /tmp/servicebus-consumer-jq'

  deploy:topic:
    desc: "Deploy emulator + topic consumer pod + CRDs (topic/subscription model)"
    cmds:
      - task: build
      - kubectl create namespace {{.NAMESPACE}} --dry-run=client -o yaml | kubectl apply -f -
      - kubectl create namespace {{.EMULATOR_NAMESPACE}} --dry-run=client -o yaml | kubectl apply -f -
      - kubectl apply -f {{.OVERLAY_DIR}}/namespace.yaml
      - task: _deploy:emulator:amd64
        vars:
          MANIFEST: "{{.OVERLAY_DIR}}/servicebus-emulator.yaml"
      - kubectl apply -f {{.OVERLAY_DIR}}/consumer-topic.yaml
      - task: _wait:topic-consumer
      - kubectl apply -f {{.OVERLAY_DIR}}/property-list.yaml
      - kubectl apply -f {{.OVERLAY_DIR}}/split-config-topic.yaml

  run:topic:
    desc: "Deploy topic model + run local consumer in one shot (tenant=^test filter)"
    cmds:
      - task: deploy:topic
      - task: run:local:topic

  run:local:topic:
    desc: "Run topic/subscription consumer locally with mirrord (tenant=^test filter)"
    dir: "{{.ROOT_DIR}}/apps/servicebus-consumer"
    vars:
      MIRRORD_CONFIG: '{{.ROOT_DIR}}/k8s/overlays/servicebus-emulator/mirrord-topic.json'
    cmds:
      - go build -o /tmp/servicebus-consumer-topic main.go
      - '{{.MIRRORD_BIN}} exec -f {{.MIRRORD_CONFIG}} -- /tmp/servicebus-consumer-topic'

  test:topic:split:
    desc: "Deploy topic model and print instructions for testing"
    cmds:
      - task: deploy:topic
      - echo ""
      - echo "Topic/subscription split test"
      - echo ""
      - echo "  Window 1 - Local consumer (topic model, tenant=^test):"
      - echo "    cd local-sandbox && task servicebus:run:local:topic"
      - echo ""
      - echo "  Window 2 - Target pod logs:"
      - echo "    cd local-sandbox && task servicebus:logs:topic"
      - echo ""
      - echo "  Window 3 - Send messages to topic:"
      - echo "    task servicebus:send:topic TENANT=test-user"
      - echo "    task servicebus:send:topic TENANT=other"
      - echo "    task servicebus:test:split:status"

  logs:topic:
    desc: "Show topic consumer logs (target pod)"
    cmds:
      - kubectl logs -n {{.NAMESPACE}} -l app=servicebus-topic-consumer --tail=100 -f

  native:guide:
    desc: "Native subscription splitting: deploy topic model and explain what to look for"
    cmds:
      - task: deploy:topic
      - |
        cat <<'EOF'

        Native Azure Service Bus subscription splitting

        What "native" means here:
          The operator does NOT create a temporary topic and does NOT rewrite the
          deployed app's topic/subscription env vars. Instead it uses Service Bus's
          own fan-out: it stamps each message with an application property called
          "mirrord_route" and installs SQL filter rules on subscriptions so each
          copy lands in the right place. This is why it works with MassTransit,
          which generates its own topic names and ignores the topic env var.

        How a split looks while running (topic "test-topic", app subscription "test-sub"):
          - mirrord-ingest-<hash>  : an operator subscription with rule
                                      "mirrord_route IS NULL". It grabs every brand
                                      new (unmarked) message first.
          - test-sub (the app's)   : its accept-all "$Default" rule is swapped for
                                      "mirrord_route = 'main'", so the deployed app
                                      only gets messages marked for production.
          - mirrord-s-<hash>       : one subscription per dev session with rule
                                      "mirrord_route = '<session-id>'".
          The operator reads from the ingest subscription, decides per message who
          should get it, re-publishes it to the SAME topic with the matching marker,
          and Service Bus delivers each copy to the subscription whose rule matches.

        Run the full automated check (asserts routing + clean teardown):
          task servicebus:test:native:topic

        Or drive it by hand in separate terminals:
          Window 1 - local dev session (tenant=^test filter):
            cd local-sandbox && task servicebus:run:local:topic
          Window 2 - deployed app logs:
            cd local-sandbox && task servicebus:logs:topic
          Window 3 - send messages:
            task servicebus:send:topic TENANT=test-user   (matches -> local session)
            task servicebus:send:topic TENANT=other        (no match -> deployed app)

        Inspect the live state at any time:
          task servicebus:native:status   (resources, no temp topic, deployed spec untouched)
          task servicebus:native:rules     (the actual SQL rules on each subscription)

        What to look for:
          - In the LOCAL session log: only tenant=test-user, tagged
            "mirrord_route=<session-id>".
          - In the DEPLOYED app log: only tenant=other, tagged "mirrord_route=main".
          - native:status shows the deployment generation never changes and its
            env still points at test-sub / test-topic (no patch, no temp topic).
          - After the session ends, native:status shows no split sessions and no
            external resources left, and native:rules shows test-sub back on its
            "$Default" accept-all rule.
        EOF

  native:status:
    desc: "Show native split state: resources, topic count, and that the deployed spec is untouched"
    vars:
      DEPLOY: '{{.DEPLOY | default "servicebus-topic-consumer"}}'
      LOCAL_PORT: '{{.LOCAL_PORT | default "5673"}}'
    cmds:
      - |
        echo "Split sessions"
        kubectl get mirrordclustersplitsessions -A 2>/dev/null || echo "  (none)"
        echo ""
        echo "External resources (operator cleanup tracking - name encodes the Service Bus path)"
        OUT=$(kubectl get mirrordclusterexternalresources -A -o jsonpath='{range .items[*]}  {.spec.azureServiceBusResource.kind}  {.spec.azureServiceBusResource.name}{"\n"}{end}' 2>/dev/null)
        if [ -z "$OUT" ]; then echo "  (none)"; else echo "$OUT"; fi
        echo ""
        echo "Deployed workload (must stay untouched: generation should not change, env keeps test-sub/test-topic)"
        kubectl get deploy {{.DEPLOY}} -n {{.NAMESPACE}} -o jsonpath='  generation={.metadata.generation}  observedGeneration={.status.observedGeneration}{"\n"}' 2>/dev/null || echo "  (deployment not found)"
        kubectl get deploy {{.DEPLOY}} -n {{.NAMESPACE}} -o jsonpath='{range .spec.template.spec.containers[0].env[*]}  {.name}={.value}{"\n"}{end}' 2>/dev/null | grep -iE "SERVICEBUS_(TOPIC|SUBSCRIPTION)" || true
        echo ""
        echo "Topics in the emulator (native splitting must NOT add a temporary topic)"
        kubectl port-forward -n {{.EMULATOR_NAMESPACE}} svc/servicebus-emulator {{.LOCAL_PORT}}:5300 >/dev/null 2>&1 &
        PF_PID=$!
        sleep 2
        curl -s "http://localhost:{{.LOCAL_PORT}}/\$Resources/Topics" -H "Content-Type: application/atom+xml" 2>/dev/null \
          | sed -n 's/.*<title[^>]*>\([^<]*\)<\/title>.*/  \1/gp' || echo "  (emulator not reachable)"
        kill $PF_PID 2>/dev/null || true

  native:rules:
    desc: "Show the SQL filter rules on the topic's subscriptions (works against real Azure SB; the emulator may not expose rule listing)"
    vars:
      TOPIC: '{{.TOPIC | default "test-topic"}}'
      APP_SUB: '{{.APP_SUB | default "test-sub"}}'
      LOCAL_PORT: '{{.LOCAL_PORT | default "5673"}}'
    cmds:
      - |
        kubectl port-forward -n {{.EMULATOR_NAMESPACE}} svc/servicebus-emulator {{.LOCAL_PORT}}:5300 >/dev/null 2>&1 &
        PF_PID=$!
        sleep 2

        show_rules() {
          sub="$1"
          echo "  Subscription: $sub"
          # The emulator can reset the connection on this endpoint (it does not
          # support rule listing), so tolerate a curl failure and report it.
          RAW=$(curl -s "http://localhost:{{.LOCAL_PORT}}/{{.TOPIC}}/subscriptions/$sub/rules" \
            -H "Content-Type: application/atom+xml" 2>/dev/null || true)
          if [ -z "$RAW" ] || echo "$RAW" | grep -q '<Error>'; then
            echo "    (rule listing not available on this emulator)"
            return
          fi
          NAMES=$(echo "$RAW" | grep -oE '<title[^>]*>[^<]*</title>' | sed -E 's/<[^>]+>//g')
          SQL=$(echo "$RAW" | grep -oE '<SqlExpression>[^<]*</SqlExpression>' | sed -E 's/<[^>]+>//g')
          if [ -z "$NAMES" ]; then echo "    (none)"; else
            echo "    rule names : $(echo $NAMES | tr '\n' ' ')"
            echo "    filters    : $(echo $SQL | tr '\n' '|')"
          fi
        }

        echo "Rules on topic '{{.TOPIC}}':"
        echo ""
        show_rules "{{.APP_SUB}}"

        # Any operator-created subscriptions currently live show up as external resources.
        SUBS=$(kubectl get mirrordclusterexternalresources -A -o jsonpath='{range .items[*]}{.spec.azureServiceBusResource.name}{"\n"}{end}' 2>/dev/null \
          | sed -nE 's#^{{.TOPIC}}/subscriptions/(mirrord-[^/]+)$#\1#p' | sort -u)
        for s in $SUBS; do
          show_rules "$s"
        done

        kill $PF_PID 2>/dev/null || true
        echo ""
        echo "Note: this emulator usually does not expose rule listing over REST."
        echo "The real proof of routing locally is message behavior + 'native:status'."

  test:native:topic:
    desc: "Automated native topic split test: asserts routing, untouched workload, and clean teardown"
    vars:
      TOPIC: "test-topic"
      APP_SUB: "test-sub"
      DEPLOY: "servicebus-topic-consumer"
      APP_LABEL: "app=servicebus-topic-consumer"
      MIRRORD_CONFIG: '{{.OVERLAY_DIR}}/mirrord-topic.json'
      LOCAL_LOG: "/tmp/sb-native-local.log"
    cmds:
      - |
        set +e
        PASS=0; FAIL=0
        check() {
          if [ "$1" = "$2" ]; then echo "  PASS: $3"; PASS=$((PASS+1));
          else echo "  FAIL: $3 (expected '$2', got '$1')"; FAIL=$((FAIL+1)); fi
        }
        contains() {
          if echo "$1" | grep -q "$2"; then echo "  PASS: $3"; PASS=$((PASS+1));
          else echo "  FAIL: $3"; FAIL=$((FAIL+1)); fi
        }
        not_contains() {
          if echo "$1" | grep -q "$2"; then echo "  FAIL: $3"; FAIL=$((FAIL+1));
          else echo "  PASS: $3"; PASS=$((PASS+1)); fi
        }

        echo "Native topic/subscription split - automated test"
        echo ""
        echo "Step 0: clean slate and build local consumer"
        pkill -f "/tmp/sb-native" 2>/dev/null || true
        pkill -f "exec -f .*mirrord-topic.json" 2>/dev/null || true
        kubectl delete mirrordclustersplitsessions --all -A >/dev/null 2>&1
        # The ingest subscription has a deterministic name, so a leftover from a
        # previous run would clash with this one. Wait for the operator to finish
        # tearing down any prior split before starting.
        for i in $(seq 1 18); do
          REMAIN=$(kubectl get mirrordclusterexternalresources -A -o jsonpath='{.items[*].metadata.name}' 2>/dev/null)
          [ -z "$REMAIN" ] && break
          [ "$i" = "1" ] && echo "  waiting for previous resources to clear..."
          sleep 5
        done
        (cd {{.ROOT_DIR}}/apps/servicebus-consumer && go build -o /tmp/sb-native main.go) \
          || { echo "  build failed"; exit 1; }
        rm -f {{.LOCAL_LOG}}

        GEN_BEFORE=$(kubectl get deploy {{.DEPLOY}} -n {{.NAMESPACE}} -o jsonpath='{.metadata.generation}' 2>/dev/null)

        echo ""
        echo "Step 1: start mirrord session (filter tenant=^test)"
        # mirrord exec startup takes ~15s (sidecar + intproxy), so poll the
        # consumer log for readiness rather than checking the process - mirrord's
        # launcher PID is not a reliable liveness signal.
        {{.MIRRORD_BIN}} exec -f {{.MIRRORD_CONFIG}} -- /tmp/sb-native > {{.LOCAL_LOG}} 2>&1 &
        READY="no"
        for i in $(seq 1 40); do
          sleep 2
          if grep -q "Listening for messages" {{.LOCAL_LOG}} 2>/dev/null; then READY="yes"; break; fi
        done
        if [ "$READY" != "yes" ]; then
          echo "  session never became ready, log:"; cat {{.LOCAL_LOG}}
          pkill -f "/tmp/sb-native" 2>/dev/null || true
          pkill -f "exec -f .*mirrord-topic.json" 2>/dev/null || true
          exit 1
        fi
        echo "  session ready"

        echo ""
        echo "Step 2: assert the operator built the native resources"
        RES=$(kubectl get mirrordclusterexternalresources -A -o jsonpath='{range .items[*]}{.spec.azureServiceBusResource.name}{"\n"}{end}' 2>/dev/null)
        contains "$RES" "mirrord-ingest" "ingest subscription created"
        contains "$RES" "{{.APP_SUB}}/rules/mirrord-main" "app subscription marker rule registered for restore"
        contains "$RES" "subscriptions/mirrord-s" "per-session subscription created"

        echo ""
        echo "Step 3: assert the deployed workload spec was NOT changed"
        GEN_AFTER=$(kubectl get deploy {{.DEPLOY}} -n {{.NAMESPACE}} -o jsonpath='{.metadata.generation}' 2>/dev/null)
        check "$GEN_AFTER" "$GEN_BEFORE" "deployment generation unchanged (no spec patch)"
        SUB_ENV=$(kubectl get deploy {{.DEPLOY}} -n {{.NAMESPACE}} -o jsonpath='{range .spec.template.spec.containers[0].env[*]}{.name}={.value}{"\n"}{end}' 2>/dev/null | grep SERVICEBUS_SUBSCRIPTION_NAME | cut -d= -f2)
        check "$SUB_ENV" "{{.APP_SUB}}" "deployed app env still points at the original subscription"

        echo ""
        echo "Step 4: send one matching + one non-matching message"
        task servicebus:send:topic TENANT=test-user >/dev/null 2>&1
        task servicebus:send:topic TENANT=other >/dev/null 2>&1
        sleep 8

        echo ""
        echo "Step 5: assert routing"
        LOCAL=$(grep "\[MSG" {{.LOCAL_LOG}} 2>/dev/null)
        DEPLOYED=$(kubectl logs -n {{.NAMESPACE}} -l {{.APP_LABEL}} --tail=50 2>/dev/null | grep "\[MSG")
        contains "$LOCAL" "tenant=test-user" "local session received the matching message"
        not_contains "$LOCAL" "tenant=other" "local session did NOT receive the non-matching message"
        contains "$DEPLOYED" "tenant=other" "deployed app received the non-matching message"
        contains "$DEPLOYED" "mirrord_route=main" "deployed app message carries the 'main' marker"
        not_contains "$DEPLOYED" "tenant=test-user" "deployed app did NOT receive the matching message"

        echo ""
        echo "Step 6: stop the session and wait for teardown"
        pkill -f "/tmp/sb-native" 2>/dev/null || true
        pkill -f "exec -f .*mirrord-topic.json" 2>/dev/null || true
        LEFT="present"
        for i in $(seq 1 24); do
          sleep 10
          REMAIN=$(kubectl get mirrordclusterexternalresources -A -o jsonpath='{.items[*].metadata.name}' 2>/dev/null)
          SESS=$(kubectl get mirrordclustersplitsessions -A -o jsonpath='{.items[*].metadata.name}' 2>/dev/null)
          if [ -z "$REMAIN" ] && [ -z "$SESS" ]; then LEFT="gone"; break; fi
          echo "  waiting for teardown... ($((i*10))s)"
        done
        check "$LEFT" "gone" "all split sessions and external resources cleaned up"

        echo ""
        echo "Results: $PASS passed, $FAIL failed"
        if [ "$FAIL" -ne 0 ]; then exit 1; fi
        echo "Native topic split test PASSED."

  run:local:wildcard:
    desc: "Run local consumer with wildcard '*' queue key (expands to all queues in MirrordSplitConfig)"
    dir: "{{.ROOT_DIR}}/apps/servicebus-consumer"
    vars:
      MIRRORD_CONFIG: '{{.ROOT_DIR}}/k8s/overlays/servicebus-emulator/mirrord-wildcard.json'
    cmds:
      - go build -o /tmp/servicebus-consumer-wc main.go
      - '{{.MIRRORD_BIN}} exec -f {{.MIRRORD_CONFIG}} -- /tmp/servicebus-consumer-wc'

  run:local:orders-only:
    desc: "Multi-queue: split only the orders queue (tenant=^test)"
    dir: "{{.ROOT_DIR}}/apps/servicebus-consumer"
    vars:
      MIRRORD_CONFIG: '{{.ROOT_DIR}}/k8s/overlays/servicebus-emulator/mirrord-orders-only.json'
    cmds:
      - go build -o /tmp/servicebus-consumer-orders main.go
      - '{{.MIRRORD_BIN}} exec -f {{.MIRRORD_CONFIG}} -- /tmp/servicebus-consumer-orders'

  run:local:notifications-only:
    desc: "Multi-queue: split only the notifications queue (tenant=^test)"
    dir: "{{.ROOT_DIR}}/apps/servicebus-consumer"
    vars:
      MIRRORD_CONFIG: '{{.ROOT_DIR}}/k8s/overlays/servicebus-emulator/mirrord-notifications-only.json'
    cmds:
      - go build -o /tmp/servicebus-consumer-notif main.go
      - '{{.MIRRORD_BIN}} exec -f {{.MIRRORD_CONFIG}} -- /tmp/servicebus-consumer-notif'

  run:local:both-queues:
    desc: "Multi-queue: split both orders and notifications (tenant=^test)"
    dir: "{{.ROOT_DIR}}/apps/servicebus-consumer"
    vars:
      MIRRORD_CONFIG: '{{.ROOT_DIR}}/k8s/overlays/servicebus-emulator/mirrord-both-queues.json'
    cmds:
      - go build -o /tmp/servicebus-consumer-both main.go
      - '{{.MIRRORD_BIN}} exec -f {{.MIRRORD_CONFIG}} -- /tmp/servicebus-consumer-both'

  send:
    desc: "Send a message to a Service Bus queue via a one-shot pod"
    vars:
      TENANT: '{{.TENANT | default "test-user"}}'
      TYPE: '{{.TYPE | default "standard"}}'
      SEND_QUEUE: '{{.SEND_QUEUE | default "test-queue"}}'
    cmds:
      - |
        BODY='{"order_id":"ORD-001","tenant":"{{.TENANT}}","type":"{{.TYPE}}","amount":100}'
        PROPS="tenant={{.TENANT}},type={{.TYPE}}"

        kubectl run sb-sender-$RANDOM --rm -i --restart=Never \
          --image=servicebus-consumer:local \
          --image-pull-policy=Never \
          --namespace={{.EMULATOR_NAMESPACE}} \
          --env="SEND_MODE=true" \
          --env="SERVICEBUS_CONNECTION_STRING={{.CONN_STR}}" \
          --env="SEND_QUEUE={{.SEND_QUEUE}}" \
          --env="MESSAGE_BODY=$BODY" \
          --env="MESSAGE_PROPERTIES=$PROPS" \
          -- /app/consumer 2>/dev/null

        echo "Published to {{.SEND_QUEUE}} with tenant={{.TENANT}} type={{.TYPE}}"

  send:topic:
    desc: "Send a message to a Service Bus topic via a one-shot pod"
    vars:
      TENANT: '{{.TENANT | default "test-user"}}'
      TYPE: '{{.TYPE | default "standard"}}'
      SEND_TOPIC: '{{.SEND_TOPIC | default "test-topic"}}'
    cmds:
      - |
        BODY='{"order_id":"ORD-001","tenant":"{{.TENANT}}","type":"{{.TYPE}}","amount":100}'
        PROPS="tenant={{.TENANT}},type={{.TYPE}}"

        kubectl run sb-sender-$RANDOM --rm -i --restart=Never \
          --image=servicebus-consumer:local \
          --image-pull-policy=Never \
          --namespace={{.EMULATOR_NAMESPACE}} \
          --env="SEND_MODE=true" \
          --env="SERVICEBUS_CONNECTION_STRING={{.CONN_STR}}" \
          --env="SEND_TOPIC={{.SEND_TOPIC}}" \
          --env="MESSAGE_BODY=$BODY" \
          --env="MESSAGE_PROPERTIES=$PROPS" \
          -- /app/consumer 2>/dev/null

        echo "Published to topic {{.SEND_TOPIC}} with tenant={{.TENANT}} type={{.TYPE}}"

  send:match:
    desc: "Send a message that matches the default filter (tenant=test-user)"
    cmds:
      - task: send
        vars: { TENANT: "test-user", TYPE: "premium" }

  send:nomatch:
    desc: "Send a message that does NOT match any filter (tenant=other)"
    cmds:
      - task: send
        vars: { TENANT: "other", TYPE: "basic" }

  send:beta:
    desc: "Send a message for user B (tenant=beta)"
    cmds:
      - task: send
        vars: { TENANT: "beta", TYPE: "premium" }

  send:gamma:
    desc: "Send a message for user C (tenant=gamma)"
    cmds:
      - task: send
        vars: { TENANT: "gamma", TYPE: "standard" }

  send:both:
    desc: "Send one matched + one unmatched + one beta message"
    cmds:
      - task: send:match
      - task: send:nomatch
      - task: send:beta

  send:all-tenants:
    desc: "Send one message per tenant (test-user, beta, gamma, other)"
    cmds:
      - task: send
        vars: { TENANT: "test-user", TYPE: "premium" }
      - task: send
        vars: { TENANT: "beta", TYPE: "standard" }
      - task: send
        vars: { TENANT: "gamma", TYPE: "premium" }
      - task: send
        vars: { TENANT: "other", TYPE: "basic" }

  send:flood:
    desc: "Send many messages quickly: task servicebus:send:flood COUNT=20"
    vars:
      COUNT: '{{.COUNT | default "20"}}'
      SEND_QUEUE: '{{.SEND_QUEUE | default "test-queue"}}'
    cmds:
      - |
        TENANTS=("test-user" "beta" "gamma" "other" "unknown")
        TYPES=("premium" "standard" "basic")

        echo "Flooding {{.COUNT}} messages to {{.SEND_QUEUE}} across tenants: ${TENANTS[*]}"
        for i in $(seq 1 {{.COUNT}}); do
          T=${TENANTS[$((RANDOM % ${#TENANTS[@]}))]}
          TY=${TYPES[$((RANDOM % ${#TYPES[@]}))]}
          BODY="{\"order_id\":\"ORD-F$i\",\"tenant\":\"$T\",\"type\":\"$TY\",\"amount\":$((RANDOM % 1000))}"
          PROPS="tenant=$T,type=$TY"

          kubectl run sb-flood-$RANDOM --rm -i --restart=Never \
            --image=servicebus-consumer:local \
            --image-pull-policy=Never \
            --namespace={{.EMULATOR_NAMESPACE}} \
            --env="SEND_MODE=true" \
            --env="SERVICEBUS_CONNECTION_STRING={{.CONN_STR}}" \
            --env="SEND_QUEUE={{.SEND_QUEUE}}" \
            --env="MESSAGE_BODY=$BODY" \
            --env="MESSAGE_PROPERTIES=$PROPS" \
            -- /app/consumer 2>/dev/null

          echo "$i: tenant=$T type=$TY"
        done
        echo ""
        echo "Sent {{.COUNT}} messages."

  send:orders:
    desc: "Send to the orders queue"
    vars:
      TENANT: '{{.TENANT | default "test-user"}}'
      TYPE: '{{.TYPE | default "premium"}}'
    cmds:
      - task: send
        vars: { SEND_QUEUE: "orders-queue", TENANT: "{{.TENANT}}", TYPE: "{{.TYPE}}" }

  send:notifications:
    desc: "Send to the notifications queue"
    vars:
      TENANT: '{{.TENANT | default "test-user"}}'
      TYPE: '{{.TYPE | default "alert"}}'
    cmds:
      - task: send
        vars: { SEND_QUEUE: "notifications-queue", TENANT: "{{.TENANT}}", TYPE: "{{.TYPE}}" }

  send:multi-queue:all:
    desc: "Send to both orders and notifications with mixed tenants"
    cmds:
      - task: send:orders
        vars: { TENANT: "test-user", TYPE: "premium" }
      - task: send:orders
        vars: { TENANT: "other", TYPE: "basic" }
      - task: send:notifications
        vars: { TENANT: "test-user", TYPE: "alert" }
      - task: send:notifications
        vars: { TENANT: "other", TYPE: "info" }

  deploy:multi-queue:
    desc: "Deploy multi-queue environment (orders + notifications, separate env vars)"
    cmds:
      - task: build
      - kubectl create namespace {{.NAMESPACE}} --dry-run=client -o yaml | kubectl apply -f -
      - kubectl create namespace {{.EMULATOR_NAMESPACE}} --dry-run=client -o yaml | kubectl apply -f -
      - kubectl apply -f {{.OVERLAY_DIR}}/namespace.yaml
      - task: _deploy:emulator:amd64
        vars:
          MANIFEST: "{{.OVERLAY_DIR}}/servicebus-emulator.yaml"
      - kubectl apply -f {{.OVERLAY_DIR}}/consumer-multi-queue.yaml
      - echo "Waiting for multi-queue consumer..."
      - kubectl wait --for=condition=ready pod -l app=servicebus-multi-consumer -n {{.NAMESPACE}} --timeout=120s
      - kubectl apply -f {{.OVERLAY_DIR}}/property-list.yaml
      - kubectl apply -f {{.OVERLAY_DIR}}/split-config-multi-queue.yaml

  logs:multi-queue:
    desc: "Show multi-queue consumer logs"
    cmds:
      - kubectl logs -n {{.NAMESPACE}} -l app=servicebus-multi-consumer --tail=100 -f

  test:split:
    desc: "Deploy environment for split testing"
    cmds:
      - task: deploy
      - echo ""
      - echo "Environment ready. Open separate terminal windows and run:"
      - echo ""
      - echo "  Window 1 - Local consumer (receives filtered messages):"
      - echo "    cd local-sandbox && task servicebus:run:local"
      - echo ""
      - echo "  Window 2 - Target pod logs (receives unfiltered messages):"
      - echo "    cd local-sandbox && task servicebus:logs"
      - echo ""
      - echo "  Window 3 - Operator logs:"
      - echo "    cd local-sandbox && task logs:operator"
      - echo ""
      - echo "  Window 4 - Send messages:"
      - echo "    task servicebus:send:match"
      - echo "    task servicebus:send:nomatch"
      - echo "    task servicebus:test:split:status"

  test:split:send:
    desc: "Send filtered and unfiltered messages: task servicebus:test:split:send MATCHED=3 UNMATCHED=2"
    vars:
      MATCHED: '{{.MATCHED | default "3"}}'
      UNMATCHED: '{{.UNMATCHED | default "2"}}'
    cmds:
      - |
        echo "Sending {{.MATCHED}} matched (tenant=test-user) + {{.UNMATCHED}} unmatched (tenant=other) messages..."
        echo ""

        for i in $(seq 1 {{.MATCHED}}); do
          BODY="{\"order_id\":\"ORD-M$i\",\"tenant\":\"test-user\",\"type\":\"premium\",\"amount\":$((RANDOM % 1000))}"
          kubectl run sb-test-m$i-$RANDOM --rm -i --restart=Never \
            --image=servicebus-consumer:local \
            --image-pull-policy=Never \
            --namespace={{.EMULATOR_NAMESPACE}} \
            --env="SEND_MODE=true" \
            --env="SERVICEBUS_CONNECTION_STRING={{.CONN_STR}}" \
            --env="SEND_QUEUE={{.QUEUE}}" \
            --env="MESSAGE_BODY=$BODY" \
            --env="MESSAGE_PROPERTIES=tenant=test-user,type=premium" \
            -- /app/consumer 2>/dev/null
          echo "MATCHED $i: tenant=test-user order=ORD-M$i"
        done

        for i in $(seq 1 {{.UNMATCHED}}); do
          BODY="{\"order_id\":\"ORD-U$i\",\"tenant\":\"other\",\"type\":\"basic\",\"amount\":$((RANDOM % 100))}"
          kubectl run sb-test-u$i-$RANDOM --rm -i --restart=Never \
            --image=servicebus-consumer:local \
            --image-pull-policy=Never \
            --namespace={{.EMULATOR_NAMESPACE}} \
            --env="SEND_MODE=true" \
            --env="SERVICEBUS_CONNECTION_STRING={{.CONN_STR}}" \
            --env="SEND_QUEUE={{.QUEUE}}" \
            --env="MESSAGE_BODY=$BODY" \
            --env="MESSAGE_PROPERTIES=tenant=other,type=basic" \
            -- /app/consumer 2>/dev/null
          echo "UNMATCHED $i: tenant=other order=ORD-U$i"
        done

        echo ""
        echo "Sent {{.MATCHED}} matched + {{.UNMATCHED}} unmatched = $(({{.MATCHED}} + {{.UNMATCHED}})) total"

  test:split:status:
    desc: "Show split session and emulator state"
    cmds:
      - echo "Split Sessions"
      - kubectl get mirrordclustersplitsessions -A 2>/dev/null || echo "(none)"
      - echo ""
      - echo "Split Config"
      - kubectl get mirrordsplitconfigs -n {{.NAMESPACE}} 2>/dev/null || echo "(none)"
      - echo ""
      - echo "External Resources"
      - kubectl get mirrordclusterexternalresources -A 2>/dev/null || echo "(none)"
      - echo ""
      - echo "Workload Patch Requests"
      - kubectl get mirrordclusterworkloadpatchrequests -A 2>/dev/null || echo "(none)"

  test:split:cleanup:
    desc: "Delete all split sessions and temp resources"
    cmds:
      - echo "Deleting split sessions..."
      - kubectl delete mirrordclustersplitsessions --all -A 2>/dev/null || echo "(none)"
      - echo ""
      - echo "Deleting external resources..."
      - kubectl delete mirrordclusterexternalresources --all -A 2>/dev/null || echo "(none)"
      - echo ""
      - echo "Deleting workload patch requests..."
      - kubectl delete mirrordclusterworkloadpatchrequests --all -A 2>/dev/null || echo "(none)"
      - echo ""
      - echo "Cleanup complete."

  test:three-sessions:
    desc: "Deploy and print instructions for running 3 concurrent sessions on the same queue"
    cmds:
