      - echo "    task servicebus:send TENANT=test-user TYPE=basic"
      - echo "    task servicebus:send TENANT=other TYPE=premium"
      - echo "    Expected - only tenant=test-user + type=premium received"
      - echo ""
      - echo "  Test 3 - JQ body filter:"
