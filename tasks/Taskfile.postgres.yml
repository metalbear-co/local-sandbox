version: '3'

vars:
  ROOT_DIR:
    sh: cd .. && pwd
  NAMESPACE: '{{.NAMESPACE | default "test-mirrord"}}'
  MODULAR_TESTS_DIR: '{{.ROOT_DIR}}/k8s/postgres/modular-tests'
  COMPLETE_TESTS_DIR: '{{.ROOT_DIR}}/k8s/postgres/complete-tests'
  POSTGRES_COMPLETE_FILE: '{{.COMPLETE_TESTS_DIR}}/postgres-test.yaml'
  POSTGRES_DIR: '{{.ROOT_DIR}}/k8s/postgres'
  MIRRORD_BIN: '{{.MIRRORD_BIN | default "mirrord"}}'

tasks:
  deploy:
    desc: "Deploy PostgreSQL test environment"
    cmds:
      - task: deploy:all

  deploy:base:
    desc: "Deploy only source database"
    cmds:
      - echo "Deploying source database..."
      - kubectl create namespace {{.NAMESPACE}} --dry-run=client -o yaml | kubectl apply -f -
      - kubectl apply -k {{.POSTGRES_DIR}}
      - task: _wait:source

  deploy:all:
    desc: "Deploy source database and all test scenarios"
    cmds:
      - task: deploy:base
      - task: deploy:scenarios
      - task: _wait:branches
      - task: _wait:app

  deploy:scenarios:
    desc: "Deploy all test scenarios (requires base)"
    cmds:
      - echo "Deploying test scenarios..."
      - kubectl apply -k {{.MODULAR_TESTS_DIR}}/scenarios/env-val
      - kubectl apply -k {{.MODULAR_TESTS_DIR}}/scenarios/secret-ref
      - kubectl apply -k {{.MODULAR_TESTS_DIR}}/scenarios/echo

  deploy:scenario:
    desc: "Deploy a specific scenario (SCENARIO=env-val)"
    vars:
      SCENARIO: '{{.SCENARIO | default "env-val"}}'
    cmds:
      - kubectl apply -k {{.MODULAR_TESTS_DIR}}/scenarios/{{.SCENARIO}}

  test:
    desc: "Full PostgreSQL test (deploy + verify)"
    cmds:
      - task: deploy:all
      - task: verify

  test:quick:
    desc: "Quick test - verify only (no deploy)"
    cmds:
      - task: verify

  test:complete:
    desc: "Run PostgreSQL complete test (single YAML file)"
    cmds:
      - kubectl create namespace {{.NAMESPACE}} --dry-run=client -o yaml | kubectl apply -f -
      - kubectl apply -f {{.POSTGRES_COMPLETE_FILE}}
      - task: _wait:source:complete
      - task: _wait:branches
      - kubectl get pgbranchdatabases -n {{.NAMESPACE}}
      - echo "PostgreSQL test deployed. Use 'task postgres:branches' to check status"

  test:mirrord:config:
    desc: "Test PostgreSQL with mirrord.json db_branches configuration"
    cmds:
      - echo "Testing PostgreSQL branch creation via mirrord.json..."
      - task: deploy:base
      - echo ""
      - echo "Now run 'task postgres:run:local' in another terminal"
      - echo "Config -> k8s/overlays/postgres/mirrord.json"

  verify:
    desc: "Verify all PostgreSQL branch data"
    cmds:
      - task: verify:all

  verify:all:
    desc: "Full verification of source and all branches"
    cmds:
      - echo ""
      - task: verify:source
      - echo ""
      - task: verify:scenario
        vars: {SCENARIO: env-val, EXPECTED_USERS: "5", EXPECTED_ORDERS: "5", EXPECTED_PRODUCTS: "4", MODE: "full copy"}
      - echo ""
      - task: verify:scenario
        vars: {SCENARIO: secret-ref, EXPECTED_USERS: "3", EXPECTED_ORDERS: "4", EXPECTED_PRODUCTS: "0", MODE: "filtered (age >= 18)"}
      - echo ""
      - echo "Tip - Run 'task postgres:branches' to see branch status"

  verify:source:
    desc: "Verify source database"
    cmds:
      - echo "=== Source Database (postgres-test) ==="
      - |
        kubectl exec -n {{.NAMESPACE}} postgres-test -- psql -U postgres -d source_db -c \
        "SELECT 'users' as tbl, COUNT(*) as cnt FROM users UNION SELECT 'orders', COUNT(*) FROM orders UNION SELECT 'products', COUNT(*) FROM products;"

  verify:scenario:
    desc: "Verify specific scenario (SCENARIO=env-val)"
    vars:
      SCENARIO: '{{.SCENARIO}}'
      MODE: '{{.MODE | default ""}}'
      EXPECTED_USERS: '{{.EXPECTED_USERS | default "?"}}'
      EXPECTED_ORDERS: '{{.EXPECTED_ORDERS | default "?"}}'
      EXPECTED_PRODUCTS: '{{.EXPECTED_PRODUCTS | default "?"}}'
    cmds:
      - |
        echo "=== Branch [{{.SCENARIO}}] {{if .MODE}}({{.MODE}}){{end}} ==="
        POD=$(kubectl get pod -n {{.NAMESPACE}} -l db-owner-name=pg-test-branch-{{.SCENARIO}} --field-selector=status.phase=Running -o jsonpath='{.items[0].metadata.name}')
        if [ -z "$POD" ]; then
          echo "Branch not found"
          exit 1
        fi
        echo "Pod -> $POD"
        kubectl exec -n {{.NAMESPACE}} $POD -- psql -U postgres -d branch_db -c \
        "SELECT 'users' as tbl, COUNT(*) as cnt FROM users UNION SELECT 'orders', COUNT(*) FROM orders UNION SELECT 'products', COUNT(*) FROM products ORDER BY tbl;" 2>/dev/null
        echo "Expected -> users={{.EXPECTED_USERS}}, orders={{.EXPECTED_ORDERS}}, products={{.EXPECTED_PRODUCTS}}"

  verify:branches:
    desc: "Quick verification of all branches"
    cmds:
      - echo "=== Source Database ==="
      - task: query:source
        vars: {QUERY: "SELECT 'users' as tbl, COUNT(*) as cnt FROM users UNION SELECT 'orders', COUNT(*) FROM orders UNION SELECT 'products', COUNT(*) FROM products;"}
      - echo ""
      - echo "=== Branch [env-val] (full copy) ==="
      - task: query:branch
        vars: {SCENARIO: env-val, QUERY: "SELECT 'users' as tbl, COUNT(*) as cnt FROM users UNION SELECT 'orders', COUNT(*) FROM orders UNION SELECT 'products', COUNT(*) FROM products;"}
      - echo ""
      - echo "=== Branch [secret-ref] (filtered) ==="
      - task: query:branch
        vars: {SCENARIO: secret-ref, QUERY: "SELECT 'users' as tbl, COUNT(*) as cnt FROM users UNION SELECT 'orders', COUNT(*) FROM orders UNION SELECT 'products', COUNT(*) FROM products;"}

  run:local:
    desc: "Run PostgreSQL app locally with mirrord"
    dir: '{{.ROOT_DIR}}/apps/postgres-app'
    vars:
      MIRRORD_CONFIG: '{{.MIRRORD_CONFIG | default (print .ROOT_DIR "/k8s/overlays/postgres/mirrord.json")}}'
    preconditions:
      - sh: test -f {{.MIRRORD_CONFIG}}
        msg: "Config file not found at {{.MIRRORD_CONFIG}}"
    cmds:
      - echo "Building PostgreSQL app..."
      - go build -o /tmp/postgres-app main.go
      - echo "Running with mirrord - config {{.MIRRORD_CONFIG}}"
      - '{{.MIRRORD_BIN}} exec -f {{.MIRRORD_CONFIG}} -- /tmp/postgres-app'

  query:source:
    desc: "Query source database (QUERY='SELECT * FROM users')"
    vars:
      QUERY: '{{.QUERY | default "SELECT * FROM users;"}}'
    cmds:
      - kubectl exec -n {{.NAMESPACE}} postgres-test -- psql -U postgres -d source_db -c "{{.QUERY}}"

  query:branch:
    desc: "Query branch database (SCENARIO=env-val QUERY='SELECT * FROM users')"
    vars:
      SCENARIO: '{{.SCENARIO | default "env-val"}}'
      QUERY: '{{.QUERY | default "SELECT * FROM users;"}}'
    cmds:
      - |
        POD=$(kubectl get pod -n {{.NAMESPACE}} -l db-owner-name=pg-test-branch-{{.SCENARIO}} --field-selector=status.phase=Running -o jsonpath='{.items[0].metadata.name}')
        if [ -z "$POD" ]; then
          echo "Branch '{{.SCENARIO}}' not found"
          exit 1
        fi
        kubectl exec -n {{.NAMESPACE}} $POD -- psql -U postgres -d branch_db -c "{{.QUERY}}"

  logs:
    desc: "Show PostgreSQL app logs"
    cmds:
      - kubectl logs -n {{.NAMESPACE}} -l app=postgres-app --tail=50 -f

  logs:source:
    desc: "Show source database logs"
    cmds:
      - kubectl logs -n {{.NAMESPACE}} postgres-test --tail=100 -f

  logs:branch:
    desc: "Show branch pod logs (SCENARIO=env-val)"
    vars:
      SCENARIO: '{{.SCENARIO | default "env-val"}}'
    cmds:
      - |
        POD=$(kubectl get pod -n {{.NAMESPACE}} -l db-owner-name=pg-test-branch-{{.SCENARIO}} -o jsonpath='{.items[0].metadata.name}')
        kubectl logs -n {{.NAMESPACE}} $POD --tail=100 -f

  logs:job:
    desc: "Show init job logs (SCENARIO=env-val)"
    vars:
      SCENARIO: '{{.SCENARIO | default "env-val"}}'
    cmds:
      - |
        JOB=$(kubectl get job -n {{.NAMESPACE}} -l db-owner-name={{.SCENARIO}} -o jsonpath='{.items[0].metadata.name}')
        if [ -z "$JOB" ]; then
          echo "No init job found for scenario {{.SCENARIO}}"
          exit 1
        fi
        kubectl logs -n {{.NAMESPACE}} job/$JOB

  shell:
    desc: "Shell into source database"
    cmds:
      - kubectl exec -it -n {{.NAMESPACE}} postgres-test -- psql -U postgres -d source_db

  shell:source:
    desc: "Shell into source database"
    cmds:
      - task: shell

  shell:branch:
    desc: "Shell into branch database (SCENARIO=env-val)"
    vars:
      SCENARIO: '{{.SCENARIO | default "env-val"}}'
    cmds:
      - |
        POD=$(kubectl get pod -n {{.NAMESPACE}} -l db-owner-name=pg-test-branch-{{.SCENARIO}} --field-selector=status.phase=Running -o jsonpath='{.items[0].metadata.name}')
        if [ -z "$POD" ]; then
          echo "Branch '{{.SCENARIO}}' not found"
          exit 1
        fi
        kubectl exec -it -n {{.NAMESPACE}} $POD -- psql -U postgres -d branch_db

  shell:app:
    desc: "Shell into postgres app"
    cmds:
      - |
        POD=$(kubectl get pod -n {{.NAMESPACE}} -l app=postgres-app -o jsonpath='{.items[0].metadata.name}')
        kubectl exec -it -n {{.NAMESPACE}} $POD -- sh

  status:
    desc: "Show PostgreSQL test environment status"
    cmds:
      - echo "=== Source Database ==="
      - kubectl get pod postgres-test -n {{.NAMESPACE}} -o wide 2>/dev/null || echo "Not deployed"
      - echo ""
      - echo "=== Branch Databases ==="
      - kubectl get pgbranchdatabases -n {{.NAMESPACE}} -o custom-columns=NAME:.metadata.name,PHASE:.status.phase,COPY_MODE:.spec.copy.mode 2>/dev/null || echo "No branches"
      - echo ""
      - echo "=== Branch Pods ==="
      - kubectl get pods -n {{.NAMESPACE}} -l db-owner-name --no-headers 2>/dev/null || echo "No branch pods"

  branches:
    desc: "List all PostgreSQL branch databases"
    cmds:
      - kubectl get pgbranchdatabase -n {{.NAMESPACE}} -o custom-columns=NAME:.metadata.name,PHASE:.status.phase,COPY_MODE:.spec.copy.mode,AGE:.metadata.creationTimestamp

  describe:
    desc: "Describe branch pod (SCENARIO=env-val)"
    vars:
      SCENARIO: '{{.SCENARIO | default "env-val"}}'
    cmds:
      - |
        POD=$(kubectl get pod -n {{.NAMESPACE}} -l db-owner-name=pg-test-branch-{{.SCENARIO}} -o jsonpath='{.items[0].metadata.name}')
        kubectl describe pod -n {{.NAMESPACE}} $POD

  clean:
    desc: "Clean all PostgreSQL test resources"
    cmds:
      - kubectl delete namespace {{.NAMESPACE}} --ignore-not-found=true
      - |
        echo "Waiting for namespace deletion..."
        while kubectl get namespace {{.NAMESPACE}} 2>/dev/null; do
          sleep 2
        done

  clean:branches:
    desc: "Clean only branch databases (keep source)"
    cmds:
      - kubectl delete pgbranchdatabase --all -n {{.NAMESPACE}} --ignore-not-found=true

  clean:complete:
    desc: "Clean PostgreSQL complete test resources"
    cmds:
      - kubectl delete -f {{.POSTGRES_COMPLETE_FILE}} --ignore-not-found=true

  branch:local:
    desc: "Create local PostgreSQL branch from cluster"
    vars:
      SOURCE_POD: '{{.SOURCE_POD | default "postgres-test"}}'
      SOURCE_DB: '{{.SOURCE_DB | default "source_db"}}'
      SOURCE_USER: '{{.SOURCE_USER | default "postgres"}}'
      BRANCH_DB: '{{.BRANCH_DB | default "local_branch"}}'
      MODE: '{{.MODE | default "schema"}}'
      LOCAL_PORT: '{{.LOCAL_PORT | default "5433"}}'
      CONTAINER_NAME: '{{.CONTAINER_NAME | default "mirrord-pg-branch-local"}}'
      POSTGRES_VERSION: '{{.POSTGRES_VERSION | default "17"}}'
      NO_PULL: '{{.NO_PULL | default "false"}}'
      PG_BRANCH_INIT: '{{.PG_BRANCH_INIT | default ""}}'
    preconditions:
      - sh: kubectl get pod -n {{.NAMESPACE}} {{.SOURCE_POD}} >/dev/null 2>&1
        msg: "Source pod '{{.SOURCE_POD}}' not found. Deploy first with 'task postgres:deploy'"
    cmds:
      - |
        PG_INIT="{{.PG_BRANCH_INIT}}"
        if [ -z "$PG_INIT" ]; then
          PG_INIT="pg-branch-init"
        fi
        NO_PULL_FLAG=""
        if [ "{{.NO_PULL}}" = "true" ]; then
          NO_PULL_FLAG="--no-pull"
        fi
        $PG_INIT \
          --local \
          --mode {{.MODE}} \
          --database-name {{.BRANCH_DB}} \
          --local-port {{.LOCAL_PORT}} \
          --container-name {{.CONTAINER_NAME}} \
          --postgres-version {{.POSTGRES_VERSION}} \
          --source-pod {{.SOURCE_POD}} \
          --source-namespace {{.NAMESPACE}} \
          --source-database {{.SOURCE_DB}} \
          --source-user {{.SOURCE_USER}} \
          $NO_PULL_FLAG

  branch:local:full:
    desc: "Create local branch with full data copy"
    cmds:
      - task: branch:local
        vars: {MODE: "all"}

  branch:local:empty:
    desc: "Create empty local branch"
    cmds:
      - task: branch:local
        vars: {MODE: "empty"}

  branch:local:stop:
    desc: "Stop local PostgreSQL branch container"
    vars:
      CONTAINER_NAME: '{{.CONTAINER_NAME | default "mirrord-pg-branch-local"}}'
    cmds:
      - docker stop {{.CONTAINER_NAME}} 2>/dev/null || true
      - docker rm {{.CONTAINER_NAME}} 2>/dev/null || true
      - echo "Container removed"

  branch:local:logs:
    desc: "Show local branch container logs"
    vars:
      CONTAINER_NAME: '{{.CONTAINER_NAME | default "mirrord-pg-branch-local"}}'
    cmds:
      - docker logs {{.CONTAINER_NAME}} --tail 100

  branch:local:shell:
    desc: "Shell into local PostgreSQL branch"
    vars:
      LOCAL_PORT: '{{.LOCAL_PORT | default "5433"}}'
      BRANCH_DB: '{{.BRANCH_DB | default "local_branch"}}'
    cmds:
      - PGPASSWORD=postgres psql -h 127.0.0.1 -p {{.LOCAL_PORT}} -U postgres -d {{.BRANCH_DB}}

  _wait:source:
    internal: true
    cmds:
      - echo "Waiting for source database..."
      - kubectl wait --for=condition=ready pod -l app=postgres-test -n {{.NAMESPACE}} --timeout=120s

  _wait:source:complete:
    internal: true
    cmds:
      - echo "Waiting for source database..."
      - kubectl wait --for=condition=ready pod/postgres-test -n {{.NAMESPACE}} --timeout=120s

  _wait:branches:
    internal: true
    cmds:
      - echo "Waiting for branch databases..."
      - sleep 5
      - kubectl wait --for=jsonpath='{.status.phase}'=Ready pgbranchdatabase/pg-test-branch-env-val -n {{.NAMESPACE}} --timeout=180s || true
      - kubectl wait --for=jsonpath='{.status.phase}'=Ready pgbranchdatabase/pg-test-branch-secret-ref -n {{.NAMESPACE}} --timeout=180s || true

  _wait:app:
    internal: true
    cmds:
      - echo "Waiting for app..."
      - kubectl wait --for=condition=ready pod -l app=postgres-app -n {{.NAMESPACE}} --timeout=120s || true
