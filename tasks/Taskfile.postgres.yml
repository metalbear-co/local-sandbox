version: '3'

# =============================================================================
# PostgreSQL Database Branching Tasks
# =============================================================================
#
# QUICK START:
#   task postgres:deploy:aws          # Deploy AWS RDS target
#   task postgres:run:local:aws       # Run mirrord with AWS RDS
#   task postgres:shell:aws:branch    # Shell into branch database
#   task postgres:shell:aws:remote    # Shell into remote AWS RDS
#
# AFTER CONNECTING TO SHELL (you're already in branch_db):
#   \dt                   - List all tables
#   \dt+                  - List tables with sizes
#   \d users              - Describe table structure
#   SELECT * FROM users;  - Show all data
#   \l                    - List all databases
#   \c db_branch          - Switch to branch database
#   \c other_db           - Switch to another database
#   \q                    - Quit
#
# QUICK DATA INSPECTION (without entering shell):
#   task postgres:tables:branch                    # List tables
#   task postgres:data:branch                      # Show users table
#   task postgres:data:branch TABLE=orders         # Show specific table
#   task postgres:schema:branch TABLE=users        # Show table schema
#   task postgres:query:branch QUERY="SELECT ..."  # Run any query
#
# DEBUGGING:
#   task postgres:debug:branch-pod    # Watch init container logs in real-time
#   task postgres:debug:grafana       # Open Grafana for terminated pod logs
#   Query in Grafana: {namespace="test-mirrord", container="pg-branch-init"}
#
# =============================================================================

vars:
  ROOT_DIR:
    sh: cd .. && pwd
  NAMESPACE: '{{.NAMESPACE | default "test-mirrord"}}'
  MODULAR_TESTS_DIR: '{{.ROOT_DIR}}/k8s/postgres/modular-tests'
  COMPLETE_TESTS_DIR: '{{.ROOT_DIR}}/k8s/postgres/complete-tests'
  POSTGRES_COMPLETE_FILE: '{{.COMPLETE_TESTS_DIR}}/postgres-test.yaml'
  POSTGRES_DIR: '{{.ROOT_DIR}}/k8s/postgres'
  MIRRORD_BIN: '{{.MIRRORD_BIN | default "mirrord"}}'

tasks:
  deploy:
    desc: "Deploy PostgreSQL test environment"
    cmds:
      - task: deploy:all

  deploy:base:
    desc: "Deploy only source database"
    cmds:
      - echo "Deploying source database..."
      - kubectl create namespace {{.NAMESPACE}} --dry-run=client -o yaml | kubectl apply -f -
      - kubectl apply -k {{.POSTGRES_DIR}}
      - task: _wait:source

  deploy:all:
    desc: "Deploy source database and all test scenarios"
    cmds:
      - task: deploy:base
      - task: deploy:scenarios
      - task: _wait:branches
      - task: _wait:app

  deploy:scenarios:
    desc: "Deploy all test scenarios (requires base)"
    cmds:
      - echo "Deploying test scenarios..."
      - kubectl apply -k {{.MODULAR_TESTS_DIR}}/scenarios/env-val
      - kubectl apply -k {{.MODULAR_TESTS_DIR}}/scenarios/secret-ref
      - kubectl apply -k {{.MODULAR_TESTS_DIR}}/scenarios/echo

  deploy:scenario:
    desc: "Deploy a specific scenario (SCENARIO=env-val)"
    vars:
      SCENARIO: '{{.SCENARIO | default "env-val"}}'
    cmds:
      - kubectl apply -k {{.MODULAR_TESTS_DIR}}/scenarios/{{.SCENARIO}}

  test:
    desc: "Full PostgreSQL test (deploy + verify)"
    cmds:
      - task: deploy:all
      - task: verify

  test:quick:
    desc: "Quick test - verify only (no deploy)"
    cmds:
      - task: verify

  test:complete:
    desc: "Run PostgreSQL complete test (single YAML file)"
    cmds:
      - kubectl create namespace {{.NAMESPACE}} --dry-run=client -o yaml | kubectl apply -f -
      - kubectl apply -f {{.POSTGRES_COMPLETE_FILE}}
      - task: _wait:source:complete
      - task: _wait:branches
      - kubectl get pgbranchdatabases -n {{.NAMESPACE}}
      - echo "PostgreSQL test deployed. Use 'task postgres:branches' to check status"

  test:mirrord:config:
    desc: "Test PostgreSQL with mirrord.json db_branches configuration"
    cmds:
      - echo "Testing PostgreSQL branch creation via mirrord.json..."
      - task: deploy:base
      - echo ""
      - echo "Now run 'task postgres:run:local' in another terminal"
      - echo "Config -> k8s/overlays/postgres/mirrord.json"

  verify:
    desc: "Verify all PostgreSQL branch data"
    cmds:
      - task: verify:all

  verify:all:
    desc: "Full verification of source and all branches"
    cmds:
      - echo ""
      - task: verify:source
      - echo ""
      - task: verify:scenario
        vars: {SCENARIO: env-val, EXPECTED_USERS: "5", EXPECTED_ORDERS: "5", EXPECTED_PRODUCTS: "4", MODE: "full copy"}
      - echo ""
      - task: verify:scenario
        vars: {SCENARIO: secret-ref, EXPECTED_USERS: "3", EXPECTED_ORDERS: "4", EXPECTED_PRODUCTS: "0", MODE: "filtered (age >= 18)"}
      - echo ""
      - echo "Tip - Run 'task postgres:branches' to see branch status"

  verify:source:
    desc: "Verify source database"
    cmds:
      - echo "=== Source Database (postgres-test) ==="
      - |
        kubectl exec -n {{.NAMESPACE}} postgres-test -- psql -U postgres -d source_db -c \
        "SELECT 'users' as tbl, COUNT(*) as cnt FROM users UNION SELECT 'orders', COUNT(*) FROM orders UNION SELECT 'products', COUNT(*) FROM products;"

  verify:scenario:
    desc: "Verify specific scenario (SCENARIO=env-val)"
    vars:
      SCENARIO: '{{.SCENARIO}}'
      MODE: '{{.MODE | default ""}}'
      EXPECTED_USERS: '{{.EXPECTED_USERS | default "?"}}'
      EXPECTED_ORDERS: '{{.EXPECTED_ORDERS | default "?"}}'
      EXPECTED_PRODUCTS: '{{.EXPECTED_PRODUCTS | default "?"}}'
    cmds:
      - |
        echo "=== Branch [{{.SCENARIO}}] {{if .MODE}}({{.MODE}}){{end}} ==="
        POD=$(kubectl get pod -n {{.NAMESPACE}} -l db-owner-name=pg-test-branch-{{.SCENARIO}} --field-selector=status.phase=Running -o jsonpath='{.items[0].metadata.name}')
        if [ -z "$POD" ]; then
          echo "Branch not found"
          exit 1
        fi
        echo "Pod -> $POD"
        kubectl exec -n {{.NAMESPACE}} $POD -- psql -U postgres -d branch_db -c \
        "SELECT 'users' as tbl, COUNT(*) as cnt FROM users UNION SELECT 'orders', COUNT(*) FROM orders UNION SELECT 'products', COUNT(*) FROM products ORDER BY tbl;" 2>/dev/null
        echo "Expected -> users={{.EXPECTED_USERS}}, orders={{.EXPECTED_ORDERS}}, products={{.EXPECTED_PRODUCTS}}"

  verify:branches:
    desc: "Quick verification of all branches"
    cmds:
      - echo "=== Source Database ==="
      - task: query:source
        vars: {QUERY: "SELECT 'users' as tbl, COUNT(*) as cnt FROM users UNION SELECT 'orders', COUNT(*) FROM orders UNION SELECT 'products', COUNT(*) FROM products;"}
      - echo ""
      - echo "=== Branch [env-val] (full copy) ==="
      - task: query:branch
        vars: {SCENARIO: env-val, QUERY: "SELECT 'users' as tbl, COUNT(*) as cnt FROM users UNION SELECT 'orders', COUNT(*) FROM orders UNION SELECT 'products', COUNT(*) FROM products;"}
      - echo ""
      - echo "=== Branch [secret-ref] (filtered) ==="
      - task: query:branch
        vars: {SCENARIO: secret-ref, QUERY: "SELECT 'users' as tbl, COUNT(*) as cnt FROM users UNION SELECT 'orders', COUNT(*) FROM orders UNION SELECT 'products', COUNT(*) FROM products;"}

  run:local:
    desc: "Run PostgreSQL app locally with mirrord"
    dir: '{{.ROOT_DIR}}/apps/postgres-app'
    vars:
      MIRRORD_CONFIG: '{{.MIRRORD_CONFIG | default (print .ROOT_DIR "/k8s/overlays/postgres/mirrord.json")}}'
    preconditions:
      - sh: test -f {{.MIRRORD_CONFIG}}
        msg: "Config file not found at {{.MIRRORD_CONFIG}}"
    cmds:
      - echo "Building PostgreSQL app..."
      - go build -o /tmp/postgres-app main.go
      - echo "Running with mirrord - config {{.MIRRORD_CONFIG}}"
      - '{{.MIRRORD_BIN}} exec -f {{.MIRRORD_CONFIG}} -- /tmp/postgres-app'

  query:source:
    desc: "Query source database (QUERY='SELECT * FROM users')"
    vars:
      QUERY: '{{.QUERY | default "SELECT * FROM users;"}}'
    cmds:
      - kubectl exec -n {{.NAMESPACE}} postgres-test -- psql -U postgres -d source_db -c "{{.QUERY}}"

  query:branch:
    desc: "Query branch database (SCENARIO=env-val QUERY='SELECT * FROM users')"
    vars:
      SCENARIO: '{{.SCENARIO | default "env-val"}}'
      QUERY: '{{.QUERY | default "SELECT * FROM users;"}}'
    cmds:
      - |
        POD=$(kubectl get pod -n {{.NAMESPACE}} -l db-owner-name=pg-test-branch-{{.SCENARIO}} --field-selector=status.phase=Running -o jsonpath='{.items[0].metadata.name}')
        if [ -z "$POD" ]; then
          echo "Branch '{{.SCENARIO}}' not found"
          exit 1
        fi
        kubectl exec -n {{.NAMESPACE}} $POD -- psql -U postgres -d branch_db -c "{{.QUERY}}"

  logs:
    desc: "Show PostgreSQL app logs"
    cmds:
      - kubectl logs -n {{.NAMESPACE}} -l app=postgres-app --tail=50 -f

  logs:source:
    desc: "Show source database logs"
    cmds:
      - kubectl logs -n {{.NAMESPACE}} postgres-test --tail=100 -f

  logs:branch:
    desc: "Show branch pod logs (SCENARIO=env-val)"
    vars:
      SCENARIO: '{{.SCENARIO | default "env-val"}}'
    cmds:
      - |
        POD=$(kubectl get pod -n {{.NAMESPACE}} -l db-owner-name=pg-test-branch-{{.SCENARIO}} -o jsonpath='{.items[0].metadata.name}')
        kubectl logs -n {{.NAMESPACE}} $POD --tail=100 -f

  logs:job:
    desc: "Show init job logs (SCENARIO=env-val)"
    vars:
      SCENARIO: '{{.SCENARIO | default "env-val"}}'
    cmds:
      - |
        JOB=$(kubectl get job -n {{.NAMESPACE}} -l db-owner-name={{.SCENARIO}} -o jsonpath='{.items[0].metadata.name}')
        if [ -z "$JOB" ]; then
          echo "No init job found for scenario {{.SCENARIO}}"
          exit 1
        fi
        kubectl logs -n {{.NAMESPACE}} job/$JOB

  shell:
    desc: "Shell into source database"
    cmds:
      - kubectl exec -it -n {{.NAMESPACE}} postgres-test -- psql -U postgres -d source_db

  shell:source:
    desc: "Shell into source database"
    cmds:
      - task: shell

  shell:branch:
    desc: "Shell into branch database (SCENARIO=env-val)"
    vars:
      SCENARIO: '{{.SCENARIO | default "env-val"}}'
    cmds:
      - |
        POD=$(kubectl get pod -n {{.NAMESPACE}} -l db-owner-name=pg-test-branch-{{.SCENARIO}} --field-selector=status.phase=Running -o jsonpath='{.items[0].metadata.name}')
        if [ -z "$POD" ]; then
          echo "Branch '{{.SCENARIO}}' not found"
          exit 1
        fi
        kubectl exec -it -n {{.NAMESPACE}} $POD -- psql -U postgres -d branch_db

  shell:app:
    desc: "Shell into postgres app"
    cmds:
      - |
        POD=$(kubectl get pod -n {{.NAMESPACE}} -l app=postgres-app -o jsonpath='{.items[0].metadata.name}')
        kubectl exec -it -n {{.NAMESPACE}} $POD -- sh

  status:
    desc: "Show PostgreSQL test environment status"
    cmds:
      - echo "=== Source Database ==="
      - kubectl get pod postgres-test -n {{.NAMESPACE}} -o wide 2>/dev/null || echo "Not deployed"
      - echo ""
      - echo "=== Branch Databases ==="
      - kubectl get pgbranchdatabases -n {{.NAMESPACE}} -o custom-columns=NAME:.metadata.name,PHASE:.status.phase,COPY_MODE:.spec.copy.mode 2>/dev/null || echo "No branches"
      - echo ""
      - echo "=== Branch Pods ==="
      - kubectl get pods -n {{.NAMESPACE}} -l db-owner-name --no-headers 2>/dev/null || echo "No branch pods"

  branches:
    desc: "List all PostgreSQL branch databases"
    cmds:
      - kubectl get pgbranchdatabase -n {{.NAMESPACE}} -o custom-columns=NAME:.metadata.name,PHASE:.status.phase,COPY_MODE:.spec.copy.mode,AGE:.metadata.creationTimestamp

  describe:
    desc: "Describe branch pod (SCENARIO=env-val)"
    vars:
      SCENARIO: '{{.SCENARIO | default "env-val"}}'
    cmds:
      - |
        POD=$(kubectl get pod -n {{.NAMESPACE}} -l db-owner-name=pg-test-branch-{{.SCENARIO}} -o jsonpath='{.items[0].metadata.name}')
        kubectl describe pod -n {{.NAMESPACE}} $POD

  clean:
    desc: "Clean all PostgreSQL test resources"
    cmds:
      - kubectl delete namespace {{.NAMESPACE}} --ignore-not-found=true
      - |
        echo "Waiting for namespace deletion..."
        while kubectl get namespace {{.NAMESPACE}} 2>/dev/null; do
          sleep 2
        done

  clean:branches:
    desc: "Clean only branch databases (keep source)"
    cmds:
      - kubectl delete pgbranchdatabase --all -n {{.NAMESPACE}} --ignore-not-found=true

  clean:complete:
    desc: "Clean PostgreSQL complete test resources"
    cmds:
      - kubectl delete -f {{.POSTGRES_COMPLETE_FILE}} --ignore-not-found=true

  branch:local:
    desc: "Create local PostgreSQL branch from cluster"
    vars:
      SOURCE_POD: '{{.SOURCE_POD | default "postgres-test"}}'
      SOURCE_DB: '{{.SOURCE_DB | default "source_db"}}'
      SOURCE_USER: '{{.SOURCE_USER | default "postgres"}}'
      BRANCH_DB: '{{.BRANCH_DB | default "local_branch"}}'
      MODE: '{{.MODE | default "schema"}}'
      LOCAL_PORT: '{{.LOCAL_PORT | default "5433"}}'
      CONTAINER_NAME: '{{.CONTAINER_NAME | default "mirrord-pg-branch-local"}}'
      POSTGRES_VERSION: '{{.POSTGRES_VERSION | default "17"}}'
      NO_PULL: '{{.NO_PULL | default "false"}}'
      PG_BRANCH_INIT: '{{.PG_BRANCH_INIT | default ""}}'
    preconditions:
      - sh: kubectl get pod -n {{.NAMESPACE}} {{.SOURCE_POD}} >/dev/null 2>&1
        msg: "Source pod '{{.SOURCE_POD}}' not found. Deploy first with 'task postgres:deploy'"
    cmds:
      - |
        PG_INIT="{{.PG_BRANCH_INIT}}"
        if [ -z "$PG_INIT" ]; then
          PG_INIT="pg-branch-init"
        fi
        NO_PULL_FLAG=""
        if [ "{{.NO_PULL}}" = "true" ]; then
          NO_PULL_FLAG="--no-pull"
        fi
        $PG_INIT \
          --local \
          --mode {{.MODE}} \
          --database-name {{.BRANCH_DB}} \
          --local-port {{.LOCAL_PORT}} \
          --container-name {{.CONTAINER_NAME}} \
          --postgres-version {{.POSTGRES_VERSION}} \
          --source-pod {{.SOURCE_POD}} \
          --source-namespace {{.NAMESPACE}} \
          --source-database {{.SOURCE_DB}} \
          --source-user {{.SOURCE_USER}} \
          $NO_PULL_FLAG

  branch:local:full:
    desc: "Create local branch with full data copy"
    cmds:
      - task: branch:local
        vars: {MODE: "all"}

  branch:local:empty:
    desc: "Create empty local branch"
    cmds:
      - task: branch:local
        vars: {MODE: "empty"}

  branch:local:stop:
    desc: "Stop local PostgreSQL branch container"
    vars:
      CONTAINER_NAME: '{{.CONTAINER_NAME | default "mirrord-pg-branch-local"}}'
    cmds:
      - docker stop {{.CONTAINER_NAME}} 2>/dev/null || true
      - docker rm {{.CONTAINER_NAME}} 2>/dev/null || true
      - echo "Container removed"

  branch:local:logs:
    desc: "Show local branch container logs"
    vars:
      CONTAINER_NAME: '{{.CONTAINER_NAME | default "mirrord-pg-branch-local"}}'
    cmds:
      - docker logs {{.CONTAINER_NAME}} --tail 100

  branch:local:shell:
    desc: "Shell into local PostgreSQL branch"
    vars:
      LOCAL_PORT: '{{.LOCAL_PORT | default "5433"}}'
      BRANCH_DB: '{{.BRANCH_DB | default "local_branch"}}'
    cmds:
      - PGPASSWORD=postgres psql -h 127.0.0.1 -p {{.LOCAL_PORT}} -U postgres -d {{.BRANCH_DB}}

  deploy:aws:
    desc: "Deploy PostgreSQL app connected to AWS RDS"
    preconditions:
      - sh: test -n "${RDS_HOST}"
        msg: "RDS_HOST not set in .env"
      - sh: test -n "${RDS_DATABASE}"
        msg: "RDS_DATABASE not set in .env"
      - sh: test -n "${RDS_USER}"
        msg: "RDS_USER not set in .env"
      - sh: test -n "${AWS_REGION}"
        msg: "AWS_REGION not set in .env"
    cmds:
      - kubectl create namespace {{.NAMESPACE}} --dry-run=client -o yaml | kubectl apply -f -
      - kubectl kustomize {{.ROOT_DIR}}/k8s/overlays/postgres-aws | envsubst | kubectl apply -f -
      - task: _wait:app:aws

  run:local:aws:
    desc: "Run PostgreSQL app locally with mirrord (AWS RDS + IAM auth)"
    dir: '{{.ROOT_DIR}}/apps/postgres-app'
    vars:
      MIRRORD_CONFIG: '{{.MIRRORD_CONFIG | default (print .ROOT_DIR "/k8s/overlays/postgres-aws/mirrord.json")}}'
    preconditions:
      - sh: test -f {{.MIRRORD_CONFIG}}
        msg: "Config file not found at {{.MIRRORD_CONFIG}}"
    cmds:
      - echo "Building PostgreSQL app..."
      - go build -o /tmp/postgres-app main.go
      - echo "Running with mirrord (AWS RDS + IAM auth)"
      - echo "Config -> {{.MIRRORD_CONFIG}}"
      - echo ""
      - echo "The init container will generate an IAM token to connect to RDS."
      - echo "Your local app will connect to an ephemeral branch database."
      - echo ""
      - '{{.MIRRORD_BIN}} exec -f {{.MIRRORD_CONFIG}} -- /tmp/postgres-app'

  test:aws:
    desc: "Full AWS RDS test (deploy + run local)"
    cmds:
      - task: deploy:aws
      - echo ""
      - echo "AWS RDS app deployed. Now run 'task postgres:run:local:aws' to test IAM auth branching."

  verify:aws:rds:
    desc: "Verify connection to AWS RDS (requires psql and AWS credentials)"
    preconditions:
      - sh: test -n "${RDS_HOST}"
        msg: "RDS_HOST not set"
    cmds:
      - |
        echo "=== Testing AWS RDS Connection ==="
        echo "Host: ${RDS_HOST}"
        echo "Database: ${RDS_DATABASE}"
        echo "User: ${RDS_USER}"
        echo ""
        echo "Generating IAM token..."
        TOKEN=$(aws rds generate-db-auth-token \
          --hostname ${RDS_HOST} \
          --port ${RDS_PORT:-5432} \
          --username ${RDS_USER} \
          --region ${AWS_REGION})
        echo "Token generated (first 50 chars): ${TOKEN:0:50}..."
        echo ""
        echo "Connecting to RDS..."
        PGPASSWORD="$TOKEN" psql \
          "host=${RDS_HOST} port=${RDS_PORT:-5432} dbname=${RDS_DATABASE} user=${RDS_USER} sslmode=require" \
          -c "SELECT version();"

  status:aws:
    desc: "Show AWS RDS test environment status"
    cmds:
      - echo "=== Pods in {{.NAMESPACE}} ==="
      - kubectl get pods -n {{.NAMESPACE}}
      - echo ""
      - echo "=== Operator pods ==="
      - kubectl get pods -n mirrord
      - echo ""
      - echo "=== Branch Databases ==="
      - kubectl get pgbranchdatabases -n {{.NAMESPACE}} -o custom-columns=NAME:.metadata.name,PHASE:.status.phase,IAM_AUTH:.spec.iamAuth 2>/dev/null || echo "No branches"
      - echo ""
      - echo "=== RDS Connection Info ==="
      - echo "Host -> ${RDS_HOST:-<not set>}"
      - echo "Database ->${RDS_DATABASE:-<not set>}"
      - echo "User -> ${RDS_USER:-<not set>}"
      - echo "Region -> ${AWS_REGION:-<not set>}"

  logs:aws:target:
    desc: "Show AWS RDS target pod logs"
    cmds:
      - kubectl logs -n {{.NAMESPACE}} pg-rds-target --tail=100 -f

  logs:aws:branch:
    desc: "Show AWS RDS branch pod logs (init container + postgres)"
    cmds:
      - |
        POD=$(kubectl get pod -n {{.NAMESPACE}} -l db-owner-name --field-selector=status.phase=Running -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
        if [ -z "$POD" ]; then
          echo "No branch pod found. Checking all pods with db-owner-name label..."
          kubectl get pods -n {{.NAMESPACE}} -l db-owner-name
          exit 1
        fi
        echo "Branch pod: $POD"
        echo ""
        echo "=== Init Container Logs (pg-branch-init) ==="
        kubectl logs -n {{.NAMESPACE}} $POD -c pg-branch-init 2>/dev/null || echo "Init container logs not available"
        echo ""
        echo "=== Postgres Container Logs ==="
        kubectl logs -n {{.NAMESPACE}} $POD -c postgres --tail=50

  clean:aws:
    desc: "Clean AWS RDS test resources"
    cmds:
      - kubectl delete pod pg-rds-target -n {{.NAMESPACE}} --ignore-not-found=true
      - kubectl delete service pg-rds-service -n {{.NAMESPACE}} --ignore-not-found=true
      - kubectl delete pgbranchdatabase --all -n {{.NAMESPACE}} --ignore-not-found=true

  shell:aws:branch:
    desc: "Shell into AWS RDS branch database"
    cmds:
      - |
        POD=$(kubectl get pod -n {{.NAMESPACE}} -l db-owner-name --field-selector=status.phase=Running -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
        if [ -z "$POD" ]; then
          echo "No branch pod found. Run 'task postgres:run:local:aws' first."
          exit 1
        fi
        echo "=== Connecting to BRANCH database in pod: $POD ==="
        echo "Commands: \\c branch_db -> \\dt -> SELECT * FROM tablename;"
        echo ""
        kubectl exec -it -n {{.NAMESPACE}} $POD -- psql -U postgres -d branch_db

  shell:aws:remote:
    desc: "Shell into remote AWS RDS database (requires psql installed locally)"
    preconditions:
      - sh: command -v psql
        msg: "psql not installed. Run 'brew install libpq' or install PostgreSQL client."
      - sh: test -n "${RDS_HOST}"
        msg: "RDS_HOST not set. Source your .env file first."
    cmds:
      - |
        echo "=== Connecting to REMOTE AWS RDS ==="
        echo "Host: ${RDS_HOST}"
        echo "Database: ${RDS_DATABASE}"
        echo "User: ${RDS_USER}"
        echo ""
        echo "Note: For IAM auth, you need to generate a token first."
        echo "This connects with password auth. Enter password when prompted."
        echo ""
        PGPASSWORD="${RDS_PASSWORD:-}" psql -h "${RDS_HOST}" -p "${RDS_PORT:-5432}" -U "${RDS_USER}" -d "${RDS_DATABASE}" --set=sslmode=require

  _wait:app:aws:
    internal: true
    cmds:
      - echo "Waiting for RDS target pod..."
      - kubectl wait --for=condition=ready pod/pg-rds-target -n {{.NAMESPACE}} --timeout=120s

  _wait:source:
    internal: true
    cmds:
      - echo "Waiting for source database..."
      - kubectl wait --for=condition=ready pod -l app=postgres-test -n {{.NAMESPACE}} --timeout=120s

  _wait:source:complete:
    internal: true
    cmds:
      - echo "Waiting for source database..."
      - kubectl wait --for=condition=ready pod/postgres-test -n {{.NAMESPACE}} --timeout=120s

  _wait:branches:
    internal: true
    cmds:
      - echo "Waiting for branch databases..."
      - sleep 5
      - kubectl wait --for=jsonpath='{.status.phase}'=Ready pgbranchdatabase/pg-test-branch-env-val -n {{.NAMESPACE}} --timeout=180s || true
      - kubectl wait --for=jsonpath='{.status.phase}'=Ready pgbranchdatabase/pg-test-branch-secret-ref -n {{.NAMESPACE}} --timeout=180s || true

  _wait:app:
    internal: true
    cmds:
      - echo "Waiting for app..."
      - kubectl wait --for=condition=ready pod -l app=postgres-app -n {{.NAMESPACE}} --timeout=120s || true

  deploy:gcp:
    desc: "Deploy GCP Cloud SQL target app for IAM auth testing"
    preconditions:
      - sh: test -n "${CLOUDSQL_HOST}"
        msg: "CLOUDSQL_HOST not set. Create .env file from k8s/overlays/postgres-gcp/env-template.txt"
      - sh: test -n "${GOOGLE_APPLICATION_CREDENTIALS}" && test -f "${GOOGLE_APPLICATION_CREDENTIALS}"
        msg: "GOOGLE_APPLICATION_CREDENTIALS not set or file not found"
    cmds:
      - kubectl create namespace {{.NAMESPACE}} --dry-run=client -o yaml | kubectl apply -f -
      # Create secret in target namespace (for target pod - IAM credentials are resolved from here)
      - |
        kubectl create secret generic gcp-credentials-json \
          --from-file=credentials.json="${GOOGLE_APPLICATION_CREDENTIALS}" \
          -n {{.NAMESPACE}} \
          --dry-run=client -o yaml | kubectl apply -f -
      - kubectl kustomize {{.ROOT_DIR}}/k8s/overlays/postgres-gcp | envsubst | kubectl apply -f -
      - task: _wait:app:gcp

  run:local:gcp:
    desc: "Run PostgreSQL app locally with mirrord (GCP Cloud SQL + IAM auth)"
    dir: '{{.ROOT_DIR}}/apps/postgres-app'
    preconditions:
      - sh: test -n "${CLOUDSQL_HOST}"
        msg: "CLOUDSQL_HOST not set"
    cmds:
      - |
        echo "=== Starting mirrord with GCP Cloud SQL IAM auth ==="
        echo "Cloud SQL Host: ${CLOUDSQL_HOST}"
        echo "Database: ${CLOUDSQL_DATABASE}"
        echo "User: ${CLOUDSQL_USER}"
        echo "Project: ${GCP_PROJECT}"
        echo ""
      - echo "Building PostgreSQL app..."
      - go build -o /tmp/postgres-app main.go
      - echo "Running with mirrord (GCP Cloud SQL + IAM auth)"
      - echo ""
      - '{{.MIRRORD_BIN}} exec -f {{.ROOT_DIR}}/k8s/overlays/postgres-gcp/mirrord.json -- /tmp/postgres-app'

  test:gcp:
    desc: "Full GCP Cloud SQL IAM auth test: deploy, run with mirrord, and verify"
    cmds:
      - task: deploy:gcp
      - echo ""
      - echo "GCP Cloud SQL app deployed. Now run 'task postgres:run:local:gcp' to test IAM auth branching."

  debug:branch-pod:
    desc: "Debug failing branch pods - watches and captures logs from ephemeral pods"
    vars:
      NAMESPACE: '{{.NAMESPACE | default "test-mirrord"}}'
    cmds:
      - |
        echo "=== Watching for branch pods in {{.NAMESPACE}} ==="
        echo "Waiting for a pod with label 'db-owner-name' to appear..."
        echo "Run your mirrord command in another terminal."
        echo ""
        
        # Loop until we find a pod
        while true; do
          POD=$(kubectl get pods -n {{.NAMESPACE}} -l db-owner-name -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
          if [ -n "$POD" ]; then
            echo "========================================"
            echo "FOUND POD: $POD"
            echo "========================================"
            
            # Immediately save pod spec
            echo ""
            echo "=== Pod Spec (init container args) ==="
            kubectl get pod -n {{.NAMESPACE}} "$POD" -o jsonpath='{.spec.initContainers[1].args}' 2>/dev/null | jq . 2>/dev/null || \
              kubectl get pod -n {{.NAMESPACE}} "$POD" -o jsonpath='{.spec.initContainers[1].args}'
            
            echo ""
            echo "=== Init container env vars ==="
            kubectl get pod -n {{.NAMESPACE}} "$POD" -o jsonpath='{.spec.initContainers[1].env[*].name}'
            
            echo ""
            echo ""
            echo "=== Waiting for init container to run... ==="
            
            # Poll for init container logs
            for i in $(seq 1 30); do
              LOGS=$(kubectl logs -n {{.NAMESPACE}} "$POD" -c pg-branch-init 2>&1)
              if [ -n "$LOGS" ] && [[ ! "$LOGS" =~ "waiting to start" ]] && [[ ! "$LOGS" =~ "PodInitializing" ]]; then
                echo ""
                echo "=== pg-branch-init LOGS ==="
                echo "$LOGS"
                break
              fi
              sleep 0.3
            done
            
            echo ""
            echo "=== Pod Status ==="
            kubectl get pod -n {{.NAMESPACE}} "$POD" -o jsonpath='{.status.phase}' 2>/dev/null || echo "(deleted)"
            
            echo ""
            echo "=== Init Container Termination Status ==="
            kubectl get pod -n {{.NAMESPACE}} "$POD" -o jsonpath='{.status.initContainerStatuses[1].state}' 2>/dev/null | jq . 2>/dev/null || echo "(not available)"
            
            break
          fi
          sleep 0.1
        done

  debug:grafana:
    desc: "Open Grafana for viewing logs from terminated pods (Loki)"
    cmds:
      - |
        # Check if port-forward is running, if not start it
        if ! pgrep -f "port-forward.*loki-grafana" > /dev/null; then
          echo "Starting Grafana port-forward..."
          pkill -f "port-forward.*loki-grafana" 2>/dev/null || true
          nohup kubectl port-forward -n loki svc/loki-grafana 3456:80 > /tmp/grafana-port-forward.log 2>&1 &
          sleep 2
        fi
        echo ""
        echo "=== Grafana (Loki) ==="
        echo "URL: http://localhost:3456"
        echo "Login: admin / admin"
        echo "Query: {namespace=\"test-mirrord\", container=\"pg-branch-init\"}"
        echo ""
        open "http://localhost:3456" 2>/dev/null || xdg-open "http://localhost:3456" 2>/dev/null || echo "Open: http://localhost:3456"

  status:gcp:
    desc: "Show GCP Cloud SQL test environment status"
    cmds:
      - echo "=== Pods in {{.NAMESPACE}} ==="
      - kubectl get pods -n {{.NAMESPACE}}
      - echo ""
      - echo "=== Operator pods ==="
      - kubectl get pods -n mirrord
      - echo ""
      - echo "=== Branch Databases ==="
      - kubectl get pgbranchdatabases -n {{.NAMESPACE}} -o custom-columns=NAME:.metadata.name,PHASE:.status.phase,IAM_AUTH:.spec.iamAuth 2>/dev/null || echo "No branches"
      - echo ""
      - echo "=== Cloud SQL Connection Info ==="
      - echo "Host -> ${CLOUDSQL_HOST:-<not set>}"
      - echo "Database -> ${CLOUDSQL_DATABASE:-<not set>}"
      - echo "User -> ${CLOUDSQL_USER:-<not set>}"
      - echo "Project -> ${GCP_PROJECT:-<not set>}"

  logs:gcp:target:
    desc: "Show GCP Cloud SQL target pod logs"
    cmds:
      - kubectl logs -n {{.NAMESPACE}} pg-cloudsql-target --tail=100 -f

  logs:gcp:branch:
    desc: "Show GCP Cloud SQL branch pod logs (init container + postgres)"
    cmds:
      - |
        POD=$(kubectl get pod -n {{.NAMESPACE}} -l db-owner-name --field-selector=status.phase=Running -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
        if [ -z "$POD" ]; then
          echo "No branch pod found. Checking all pods with db-owner-name label..."
          kubectl get pods -n {{.NAMESPACE}} -l db-owner-name
          exit 1
        fi
        echo "Branch pod: $POD"
        echo ""
        echo "=== Init Container Logs (pg-branch-init) ==="
        kubectl logs -n {{.NAMESPACE}} $POD -c pg-branch-init 2>/dev/null || echo "Init container logs not available"
        echo ""
        echo "=== Postgres Container Logs ==="
        kubectl logs -n {{.NAMESPACE}} $POD -c postgres --tail=50

  clean:gcp:
    desc: "Clean GCP Cloud SQL test resources"
    cmds:
      - kubectl delete pod pg-cloudsql-target -n {{.NAMESPACE}} --ignore-not-found=true
      - kubectl delete service pg-cloudsql-service -n {{.NAMESPACE}} --ignore-not-found=true
      - kubectl delete pgbranchdatabase --all -n {{.NAMESPACE}} --ignore-not-found=true

  shell:gcp:branch:
    desc: "Shell into GCP Cloud SQL branch database"
    cmds:
      - |
        POD=$(kubectl get pod -n {{.NAMESPACE}} -l db-owner-name --field-selector=status.phase=Running -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
        if [ -z "$POD" ]; then
          echo "No branch pod found"
          exit 1
        fi
        echo "Connecting to branch database in pod: $POD"
        kubectl exec -it -n {{.NAMESPACE}} $POD -- psql -U postgres

  tables:branch:
    desc: "List all tables in the branch database"
    cmds:
      - |
        POD=$(kubectl get pod -n {{.NAMESPACE}} -l db-owner-name --field-selector=status.phase=Running -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
        if [ -z "$POD" ]; then
          echo "No branch pod found"
          exit 1
        fi
        echo "=== Tables in branch database ==="
        kubectl exec -n {{.NAMESPACE}} $POD -- psql -U postgres -d branch_db -c '\dt'

  data:branch:
    desc: "Show all data from a table in branch (TABLE=users)"
    vars:
      TABLE: '{{.TABLE | default "users"}}'
    cmds:
      - |
        POD=$(kubectl get pod -n {{.NAMESPACE}} -l db-owner-name --field-selector=status.phase=Running -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
        if [ -z "$POD" ]; then
          echo "No branch pod found"
          exit 1
        fi
        echo "=== Data in {{.TABLE}} ==="
        kubectl exec -n {{.NAMESPACE}} $POD -- psql -U postgres -d branch_db -c 'SELECT * FROM {{.TABLE}};'

  schema:branch:
    desc: "Show schema of a table in branch (TABLE=users)"
    vars:
      TABLE: '{{.TABLE | default "users"}}'
    cmds:
      - |
        POD=$(kubectl get pod -n {{.NAMESPACE}} -l db-owner-name --field-selector=status.phase=Running -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
        if [ -z "$POD" ]; then
          echo "No branch pod found"
          exit 1
        fi
        echo "=== Schema for {{.TABLE}} ==="
        kubectl exec -n {{.NAMESPACE}} $POD -- psql -U postgres -d branch_db -c '\d {{.TABLE}}'

  query:branch:
    desc: "Run a SQL query on branch (QUERY='SELECT ...')"
    vars:
      QUERY: '{{.QUERY | default "SELECT 1;"}}'
    cmds:
      - |
        POD=$(kubectl get pod -n {{.NAMESPACE}} -l db-owner-name --field-selector=status.phase=Running -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
        if [ -z "$POD" ]; then
          echo "No branch pod found"
          exit 1
        fi
        kubectl exec -n {{.NAMESPACE}} $POD -- psql -U postgres -d branch_db -c '{{.QUERY}}'

  _wait:app:gcp:
    internal: true
    cmds:
      - echo "Waiting for Cloud SQL target pod..."
      - kubectl wait --for=condition=ready pod/pg-cloudsql-target -n {{.NAMESPACE}} --timeout=120s

  deploy:gcp:path:
    desc: "Deploy GCP Cloud SQL target app using credentials_path (file-based)"
    preconditions:
      - sh: test -n "${CLOUDSQL_HOST}"
        msg: "CLOUDSQL_HOST not set. Create .env file from k8s/overlays/postgres-gcp/env-template.txt"
      - sh: test -n "${GOOGLE_APPLICATION_CREDENTIALS}" && test -f "${GOOGLE_APPLICATION_CREDENTIALS}"
        msg: "GOOGLE_APPLICATION_CREDENTIALS not set or file not found"
    cmds:
      - kubectl create namespace {{.NAMESPACE}} --dry-run=client -o yaml | kubectl apply -f -
      # Create secret in target namespace (mounted as volume in target pod)
      - |
        kubectl create secret generic gcp-credentials-json \
          --from-file=credentials.json="${GOOGLE_APPLICATION_CREDENTIALS}" \
          -n {{.NAMESPACE}} \
          --dry-run=client -o yaml | kubectl apply -f -
      - kubectl kustomize {{.ROOT_DIR}}/k8s/overlays/postgres-gcp-path | envsubst | kubectl apply -f -
      - task: _wait:app:gcp:path

  run:local:gcp:path:
    desc: "Run PostgreSQL app locally with mirrord using credentials_path (file-based credentials)"
    dir: '{{.ROOT_DIR}}/apps/postgres-app'
    preconditions:
      - sh: test -n "${CLOUDSQL_HOST}"
        msg: "CLOUDSQL_HOST not set"
    cmds:
      - |
        echo "=== Starting mirrord with GCP Cloud SQL IAM auth (credentials_path) ==="
        echo "Cloud SQL Host: ${CLOUDSQL_HOST}"
        echo "Database: ${CLOUDSQL_DATABASE}"
        echo "User: ${CLOUDSQL_USER}"
        echo "Project: ${GCP_PROJECT}"
        echo ""
        echo "Using credentials_path - mirrord reads the file content from Secret automatically"
        echo ""
      - echo "Building PostgreSQL app..."
      - go build -o /tmp/postgres-app main.go
      - echo "Running with mirrord (GCP Cloud SQL + IAM auth via credentials_path)"
      - echo ""
      - '{{.MIRRORD_BIN}} exec -f {{.ROOT_DIR}}/k8s/overlays/postgres-gcp-path/mirrord.json -- /tmp/postgres-app'

  test:gcp:path:
    desc: "Full GCP Cloud SQL test with credentials_path: deploy, run with mirrord"
    cmds:
      - task: deploy:gcp:path
      - echo ""
      - echo "GCP Cloud SQL (path) app deployed. Now run 'task postgres:run:local:gcp:path' to test."

  status:gcp:path:
    desc: "Show GCP Cloud SQL (path) test environment status"
    cmds:
      - echo "=== Pods in {{.NAMESPACE}} ==="
      - kubectl get pods -n {{.NAMESPACE}} -l app=pg-cloudsql-target-path
      - echo ""
      - echo "=== Branch Databases ==="
      - kubectl get pgbranchdatabases -n {{.NAMESPACE}} -l db-owner-name=cloudsql-branch-path -o custom-columns=NAME:.metadata.name,PHASE:.status.phase 2>/dev/null || echo "No branches"

  logs:gcp:path:branch:
    desc: "Show GCP Cloud SQL (path) branch pod logs"
    cmds:
      - |
        POD=$(kubectl get pod -n {{.NAMESPACE}} -l db-owner-name=cloudsql-branch-path --field-selector=status.phase=Running -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
        if [ -z "$POD" ]; then
          echo "No branch pod found for cloudsql-branch-path"
          kubectl get pods -n {{.NAMESPACE}} -l db-owner-name
          exit 1
        fi
        echo "Branch pod: $POD"
        echo ""
        echo "=== Init Container Logs (pg-branch-init) ==="
        kubectl logs -n {{.NAMESPACE}} $POD -c pg-branch-init 2>/dev/null || echo "Init container logs not available"

  clean:gcp:path:
    desc: "Clean GCP Cloud SQL (path) test resources"
    cmds:
      - kubectl delete pod pg-cloudsql-target-path -n {{.NAMESPACE}} --ignore-not-found=true
      - kubectl delete service pg-cloudsql-service-path -n {{.NAMESPACE}} --ignore-not-found=true
      - kubectl delete pgbranchdatabase -l db-owner-name=cloudsql-branch-path -n {{.NAMESPACE}} --ignore-not-found=true

  _wait:app:gcp:path:
    internal: true
    cmds:
      - echo "Waiting for Cloud SQL (path) target pod..."
      - kubectl wait --for=condition=ready pod/pg-cloudsql-target-path -n {{.NAMESPACE}} --timeout=120s

  # =============================================================================
  # RESET TASKS - Clean cluster and set up fresh environment
  # These tasks are meant to be called from the parent Taskfile
  # Use: task test:postgres:aws:clean, task test:postgres:gcp:clean, etc.
  # =============================================================================

  _reset:print:aws:
    internal: true
    cmds:
      - |
        echo ""
        echo "============================================"
        echo "AWS RDS environment ready!"
        echo ""
        echo "Run mirrord with:"
        echo "  task postgres:run:local:aws"
        echo ""
        echo "Or debug branch pod:"
        echo "  task postgres:debug:branch-pod"
        echo "============================================"

  _reset:print:gcp:
    internal: true
    cmds:
      - |
        echo ""
        echo "============================================"
        echo "GCP Cloud SQL environment ready!"
        echo ""
        echo "Run mirrord with:"
        echo "  task postgres:run:local:gcp"
        echo ""
        echo "Or debug branch pod:"
        echo "  task postgres:debug:branch-pod"
        echo "============================================"

  _reset:print:gcp:path:
    internal: true
    cmds:
      - |
        echo ""
        echo "============================================"
        echo "GCP Cloud SQL (path) environment ready!"
        echo ""
        echo "Run mirrord with:"
        echo "  task postgres:run:local:gcp:path"
        echo ""
        echo "Or debug branch pod:"
        echo "  task postgres:debug:branch-pod"
        echo "============================================"

  test:literal-value:
    desc: "Test literal value scenario: deploy target pod, run mirrord, verify secret"
    cmds:
      - task: deploy:base
      - task: deploy:literal-value:pod
      - echo ""
      - echo "Environment ready. Run mirrord:"
      - echo "  task postgres:run:local:literal-value"
      - echo ""
      - echo "After mirrord runs, verify:"
      - echo "  task postgres:verify:literal-value:secret"
      - echo ""
      - echo "Test orphan cleanup:"
      - echo "  task postgres:test:orphan-cleanup"

  deploy:literal-value:pod:
    desc: "Deploy target pod with individual DB env vars for literal value testing"
    cmds:
      - |
        kubectl apply -n {{.NAMESPACE}} -f - <<'EOF'
        apiVersion: v1
        kind: Pod
        metadata:
          name: pg-server-literal-value
          labels:
            test-scenario: literal-value
        spec:
          containers:
          - name: app
            image: busybox
            command: ["sh", "-c", "sleep 3600"]
            env:
            - name: DB_HOST
              value: "postgres-test"
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: "postgres"
            - name: DB_PASSWORD
              value: "postgres"
            - name: DB_NAME
              value: "source_db"
        EOF
      - kubectl wait --for=condition=ready pod/pg-server-literal-value -n {{.NAMESPACE}} --timeout=60s

  run:local:literal-value:
    desc: "Run mirrord with literal value config"
    dir: '{{.ROOT_DIR}}/apps/postgres-app'
    cmds:
      - echo "Building PostgreSQL app..."
      - go build -o /tmp/postgres-app main.go
      - echo "Running with mirrord (literal value password)"
      - '{{.MIRRORD_BIN}} exec -f {{.ROOT_DIR}}/k8s/overlays/postgres/mirrord-literal-value.json -- /tmp/postgres-app'

  verify:literal-value:secret:
    desc: "Verify credential secret has annotation, label, and ownerRef"
    cmds:
      - |
        echo "=== Credential Secrets ==="
        kubectl get secrets -n {{.NAMESPACE}} -l operator.metalbear.co/branch-credential=true \
          -o custom-columns=NAME:.metadata.name,CLEANUP-AFTER:.metadata.annotations.operator\.metalbear\.co/cleanup-after,OWNERS:.metadata.ownerReferences[*].name
        echo ""
        echo "=== Full YAML ==="
        kubectl get secrets -n {{.NAMESPACE}} -l operator.metalbear.co/branch-credential=true -o yaml

  test:orphan-cleanup:
    desc: "Simulate orphaned secret and watch it get cleaned up"
    cmds:
      - |
        SECRET=$(kubectl get secrets -n {{.NAMESPACE}} -l operator.metalbear.co/branch-credential=true -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
        if [ -z "$SECRET" ]; then
          echo "No credential secret found. Run 'task postgres:run:local:literal-value' first."
          exit 1
        fi
        echo "Found credential secret: $SECRET"
        echo ""
        echo "1. Removing ownerReferences (simulating CLI crash)..."
        kubectl patch secret $SECRET -n {{.NAMESPACE}} --type=json \
          -p='[{"op":"remove","path":"/metadata/ownerReferences"}]' 2>/dev/null || \
          echo "   (no ownerReferences to remove)"
        echo ""
        echo "2. Setting cleanup-after to a past timestamp..."
        kubectl annotate secret $SECRET -n {{.NAMESPACE}} --overwrite \
          operator.metalbear.co/cleanup-after="2020-01-01T00:00:00Z"
        echo ""
        echo "3. Watching for deletion (sweep runs every 5s)..."
        echo "   Press Ctrl+C when done."
        kubectl get secrets -n {{.NAMESPACE}} -l operator.metalbear.co/branch-credential=true -w

  clean:literal-value:
    desc: "Clean literal value test resources"
    cmds:
      - kubectl delete pod pg-server-literal-value -n {{.NAMESPACE}} --ignore-not-found=true
      - kubectl delete branchdatabase -l mirrord.metalbear.co/branch-id=pg-literal-value-test -n {{.NAMESPACE}} --ignore-not-found=true
      - kubectl delete secrets -l operator.metalbear.co/branch-credential=true -n {{.NAMESPACE}} --ignore-not-found=true

  # literal-value WITHOUT password on the target pod.
  # The target pod has no DB_PASSWORD env var. The mirrord config supplies
  # the password as a literal value. The expectation is that mirrord/operator
  # creates a credential Secret and exposes it to the local app (via
  # secretKeyRef on the relevant pod, resolved by Kubernetes), so that the
  # app's os.Getenv("DB_PASSWORD") returns "postgres" and the connection
  # to the branch DB succeeds. If the app fails with
  # `required env var DB_PASSWORD is not set`, the literal-value flow is
  # broken end-to-end.

  test:literal-value:no-pass:
    desc: "Literal-value test where target pod has NO DB_PASSWORD"
    cmds:
      - task: deploy:base
      - task: deploy:literal-value:no-pass:pod
      - echo ""
      - echo "Target pod is up WITHOUT DB_PASSWORD. Now run:"
      - echo "  task postgres:run:local:literal-value:no-pass"
      - echo ""
      - echo "After it runs, check the credential Secret with:"
      - echo "  task postgres:verify:literal-value:secret"

  deploy:literal-value:no-pass:pod:
    desc: "Deploy a target pod that exposes DB params except DB_PASSWORD. DB_USER is sourced from a user-managed Secret via secretKeyRef to verify the Env-via-secretKeyRef + literal-value combination works end-to-end."
    cmds:
      - |
        kubectl apply -n {{.NAMESPACE}} -f - <<'EOF'
        apiVersion: v1
        kind: Secret
        metadata:
          name: pg-user-secret
        type: Opaque
        stringData:
          username: "postgres"
        EOF
      - |
        kubectl apply -n {{.NAMESPACE}} -f - <<'EOF'
        apiVersion: v1
        kind: Pod
        metadata:
          name: pg-server-no-pass
          labels:
            test-scenario: literal-value-no-pass
        spec:
          containers:
          - name: app
            image: busybox
            command: ["sh", "-c", "sleep 3600"]
            env:
            - name: DB_HOST
              value: "postgres-test"
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: pg-user-secret
                  key: username
            - name: DB_NAME
              value: "source_db"
        EOF
      - kubectl wait --for=condition=ready pod/pg-server-no-pass -n {{.NAMESPACE}} --timeout=60s

  run:local:literal-value:no-pass:
    desc: "Run the params app via mirrord, expecting DB_PASSWORD from the literal value"
    dir: '{{.ROOT_DIR}}/apps/postgres-app-params'
    cmds:
      - echo "Building postgres-app-params..."
      - go build -o /tmp/postgres-app-params main.go
      - echo "Running with mirrord (literal-value, target pod has no DB_PASSWORD)"
      - '{{.MIRRORD_BIN}} exec -f {{.ROOT_DIR}}/k8s/overlays/postgres/mirrord-literal-value-no-pass.json -- /tmp/postgres-app-params'

  clean:literal-value:no-pass:
    desc: "Clean literal-value-no-pass test resources"
    cmds:
      - kubectl delete pod pg-server-no-pass -n {{.NAMESPACE}} --ignore-not-found=true
      - kubectl delete secret pg-user-secret -n {{.NAMESPACE}} --ignore-not-found=true
      - kubectl delete branchdatabase -l mirrord.metalbear.co/branch-id=pg-literal-value-no-pass -n {{.NAMESPACE}} --ignore-not-found=true
      - kubectl delete secrets -l operator.metalbear.co/branch-credential=true -n {{.NAMESPACE}} --ignore-not-found=true
