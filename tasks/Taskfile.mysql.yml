version: '3'

vars:
  ROOT_DIR:
    sh: cd .. && pwd
  NAMESPACE: '{{.NAMESPACE | default "test-mirrord"}}'
  MODULAR_TESTS_DIR: '{{.ROOT_DIR}}/k8s/mysql/modular-tests'
  COMPLETE_TESTS_DIR: '{{.ROOT_DIR}}/k8s/mysql/complete-tests'
  MYSQL_COMPLETE_FILE: '{{.COMPLETE_TESTS_DIR}}/mysql-test.yaml'
  MARIADB_COMPLETE_FILE: '{{.COMPLETE_TESTS_DIR}}/mariadb-test.yaml'
  MYSQL_ROOT_PASSWORD: 'mysql-branch-pod-root-password'
  SOURCE_DB_PASSWORD: 'examplepassword'
  MIRRORD_BIN: '{{.MIRRORD_BIN | default "mirrord"}}'

tasks:
  deploy:
    desc: "Deploy MySQL test environment (source + scenarios)"
    cmds:
      - task: deploy:all

  deploy:base:
    desc: "Deploy only source database"
    cmds:
      - echo "Deploying source database..."
      - kubectl create namespace {{.NAMESPACE}} --dry-run=client -o yaml | kubectl apply -f -
      - kubectl apply -k {{.MODULAR_TESTS_DIR}}/base
      - task: _wait:source

  deploy:all:
    desc: "Deploy source database and all test scenarios"
    cmds:
      - task: _patch:operator
      - task: deploy:base
      - task: deploy:scenarios
      - task: _wait:branches

  deploy:scenarios:
    desc: "Deploy all test scenarios (requires base)"
    cmds:
      - echo "Deploying test scenarios..."
      - kubectl apply -k {{.MODULAR_TESTS_DIR}}/scenarios/env-val
      - kubectl apply -k {{.MODULAR_TESTS_DIR}}/scenarios/secret-ref
      - kubectl apply -k {{.MODULAR_TESTS_DIR}}/scenarios/echo
      - kubectl apply -k {{.MODULAR_TESTS_DIR}}/scenarios/multi-replica

  deploy:scenario:
    desc: "Deploy a specific scenario (SCENARIO=env-val)"
    vars:
      SCENARIO: '{{.SCENARIO | default "env-val"}}'
    cmds:
      - kubectl apply -k {{.MODULAR_TESTS_DIR}}/scenarios/{{.SCENARIO}}

  deploy:mariadb:
    desc: "Deploy MariaDB test environment"
    cmds:
      - task: _patch:operator
      - kubectl create namespace {{.NAMESPACE}} --dry-run=client -o yaml | kubectl apply -f -
      - kubectl apply -f {{.MARIADB_COMPLETE_FILE}}
      - task: _wait:db
        vars: {DB_TYPE: mariadb, POD_NAME: mariadb-test}
      - task: _wait:mariadb:branches

  test:
    desc: "Full MySQL test (deploy + verify)"
    cmds:
      - task: deploy:all
      - task: verify

  test:quick:
    desc: "Quick test - verify only (no deploy)"
    cmds:
      - task: verify

  test:scenario:
    desc: "Test specific scenario (SCENARIO=env-val)"
    vars:
      SCENARIO: '{{.SCENARIO | default "env-val"}}'
    cmds:
      - task: deploy:base
      - task: deploy:scenario
        vars: {SCENARIO: "{{.SCENARIO}}"}
      - sleep 15
      - task: verify:scenario
        vars: {SCENARIO: "{{.SCENARIO}}"}

  test:mariadb:
    desc: "Full MariaDB test (deploy + verify)"
    cmds:
      - task: deploy:mariadb
      - task: verify:mariadb

  test:race:condition:
    desc: "Test for race condition - connects immediately after Ready"
    cmds:
      - task: deploy:base
      - task: deploy:scenario
        vars: {SCENARIO: env-val}
      - |
        echo "Waiting for branch to be ready..."
        kubectl wait --for=jsonpath='{.status.phase}'=Ready mysqlbranchdatabase/mysql-test-branch-env-val -n {{.NAMESPACE}} --timeout=180s || true
        echo "Attempting immediate connection..."
        POD=$(kubectl get pods -n {{.NAMESPACE}} -l db-owner-name=mysql-test-branch-env-val --no-headers -o custom-columns=":metadata.name" | head -1)
        if kubectl exec -n {{.NAMESPACE}} "$POD" -- mysql -uroot -p{{.MYSQL_ROOT_PASSWORD}} user -e "SELECT 1" >/dev/null 2>&1; then
          echo "✓ Connection successful"
        else
          echo "✗ Connection failed - possible race condition"
        fi

  verify:
    desc: "Verify all MySQL branch data"
    cmds:
      - task: verify:all

  verify:all:
    desc: "Full verification of source and all branches"
    cmds:
      - echo ""
      - task: verify:source
      - echo ""
      - task: verify:scenario
        vars: {SCENARIO: env-val, EXPECTED_USERS: 2, EXPECTED_ORDERS: 4, MODE: "full copy"}
      - echo ""
      - task: verify:scenario
        vars: {SCENARIO: secret-ref, EXPECTED_USERS: 1, EXPECTED_ORDERS: 4, MODE: "filtered (id>1)"}
      - echo ""
      - task: verify:scenario
        vars: {SCENARIO: multi-replica, EXPECTED_USERS: 2, EXPECTED_ORDERS: 4, MODE: "deployment (3 replicas)"}
      - echo ""
      - echo "Tip - Run 'task mysql:branches' to see branch status"

  verify:source:
    desc: "Verify source database"
    cmds:
      - echo "=== Source Database (mysql-test) ==="
      - kubectl exec -n {{.NAMESPACE}} mysql-test -- mysql -uroot -p{{.SOURCE_DB_PASSWORD}} user -e "SELECT 'users' as tbl, COUNT(*) as cnt FROM users UNION SELECT 'orders', COUNT(*) FROM orders;"

  verify:scenario:
    desc: "Verify specific scenario (SCENARIO=env-val)"
    vars:
      SCENARIO: '{{.SCENARIO}}'
      MODE: '{{.MODE | default ""}}'
      EXPECTED_USERS: '{{.EXPECTED_USERS | default "?"}}'
      EXPECTED_ORDERS: '{{.EXPECTED_ORDERS | default "?"}}'
    cmds:
      - |
        echo "=== Branch [{{.SCENARIO}}] {{if .MODE}}({{.MODE}}){{end}} ==="
        POD=$(kubectl get pods -n {{.NAMESPACE}} -l db-owner-name=mysql-test-branch-{{.SCENARIO}} --no-headers -o custom-columns=":metadata.name" | head -1)
        if [ -z "$POD" ]; then
          echo "Branch not found"
          exit 1
        fi
        echo "Pod -> $POD"
        kubectl exec -n {{.NAMESPACE}} "$POD" -- mysql -uroot -p{{.MYSQL_ROOT_PASSWORD}} user -e "SELECT 'users' as tbl, COUNT(*) as cnt FROM users UNION SELECT 'orders', COUNT(*) FROM orders;" 2>/dev/null
        echo "Expected -> users={{.EXPECTED_USERS}}, orders={{.EXPECTED_ORDERS}}"

  verify:mariadb:
    desc: "Verify MariaDB branches"
    cmds:
      - echo "=== MariaDB Source ==="
      - kubectl exec -n {{.NAMESPACE}} mariadb-test -- mysql -uroot -p{{.SOURCE_DB_PASSWORD}} user -e "SELECT 'users' as tbl, COUNT(*) as cnt FROM users UNION SELECT 'orders', COUNT(*) FROM orders;"
      - echo ""
      - |
        for SCENARIO in env-val secret-ref; do
          POD=$(kubectl get pods -n {{.NAMESPACE}} -l db-owner-name=mariadb-test-branch-$SCENARIO -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
          if [ -n "$POD" ]; then
            echo "=== Branch [$SCENARIO] ==="
            kubectl exec -n {{.NAMESPACE}} "$POD" -- mysql -uroot -p{{.MYSQL_ROOT_PASSWORD}} user -e "SELECT 'users' as tbl, COUNT(*) as cnt FROM users UNION SELECT 'orders', COUNT(*) FROM orders;"
          fi
        done

  run:local:
    desc: "Run MySQL app locally with mirrord"
    dir: '{{.ROOT_DIR}}/apps/mysql-app'
    vars:
      MIRRORD_CONFIG: '{{.MIRRORD_CONFIG | default (print .ROOT_DIR "/k8s/overlays/mysql/mirrord.json")}}'
    cmds:
      - go build -o /tmp/mysql-app main.go
      - '{{.MIRRORD_BIN}} exec -f {{.MIRRORD_CONFIG}} -- /tmp/mysql-app'

  query:source:query:
    desc: "Query source database (QUERY='SELECT * FROM users')"
    vars:
      QUERY: '{{.QUERY | default "SELECT * FROM users"}}'
    cmds:
      - kubectl exec -n {{.NAMESPACE}} mysql-test -- mysql -uroot -p{{.SOURCE_DB_PASSWORD}} user -e "{{.QUERY}}"

  query:branch:
    desc: "Query branch database (SCENARIO=env-val QUERY='SELECT * FROM users')"
    vars:
      SCENARIO: '{{.SCENARIO | default "env-val"}}'
      QUERY: '{{.QUERY | default "SELECT * FROM users"}}'
    cmds:
      - |
        POD=$(kubectl get pods -n {{.NAMESPACE}} -l db-owner-name=mysql-test-branch-{{.SCENARIO}} --no-headers -o custom-columns=":metadata.name" | head -1)
        if [ -n "$POD" ]; then
          kubectl exec -n {{.NAMESPACE}} "$POD" -- mysql -uroot -p{{.MYSQL_ROOT_PASSWORD}} user -e "{{.QUERY}}"
        else
          echo "Branch '{{.SCENARIO}}' not found"
          exit 1
        fi

  query:source:
    desc: "Query the latest mirrord-created branch"
    cmds:
      - |
        echo ""
        echo "=== TABLES ==="
        kubectl exec -n {{.NAMESPACE}} mysql-test -- mysql -uroot -p{{.SOURCE_DB_PASSWORD}} user -e "SHOW TABLES" 2>/dev/null
        echo ""
        echo "=== ORDERS ==="
        kubectl exec -n {{.NAMESPACE}} mysql-test  -- mysql -uroot -p{{.SOURCE_DB_PASSWORD}} user -e "SELECT * FROM orders" 2>/dev/null
        echo ""
        echo "=== USERS ==="
        kubectl exec -n {{.NAMESPACE}} mysql-test  -- mysql -uroot -p{{.SOURCE_DB_PASSWORD}} user -e "SELECT * FROM users" 2>/dev/null
        echo ""

  query:mirrord:
    desc: "Query the latest mirrord-created branch"
    cmds:
      - |
        POD=$(kubectl get pods -n {{.NAMESPACE}} -l db-owner-name --sort-by=.metadata.creationTimestamp -o jsonpath='{.items[-1].metadata.name}' 2>/dev/null)
        if [ -n "$POD" ]; then
          echo ""
          echo "Branch Pod: $POD"
          echo ""
          echo "=== TABLES ==="
          kubectl exec -n {{.NAMESPACE}} "$POD" -- mysql -uroot -p{{.MYSQL_ROOT_PASSWORD}} user -e "SHOW TABLES" 2>/dev/null
          echo ""
          echo "=== ORDERS ==="
          kubectl exec -n {{.NAMESPACE}} "$POD" -- mysql -uroot -p{{.MYSQL_ROOT_PASSWORD}} user -e "SELECT * FROM orders" 2>/dev/null
          echo ""
          echo "=== USERS ==="
          kubectl exec -n {{.NAMESPACE}} "$POD" -- mysql -uroot -p{{.MYSQL_ROOT_PASSWORD}} user -e "SELECT * FROM users" 2>/dev/null
          echo ""
        else
          echo "No branch found. Run 'task mysql:run:local' first."
          exit 1
        fi

  test:local:
    desc: "Run app locally with mirrord, then query the branch"
    cmds:
      - task: run:local
      - task: query:mirrord

  setup:local:
    desc: "Clean and setup minimal environment for local testing"
    cmds:
      - echo "Cleaning up..."
      - kubectl delete mysqlbranchdatabase --all -n {{.NAMESPACE}} --ignore-not-found=true
      - kubectl delete pod -l db-owner-name -n {{.NAMESPACE}} --ignore-not-found=true
      - kubectl delete -k {{.MODULAR_TESTS_DIR}}/scenarios/secret-ref --ignore-not-found=true 2>/dev/null || true
      - kubectl delete -k {{.MODULAR_TESTS_DIR}}/scenarios/echo --ignore-not-found=true 2>/dev/null || true
      - kubectl delete -k {{.MODULAR_TESTS_DIR}}/scenarios/multi-replica --ignore-not-found=true 2>/dev/null || true
      - echo ""
      - echo "Deploying source database + env-val scenario..."
      - task: deploy:base
      - task: deploy:scenario
        vars: {SCENARIO: env-val}

  logs:
    desc: "Show MySQL app logs"
    cmds:
      - kubectl logs -n {{.NAMESPACE}} -l app=mysql-app --tail=100 -f

  logs:source:
    desc: "Show source database logs"
    cmds:
      - kubectl logs -n {{.NAMESPACE}} mysql-test --tail=100 -f

  logs:branch:
    desc: "Show branch pod logs (SCENARIO=env-val)"
    vars:
      SCENARIO: '{{.SCENARIO | default "env-val"}}'
    cmds:
      - |
        POD=$(kubectl get pods -n {{.NAMESPACE}} -l db-owner-name=mysql-test-branch-{{.SCENARIO}} --no-headers -o custom-columns=":metadata.name" | head -1)
        kubectl logs -n {{.NAMESPACE}} "$POD" --tail=100 -f

  shell:
    desc: "Shell into source database"
    cmds:
      - kubectl exec -it -n {{.NAMESPACE}} mysql-test -- mysql -uroot -p{{.SOURCE_DB_PASSWORD}} user

  shell:source:
    desc: "Shell into source database"
    cmds:
      - task: shell

  shell:branch:
    desc: "Shell into branch database (SCENARIO=env-val)"
    vars:
      SCENARIO: '{{.SCENARIO | default "env-val"}}'
    cmds:
      - |
        POD=$(kubectl get pods -n {{.NAMESPACE}} -l db-owner-name=mysql-test-branch-{{.SCENARIO}} --no-headers -o custom-columns=":metadata.name" | head -1)
        kubectl exec -it -n {{.NAMESPACE}} "$POD" -- mysql -uroot -p{{.MYSQL_ROOT_PASSWORD}} user

  status:
    desc: "Show MySQL test environment status"
    cmds:
      - echo "=== Source Database ==="
      - kubectl get pod mysql-test -n {{.NAMESPACE}} -o wide 2>/dev/null || echo "Not deployed"
      - echo ""
      - echo "=== Branch Databases ==="
      - kubectl get mysqlbranchdatabases -n {{.NAMESPACE}} -o custom-columns=NAME:.metadata.name,PHASE:.status.phase,EXPIRES:.status.expireTime 2>/dev/null || echo "No branches"
      - echo ""
      - echo "=== Branch Pods ==="
      - kubectl get pods -n {{.NAMESPACE}} -l db-owner-name --no-headers 2>/dev/null || echo "No branch pods"

  branches:
    desc: "List all MySQL branch databases"
    cmds:
      - kubectl get mysqlbranchdatabases -n {{.NAMESPACE}} -o custom-columns=NAME:.metadata.name,BRANCH_ID:.spec.id,PHASE:.status.phase,EXPIRES:.status.expireTime

  describe:
    desc: "Describe test scenario pod (SCENARIO=env-val)"
    vars:
      SCENARIO: '{{.SCENARIO | default "env-val"}}'
    cmds:
      - |
        POD=$(kubectl get pods -n {{.NAMESPACE}} -l test-scenario={{.SCENARIO}} --no-headers -o custom-columns=":metadata.name" | head -1)
        kubectl describe pod -n {{.NAMESPACE}} $POD

  clean:
    desc: "Clean all MySQL test resources"
    cmds:
      - kubectl delete -k {{.MODULAR_TESTS_DIR}} --ignore-not-found=true
      - kubectl delete namespace {{.NAMESPACE}} --ignore-not-found=true --wait=false

  clean:branches:
    desc: "Clean only branch databases (keep source)"
    cmds:
      - kubectl delete mysqlbranchdatabase --all -n {{.NAMESPACE}} --ignore-not-found=true

  clean:mariadb:
    desc: "Clean MariaDB test resources"
    cmds:
      - kubectl delete -f {{.MARIADB_COMPLETE_FILE}} --ignore-not-found=true

  _patch:operator:
    internal: true
    cmds:
      - kubectl patch deployment mirrord-operator -n mirrord --patch-file {{.ROOT_DIR}}/k8s/overlays/mysql/operator-patch.yaml --type=strategic || true
      - kubectl rollout status deployment/mirrord-operator -n mirrord --timeout=300s || true

  _wait:source:
    internal: true
    cmds:
      - echo "Waiting for source database..."
      - kubectl wait --for=condition=ready pod -l app=mysql-test -n {{.NAMESPACE}} --timeout=300s
      - |
        echo "Waiting for MySQL to accept connections..."
        for i in {1..30}; do
          if kubectl exec -n {{.NAMESPACE}} mysql-test -- mysql -uroot -p{{.SOURCE_DB_PASSWORD}} -e "SELECT 1" >/dev/null 2>&1; then
            echo "MySQL ready"
            exit 0
          fi
          sleep 2
        done
        echo "MySQL failed to become ready"
        exit 1

  _wait:branches:
    internal: true
    cmds:
      - echo "Waiting for branch databases (1-2 minutes)..."
      - sleep 10
      - kubectl wait --for=condition=ready pod -l db-owner-name=mysql-test-branch-env-val -n {{.NAMESPACE}} --timeout=300s || true
      - kubectl wait --for=condition=ready pod -l db-owner-name=mysql-test-branch-secret-ref -n {{.NAMESPACE}} --timeout=300s || true
      - kubectl wait --for=condition=ready pod -l db-owner-name=mysql-test-branch-multi-replica -n {{.NAMESPACE}} --timeout=300s || true
      - sleep 5

  _wait:db:
    internal: true
    vars:
      DB_TYPE: '{{.DB_TYPE}}'
      POD_NAME: '{{.POD_NAME}}'
    cmds:
      - kubectl wait --for=condition=ready pod/{{.POD_NAME}} -n {{.NAMESPACE}} --timeout=300s
      - |
        for i in {1..30}; do
          if kubectl exec -n {{.NAMESPACE}} {{.POD_NAME}} -- mysql -uroot -p{{.SOURCE_DB_PASSWORD}} -e "SELECT 1" >/dev/null 2>&1; then
            echo "{{.DB_TYPE}} ready"
            break
          fi
          sleep 2
        done

  _wait:mariadb:branches:
    internal: true
    cmds:
      - sleep 5
      - kubectl wait --for=jsonpath='{.status.phase}'=Ready mysqlbranchdatabase/mariadb-test-branch-env-val -n {{.NAMESPACE}} --timeout=180s || true
      - kubectl wait --for=jsonpath='{.status.phase}'=Ready mysqlbranchdatabase/mariadb-test-branch-secret-ref -n {{.NAMESPACE}} --timeout=180s || true
